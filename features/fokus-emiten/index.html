<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fokus Emiten · IHSG Suite</title>
  <link rel="stylesheet" href="../../shared/ui.css">

  <style>
    /* ── VIEW: PILIH EMITEN ── */
    .emiten-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
      margin-top: 20px;
    }

    .emiten-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      padding: 18px;
      cursor: pointer;
      transition: all var(--ease);
    }
    .emiten-card:hover { border-color: var(--phosphor-line); background: var(--panel-hi); }

    .emiten-card-sym {
      font-family: var(--f-mono);
      font-size: 20px;
      color: var(--paper);
      letter-spacing: 0.02em;
      margin-bottom: 4px;
    }
    .emiten-card-indicator {
      font-family: var(--f-mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--phosphor);
      margin-bottom: 12px;
    }
    .emiten-card-formula {
      font-family: var(--f-mono);
      font-size: 11px;
      color: var(--dim);
      line-height: 1.7;
      border-top: 1px solid var(--line);
      padding-top: 10px;
    }
    .emiten-card-formula .rule-entry::before { content: "▲ "; color: var(--live); }
    .emiten-card-formula .rule-exit::before  { content: "▼ "; color: var(--down); }

    .emiten-card-stat {
      display: flex; justify-content: space-between;
      font-family: var(--f-mono); font-size: 10px; color: var(--ghost);
      margin-top: 10px;
    }
    .emiten-card-stat b { color: var(--dim); }

    .empty-slot {
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      padding: 18px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--f-mono); font-size: 11px; color: var(--ghost);
      text-align: center;
      min-height: 140px;
    }

    /* ── VIEW: DETAIL CHART ── */
    .focus-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px; flex-wrap: wrap; gap: 10px;
    }
    .focus-back {
      font-family: var(--f-mono); font-size: 11px; color: var(--ghost);
      cursor: pointer; display: flex; align-items: center; gap: 6px;
    }
    .focus-back:hover { color: var(--dim); }

    .focus-title-row { display: flex; align-items: baseline; gap: 12px; }
    .focus-sym { font-family: var(--f-mono); font-size: 22px; color: var(--paper); }
    .focus-indicator-name {
      font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--phosphor);
      border: 1px solid var(--phosphor-line); border-radius: var(--radius);
      padding: 3px 10px;
    }

    .legend-row {
      display: flex; gap: 18px; flex-wrap: wrap;
      font-family: var(--f-mono); font-size: 10px; color: var(--ghost);
      margin-bottom: 12px;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 2px; }

    #chart-main { width: 100%; height: 540px; border: 1px solid var(--line); border-radius: var(--radius); }

    .status-strip {
      display: flex; gap: 16px; flex-wrap: wrap;
      font-family: var(--f-mono); font-size: 11px; color: var(--dim);
      margin-top: 12px; padding: 10px 14px;
      border: 1px solid var(--line); border-radius: var(--radius);
      background: var(--panel);
    }
    .status-strip .item b { color: var(--paper); margin-left: 4px; }
    .status-strip .signal-active { color: var(--live); font-weight: 600; }
    .status-strip .signal-avoid  { color: var(--down); font-weight: 600; }

    .refresh-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-family: var(--f-mono); font-size: 10px;
      color: var(--ghost); letter-spacing: 0.05em;
    }
    .refresh-badge.is-market-open { color: var(--live); }
    .refresh-badge.is-refreshing  { color: var(--phosphor); }
    .refresh-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--ghost);
    }
    .refresh-badge.is-market-open .refresh-dot  { background: var(--live); animation: blink 1.5s step-end infinite; }
    .refresh-badge.is-refreshing  .refresh-dot  { background: var(--phosphor); }

    /* ── TIMEFRAME SELECTOR ── */
    .tf-bar {
      display: flex; align-items: center; gap: 2px; margin-bottom: 8px;
    }
    .tf-btn {
      padding: 2px 7px; border-radius: 4px; border: none;
      background: transparent; color: var(--ghost);
      font-family: var(--f-mono); font-size: 11px; cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .tf-btn:hover  { background: var(--raised); color: var(--paper); }
    .tf-btn.active { background: var(--phosphor); color: var(--bg); font-weight: 700; }
  </style>
</head>
<body>

<div class="page">

  <header class="app-header" id="app-header"></header>

  <!-- VIEW 1: PILIH EMITEN -->
  <div id="view-select">
    <div class="section-label">Emiten dengan Formula Tervalidasi</div>
    <div class="emiten-grid" id="emiten-grid"></div>
  </div>

  <!-- VIEW 2: DETAIL CHART -->
  <div id="view-detail" class="hidden">
    <div class="focus-header">
      <div class="focus-back" id="back-btn">← Kembali ke daftar emiten</div>
    </div>
    <div class="focus-title-row" style="margin-bottom:6px;">
      <span class="focus-sym" id="focus-sym"></span>
      <span class="focus-indicator-name" id="focus-indicator-name"></span>
    </div>
    <div class="legend-row" id="legend-row"></div>
    <div id="refresh-badge-wrap" style="margin-bottom:8px;"></div>
    <div class="tf-bar" id="tf-bar-fokus">
      <button class="tf-btn" data-tf="5m">5m</button>
      <button class="tf-btn" data-tf="15m">15m</button>
      <button class="tf-btn" data-tf="30m">30m</button>
      <button class="tf-btn" data-tf="1h">1h</button>
      <button class="tf-btn active" data-tf="1D">1D</button>
      <button class="tf-btn" data-tf="1W">1W</button>
      <button class="tf-btn" data-tf="1M">1M</button>
    </div>
    <div id="chart-main"></div>
    <div class="status-strip" id="status-strip"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@5.2.0/dist/lightweight-charts.standalone.production.js"></script>

<script type="module">
  import { TOKEN }        from '../../shared/store.js'
import { isMarketHours } from '../../shared/monitor.js'
  import { fetchDaily, fetchIntraday } from '../../shared/api.js'

  // Baca gap category dari URL parameter (dikirim dari dashboard panel kiri)
  // ?gap=UP → exit ORB 10:00 | ?gap=DOWN → exit ORB 09:15 | tidak ada → default UP
  {
    const urlGap = new URLSearchParams(window.location.search).get('gap')
    if (urlGap === 'UP' || urlGap === 'DOWN') window._rajaGapCat = urlGap
    else if (!window._rajaGapCat) window._rajaGapCat = 'UP'
  }
  import { renderHeader, openTokenPopover, whenTokenReady } from '../../shared/header.js'
  import { calcRSI, calcMACD, calcSMA, calcConnorsRSI, resampleWeekly, resampleMonthly } from '../../shared/indicators.js'

  renderHeader(document.getElementById('app-header'), [
    { label: 'IHSG Suite', href: '../../index.html' },
    { label: 'Fokus Emiten' }
  ])

  // ============================================================
  // DAFTAR EMITEN — formula tervalidasi lewat analisa manual.
  // Tiap entry: { sym, indicatorName, formula, evaluate(daily) -> {entry: bool[], avoid: bool[]}, summary }
  // ============================================================
  const EMITEN_PROFILES = [
    {
      sym: 'RAJA',
      indicatorName: 'Kunci RAJA',
      summary: 'Entry: Connors RSI ≤15 + Asing Net Buy (filter konfluensi). Max 3 posisi, min jarak 14 hari. Exit per posisi: Trailing stop 30%. Exit semua: MACD hist>100. Filter asing membuang trade saat institusi distribusi (WLB naik 43%→65%, win rate 65%→92%).',
      stat: { n: 20, wlb: '69.9%', horizon: 'per-trade, avg hold ~184 hari kalender' },
      rules: [
        { type: 'entry', text: 'Connors RSI ≤ 15' },
        { type: 'entry', text: 'Asing NET BUY hari itu (foreignbuy > foreignsell) — filter konfluensi' },
        { type: 'entry', text: 'Max 3 posisi terbuka bersamaan' },
        { type: 'entry', text: 'Min jarak 14 hari dari entry sebelumnya' },
        { type: 'exit',  text: 'Trailing stop 30% dari highest tiap posisi (independen)' },
        { type: 'exit',  text: 'MACD histogram > 100 → EXIT SEMUA posisi sekaligus' },
      ],
      // Hitung indikator turunan, lalu jalankan state machine MULTI-POSISI
      compute(daily) {
        const closes  = daily.map(d => d.close)
        const rsi    = calcRSI(closes, 14)
        const ma20   = calcSMA(closes, 20)
        const macd   = calcMACD(closes)
        const cRsi   = calcConnorsRSI(closes, 3, 2, 100)

        const out = daily.map((d, i) => ({
          ...d,
          _rsi: rsi[i],
          _ma20: ma20[i],
          _macdHist: macd.hist[i],
          _connorsRsi: cRsi[i],
          _signal: null,    // 'entry' | 'exit_trail' | 'exit_macd' | null
          _posCount: 0,     // jumlah posisi terbuka di hari ini
        }))

        // ============================================================
        // STATE MACHINE MULTI-POSISI
        // RIWAYAT KEPUTUSAN:
        // 1. Awalnya 1 posisi saja (state machine standar) → WLB 52.3% n=11
        // 2. Multi-posisi (max 3, min gap 14 hari) → WLB 69.9% n=20
        //    Mengapa WLB naik: RAJA sering turun sementara beberapa kali
        //    dalam satu rally besar → sinyal Connors RSI muncul berulang
        //    → dengan 1 posisi, sinyal tambahan terbuang; dengan multi-
        //    posisi, semua entry punya harga berbeda tapi exit di rally
        //    yang sama → return rata-rata jauh lebih baik.
        // 3. Stop loss 5% diuji → merusak WLB (dari 52% → 11%) → tidak dipakai.
        // ============================================================
        const MAX_POS      = 3
        const MIN_GAP_DAYS = 14   // hari kalender minimum antar entry
        const TRAIL_PCT    = 30
        const MACD_AVOID   = 100
        const CRSI_THRESH  = 15

        let positions = []        // [{entryIdx, entryPrice, highest}]
        let lastEntryDate = null

        const msPerDay = 86400000

        for (let i = 0; i < out.length; i++) {
          const d = out[i]

          // EXIT semua posisi kalau MACD ekstrem
          const macdExit = d._macdHist != null && d._macdHist > MACD_AVOID
          if (macdExit && positions.length > 0) {
            // Tandai exit MACD di hari ini (hanya 1 marker, bukan per posisi)
            d._signal = 'exit_macd'
            positions = []
          }

          if (!macdExit) {
            // Update highest + cek trailing stop tiap posisi
            const remaining = []
            let anyExited = false
            for (const pos of positions) {
              if (d.close > pos.highest) pos.highest = d.close
              const drawdown = (pos.highest - d.close) / pos.highest * 100
              if (drawdown >= TRAIL_PCT) {
                anyExited = true  // ada yang kena trailing
              } else {
                remaining.push(pos)
              }
            }
            positions = remaining
            if (anyExited && d._signal == null) d._signal = 'exit_trail'
          }

          out[i]._posCount = positions.length

          // Cek entry baru
          // Filter konfluensi: CRSI ≤ 15 + Asing NET BUY
          // (dari backtest: WLB naik dari 43% → 65%, win rate 65% → 92%, n=12)
          const foreignNetBuy = (d.foreignbuy || 0) > (d.foreignsell || 0)
          const entryOk = d._connorsRsi != null && d._connorsRsi <= CRSI_THRESH && foreignNetBuy
          // Tandai hari CRSI rendah tapi asing distribusi → marker khusus
          const crsiOkButForeignSell = d._connorsRsi != null && d._connorsRsi <= CRSI_THRESH && !foreignNetBuy
          if (crsiOkButForeignSell && d._signal == null) d._signal = 'crsi_no_foreign'
          if (entryOk && positions.length < MAX_POS) {
            // Cek min gap dari entry terakhir
            let gapOk = true
            if (lastEntryDate != null && MIN_GAP_DAYS > 0) {
              const gapMs = new Date(d.date) - new Date(lastEntryDate)
              const gapDays = gapMs / msPerDay
              gapOk = gapDays >= MIN_GAP_DAYS
            }
            if (gapOk) {
              // Tandai entry
              if (d._signal == null) d._signal = 'entry'
              positions.push({ entryIdx: i, entryPrice: d.close, highest: d.close })
              lastEntryDate = d.date
            }
          }
        }

        return out
      }
    },

    // ============================================================
    // KUNCI RAJA INTRADAY
    // ============================================================
    {
      sym: 'RAJA',
      indicatorName: 'Kunci RAJA Intraday',
      mode: 'intraday',  // mode flag untuk membedakan dari kartu swing
      summary: 'Formula berbeda per kondisi IEP Gap. SKIP jika IEP Stabil (±0.5%). GAP UP: entry 09:00, exit ORB 10:00 (WLB 71.6%, avg +2.83%). GAP DOWN: entry 09:00, exit ORB 09:15 (WLB 81.6%, avg +2.80%, 100% win). Deadline ORB: 09:15 — tidak ada breakout → EXIT AVOID.',
      stat: { n: 58, wlb: '79.2%', horizon: 'ORB days only (skip stabil), GAP UP exit 10:00, GAP DOWN exit 09:15' },
      rules: [
        { type: 'avoid', text: 'SKIP jika IEP Stabil (gap ±0.5% dari close kemarin) — WLB ORB hanya 50.8%' },
        { type: 'entry', text: 'Entry Open 09:00 hanya jika IEP Gap UP (>+0.5%) atau Gap DOWN (<-0.5%)' },
        { type: 'entry', text: 'Monitor ORB breakout UP jam 09:05–09:14 (deadline 09:15)' },
        { type: 'exit',  text: 'GAP UP + ORB UP → exit jam 10:00 (WLB 71.6%, avg +2.83%, R/R 4.36x)' },
        { type: 'exit',  text: 'GAP DOWN + ORB UP → exit jam 09:15 (WLB 81.6%, avg +2.80%, 100% win, n=17)' },
        { type: 'avoid', text: 'Tidak ada ORB sebelum 09:15 → EXIT AVOID 09:15 (avg -0.81%)' },
      ],
      // compute() untuk intraday berbeda — fetch data 1m hari ini,
      // hitung ORB high/low dari 09:00-09:04, deteksi breakout
      async computeIntraday(sym, fetchIntradayFn) {
        const now = new Date()
        const wib = new Date(now.getTime() + 7*3600*1000)
        const dateStr = wib.toISOString().slice(0, 10)

        // Fetch intraday 5m hari ini (untuk chart) + 1m untuk ORB presisi
        const toTs   = Math.floor(now.getTime() / 1000)
        const fromTs = Math.floor(new Date(dateStr + 'T01:00:00Z').getTime() / 1000)  // 08:00 WIB

        const raw1m = await fetchIntradayFn(sym, toTs, fromTs, 1)
        const raw5m = await fetchIntradayFn(sym, toTs, fromTs, 5)

        if (!raw1m || raw1m.length === 0) return null

        const sort1m = [...raw1m].sort((a,b) => a.unix - b.unix)
        const sort5m = [...raw5m].sort((a,b) => a.unix - b.unix)

        // IEP candle (08:45-08:59)
        const iepCandles = sort1m.filter(c => {
          const t = (c.datetime||'').slice(11,16)
          return t >= '08:45' && t <= '08:59'
        })
        const iepClose = iepCandles.length ? iepCandles[iepCandles.length-1].close : null
        const iepVol   = iepCandles.reduce((s,c) => s + (c.volume||0), 0)

        // ORB range (09:00-09:04)
        const orbCandles = sort1m.filter(c => {
          const t = (c.datetime||'').slice(11,16)
          return t >= '09:00' && t <= '09:04'
        })
        const orbHigh = orbCandles.length ? Math.max(...orbCandles.map(c=>c.high)) : null
        const orbLow  = orbCandles.length ? Math.min(...orbCandles.map(c=>c.low))  : null

        // Status breakout
        const postOrb = sort1m.filter(c => {
          const t = (c.datetime||'').slice(11,16)
          return t >= '09:05' && t < '09:15'
        })
        const brokenUp   = orbHigh && postOrb.some(c => c.close > orbHigh)
        const brokenDown = orbLow  && postOrb.some(c => c.close < orbLow)

        // Klasifikasi IEP gap
        const iepClose = iepC.length ? iepC[iepC.length-1].close : null
        let gapCat = 'STABIL'
        // prevClose diambil dari candle sebelum 08:45 (hari yang sama, tidak ada)
        // atau dari parameter yang dipass — untuk checklist pakai prevClose dari daily
        // Di sini kita tidak punya prevClose, jadi gapCat selalu STABIL kecuali ada data
        // (prevClose ditambahkan di _openDetailIntraday jika tersedia dari fetchDaily)

        // Exit time berbeda per gap (formula tervalidasi backtest)
        // GAP UP  → exit 10:00 (WLB 71.6%, avg +2.83%)
        // GAP DOWN → exit 09:15 (WLB 81.6%, avg +2.80%)
        const exitOrbTime = (window._rajaGapCat === 'DOWN') ? '09:15' : '10:00'

        // Waktu sekarang WIB
        const timeNow = wib.toISOString().slice(11,16)
        let orbStatus
        if (timeNow < '08:45')                          orbStatus = 'pre_iep'
        else if (timeNow < '09:00')                     orbStatus = 'iep_forming'
        else if (timeNow < '09:05')                     orbStatus = 'orb_forming'
        else if (brokenUp && timeNow < exitOrbTime)     orbStatus = 'broken_up'
        else if (brokenUp && timeNow >= exitOrbTime)    orbStatus = 'done_orb'
        else if (!brokenUp && timeNow < '09:15')        orbStatus = 'waiting'
        else if (!brokenUp && timeNow >= '09:15')       orbStatus = 'done_avoid'
        else                                            orbStatus = 'no_signal'

        // Tandai candle 5m dengan signal
        const out = sort5m.map(c => {
          const t = (c.datetime||'').slice(11,16)
          let _signal = null
          // Entry: candle 09:00 (Open pasar setelah IEP final)
          if (t === '09:00') _signal = 'entry'
          // Exit normal: jam sesuai gap kategori (10:00 untuk GAP UP, 09:15 untuk GAP DOWN)
          if (brokenUp && t === exitOrbTime) _signal = 'exit'
          // Exit AVOID: jam 09:15 (deadline ORB tidak terpenuhi)
          if (!brokenUp && t === '09:15') _signal = 'exit_avoid'
          return { ...c, time: c.unix, _signal, _orbHigh: orbHigh, _orbLow: orbLow }
        })

        return { candles5m: out, orbHigh, orbLow, orbStatus, iepClose, iepVol, brokenUp, brokenDown, dateStr }
      },
      // compute() reguler (dummy untuk kompatibilitas -- tidak dipakai di mode intraday)
      compute(daily) { return daily.map(d => ({ ...d, _signal: null })) }
    }
  ]

  // ============================================================
  // VIEW 1: RENDER CARD PILIHAN EMITEN
  // ============================================================
  const gridEl = document.getElementById('emiten-grid')

  function _renderCards() {
    const cards = EMITEN_PROFILES.map((p, idx) => {
      const isIntraday = p.mode === 'intraday'
      const badge = isIntraday
        ? `<span style="background:var(--phosphor);color:var(--bg);font-size:9px;padding:1px 5px;border-radius:3px;margin-left:4px;font-family:var(--f-mono);">INTRADAY</span>`
        : ''
      return `
        <div class="emiten-card" data-idx="${idx}">
          <div class="emiten-card-sym">${p.sym}${badge}</div>
          <div class="emiten-card-indicator">${p.indicatorName}</div>
          <div class="emiten-card-formula">
            ${p.rules.map(r => `<div class="rule-${r.type}">${r.text}</div>`).join('')}
          </div>
          <div class="emiten-card-stat">
            <span>n=<b>${p.stat.n}</b></span>
            <span>WLB <b>${p.stat.wlb}</b></span>
            <span>${p.stat.horizon}</span>
          </div>
        </div>
      `
    }).join('')

    const emptySlots = Array.from({ length: Math.max(0, 3 - EMITEN_PROFILES.length) })
      .map(() => `<div class="empty-slot">Belum ada formula<br>untuk emiten lain</div>`).join('')

    gridEl.innerHTML = cards + emptySlots

    gridEl.querySelectorAll('.emiten-card').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.idx)
        const profile = EMITEN_PROFILES[idx]
        if (profile.mode === 'intraday') {
          _openDetailIntraday(profile)
        } else {
          _openDetail(profile.sym, profile)
        }
      })
    })
  }
  _renderCards()

  // ============================================================
  // VIEW 2: DETAIL CHART + INDIKATOR
  // ============================================================
  const viewSelect = document.getElementById('view-select')
  const viewDetail = document.getElementById('view-detail')

  let chart = null
  let _activeSym = null        // simbol yang sedang dibuka di view detail
  let _activeTf  = '1D'        // timeframe aktif untuk tampilan chart

  const TF_CONFIG_FOKUS = {
    '5m':  { type: 'intraday', mult: 5,  batchHours: 7,   batches: 5 },
    '15m': { type: 'intraday', mult: 15, batchHours: 7,   batches: 10 },
    '30m': { type: 'intraday', mult: 30, batchHours: 720, batches: 1 },
    '1h':  { type: 'intraday', mult: 60, batchHours: 720, batches: 1 },
    '1D':  { type: 'daily' },
    '1W':  { type: 'weekly' },
    '1M':  { type: 'monthly' },
  }

  async function _fetchForTfFokus(sym, tf) {
    const cfg = TF_CONFIG_FOKUS[tf]
    if (cfg.type === 'intraday') {
      const batchMs = cfg.batchHours * 3600 * 1000
      const now = Date.now()
      const allCandles = []
      const seen = new Set()
      for (let b = 0; b < cfg.batches; b++) {
        const toTs   = Math.floor((now - b * batchMs) / 1000)
        const fromTs = Math.floor((now - (b + 1) * batchMs) / 1000)
        try {
          const candles = await fetchIntraday(sym, toTs, fromTs, cfg.mult)
          for (const c of candles) {
            if (!seen.has(c.unix)) { seen.add(c.unix); allCandles.push(c) }
          }
        } catch (e) {
          if (e.code === 'EMPTY_RESPONSE') break
          throw e
        }
      }
      return allCandles.sort((a, b) => a.unix - b.unix)
    }
    // Daily — ambil semua (warmup penuh untuk Connors RSI)
    const raw = await fetchDaily(sym)
    const daily = [...raw].sort((a, b) => a.date < b.date ? -1 : a.date > b.date ? 1 : 0)
    if (cfg.type === 'weekly')  return { daily, candles: resampleWeekly(daily) }
    if (cfg.type === 'monthly') return { daily, candles: resampleMonthly(daily) }
    return { daily, candles: daily }
  }
  let _autoRefreshTimer = null // setInterval handle untuk auto-refresh

  // Cek apakah sekarang jam bursa IDX (Senin-Jumat 08:45-16:00 WIB)
  // isMarketHours → diimport dari shared/monitor.js

  function _nextRefreshSecs() {
    return 5 * 60  // 5 menit
  }

  let _countdown = 0
  let _countdownTimer = null

  function _updateRefreshBadge(state) {
    const wrap = document.getElementById('refresh-badge-wrap')
    if (!wrap) return
    if (state === 'off') {
      wrap.innerHTML = `<span class="refresh-badge"><span class="refresh-dot"></span>Auto-refresh nonaktif (pasar tutup)</span>`
    } else if (state === 'countdown') {
      wrap.innerHTML = `<span class="refresh-badge is-market-open"><span class="refresh-dot"></span>Pasar buka · refresh berikutnya dalam <b id="refresh-countdown">${_countdown}d</b></span>`
    } else if (state === 'refreshing') {
      wrap.innerHTML = `<span class="refresh-badge is-refreshing"><span class="refresh-dot"></span>Memperbarui data...</span>`
    }
  }

  function _startCountdown(seconds) {
    _countdown = seconds
    _updateRefreshBadge('countdown')
    if (_countdownTimer) clearInterval(_countdownTimer)
    _countdownTimer = setInterval(() => {
      _countdown--
      const el = document.getElementById('refresh-countdown')
      if (el) el.textContent = _countdown + 'd'
      if (_countdown <= 0) clearInterval(_countdownTimer)
    }, 1000)
  }

  function _stopAutoRefresh() {
    if (_autoRefreshTimer) { clearInterval(_autoRefreshTimer); _autoRefreshTimer = null }
    if (_countdownTimer) { clearInterval(_countdownTimer); _countdownTimer = null }
    _updateRefreshBadge('off')
  }

  async function _refreshData() {
    if (!_activeSym || viewDetail.classList.contains('hidden')) return
    if (!TOKEN.isSet()) return
    _updateRefreshBadge('refreshing')
    try {
      const profile = EMITEN_PROFILES.find(p => p.sym === _activeSym)
      if (!profile) return
      const result = await _fetchForTfFokus(_activeSym, _activeTf)
      const isIntraday = TF_CONFIG_FOKUS[_activeTf].type === 'intraday'
      if (isIntraday) {
        // Untuk intraday, render chart saja tanpa Connors RSI signal (signal tetap daily)
        _renderChartRaw(result)
      } else {
        const { daily, candles } = result
        const computed = profile.compute(daily)
        // Render dengan candles TF tapi signal dari daily
        _renderChartWithTf(computed, candles, _activeTf)
        _renderStatusStrip(computed)
      }
    } catch (e) {
      console.warn('[auto-refresh] gagal:', e.message)
    } finally {
      if (isMarketHours()) {
        _startCountdown(_nextRefreshSecs())
      } else {
        _stopAutoRefresh()
      }
    }
  }

  function _setupAutoRefresh() {
    _stopAutoRefresh()
    if (!isMarketHours()) { _updateRefreshBadge('off'); return }
    _startCountdown(_nextRefreshSecs())
    _autoRefreshTimer = setInterval(() => {
      if (!isMarketHours()) { _stopAutoRefresh(); return }
      _refreshData()
    }, _nextRefreshSecs() * 1000)
  }

  // Guard: pastikan library LightweightCharts (dari CDN) sudah ter-load
  // sebelum dipakai. CDN kadang lambat/gagal di koneksi tertentu —
  // tunggu sebentar (retry) sebelum benar2 menyerah.
  function _waitForLightweightCharts(timeoutMs = 8000, intervalMs = 100) {
    return new Promise((resolve, reject) => {
      if (typeof LightweightCharts !== 'undefined') return resolve()
      const start = Date.now()
      const timer = setInterval(() => {
        if (typeof LightweightCharts !== 'undefined') {
          clearInterval(timer)
          resolve()
        } else if (Date.now() - start > timeoutMs) {
          clearInterval(timer)
          reject(new Error('Library chart (CDN) gagal dimuat — cek koneksi internet atau ad-blocker, lalu refresh halaman.'))
        }
      }, intervalMs)
    })
  }

  async function _openDetail(sym, profile) {
    if (!profile) profile = EMITEN_PROFILES.find(p => p.sym === sym && p.mode !== 'intraday')
    if (!profile) return

    await whenTokenReady()
    if (!TOKEN.isSet()) { openTokenPopover(); return }

    _activeSym = sym
    viewSelect.classList.add('hidden')
    viewDetail.classList.remove('hidden')

    document.getElementById('focus-sym').textContent = profile.sym
    document.getElementById('focus-indicator-name').textContent = profile.indicatorName
    document.getElementById('legend-row').innerHTML = `
      <span class="legend-item"><span class="legend-dot" style="background:#4ade80;"></span> Entry (closed)</span>
      <span class="legend-item"><span class="legend-dot" style="background:#60a5fa;"></span> Entry (masih terbuka)</span>
      <span class="legend-item"><span class="legend-dot" style="background:#f0635c;"></span> Exit Trailing</span>
      <span class="legend-item"><span class="legend-dot" style="background:#f97316;"></span> Exit MACD (semua)</span>
    `
    document.getElementById('status-strip').innerHTML = `<span class="item">Memuat data...</span>`

    // Bind tombol TF untuk view ini
    document.querySelectorAll('#tf-bar-fokus .tf-btn').forEach(btn => {
      btn.onclick = () => {
        const tf = btn.dataset.tf
        if (tf === _activeTf) return
        _activeTf = tf
        document.querySelectorAll('#tf-bar-fokus .tf-btn').forEach(b => b.classList.toggle('active', b.dataset.tf === tf))
        _loadChartForTf(sym, profile)
      }
    })

    try {
      await _waitForLightweightCharts()
      await _loadChartForTf(sym, profile)
      _setupAutoRefresh()
    } catch (e) {
      document.getElementById('status-strip').innerHTML =
        `<span class="item" style="color:var(--down);">Gagal memuat: ${e.code || e.message}</span>`
      if (e.code === 'TOKEN_EXPIRED') openTokenPopover()
    }
  }

  async function _loadChartForTf(sym, profile) {
    document.getElementById('status-strip').innerHTML = `<span class="item">Memuat data (${_activeTf})...</span>`
    const isIntraday = TF_CONFIG_FOKUS[_activeTf].type === 'intraday'
    const result = await _fetchForTfFokus(sym, _activeTf)
    if (isIntraday) {
      _renderChartRaw(result, _activeTf)
      document.getElementById('status-strip').innerHTML = `<span class="item">Chart intraday ${_activeTf} — sinyal entry/exit hanya tersedia di timeframe Daily (1D)</span>`
    } else {
      const { daily, candles } = result
      const computed = profile.compute(daily)
      _renderChartWithTf(computed, candles, _activeTf)
      _renderStatusStrip(computed)
    }
  }

  function _renderChart(computed) {
    _renderChartWithTf(computed, computed, '1D')
  }

  // Render chart intraday tanpa signal entry/exit (signal hanya valid di daily)
  function _renderChartRaw(candles, tf) {
    if (chart) { chart.remove(); chart = null }
    chart = LightweightCharts.createChart(document.getElementById('chart-main'), {
      autoSize: true,
      layout:    { background: { color: '#0a0908' }, textColor: '#6b6557' },
      grid:      { vertLines: { color: '#1a1815' }, horzLines: { color: '#1a1815' } },
      timeScale: { timeVisible: true, rightOffset: 4 }
    })
    const candleSeries = chart.addSeries(LightweightCharts.CandlestickSeries, {
      upColor: '#4ade80', downColor: '#f0635c', borderVisible: false,
      wickUpColor: '#4ade80', wickDownColor: '#f0635c'
    })
    candleSeries.setData(candles.map(d => ({ time: d.unix, open: d.open, high: d.high, low: d.low, close: d.close })))
    chart.timeScale().fitContent()
  }

  // Render chart dengan candles TF tertentu (W/M resampled atau D),
  // tapi signal entry/exit tetap dari data daily (di computed)
  function _renderChartWithTf(computed, candles, tf) {
    if (chart) { chart.remove(); chart = null }
    const isDaily = tf === '1D'

    chart = LightweightCharts.createChart(document.getElementById('chart-main'), {
      autoSize: true,
      layout:    { background: { color: '#0a0908' }, textColor: '#6b6557' },
      grid:      { vertLines: { color: '#1a1815' }, horzLines: { color: '#1a1815' } },
      timeScale: { timeVisible: false, rightOffset: 4 }
    })

    const candleSeries = chart.addSeries(LightweightCharts.CandlestickSeries, {
      upColor: '#4ade80', downColor: '#f0635c', borderVisible: false,
      wickUpColor: '#4ade80', wickDownColor: '#f0635c'
    })
    candleSeries.setData(candles.map(d => ({ time: d.date || d.time, open: d.open, high: d.high, low: d.low, close: d.close })))

    // MA20 overlay — hanya di Daily (untuk W/M tidak relevan)
    if (isDaily) {
      const ma20Series = chart.addSeries(LightweightCharts.LineSeries, {
        color: 'rgba(217,142,43,0.6)', lineWidth: 1, priceLineVisible: false, lastValueVisible: false, title: 'MA20'
      })
      ma20Series.setData(computed.filter(d => d._ma20 != null).map(d => ({ time: d.date, value: d._ma20 })))
    }

    // Marker entry/exit — hanya ditampilkan di Daily TF
    // Multi-posisi: bisa ada beberapa entry marker di hari yang sama atau berdekatan,
    // exit bisa 'exit_trail' (1 posisi kena trailing) atau 'exit_macd' (semua posisi keluar)
    if (isDaily) {
      // Posisi yang masih terbuka di akhir data = _posCount terakhir yang > 0
      const lastPosCount = computed[computed.length - 1]?._posCount || 0

      const markers = []
      // Kumpulkan semua hari yang punya signal, hindari duplikat tanggal
      const seenDates = new Set()
      for (const d of computed) {
        if (!d._signal) continue
        const key = d.date + '_' + d._signal
        if (seenDates.has(key)) continue
        seenDates.add(key)

        if (d._signal === 'entry') {
          // Cek apakah posisi yang dibuka hari ini masih terbuka (lihat _posCount di akhir)
          // Sederhana: kalau hari ini adalah entry dan tidak ada exit_macd/exit_trail setelahnya
          // yang mengosongkan semua posisi, tandai sebagai "open"
          const isNearEnd = lastPosCount > 0 &&
            !computed.slice(computed.indexOf(d) + 1).some(x => x._signal === 'exit_macd')
          markers.push({
            time: d.date,
            position: 'belowBar',
            color: isNearEnd ? '#60a5fa' : '#4ade80',
            shape: 'arrowUp',
            text: isNearEnd ? `ENTRY (${lastPosCount} open)` : 'ENTRY'
          })
        } else if (d._signal === 'crsi_no_foreign') {
          // CRSI rendah tapi asing net sell — sinyal lemah, tidak entry
          markers.push({
            time: d.date,
            position: 'belowBar',
            color: '#6b7280',
            shape: 'circle',
            text: '○ CRSI≤15 (Asing Jual)'
          })
        } else if (d._signal === 'exit_trail') {
          markers.push({ time: d.date, position: 'aboveBar', color: '#f0635c', shape: 'arrowDown', text: 'EXIT (trail)' })
        } else if (d._signal === 'exit_macd') {
          markers.push({ time: d.date, position: 'aboveBar', color: '#f97316', shape: 'arrowDown', text: 'EXIT ALL (MACD)' })
        }
      }
      LightweightCharts.createSeriesMarkers(candleSeries, markers)
    }

    chart.timeScale().fitContent()
  }

  function _renderStatusStrip(computed) {
    const last = computed[computed.length - 1]
    const strip = document.getElementById('status-strip')

    // Jumlah posisi terbuka saat ini dari _posCount
    const openCount = last._posCount || 0

    // Cari tanggal entry-entry yang masih terbuka (mundur dari akhir sampai ketemu exit_macd)
    const openEntries = []
    for (let i = computed.length - 1; i >= 0; i--) {
      if (computed[i]._signal === 'exit_macd') break // exit_macd menutup semua
      if (computed[i]._signal === 'entry') openEntries.unshift(computed[i].date)
      if (openEntries.length >= openCount) break
    }

    let positionHtml = ''
    if (openCount === 0) {
      positionHtml = 'Tidak ada posisi terbuka'
    } else {
      positionHtml = `<b>${openCount} posisi TERBUKA</b> — entry: ${openEntries.join(', ')}`
    }

    const signalHtml = last._signal === 'entry'
      ? `<span class="signal-active">ENTRY BARU</span>`
      : last._signal === 'exit_trail'
        ? `<span class="signal-avoid">EXIT trailing (1 posisi)</span>`
        : last._signal === 'exit_macd'
          ? `<span class="signal-avoid">EXIT MACD (semua posisi)</span>`
          : `<span>Netral</span>`

    strip.innerHTML = `
      <span class="item">${last.date}</span>
      <span class="item">Close <b>${last.close.toLocaleString('id-ID')}</b></span>
      <span class="item">RSI <b>${last._rsi != null ? last._rsi.toFixed(1) : '–'}</b></span>
      <span class="item">MA20 <b>${last._ma20 != null ? last._ma20.toLocaleString('id-ID', {maximumFractionDigits:0}) : '–'}</b></span>
      <span class="item">MACD Hist <b>${last._macdHist != null ? last._macdHist.toFixed(2) : '–'}</b></span>
      <span class="item">Connors RSI <b>${last._connorsRsi != null ? last._connorsRsi.toFixed(1) : '–'}</b></span>
      <span class="item">Asing <b>${(last.foreignbuy||0) > (last.foreignsell||0) ? '🟢 NET BUY' : '🔴 NET SELL'}</b></span>
      <span class="item">Foreign Buy <b>${last.foreignbuy ? (last.foreignbuy/1e9).toFixed(1)+'M' : '–'}</b></span>
      <span class="item">Sinyal hari ini: ${signalHtml}</span>
      <span class="item" style="width:100%; padding-top:6px; border-top:1px solid var(--line); margin-top:4px;">${positionHtml}</span>
    `
  }

  // ============================================================
  // INTRADAY MODE: _openDetailIntraday + _renderChartIntraday
  // ============================================================
  // Formula FINAL (tervalidasi):
  // - Entry: Open pasar 09:00 (IEP sudah final, slippage median 0%, avg +0.1%)
  // - Konfirmasi: ORB breakout UP sebelum 09:15 (deadline)
  // - Exit: jam 12:00
  // - WLB LONG: 61.2% (n=163), avg +1.79%, konsisten EARLY/LATE
  // - WLB AVOID: 85.5% (n=76), avg -3.56% kalau tidak ada ORB breakout
  //
  // Kenapa Open 09:00, bukan IEP price (08:58)?
  // - IEP belum final saat 08:58, tidak bisa dieksekusi
  // - Selisih IEP vs Open rata-rata hanya +0.097% — tidak material
  // - WLB hanya turun tipis: 64.4% → 61.2%

  let _orbAutoRefreshTimer = null

  async function _openDetailIntraday(profile) {
    // Re-read URL param setiap kali dibuka (bisa berubah kalau user navigasi balik)
    const urlGap = new URLSearchParams(window.location.search).get('gap')
    if (urlGap === 'UP' || urlGap === 'DOWN') window._rajaGapCat = urlGap
    if (!window._rajaGapCat) window._rajaGapCat = 'UP'
    await whenTokenReady()
    if (!TOKEN.isSet()) { openTokenPopover(); return }

    _activeSym = profile.sym
    viewSelect.classList.add('hidden')
    viewDetail.classList.remove('hidden')

    document.getElementById('focus-sym').textContent = profile.sym
    document.getElementById('focus-indicator-name').textContent = profile.indicatorName
    document.getElementById('legend-row').innerHTML = `
      <span class="legend-item"><span class="legend-dot" style="background:#4ade80;"></span> Entry (Open 09:00)</span>
      <span class="legend-item"><span class="legend-dot" style="background:#f0635c;"></span> Exit (12:00, ORB UP)</span>
      <span class="legend-item"><span class="legend-dot" style="background:#f97316;"></span> Exit AVOID (09:15, no ORB)</span>
      <span class="legend-item"><span class="legend-dot" style="background:#60a5fa;"></span> ORB High</span>
      <span class="legend-item"><span class="legend-dot" style="background:#fca5a5;"></span> ORB Low</span>
    `
    document.getElementById('status-strip').innerHTML = `<span class="item">Memuat data intraday...</span>`

    // Hide TF bar — intraday selalu 5m
    document.getElementById('tf-bar-fokus').style.display = 'none'

    // Setup auto-refresh
    if (_orbAutoRefreshTimer) clearInterval(_orbAutoRefreshTimer)
    if (_autoRefreshTimer) clearInterval(_autoRefreshTimer)

    try {
      await _waitForLightweightCharts()
      await _loadIntraday(profile)

      // Auto-refresh 1 menit saat jam bursa
      if (isMarketHours()) {
        _orbAutoRefreshTimer = setInterval(async () => {
          if (!isMarketHours()) { clearInterval(_orbAutoRefreshTimer); return }
          if (_activeSym === profile.sym) await _loadIntraday(profile)
        }, 60 * 1000)
      }
    } catch(e) {
      document.getElementById('status-strip').innerHTML =
        `<span class="item" style="color:var(--down);">Gagal: ${e.code || e.message}</span>`
      if (e.code === 'TOKEN_EXPIRED') openTokenPopover()
    }
  }

  async function _loadIntraday(profile) {
    document.getElementById('status-strip').innerHTML = `<span class="item">Mengambil data intraday 5m...</span>`
    const result = await profile.computeIntraday(profile.sym, fetchIntraday)
    if (!result) {
      document.getElementById('status-strip').innerHTML = `<span class="item" style="color:var(--ghost);">Belum ada data intraday hari ini</span>`
      return
    }
    _renderChartIntraday(result)
    _renderStatusStripIntraday(result)
  }

  function _renderChartIntraday(result) {
    const { candles5m, orbHigh, orbLow } = result
    if (chart) { chart.remove(); chart = null }

    chart = LightweightCharts.createChart(document.getElementById('chart-main'), {
      autoSize: true,
      layout:    { background: { color: '#0a0908' }, textColor: '#6b6557' },
      grid:      { vertLines: { color: '#1a1815' }, horzLines: { color: '#1a1815' } },
      timeScale: { timeVisible: true, rightOffset: 4 }
    })

    const candleSeries = chart.addSeries(LightweightCharts.CandlestickSeries, {
      upColor: '#4ade80', downColor: '#f0635c', borderVisible: false,
      wickUpColor: '#4ade80', wickDownColor: '#f0635c'
    })
    candleSeries.setData(candles5m.map(d => ({
      time: d.unix, open: d.open, high: d.high, low: d.low, close: d.close
    })))

    // Garis ORB High dan Low
    if (orbHigh) candleSeries.createPriceLine({ price: orbHigh, color: '#60a5fa', lineWidth: 1, lineStyle: 2, axisLabelVisible: true, title: `ORB H ${orbHigh}` })
    if (orbLow)  candleSeries.createPriceLine({ price: orbLow,  color: '#fca5a5', lineWidth: 1, lineStyle: 2, axisLabelVisible: true, title: `ORB L ${orbLow}` })

    // Marker entry/exit
    const markers = candles5m
      .filter(d => d._signal)
      .map(d => {
        if (d._signal === 'entry')
          return { time: d.unix, position: 'belowBar', color: '#4ade80', shape: 'arrowUp',   text: `ENTRY Open ${d.open?.toLocaleString('id-ID')}` }
        if (d._signal === 'exit')
          return { time: d.unix, position: 'aboveBar', color: '#f0635c', shape: 'arrowDown', text: 'EXIT 10:00' }
        if (d._signal === 'exit_avoid')
          return { time: d.unix, position: 'aboveBar', color: '#f97316', shape: 'arrowDown', text: 'EXIT AVOID 09:15' }
        return null
      })
      .filter(Boolean)
    if (markers.length) LightweightCharts.createSeriesMarkers(candleSeries, markers)

    chart.timeScale().fitContent()
  }

  function _renderStatusStripIntraday(result) {
    const { orbHigh, orbLow, orbStatus, iepClose, iepVol, brokenUp } = result
    const strip = document.getElementById('status-strip')

    const fmtVol = v => v ? (v/1000).toFixed(0) + 'rb lot' : '–'
    const fmtPrc = v => v ? v.toLocaleString('id-ID') : '–'

    const statusMap = {
      'pre_iep':    `<span style="color:var(--ghost)">Sebelum IEP (pasar belum pre-opening)</span>`,
      'iep_forming':`<span style="color:#fbbf24">🔔 IEP berlangsung (08:45–08:59) — siapkan order di Open 09:00</span> <span style="color:var(--ghost);font-size:10px">Gap: ${window._rajaGapCat||'–'}</span>`,
      'orb_forming':`<span style="color:#fbbf24">⏳ Opening Range sedang terbentuk (09:00–09:04) — tunggu konfirmasi</span>`,
      'broken_up':  `<span style="color:#4ade80">✓ ORB BROKEN UP — HOLD, exit ${window._rajaGapCat==='DOWN'?'09:15 (GAP DOWN)':'10:00 (GAP UP)'}</span> <span style="color:var(--ghost);font-size:10px">${window._rajaGapCat==='DOWN'?'WLB 81.6%, avg +2.80%':'WLB 71.6%, avg +2.83%'}</span>`,
      'waiting':    `<span style="color:#fbbf24">⏳ Belum ada ORB breakout — monitor sampai 09:15</span> <span style="color:var(--ghost);font-size:10px">Jika 09:15 belum breakout → EXIT</span>`,
      'no_signal':  `<span style="color:#f97316">⚠ TIDAK ADA ORB BREAKOUT — EXIT SEKARANG (09:15)</span> <span style="color:var(--ghost);font-size:10px">Avg loss -0.81% | WLB 79.5% saat ORB UP</span>`,
      'done_orb':   `<span style="color:#4ade80">✓ SELESAI — ORB UP, exit ${window._rajaGapCat==='DOWN'?'09:15':'10:00'}</span> <span style="color:var(--ghost);font-size:10px">Trade hari ini sudah selesai</span>`,
      'done_avoid': `<span style="color:#f0635c">✗ SELESAI — AVOID, exit 09:15</span> <span style="color:var(--ghost);font-size:10px">Trade hari ini sudah selesai</span>`,
    }

    strip.innerHTML = `
      <span class="item">IEP Price <b>${fmtPrc(iepClose)}</b></span>
      <span class="item">IEP Volume <b>${fmtVol(iepVol)}</b></span>
      <span class="item">ORB High <b>${fmtPrc(orbHigh)}</b></span>
      <span class="item">ORB Low <b>${fmtPrc(orbLow)}</b></span>
      <span class="item" style="width:100%; padding-top:6px; border-top:1px solid var(--line); margin-top:4px;">
        ${statusMap[orbStatus] || '–'}
      </span>
    `
  }

  // Override back button untuk intraday mode
  document.getElementById('back-btn').addEventListener('click', () => {
    _stopAutoRefresh()
    if (_orbAutoRefreshTimer) { clearInterval(_orbAutoRefreshTimer); _orbAutoRefreshTimer = null }
    _activeSym = null
    document.getElementById('tf-bar-fokus').style.display = ''  // restore TF bar
    viewDetail.classList.add('hidden')
    viewSelect.classList.remove('hidden')
  }, { once: false })
</script>

</body>
</html>
