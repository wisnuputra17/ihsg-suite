<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fokus Emiten · IHSG Suite</title>
  <link rel="stylesheet" href="../../shared/ui.css">

  <style>
    /* ── VIEW: PILIH EMITEN ── */
    .emiten-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
      margin-top: 20px;
    }

    .emiten-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      padding: 18px;
      cursor: pointer;
      transition: all var(--ease);
    }
    .emiten-card:hover { border-color: var(--phosphor-line); background: var(--panel-hi); }

    .emiten-card-sym {
      font-family: var(--f-mono);
      font-size: 20px;
      color: var(--paper);
      letter-spacing: 0.02em;
      margin-bottom: 4px;
    }
    .emiten-card-indicator {
      font-family: var(--f-mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--phosphor);
      margin-bottom: 12px;
    }
    .emiten-card-formula {
      font-family: var(--f-mono);
      font-size: 11px;
      color: var(--dim);
      line-height: 1.7;
      border-top: 1px solid var(--line);
      padding-top: 10px;
    }
    .emiten-card-formula .rule-entry::before { content: "▲ "; color: var(--live); }
    .emiten-card-formula .rule-exit::before  { content: "▼ "; color: var(--down); }

    .emiten-card-stat {
      display: flex; justify-content: space-between;
      font-family: var(--f-mono); font-size: 10px; color: var(--ghost);
      margin-top: 10px;
    }
    .emiten-card-stat b { color: var(--dim); }

    .empty-slot {
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      padding: 18px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--f-mono); font-size: 11px; color: var(--ghost);
      text-align: center;
      min-height: 140px;
    }

    /* ── VIEW: DETAIL CHART ── */
    .focus-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px; flex-wrap: wrap; gap: 10px;
    }
    .focus-back {
      font-family: var(--f-mono); font-size: 11px; color: var(--ghost);
      cursor: pointer; display: flex; align-items: center; gap: 6px;
    }
    .focus-back:hover { color: var(--dim); }

    .focus-title-row { display: flex; align-items: baseline; gap: 12px; }
    .focus-sym { font-family: var(--f-mono); font-size: 22px; color: var(--paper); }
    .focus-indicator-name {
      font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--phosphor);
      border: 1px solid var(--phosphor-line); border-radius: var(--radius);
      padding: 3px 10px;
    }

    .legend-row {
      display: flex; gap: 18px; flex-wrap: wrap;
      font-family: var(--f-mono); font-size: 10px; color: var(--ghost);
      margin-bottom: 12px;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 2px; }

    #chart-main { width: 100%; height: 540px; border: 1px solid var(--line); border-radius: var(--radius); }

    .status-strip {
      display: flex; gap: 16px; flex-wrap: wrap;
      font-family: var(--f-mono); font-size: 11px; color: var(--dim);
      margin-top: 12px; padding: 10px 14px;
      border: 1px solid var(--line); border-radius: var(--radius);
      background: var(--panel);
    }
    .status-strip .item b { color: var(--paper); margin-left: 4px; }
    .status-strip .signal-active { color: var(--live); font-weight: 600; }
    .status-strip .signal-avoid  { color: var(--down); font-weight: 600; }
  </style>
</head>
<body>

<div class="page">

  <header class="app-header" id="app-header"></header>

  <!-- VIEW 1: PILIH EMITEN -->
  <div id="view-select">
    <div class="section-label">Emiten dengan Formula Tervalidasi</div>
    <div class="emiten-grid" id="emiten-grid"></div>
  </div>

  <!-- VIEW 2: DETAIL CHART -->
  <div id="view-detail" class="hidden">
    <div class="focus-header">
      <div class="focus-back" id="back-btn">← Kembali ke daftar emiten</div>
    </div>
    <div class="focus-title-row" style="margin-bottom:6px;">
      <span class="focus-sym" id="focus-sym"></span>
      <span class="focus-indicator-name" id="focus-indicator-name"></span>
    </div>
    <div class="legend-row" id="legend-row"></div>
    <div id="chart-main"></div>
    <div class="status-strip" id="status-strip"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@5.2.0/dist/lightweight-charts.standalone.production.js"></script>

<script type="module">
  import { TOKEN } from '../../shared/store.js'
  import { fetchDaily } from '../../shared/api.js'
  import { renderHeader, openTokenPopover, whenTokenReady } from '../../shared/header.js'
  import { calcRSI, calcMACD, calcSMA } from '../../shared/indicators.js'

  renderHeader(document.getElementById('app-header'), [
    { label: 'IHSG Suite', href: '../../index.html' },
    { label: 'Fokus Emiten' }
  ])

  // ============================================================
  // DAFTAR EMITEN — formula tervalidasi lewat analisa manual.
  // Tiap entry: { sym, indicatorName, formula, evaluate(daily) -> {entry: bool[], avoid: bool[]}, summary }
  // ============================================================
  const EMITEN_PROFILES = [
    {
      sym: 'RAJA',
      indicatorName: 'Kunci RAJA v2',
      summary: 'Entry: RSI(14)≤40 + Close<MA20×0.95 + MACD hist<0 + Volume(3H)>rata-rata(20H). Exit: Trailing stop 20% dari titik tertinggi sejak entry.',
      stat: { n: 54, wlb: '90.2%', horizon: 'trailing, avg hold ~48 hari' },
      rules: [
        { type: 'entry', text: 'RSI(14) ≤ 40' },
        { type: 'entry', text: 'Close < MA20 × 0.95' },
        { type: 'entry', text: 'MACD histogram < 0' },
        { type: 'entry', text: 'Volume rata-rata 3 hari > rata-rata 20 hari' },
        { type: 'exit',  text: 'Trailing stop 20% dari harga tertinggi sejak entry' },
      ],
      // Hitung indikator turunan, lalu jalankan state machine entry/exit (trailing stop)
      compute(daily) {
        const closes  = daily.map(d => d.close)
        const volumes = daily.map(d => d.volume)
        const rsi   = calcRSI(closes, 14)
        const ma20  = calcSMA(closes, 20)
        const macd  = calcMACD(closes)
        const vol20 = calcSMA(volumes, 20)

        // Volume rata-rata 3 hari terakhir (termasuk hari ini)
        const vol3 = new Array(daily.length).fill(null)
        for (let i = 2; i < daily.length; i++) {
          vol3[i] = (volumes[i] + volumes[i - 1] + volumes[i - 2]) / 3
        }

        const out = daily.map((d, i) => ({
          ...d,
          _rsi: rsi[i],
          _ma20: ma20[i],
          _macdHist: macd.hist[i],
          _vol3: vol3[i],
          _vol20: vol20[i],
          _signal: null, // diisi state machine di bawah
        }))

        // STATE MACHINE: trailing stop. Saat tidak ada posisi terbuka & syarat
        // entry terpenuhi -> buka posisi (marker entry), lalu ikuti highest
        // close sampai drawdown >= 20% dari highest -> tutup posisi (marker exit).
        const TRAIL_PCT = 20
        let inPosition = false
        let highestSinceEntry = null

        for (let i = 0; i < out.length; i++) {
          const d = out[i]
          if (!inPosition) {
            const entryOk = d._rsi != null && d._rsi <= 40
              && d._ma20 != null && d.close < d._ma20 * 0.95
              && d._macdHist != null && d._macdHist < 0
              && d._vol3 != null && d._vol20 != null && d._vol3 > d._vol20
            if (entryOk) {
              d._signal = 'entry'
              inPosition = true
              highestSinceEntry = d.close
            }
          } else {
            if (d.close > highestSinceEntry) highestSinceEntry = d.close
            const drawdown = (highestSinceEntry - d.close) / highestSinceEntry * 100
            if (drawdown >= TRAIL_PCT) {
              d._signal = 'avoid' // exit/trailing-stop hit
              inPosition = false
              highestSinceEntry = null
            }
          }
        }

        return out
      }
    }
  ]

  // ============================================================
  // VIEW 1: RENDER CARD PILIHAN EMITEN
  // ============================================================
  const gridEl = document.getElementById('emiten-grid')

  function _renderCards() {
    const cards = EMITEN_PROFILES.map(p => `
      <div class="emiten-card" data-sym="${p.sym}">
        <div class="emiten-card-sym">${p.sym}</div>
        <div class="emiten-card-indicator">${p.indicatorName}</div>
        <div class="emiten-card-formula">
          ${p.rules.map(r => `<div class="rule-${r.type}">${r.text}</div>`).join('')}
        </div>
        <div class="emiten-card-stat">
          <span>n=<b>${p.stat.n}</b></span>
          <span>WLB <b>${p.stat.wlb}</b></span>
          <span>${p.stat.horizon}</span>
        </div>
      </div>
    `).join('')

    const emptySlots = Array.from({ length: Math.max(0, 3 - EMITEN_PROFILES.length) })
      .map(() => `<div class="empty-slot">Belum ada formula<br>untuk emiten lain</div>`).join('')

    gridEl.innerHTML = cards + emptySlots

    gridEl.querySelectorAll('.emiten-card').forEach(el => {
      el.addEventListener('click', () => _openDetail(el.dataset.sym))
    })
  }
  _renderCards()

  // ============================================================
  // VIEW 2: DETAIL CHART + INDIKATOR
  // ============================================================
  const viewSelect = document.getElementById('view-select')
  const viewDetail = document.getElementById('view-detail')
  document.getElementById('back-btn').addEventListener('click', () => {
    viewDetail.classList.add('hidden')
    viewSelect.classList.remove('hidden')
  })

  let chart = null

  async function _openDetail(sym) {
    const profile = EMITEN_PROFILES.find(p => p.sym === sym)
    if (!profile) return

    await whenTokenReady()
    if (!TOKEN.isSet()) { openTokenPopover(); return }

    viewSelect.classList.add('hidden')
    viewDetail.classList.remove('hidden')

    document.getElementById('focus-sym').textContent = profile.sym
    document.getElementById('focus-indicator-name').textContent = profile.indicatorName
    document.getElementById('legend-row').innerHTML = `
      <span class="legend-item"><span class="legend-dot" style="background:#4ade80;"></span> Entry (closed)</span>
      <span class="legend-item"><span class="legend-dot" style="background:#60a5fa;"></span> Entry (masih terbuka)</span>
      <span class="legend-item"><span class="legend-dot" style="background:#f0635c;"></span> Exit (Trailing Stop)</span>
    `
    document.getElementById('status-strip').innerHTML = `<span class="item">Memuat data...</span>`

    try {
      const raw = await fetchDaily(sym)
      const daily = [...raw].sort((a, b) => a.date.localeCompare(b.date))
      const computed = profile.compute(daily)
      _renderChart(computed)
      _renderStatusStrip(computed)
    } catch (e) {
      document.getElementById('status-strip').innerHTML =
        `<span class="item" style="color:var(--down);">Gagal memuat: ${e.code || e.message}</span>`
      if (e.code === 'TOKEN_EXPIRED') openTokenPopover()
    }
  }

  function _renderChart(computed) {
    if (chart) { chart.remove(); chart = null }

    chart = LightweightCharts.createChart(document.getElementById('chart-main'), {
      autoSize: true,
      layout:    { background: { color: '#0a0908' }, textColor: '#6b6557' },
      grid:      { vertLines: { color: '#1a1815' }, horzLines: { color: '#1a1815' } },
      timeScale: { timeVisible: false, rightOffset: 4 }
    })

    const candleSeries = chart.addSeries(LightweightCharts.CandlestickSeries, {
      upColor: '#4ade80', downColor: '#f0635c', borderVisible: false,
      wickUpColor: '#4ade80', wickDownColor: '#f0635c'
    })
    candleSeries.setData(computed.map(d => ({ time: d.date, open: d.open, high: d.high, low: d.low, close: d.close })))

    // MA20 overlay — referensi visual untuk formula
    const ma20Series = chart.addSeries(LightweightCharts.LineSeries, {
      color: 'rgba(217,142,43,0.6)', lineWidth: 1, priceLineVisible: false, lastValueVisible: false, title: 'MA20'
    })
    ma20Series.setData(computed.filter(d => d._ma20 != null).map(d => ({ time: d.date, value: d._ma20 })))

    // Marker entry/exit — entry TERAKHIR yang belum punya exit sesudahnya
    // (posisi masih terbuka sampai hari ini) ditandai beda supaya jelas
    // ini bukan siklus yang sudah selesai.
    const lastEntryIdx = computed.findLastIndex
      ? computed.findLastIndex(d => d._signal === 'entry')
      : (() => { for (let i = computed.length - 1; i >= 0; i--) if (computed[i]._signal === 'entry') return i; return -1 })()
    const hasExitAfterLastEntry = lastEntryIdx >= 0 &&
      computed.slice(lastEntryIdx + 1).some(d => d._signal === 'avoid')
    const openEntryIdx = (lastEntryIdx >= 0 && !hasExitAfterLastEntry) ? lastEntryIdx : -1

    const markers = computed
      .filter(d => d._signal)
      .map((d, _, arr) => {
        const idxInComputed = computed.indexOf(d)
        if (d._signal === 'entry') {
          const isOpen = idxInComputed === openEntryIdx
          return isOpen
            ? { time: d.date, position: 'belowBar', color: '#60a5fa', shape: 'arrowUp', text: 'ENTRY (open)' }
            : { time: d.date, position: 'belowBar', color: '#4ade80', shape: 'arrowUp', text: 'ENTRY' }
        }
        return { time: d.date, position: 'aboveBar', color: '#f0635c', shape: 'arrowDown', text: 'EXIT' }
      })
    LightweightCharts.createSeriesMarkers(candleSeries, markers)

    chart.timeScale().fitContent()
  }

  function _renderStatusStrip(computed) {
    const last = computed[computed.length - 1]
    const strip = document.getElementById('status-strip')

    // Tentukan apakah SAAT INI sedang dalam posisi terbuka (entry sudah trigger,
    // belum ada exit sesudahnya) -- scan dari belakang sampai ketemu signal terakhir
    let positionStatus = 'Tidak ada posisi terbuka'
    let entrySince = null
    for (let i = computed.length - 1; i >= 0; i--) {
      if (computed[i]._signal === 'avoid') break // exit terakhir -> tidak ada posisi terbuka
      if (computed[i]._signal === 'entry') {
        positionStatus = `Posisi TERBUKA sejak ${computed[i].date}`
        entrySince = computed[i]
        break
      }
    }

    const signalHtml = last._signal === 'entry'
      ? `<span class="signal-active">ENTRY AKTIF</span>`
      : last._signal === 'avoid'
        ? `<span class="signal-avoid">EXIT (trailing stop kena)</span>`
        : `<span>Netral</span>`

    strip.innerHTML = `
      <span class="item">${last.date}</span>
      <span class="item">Close <b>${last.close.toLocaleString('id-ID')}</b></span>
      <span class="item">RSI <b>${last._rsi != null ? last._rsi.toFixed(1) : '–'}</b></span>
      <span class="item">MA20 <b>${last._ma20 != null ? last._ma20.toLocaleString('id-ID', {maximumFractionDigits:0}) : '–'}</b></span>
      <span class="item">MACD Hist <b>${last._macdHist != null ? last._macdHist.toFixed(2) : '–'}</b></span>
      <span class="item">Sinyal hari ini: ${signalHtml}</span>
      <span class="item" style="width:100%; padding-top:6px; border-top:1px solid var(--line); margin-top:4px;">${positionStatus}</span>
    `
  }
</script>

</body>
</html>
