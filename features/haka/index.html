<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HAKA & HAKI · IHSG Suite</title>
  <link rel="stylesheet" href="../../shared/ui.css">

  <style>
    /* =========================================================
       Khusus halaman ini — di luar token shared/ui.css
       ========================================================= */
    .page { max-width: 1100px; }

    .tabs { display: flex; border-bottom: 1px solid var(--line); padding-top: 4px; }
    .tab-btn {
      font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 12px 20px; background: transparent; border: none; border-bottom: 2px solid transparent;
      color: var(--ghost); cursor: pointer; transition: all var(--ease); margin-bottom: -1px;
    }
    .tab-btn:hover { color: var(--dim); }
    .tab-btn.active { color: var(--phosphor); border-bottom-color: var(--phosphor); }

    .panels { padding: 24px 0; }

    .toolbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .sym-input { width: 100px; text-transform: uppercase; }

    .watchlist-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; min-height: 30px; }
    .chip-count { font-family: var(--f-mono); font-size: 10px; color: var(--ghost); align-self: center; }

    .watch-count { font-family: var(--f-mono); font-size: 11px; color: var(--phosphor); margin-left: 6px; text-transform: none; letter-spacing: 0; }

    .preset-row { display: flex; gap: 6px; margin-bottom: 8px; }

    .emiten-grid {
      display: flex; flex-wrap: wrap; gap: 4px; max-height: 160px; overflow-y: auto;
      padding: 8px; background: #0f0e0c; border: 1px solid var(--line); border-radius: var(--radius);
      margin-bottom: 12px;
    }
    .etag {
      padding: 3px 7px; border-radius: var(--radius); cursor: pointer; user-select: none;
      font-family: var(--f-mono); font-size: 10px; border: 1px solid var(--line);
      color: var(--ghost); background: transparent; transition: all 100ms ease;
    }
    .etag:hover { border-color: var(--line-hi); color: var(--dim); }
    .etag.active { border-color: var(--phosphor-line); color: var(--phosphor); background: var(--phosphor-dim); }

    .monitor-row { display: flex; align-items: center; gap: 12px; margin: 16px 0; }
    .monitor-status { font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.08em; }

    .alert-feed { display: flex; flex-direction: column; gap: 6px; max-height: 560px; overflow-y: auto; }

    .alert-card2 {
      background: var(--panel); border: 1px solid var(--line); border-left: 3px solid var(--line);
      border-radius: 0 var(--radius) var(--radius) 0; padding: 10px 13px; animation: slideIn 200ms ease both;
    }
    @keyframes slideIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }

    .alert-head-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
    .alert-sym2 { font-family: var(--f-mono); font-size: 14px; font-weight: 700; color: var(--paper); }
    .alert-badge { padding: 2px 8px; border-radius: 8px; font-size: 9px; font-weight: 700; font-family: var(--f-mono); }
    .alert-board { font-size: 9px; color: var(--ghost); font-family: var(--f-mono); padding: 1px 5px; background: #0f0e0c; border-radius: 4px; }
    .alert-time2 { margin-left: auto; font-size: 9px; color: var(--ghost); font-family: var(--f-mono); white-space: nowrap; }

    .alert-metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 7px; }
    .alert-metric { background: #0f0e0c; border-radius: 5px; padding: 5px 7px; text-align: center; }
    .alert-metric-label { font-size: 8px; color: var(--ghost); margin-bottom: 2px; }
    .alert-metric-val { font-size: 11px; font-weight: 700; font-family: var(--f-mono); color: var(--paper); }

    .alert-bs-row { font-size: 9px; color: var(--ghost); font-family: var(--f-mono); display: flex; gap: 10px; }
    .alert-bs-code { color: var(--dim); }

    .btn-dashed { border-style: dashed; border-color: var(--phosphor-line); color: var(--phosphor); background: transparent; }
    .custom-wl-btns { display: inline-flex; gap: 4px; flex-wrap: wrap; }
    .custom-wl-btn {
      padding: 3px 10px; border-radius: var(--radius); cursor: pointer; font-size: 10px;
      font-family: var(--f-mono); border: 1px solid var(--phosphor-line); color: var(--phosphor);
      background: var(--phosphor-dim);
    }

    .wl-modal-overlay {
      position: fixed; inset: 0; background: rgba(10,9,8,0.75); z-index: 200;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .wl-modal {
      background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
      padding: 20px; width: 100%; max-width: 460px; max-height: 80vh; overflow-y: auto;
    }
    .wl-modal-head { display: flex; align-items: center; margin-bottom: 16px; font-size: 14px; font-weight: 700; color: var(--paper); }
    .wl-modal-head span { flex: 1; }
    .wl-modal-list { margin-bottom: 8px; }
    .wl-item {
      display: flex; align-items: center; gap: 8px; padding: 8px 10px;
      background: #0f0e0c; border-radius: var(--radius); margin-bottom: 5px;
    }
    .wl-item-info { flex: 1; min-width: 0; }
    .wl-item-name { font-size: 11px; font-weight: 700; color: var(--paper); }
    .wl-item-tickers { font-size: 9px; color: var(--ghost); font-family: var(--f-mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .wl-modal-form { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--line); }
  </style>
</head>
<body>

<div class="page">

  <header class="app-header" id="app-header"></header>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="haka">HAKA — Alert Entry</button>
    <button class="tab-btn" data-tab="hakahaki">HAKA & HAKI — Posisi Aktif</button>
  </nav>

  <div class="panels">

    <!-- =================== TAB: HAKA =================== -->
    <div data-panel="haka">

      <div class="section-label">Pantau Emiten <span class="watch-count" id="haka-count">0 dipilih</span></div>
      <div class="preset-row">
        <button class="btn btn-sm" data-preset="lq45">LQ45</button>
        <button class="btn btn-sm" data-preset="idx80">IDX80</button>
        <button class="btn btn-sm" data-preset="all">Semua</button>
        <button class="btn btn-sm" data-preset="none">Reset</button>
        <span class="custom-wl-btns" id="haka-custom-btns"></span>
        <button class="btn btn-sm btn-dashed" data-wl-modal="haka">＋ Watchlist</button>
      </div>
      <div class="toolbar">
        <input type="text" class="input sym-input" id="haka-grid-search" placeholder="Cari kode saham..." style="width:200px;">
        <button class="btn btn-sm" id="haka-grid-search-clear">×</button>
      </div>
      <div class="emiten-grid" id="haka-egrid"></div>

      <div class="section-label">Threshold</div>
      <div class="toolbar" data-threshold-group="haka">
        <button class="pill" data-threshold="100000000">100 jt</button>
        <button class="pill" data-threshold="250000000">250 jt</button>
        <button class="pill active" data-threshold="500000000">500 jt ★</button>
        <button class="pill" data-threshold="1000000000">1 M</button>
        <button class="pill" data-threshold="5000000000">5 M</button>
      </div>

      <div class="monitor-row">
        <button class="btn btn-primary" id="haka-btn-start" data-running="0">Start Monitor</button>
        <span class="monitor-status" id="haka-status">○ Idle</span>
        <button class="btn btn-sm" id="haka-btn-clear">Bersihkan feed</button>
      </div>

      <div class="section-label">Alert Feed — BUY Agresif</div>
      <div class="alert-feed" id="haka-feed">
        <div class="empty-state">Belum ada alert. Jalankan monitor.</div>
      </div>

    </div>

    <!-- =================== TAB: HAKA & HAKI =================== -->
    <div data-panel="hakahaki" class="hidden">

      <div class="section-label">Pantau Emiten (maks 20) <span class="watch-count" id="hakahaki-count">0 dipilih</span></div>
      <div class="preset-row">
        <button class="btn btn-sm" data-preset="lq45">LQ45</button>
        <button class="btn btn-sm" data-preset="idx80">IDX80</button>
        <button class="btn btn-sm" data-preset="all">Semua</button>
        <button class="btn btn-sm" data-preset="none">Reset</button>
        <span class="custom-wl-btns" id="hakahaki-custom-btns"></span>
        <button class="btn btn-sm btn-dashed" data-wl-modal="hakahaki">＋ Watchlist</button>
      </div>
      <div class="toolbar">
        <input type="text" class="input sym-input" id="hakahaki-grid-search" placeholder="Cari kode saham..." style="width:200px;">
        <button class="btn btn-sm" id="hakahaki-grid-search-clear">×</button>
      </div>
      <div class="emiten-grid" id="hakahaki-egrid"></div>

      <div class="section-label">Threshold</div>
      <div class="toolbar" data-threshold-group="hakahaki">
        <button class="pill" data-threshold="100000000">100 jt</button>
        <button class="pill" data-threshold="250000000">250 jt</button>
        <button class="pill active" data-threshold="500000000">500 jt ★</button>
        <button class="pill" data-threshold="1000000000">1 M</button>
        <button class="pill" data-threshold="5000000000">5 M</button>
      </div>

      <div class="monitor-row">
        <button class="btn btn-primary" id="hakahaki-btn-start" data-running="0">Start Monitor</button>
        <span class="monitor-status" id="hakahaki-status">○ Idle</span>
        <button class="btn btn-sm" id="hakahaki-btn-clear">Bersihkan feed</button>
      </div>

      <div class="section-label">Alert Feed — BUY & SELL Agresif</div>
      <div class="alert-feed" id="hakahaki-feed">
        <div class="empty-state">Belum ada alert. Jalankan monitor.</div>
      </div>

    </div>

  </div>

  <!-- =================== MODAL: Kelola Watchlist Custom =================== -->
  <div class="wl-modal-overlay hidden" id="wl-modal-overlay">
    <div class="wl-modal">
      <div class="wl-modal-head">
        <span>📋 Kelola Watchlist Custom</span>
        <button class="btn btn-sm" id="wl-modal-close">×</button>
      </div>
      <div class="wl-modal-list" id="wl-modal-list"></div>
      <div class="wl-modal-form">
        <div class="section-label">＋ Buat Watchlist Baru</div>
        <input type="text" class="input" id="wl-new-name" placeholder="Nama watchlist (misal: Saham Favorit)" style="width:100%; margin-bottom:7px;">
        <textarea class="input" id="wl-new-tickers" placeholder="Kode saham dipisah spasi atau koma&#10;Contoh: BBRI BMRI TLKM ASII ANTM" style="width:100%; height:80px; resize:vertical; font-family:var(--f-mono);"></textarea>
        <div class="toolbar" style="margin-top:8px;">
          <button class="btn btn-primary" id="wl-create-btn">✓ Simpan Watchlist</button>
          <button class="btn btn-sm" id="wl-cancel-btn">Batal</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script type="module">
  import { TOKEN, SYMS, LQ45, IDX80, has, setEmitenInfo } from '../../shared/store.js'
  import { fetchEmitenJson } from '../../shared/api.js'
  import { renderHeader, refreshTokenStatus } from '../../shared/header.js'
  import { createMonitor } from './poll.js'
  import {
    DB, loadAll,
    watchlistAdd, watchlistRemove, watchlistSet,
    hakahakiWatchlistAdd, hakahakiWatchlistRemove, hakahakiWatchlistSet,
    setThreshold,
    namedListSave, namedListDelete,
    alertAdd, hakahakiAlertAdd, clearAlerts
  } from './db.js'

  // ============================================================
  // SEKSI 1: STATE HALAMAN (bukan data domain — UI saja)
  // ============================================================
  let _tab = 'haka'
  const hakaMonitor     = createMonitor('buy')
  const hakahakiMonitor = createMonitor('both')

  // ============================================================
  // SEKSI 2: INIT
  // ============================================================
  async function init() {
    renderHeader(document.getElementById('app-header'), [
      { label: 'IHSG Suite', href: '../../index.html' },
      { label: 'HAKA & HAKI' }
    ])

    await _loadEmitenInfo() // SYMS/LQ45/IDX80 perlu ini dulu sebelum grid bisa digambar

    _bindTabs()
    _bindGridControls('haka')
    _bindGridControls('hakahaki')
    _bindThresholdPills()
    _bindMonitorButtons()
    _bindWlModal()

    hakaMonitor.init({
      onAlert:    (a) => { alertAdd(a); _renderAlerts('haka'); if (a.isHAKA) _beep() },
      onError:    handleError
    })
    hakahakiMonitor.init({
      onAlert:    (a) => { hakahakiAlertAdd(a); _renderAlerts('hakahaki'); if (a.isHAKA) _beep() },
      onError:    handleError
    })

    await loadAll()
    _renderGrid('haka')
    _renderGrid('hakahaki')
    _renderCount('haka')
    _renderCount('hakahaki')
    _renderThresholdPills()
    _renderCustomWlBtns('haka')
    _renderCustomWlBtns('hakahaki')
  }

  async function _loadEmitenInfo() {
    if (has.emitenInfo()) return
    try { setEmitenInfo(await fetchEmitenJson()) } catch (e) { console.warn('[haka] gagal load emiten.json:', e.message) }
  }

  // ============================================================
  // SEKSI 4: TAB
  // ============================================================
  function _bindTabs() {
    document.querySelectorAll('[data-tab]').forEach(el => {
      el.addEventListener('click', () => {
        _tab = el.dataset.tab
        document.querySelectorAll('[data-tab]').forEach(e => e.classList.toggle('active', e.dataset.tab === _tab))
        document.querySelectorAll('[data-panel]').forEach(e => e.classList.toggle('hidden', e.dataset.panel !== _tab))
      })
    })
  }

  // ============================================================
  // SEKSI 5: GRID EMITEN — search, preset, klik utk toggle watchlist
  // ============================================================
  function _bindGridControls(prefix) {
    const searchInput = document.getElementById(`${prefix}-grid-search`)
    searchInput.addEventListener('input', () => _renderGrid(prefix))
    document.getElementById(`${prefix}-grid-search-clear`).addEventListener('click', () => {
      searchInput.value = ''
      _renderGrid(prefix)
    })

    document.querySelectorAll(`[data-panel="${prefix}"] [data-preset]`).forEach(btn => {
      btn.addEventListener('click', () => _applyPreset(prefix, btn.dataset.preset))
    })
  }

  function _renderGrid(prefix) {
    const query = document.getElementById(`${prefix}-grid-search`).value.trim().toUpperCase()
    const list  = query ? SYMS.filter(s => s.includes(query)) : SYMS
    const watchlist = prefix === 'haka' ? DB.watchlist : DB.hakahakiWatchlist
    const el = document.getElementById(`${prefix}-egrid`)

    el.innerHTML = list.map(sym => `
      <span class="etag ${watchlist.includes(sym) ? 'active' : ''}" data-sym="${sym}">${sym}</span>
    `).join('')

    el.querySelectorAll('.etag').forEach(tag => {
      tag.addEventListener('click', () => _toggleSym(prefix, tag.dataset.sym))
    })
  }

  function _renderCount(prefix) {
    const list = prefix === 'haka' ? DB.watchlist : DB.hakahakiWatchlist
    const max  = prefix === 'haka' ? 100 : 20
    document.getElementById(`${prefix}-count`).textContent = `${list.length}/${max} dipilih`
  }

  function _toggleSym(prefix, sym) {
    const watchlist = prefix === 'haka' ? DB.watchlist : DB.hakahakiWatchlist
    const inList = watchlist.includes(sym)

    if (inList) {
      if (prefix === 'haka') watchlistRemove(sym)
      else                   hakahakiWatchlistRemove(sym)
    } else {
      const ok = prefix === 'haka' ? watchlistAdd(sym) : hakahakiWatchlistAdd(sym)
      if (!ok) { alert(`Maksimal ${prefix === 'haka' ? 100 : 20} saham.`); return }
    }

    _renderGrid(prefix)
    _renderCount(prefix)

    // Restart monitor kalau sedang jalan — watchlist berubah
    const monitor = prefix === 'haka' ? hakaMonitor : hakahakiMonitor
    if (monitor.isRunning()) { monitor.stop(); _startMonitor(prefix) }
  }

  function _applyPreset(prefix, preset) {
    const max = prefix === 'haka' ? 100 : 20
    let syms = []
    if (preset === 'lq45')  syms = LQ45
    else if (preset === 'idx80') syms = IDX80
    else if (preset === 'all')   syms = SYMS
    else if (preset === 'none')  syms = []
    syms = syms.slice(0, max)

    if (prefix === 'haka') watchlistSet(syms)
    else                   hakahakiWatchlistSet(syms)

    _renderGrid(prefix)
    _renderCount(prefix)

    const monitor = prefix === 'haka' ? hakaMonitor : hakahakiMonitor
    if (monitor.isRunning()) { monitor.stop(); _startMonitor(prefix) }
  }

  // ============================================================
  // SEKSI 6: WATCHLIST CUSTOM (modal kelola + tombol cepat)
  // ============================================================
  let _wlModalTarget = 'haka' // tab mana yang sedang minta modal dibuka

  function _renderCustomWlBtns(prefix) {
    const el = document.getElementById(`${prefix}-custom-btns`)
    const names = Object.keys(DB.namedLists)
    el.innerHTML = names.map(name => `
      <button class="custom-wl-btn" data-apply-named="${name}" data-apply-prefix="${prefix}"
        title="${DB.namedLists[name].join(', ')}">${name} (${DB.namedLists[name].length})</button>
    `).join('')
    el.querySelectorAll('[data-apply-named]').forEach(btn => {
      btn.addEventListener('click', () => _applyNamedList(btn.dataset.applyPrefix, btn.dataset.applyNamed))
    })
  }

  function _applyNamedList(prefix, name) {
    const syms = DB.namedLists[name]
    if (!syms) return
    const max = prefix === 'haka' ? 100 : 20
    const sliced = syms.slice(0, max)
    if (prefix === 'haka') watchlistSet(sliced)
    else                   hakahakiWatchlistSet(sliced)
    _renderGrid(prefix)
    _renderCount(prefix)
    const monitor = prefix === 'haka' ? hakaMonitor : hakahakiMonitor
    if (monitor.isRunning()) { monitor.stop(); _startMonitor(prefix) }
  }

  function _bindWlModal() {
    document.querySelectorAll('[data-wl-modal]').forEach(btn => {
      btn.addEventListener('click', () => _openWlModal(btn.dataset.wlModal))
    })
    document.getElementById('wl-modal-close').addEventListener('click', _closeWlModal)
    document.getElementById('wl-cancel-btn').addEventListener('click', _closeWlModal)
    document.getElementById('wl-modal-overlay').addEventListener('click', e => {
      if (e.target.id === 'wl-modal-overlay') _closeWlModal()
    })
    document.getElementById('wl-create-btn').addEventListener('click', _createNamedList)
  }

  function _openWlModal(target) {
    _wlModalTarget = target
    _renderWlModalList()
    document.getElementById('wl-modal-overlay').classList.remove('hidden')
  }

  function _closeWlModal() {
    document.getElementById('wl-modal-overlay').classList.add('hidden')
    document.getElementById('wl-new-name').value = ''
    document.getElementById('wl-new-tickers').value = ''
  }

  function _renderWlModalList() {
    const el = document.getElementById('wl-modal-list')
    const names = Object.keys(DB.namedLists)
    if (!names.length) {
      el.innerHTML = `<div class="empty-state">Belum ada watchlist custom. Buat yang pertama!</div>`
      return
    }
    el.innerHTML = names.map(name => `
      <div class="wl-item">
        <div class="wl-item-info">
          <div class="wl-item-name">${name}</div>
          <div class="wl-item-tickers">${DB.namedLists[name].join(', ')}</div>
        </div>
        <button class="btn btn-sm btn-danger" data-delete-named="${name}">🗑</button>
      </div>
    `).join('')
    el.querySelectorAll('[data-delete-named]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (!confirm(`Hapus watchlist "${btn.dataset.deleteNamed}"?`)) return
        namedListDelete(btn.dataset.deleteNamed)
        _renderWlModalList()
        _renderCustomWlBtns('haka')
        _renderCustomWlBtns('hakahaki')
      })
    })
  }

  function _createNamedList() {
    const name    = document.getElementById('wl-new-name').value.trim()
    const rawText = document.getElementById('wl-new-tickers').value.trim()
    if (!name) { alert('Masukkan nama watchlist.'); return }
    if (!rawText) { alert('Masukkan minimal 1 kode saham.'); return }
    if (DB.namedLists[name]) { alert('Nama sudah dipakai.'); return }

    const tickers = [...new Set(
      rawText.toUpperCase().split(/[\s,;]+/).filter(t => t.length >= 2 && t.length <= 6)
    )]
    if (!tickers.length) { alert('Kode saham tidak valid.'); return }

    namedListSave(name, tickers)
    document.getElementById('wl-new-name').value = ''
    document.getElementById('wl-new-tickers').value = ''
    _renderWlModalList()
    _renderCustomWlBtns('haka')
    _renderCustomWlBtns('hakahaki')
  }

  // ============================================================
  // SEKSI 7: THRESHOLD
  // ============================================================
  function _bindThresholdPills() {
    document.querySelectorAll('[data-threshold]').forEach(el => {
      el.addEventListener('click', () => {
        setThreshold(parseFloat(el.dataset.threshold))
        _renderThresholdPills()
        // Restart monitor yang sedang jalan supaya pakai threshold baru
        if (hakaMonitor.isRunning())     { hakaMonitor.stop();     _startMonitor('haka') }
        if (hakahakiMonitor.isRunning()) { hakahakiMonitor.stop(); _startMonitor('hakahaki') }
      })
    })
  }
  function _renderThresholdPills() {
    document.querySelectorAll('[data-threshold]').forEach(el => {
      el.classList.toggle('active', parseFloat(el.dataset.threshold) === DB.threshold)
    })
  }

  // ============================================================
  // SEKSI 8: MONITOR START/STOP
  // ============================================================
  function _bindMonitorButtons() {
    document.getElementById('haka-btn-start').addEventListener('click', () => _toggleMonitor('haka'))
    document.getElementById('hakahaki-btn-start').addEventListener('click', () => _toggleMonitor('hakahaki'))
    document.getElementById('haka-btn-clear').addEventListener('click', () => { clearAlerts('haka'); _renderAlerts('haka') })
    document.getElementById('hakahaki-btn-clear').addEventListener('click', () => { clearAlerts('hakahaki'); _renderAlerts('hakahaki') })
  }

  function _toggleMonitor(prefix) {
    const monitor = prefix === 'haka' ? hakaMonitor : hakahakiMonitor
    if (monitor.isRunning()) { monitor.stop(); _renderMonitorStatus(prefix, false) }
    else                     { _startMonitor(prefix) }
  }

  function _startMonitor(prefix) {
    const monitor = prefix === 'haka' ? hakaMonitor : hakahakiMonitor
    const list    = prefix === 'haka' ? DB.watchlist : DB.hakahakiWatchlist
    if (!list.length) { alert('Watchlist masih kosong.'); return }
    monitor.start(list, DB.threshold)
    _renderMonitorStatus(prefix, true)
  }

  function _renderMonitorStatus(prefix, running) {
    const btn    = document.getElementById(`${prefix}-btn-start`)
    const status = document.getElementById(`${prefix}-status`)
    btn.textContent     = running ? 'Stop Monitor' : 'Start Monitor'
    btn.dataset.running = running ? '1' : '0'
    btn.classList.toggle('btn-danger', running)
    status.textContent  = running ? '● Memantau...' : '○ Idle'
    status.style.color  = running ? 'var(--live)' : 'var(--ghost)'
  }

  // ============================================================
  // SEKSI 9: RENDER ALERT FEED
  // ============================================================
  function _renderAlerts(prefix) {
    const list = prefix === 'haka' ? DB.alerts : DB.hakahakiAlerts
    const el   = document.getElementById(`${prefix}-feed`)
    if (!list.length) { el.innerHTML = '<div class="empty-state">Belum ada alert.</div>'; return }

    el.innerHTML = list.map(a => {
      // Warna: HAKA (buy penuh) = hijau, HAKI (sell penuh) = merah, Watch (di
      // bawah threshold tapi >=100jt) = amber — terlepas dari buy/sell.
      const col   = a.isWatch ? 'var(--phosphor)' : (a.type === 'HAKA' ? 'var(--live)' : 'var(--down)')
      const badge = a.isWatch ? '⚠ Watch' : (a.type === 'HAKA' ? '🔴 HAKA!' : '🔵 HAKI!')
      const boardLabel = a.board === 'RG' ? 'Regular' : a.board === 'NG' ? 'Nego' : a.board
      const buyerTypeIcon = a.buyerType === 'BROKER_TYPE_FOREIGN' ? '🌍' : a.buyerType === 'BROKER_TYPE_GOVERNMENT' ? '🏛️' : '🏠'
      const lotFmt = a.lot >= 1000 ? `${(a.lot/1000).toFixed(1)}K lot` : `${_fmtNum(a.lot)} lot`

      return `
      <div class="alert-card2" style="border-left-color:${col}">
        <div class="alert-head-row">
          <span class="alert-sym2">${a.sym}</span>
          <span class="alert-badge" style="color:${col};background:${col}22">${badge}</span>
          ${boardLabel ? `<span class="alert-board">${boardLabel}</span>` : ''}
          <span class="alert-time2">${a.time}</span>
        </div>
        <div class="alert-metrics-grid">
          <div class="alert-metric">
            <div class="alert-metric-label">Nilai</div>
            <div class="alert-metric-val" style="color:${a.isHAKA ? col : 'var(--paper)'}; font-size:${a.isHAKA ? '13px' : '11px'}">${_fmtRp(a.value)}</div>
          </div>
          <div class="alert-metric">
            <div class="alert-metric-label">Harga</div>
            <div class="alert-metric-val">${_fmtNum(a.price)}</div>
          </div>
          <div class="alert-metric">
            <div class="alert-metric-label">Volume</div>
            <div class="alert-metric-val">${lotFmt}</div>
          </div>
        </div>
        ${a.buyer ? `
        <div class="alert-bs-row">
          <span>${buyerTypeIcon} Buyer: <span class="alert-bs-code">${a.buyer}</span></span>
          <span>→ Seller: <span class="alert-bs-code">${a.seller || '—'}</span></span>
        </div>` : ''}
      </div>
    `}).join('')
  }

  // ============================================================
  // SEKSI 10: ERROR HANDLING
  // ============================================================
  function handleError(e) {
    if (e.code === 'TOKEN_EXPIRED' || e.code === 'TOKEN_NOT_SET') {
      if (e.code === 'TOKEN_EXPIRED') TOKEN.clear()
      refreshTokenStatus()
      _renderMonitorStatus('haka', false)
      _renderMonitorStatus('hakahaki', false)
    }
    console.error('[haka] error:', e.message)
  }

  // ============================================================
  // SEKSI 11: HELPER FORMAT
  // ============================================================
  /**
   * Beep singkat (oscillator 880Hz, 0.4 detik) — sama persis pola dari
   * ihsg-intelligence-hub.html. Dipanggil tiap alert masuk (HAKA atau HAKI).
   */
  function _beep() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)()
      const o = ctx.createOscillator(), g = ctx.createGain()
      o.connect(g); g.connect(ctx.destination)
      o.frequency.value = 880
      g.gain.setValueAtTime(0.3, ctx.currentTime)
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4)
      o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.4)
    } catch (_) {}
  }

  function _fmtRp(v) {
    if (v >= 1e9) return (v/1e9).toFixed(1) + ' M'
    if (v >= 1e6) return (v/1e6).toFixed(0) + ' jt'
    return new Intl.NumberFormat('id-ID').format(Math.round(v))
  }
  function _fmtNum(v) { return new Intl.NumberFormat('id-ID').format(Math.round(v)) }

  init()
  window._haka = { DB, hakaMonitor, hakahakiMonitor }
</script>
