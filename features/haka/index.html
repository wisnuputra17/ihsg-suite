<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HAKA & HAKI · IHSG Suite</title>
  <link rel="stylesheet" href="../../shared/ui.css">

  <style>
    .page { max-width: none; }
    .app-header { padding: 14px 0; }

    .toolbar-top {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 16px;
      padding-bottom: 14px; border-bottom: 1px solid var(--line);
    }
    .add-card-wrap { position: relative; }
    .sym-dropdown { position: absolute; top: calc(100% + 4px); left: 0; z-index: 30;
      background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
      width: 240px; max-height: 260px; overflow-y: auto; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .sym-option { display: flex; align-items: baseline; gap: 8px; padding: 7px 10px; cursor: pointer; }
    .sym-option:hover { background: var(--panel-hi); }
    .sym-option-code { font-family: var(--f-mono); font-size: 12px; color: var(--paper); flex-shrink: 0; }
    .sym-option-name { font-size: 11px; color: var(--ghost); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sym-dropdown-empty { padding: 10px; font-family: var(--f-mono); font-size: 11px; color: var(--ghost); }

    .global-status { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .monitor-status { font-family: var(--f-mono); font-size: 11px; color: var(--ghost); }
    .monitor-status.is-live { color: var(--live); }

    /* ============ CARDS GRID ============ */
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; align-items: start; }
    .card-box { border: 1px solid var(--line); border-radius: var(--radius); background: var(--panel); overflow: hidden; }
    .card-box.is-multi { grid-column: span 2; }
    @media (max-width: 700px) { .card-box.is-multi { grid-column: span 1; } }

    .card-head {
      display: flex; align-items: center; gap: 8px; padding: 10px 12px;
      border-bottom: 1px solid var(--line); background: var(--panel-hi);
    }
    .card-head-sym { font-family: var(--f-mono); font-size: 14px; font-weight: 700; color: var(--paper); }
    .card-head-badge { font-family: var(--f-mono); font-size: 9px; color: var(--phosphor); background: var(--phosphor-dim);
      border: 1px solid var(--phosphor-line); padding: 1px 6px; border-radius: 8px; }
    .card-threshold-wrap { display: flex; align-items: center; gap: 3px; font-family: var(--f-mono); font-size: 9px; color: var(--ghost); }
    .card-threshold-input {
      width: 48px; background: #0f0e0c; border: 1px solid var(--line); border-radius: var(--radius);
      padding: 2px 5px; font-family: var(--f-mono); font-size: 10px; color: var(--phosphor); text-align: right; outline: none;
    }
    .card-threshold-input:focus { border-color: var(--phosphor-line); }
    .mode-toggle { display: flex; gap: 3px; margin-left: auto; }
    .mode-toggle button {
      font-family: var(--f-mono); font-size: 9px; padding: 3px 8px; border-radius: var(--radius);
      border: 1px solid var(--line); background: transparent; color: var(--ghost); cursor: pointer;
    }
    .mode-toggle button.active { border-color: var(--phosphor-line); color: var(--phosphor); background: var(--phosphor-dim); }
    .card-remove-btn { font-size: 13px; color: var(--ghost); cursor: pointer; padding: 0 2px; }
    .card-remove-btn:hover { color: var(--down); }

    .card-body { padding: 10px 12px; }

    /* Multi card: search + preset + grid emiten (reuse pola yg sudah ada) */
    .preset-row { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
    .custom-wl-btns { display: inline-flex; gap: 4px; flex-wrap: wrap; }
    .custom-wl-btn {
      padding: 3px 10px; border-radius: var(--radius); cursor: pointer; font-size: 10px;
      font-family: var(--f-mono); border: 1px solid var(--phosphor-line); color: var(--phosphor); background: var(--phosphor-dim);
    }
    .btn-dashed { border-style: dashed; border-color: var(--phosphor-line); color: var(--phosphor); background: transparent; }
    .emiten-grid {
      display: flex; flex-wrap: wrap; gap: 4px; max-height: 130px; overflow-y: auto;
      padding: 8px; background: #0f0e0c; border: 1px solid var(--line); border-radius: var(--radius);
      margin-bottom: 10px;
    }
    .etag {
      padding: 3px 7px; border-radius: var(--radius); cursor: pointer; user-select: none;
      font-family: var(--f-mono); font-size: 10px; border: 1px solid var(--line);
      color: var(--ghost); background: transparent; transition: all 100ms ease;
    }
    .etag:hover { border-color: var(--line-hi); color: var(--dim); }
    .etag.active { border-color: var(--phosphor-line); color: var(--phosphor); background: var(--phosphor-dim); }
    .watch-count { font-family: var(--f-mono); font-size: 10px; color: var(--phosphor); }

    /* Feed kompak per-card */
    .card-feed { display: flex; flex-direction: column; gap: 4px; max-height: 280px; overflow-y: auto; }
    .card-box.is-multi .card-feed { max-height: 360px; }
    .feed-row {
      display: flex; align-items: center; gap: 8px; padding: 6px 8px;
      border-left: 3px solid var(--line); border-radius: 0 var(--radius) var(--radius) 0;
      background: #0f0e0c; font-family: var(--f-mono); font-size: 10px; animation: slideIn 200ms ease both;
    }
    @keyframes slideIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }
    .feed-row-sym { font-weight: 700; color: var(--paper); min-width: 44px; }
    .feed-row-badge { font-size: 8px; padding: 1px 5px; border-radius: 6px; font-weight: 700; }
    .feed-row-val { font-weight: 700; }
    .feed-row-detail { color: var(--ghost); }
    .feed-row-time { margin-left: auto; color: var(--ghost); white-space: nowrap; }

    /* Modal watchlist custom (sama seperti sebelumnya) */
    .wl-modal-overlay { position: fixed; inset: 0; background: rgba(10,9,8,0.75); z-index: 200;
      display: flex; align-items: center; justify-content: center; padding: 20px; }
    .wl-modal { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
      padding: 20px; width: 100%; max-width: 460px; max-height: 80vh; overflow-y: auto; }
    .wl-modal-head { display: flex; align-items: center; margin-bottom: 16px; font-size: 14px; font-weight: 700; color: var(--paper); }
    .wl-modal-head span { flex: 1; }
    .wl-modal-list { margin-bottom: 8px; }
    .wl-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: #0f0e0c; border-radius: var(--radius); margin-bottom: 5px; }
    .wl-item-info { flex: 1; min-width: 0; }
    .wl-item-name { font-size: 11px; font-weight: 700; color: var(--paper); }
    .wl-item-tickers { font-size: 9px; color: var(--ghost); font-family: var(--f-mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .wl-modal-form { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--line); }
  </style>
</head>
<body>

<div class="page">

  <header class="app-header" id="app-header"></header>

  <div class="toolbar-top">
    <div class="add-card-wrap">
      <input type="text" class="input sym-input" id="add-card-input" placeholder="+ Tambah card (cari saham)..." style="width:200px;" autocomplete="off">
      <div class="sym-dropdown hidden" id="add-card-dropdown"></div>
    </div>

    <div class="global-status">
      <button class="btn btn-primary" id="btn-start" data-running="0">Start Monitor</button>
      <span class="monitor-status" id="global-status">○ Idle</span>
    </div>
  </div>

  <div class="cards-grid" id="cards-grid"></div>

  <!-- =================== MODAL: Kelola Watchlist Custom =================== -->
  <div class="wl-modal-overlay hidden" id="wl-modal-overlay">
    <div class="wl-modal">
      <div class="wl-modal-head">
        <span>📋 Kelola Watchlist Custom</span>
        <button class="btn btn-sm" id="wl-modal-close">×</button>
      </div>
      <div class="wl-modal-list" id="wl-modal-list"></div>
      <div class="wl-modal-form">
        <div class="section-label">＋ Buat Watchlist Baru</div>
        <input type="text" class="input" id="wl-new-name" placeholder="Nama watchlist (misal: Saham Favorit)" style="width:100%; margin-bottom:7px;">
        <textarea class="input" id="wl-new-tickers" placeholder="Kode saham dipisah spasi atau koma&#10;Contoh: BBRI BMRI TLKM ASII ANTM" style="width:100%; height:80px; resize:vertical; font-family:var(--f-mono);"></textarea>
        <div class="toolbar" style="margin-top:8px;">
          <button class="btn btn-primary" id="wl-create-btn">✓ Simpan Watchlist</button>
          <button class="btn btn-sm" id="wl-cancel-btn">Batal</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script type="module">
  import { TOKEN, SYMS, LQ45, IDX80, EMITEN_INFO, has, setEmitenInfo } from '../../shared/store.js'
  import { fetchEmitenJson } from '../../shared/api.js'
  import { renderHeader, refreshTokenStatus, openTokenPopover } from '../../shared/header.js'
  import { createMonitor } from './poll.js'
  import {
    DB, loadAll, MULTI_CARD_ID,
    cardAdd, cardRemove, cardSetMode, cardSetThreshold,
    multiCardToggleSym, multiCardSetSyms,
    namedListSave, namedListDelete,
    cardAlertAdd
  } from './db.js'

  const monitor = createMonitor()

  // ============================================================
  // SEKSI 1: INIT
  // ============================================================
  async function init() {
    renderHeader(document.getElementById('app-header'), [
      { label: 'IHSG Suite', href: '../../index.html' },
      { label: 'HAKA & HAKI' }
    ])
    window.addEventListener('ihsg:token-saved', refreshTokenStatus)

    await _loadEmitenInfo()
    await loadAll()

    _bindAddCard()
    _bindStartStop()
    _bindWlModal()
    _renderAllCards()

    monitor.init({
      onAlert:  _routeAlert,
      onError:  handleError
    })
  }

  async function _loadEmitenInfo() {
    if (has.emitenInfo()) return
    try { setEmitenInfo(await fetchEmitenJson()) } catch (e) { console.warn('[haka] gagal load emiten.json:', e.message) }
  }

  function handleError(e) {
    if (e.code === 'TOKEN_EXPIRED' || e.code === 'TOKEN_NOT_SET') {
      document.getElementById('global-status').textContent = '⚠ Token belum diisi / expired'
      document.getElementById('global-status').classList.remove('is-live')
      _setRunningUI(false)
      openTokenPopover()
    }
  }

  // ============================================================
  // SEKSI 2: ROUTING ALERT — 1 trade bisa relevan ke BEBERAPA card sekaligus
  // ============================================================
  function _routeAlert(trade) {
    let beeped = false
    DB.cards.forEach(card => {
      if (!card.syms.includes(trade.sym)) return
      if (card.mode === 'buy' && trade.type !== 'HAKA') return // mode HAKA-saja, lewati transaksi sell
      if (trade.value < card.threshold) return // di bawah threshold CARD INI — lewati (card lain mungkin tetap lolos)
      cardAlertAdd(card.id, trade)
      _renderCardFeed(card.id)
      if (!beeped) { _beep(); beeped = true }
    })
  }

  function _getAllSymbols() {
    const set = new Set()
    DB.cards.forEach(c => c.syms.forEach(s => set.add(s)))
    return [...set]
  }

  // ============================================================
  // SEKSI 3: START/STOP MONITOR (global, 1 poller bersama)
  // ============================================================
  function _bindStartStop() {
    document.getElementById('btn-start').addEventListener('click', () => {
      if (monitor.isRunning()) { monitor.stop(); _setRunningUI(false); return }
      if (!TOKEN.isSet()) { openTokenPopover(); return }
      if (!_getAllSymbols().length) { alert('Tambah minimal 1 card / pilih emiten dulu.'); return }
      monitor.start(_getAllSymbols)
      _setRunningUI(true)
    })
  }

  function _setRunningUI(running) {
    const btn = document.getElementById('btn-start')
    const status = document.getElementById('global-status')
    btn.textContent = running ? 'Stop Monitor' : 'Start Monitor'
    btn.dataset.running = running ? '1' : '0'
    status.textContent = running ? '● Live' : '○ Idle'
    status.classList.toggle('is-live', running)
  }

  /** Dipanggil tiap kali symbol set card berubah (tambah/hapus card, ubah isi multi) — restart poller kalau sedang jalan, biar ikut simbol terbaru. */
  function _maybeRestartMonitor() {
    if (monitor.isRunning()) monitor.start(_getAllSymbols)
  }

  // ============================================================
  // SEKSI 4: TAMBAH CARD (search saham)
  // ============================================================
  function _bindAddCard() {
    const input = document.getElementById('add-card-input')
    const dropdown = document.getElementById('add-card-dropdown')

    input.addEventListener('input', () => _renderAddCardDropdown(input.value.trim()))
    input.addEventListener('focus', () => { if (input.value.trim()) _renderAddCardDropdown(input.value.trim()) })
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { _addCardFromInput(input.value.trim().toUpperCase()); dropdown.classList.add('hidden') }
      if (e.key === 'Escape') dropdown.classList.add('hidden')
    })
    document.addEventListener('click', e => {
      if (!dropdown.contains(e.target) && e.target !== input) dropdown.classList.add('hidden')
    })
  }

  function _renderAddCardDropdown(query) {
    const dropdown = document.getElementById('add-card-dropdown')
    if (!query) { dropdown.classList.add('hidden'); return }
    const q = query.toUpperCase()
    const all = Object.entries(EMITEN_INFO)
    const codeMatches = all.filter(([code]) => code.startsWith(q))
    const nameMatches  = all.filter(([code, info]) => !code.startsWith(q) && info.name && info.name.toUpperCase().includes(q))
    const results = [...codeMatches, ...nameMatches].slice(0, 20)
    if (!results.length) { dropdown.innerHTML = `<div class="sym-dropdown-empty">Tidak ditemukan</div>`; dropdown.classList.remove('hidden'); return }
    dropdown.innerHTML = results.map(([code, info]) => `
      <div class="sym-option" data-code="${code}"><span class="sym-option-code">${code}</span><span class="sym-option-name">${info.name || ''}</span></div>
    `).join('')
    dropdown.classList.remove('hidden')
    dropdown.querySelectorAll('.sym-option').forEach(el => {
      el.addEventListener('click', () => { _addCardFromInput(el.dataset.code); dropdown.classList.add('hidden') })
    })
  }

  function _addCardFromInput(sym) {
    if (!sym) return
    const ok = cardAdd(sym)
    document.getElementById('add-card-input').value = ''
    if (!ok) { alert(`Card untuk ${sym} sudah ada.`); return }
    _renderAllCards()
    _maybeRestartMonitor()
  }

  // ============================================================
  // SEKSI 5: RENDER SEMUA CARD
  // ============================================================
  function _renderAllCards() {
    const grid = document.getElementById('cards-grid')
    grid.innerHTML = DB.cards.map(card => _cardHtml(card)).join('')
    DB.cards.forEach(card => {
      _bindCardEvents(card)
      if (card.type === 'multi') _renderMultiGrid()
      _renderCardFeed(card.id)
    })
    _renderCustomWlBtns()
  }

  function _cardHtml(card) {
    const isMulti = card.type === 'multi'
    return `
    <div class="card-box ${isMulti ? 'is-multi' : ''}" data-card-id="${card.id}">
      <div class="card-head">
        ${isMulti
          ? `<span class="card-head-sym">📋 Multi</span><span class="card-head-badge" id="multi-count">0 dipilih</span>`
          : `<span class="card-head-sym">${card.id}</span>`}
        <div class="mode-toggle" data-mode-for="${card.id}">
          <button data-mode="buy"  class="${card.mode === 'buy'  ? 'active' : ''}">HAKA</button>
          <button data-mode="both" class="${card.mode === 'both' ? 'active' : ''}">HAKA+HAKI</button>
        </div>
        <div class="card-threshold-wrap">
          <input type="number" class="card-threshold-input" data-threshold-for="${card.id}" value="${card.threshold / 1e6}" min="1" step="1">
          <span>jt</span>
        </div>
        ${isMulti ? '' : `<span class="card-remove-btn" data-remove-card="${card.id}">×</span>`}
      </div>
      <div class="card-body">
        ${isMulti ? `
          <div class="preset-row">
            <button class="btn btn-sm" data-preset="lq45">LQ45</button>
            <button class="btn btn-sm" data-preset="idx80">IDX80</button>
            <button class="btn btn-sm" data-preset="all">Semua</button>
            <button class="btn btn-sm" data-preset="none">Reset</button>
            <span class="custom-wl-btns" id="multi-custom-btns"></span>
            <button class="btn btn-sm btn-dashed" id="open-wl-modal">＋ Watchlist</button>
          </div>
          <input type="text" class="input sym-input" id="multi-grid-search" placeholder="Cari kode saham..." style="width:100%; margin-bottom:8px;">
          <div class="emiten-grid" id="multi-egrid"></div>
        ` : ''}
        <div class="card-feed" id="feed-${card.id}"></div>
      </div>
    </div>`
  }

  function _bindCardEvents(card) {
    document.querySelectorAll(`[data-mode-for="${card.id}"] button`).forEach(btn => {
      btn.addEventListener('click', () => {
        cardSetMode(card.id, btn.dataset.mode)
        document.querySelectorAll(`[data-mode-for="${card.id}"] button`).forEach(b => b.classList.toggle('active', b === btn))
      })
    })

    // Threshold diketik langsung (satuan juta) — TIDAK perlu restart monitor,
    // karena threshold dibaca per-card saat routing alert, bukan oleh poller.
    const thresholdInput = document.querySelector(`[data-threshold-for="${card.id}"]`)
    const _applyThresholdInput = () => {
      const jt = parseFloat(thresholdInput.value)
      if (isNaN(jt) || jt <= 0) { thresholdInput.value = card.threshold / 1e6; return }
      cardSetThreshold(card.id, jt * 1e6)
    }
    thresholdInput.addEventListener('blur', _applyThresholdInput)
    thresholdInput.addEventListener('keydown', e => { if (e.key === 'Enter') thresholdInput.blur() })

    if (card.type === 'single') {
      const removeBtn = document.querySelector(`[data-remove-card="${card.id}"]`)
      removeBtn.addEventListener('click', () => {
        cardRemove(card.id)
        _renderAllCards()
        _maybeRestartMonitor()
      })
    }

    if (card.type === 'multi') {
      document.getElementById('multi-grid-search').addEventListener('input', _renderMultiGrid)
      document.querySelectorAll('#cards-grid [data-preset]').forEach(btn => {
        btn.addEventListener('click', () => _applyMultiPreset(btn.dataset.preset))
      })
      document.getElementById('open-wl-modal').addEventListener('click', _openWlModal)
    }
  }

  // ============================================================
  // SEKSI 6: GRID EMITEN (card multi) — search, preset
  // ============================================================
  function _renderMultiGrid() {
    const query = document.getElementById('multi-grid-search').value.trim().toUpperCase()
    const list  = query ? SYMS.filter(s => s.includes(query)) : SYMS
    const multiCard = DB.cards.find(c => c.id === MULTI_CARD_ID)
    const el = document.getElementById('multi-egrid')
    el.innerHTML = list.map(sym => `<span class="etag ${multiCard.syms.includes(sym) ? 'active' : ''}" data-sym="${sym}">${sym}</span>`).join('')
    el.querySelectorAll('.etag').forEach(tag => {
      tag.addEventListener('click', () => {
        multiCardToggleSym(tag.dataset.sym)
        _renderMultiGrid()
        _renderMultiCount()
        _maybeRestartMonitor()
      })
    })
    _renderMultiCount()
  }

  function _renderMultiCount() {
    const multiCard = DB.cards.find(c => c.id === MULTI_CARD_ID)
    const el = document.getElementById('multi-count')
    if (el) el.textContent = `${multiCard.syms.length} dipilih`
  }

  function _applyMultiPreset(preset) {
    let syms = []
    if (preset === 'lq45')  syms = LQ45
    else if (preset === 'idx80') syms = IDX80
    else if (preset === 'all')   syms = SYMS
    else if (preset === 'none')  syms = []
    multiCardSetSyms(syms)
    _renderMultiGrid()
    _maybeRestartMonitor()
  }

  // ============================================================
  // SEKSI 7: WATCHLIST CUSTOM (modal + tombol cepat) — isi card multi
  // ============================================================
  function _renderCustomWlBtns() {
    const el = document.getElementById('multi-custom-btns')
    if (!el) return
    const names = Object.keys(DB.namedLists)
    el.innerHTML = names.map(name => `
      <button class="custom-wl-btn" data-apply-named="${name}" title="${DB.namedLists[name].join(', ')}">${name} (${DB.namedLists[name].length})</button>
    `).join('')
    el.querySelectorAll('[data-apply-named]').forEach(btn => {
      btn.addEventListener('click', () => {
        multiCardSetSyms(DB.namedLists[btn.dataset.applyNamed])
        _renderMultiGrid()
        _maybeRestartMonitor()
      })
    })
  }

  function _bindWlModal() {
    document.getElementById('wl-modal-close').addEventListener('click', _closeWlModal)
    document.getElementById('wl-cancel-btn').addEventListener('click', _closeWlModal)
    document.getElementById('wl-modal-overlay').addEventListener('click', e => { if (e.target.id === 'wl-modal-overlay') _closeWlModal() })
    document.getElementById('wl-create-btn').addEventListener('click', _createNamedList)
  }

  function _openWlModal() {
    _renderWlModalList()
    document.getElementById('wl-modal-overlay').classList.remove('hidden')
  }

  function _closeWlModal() {
    document.getElementById('wl-modal-overlay').classList.add('hidden')
    document.getElementById('wl-new-name').value = ''
    document.getElementById('wl-new-tickers').value = ''
  }

  function _renderWlModalList() {
    const el = document.getElementById('wl-modal-list')
    const names = Object.keys(DB.namedLists)
    if (!names.length) { el.innerHTML = `<div class="empty-state">Belum ada watchlist custom. Buat yang pertama!</div>`; return }
    el.innerHTML = names.map(name => `
      <div class="wl-item">
        <div class="wl-item-info"><div class="wl-item-name">${name}</div><div class="wl-item-tickers">${DB.namedLists[name].join(', ')}</div></div>
        <button class="btn btn-sm btn-danger" data-delete-named="${name}">🗑</button>
      </div>
    `).join('')
    el.querySelectorAll('[data-delete-named]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (!confirm(`Hapus watchlist "${btn.dataset.deleteNamed}"?`)) return
        namedListDelete(btn.dataset.deleteNamed)
        _renderWlModalList()
        _renderCustomWlBtns()
      })
    })
  }

  function _createNamedList() {
    const name    = document.getElementById('wl-new-name').value.trim()
    const rawText = document.getElementById('wl-new-tickers').value.trim()
    if (!name) { alert('Masukkan nama watchlist.'); return }
    if (!rawText) { alert('Masukkan minimal 1 kode saham.'); return }
    if (DB.namedLists[name]) { alert('Nama sudah dipakai.'); return }
    const tickers = [...new Set(rawText.toUpperCase().split(/[\s,;]+/).filter(t => t.length >= 2 && t.length <= 6))]
    if (!tickers.length) { alert('Kode saham tidak valid.'); return }
    namedListSave(name, tickers)
    document.getElementById('wl-new-name').value = ''
    document.getElementById('wl-new-tickers').value = ''
    _renderWlModalList()
    _renderCustomWlBtns()
  }

  // ============================================================
  // SEKSI 9: RENDER FEED PER-CARD (kompak)
  // ============================================================
  function _renderCardFeed(cardId) {
    const card = DB.cards.find(c => c.id === cardId)
    const el = document.getElementById(`feed-${cardId}`)
    if (!card || !el) return
    if (!card.alerts.length) { el.innerHTML = `<div class="empty-state" style="padding:14px 0;">Belum ada alert.</div>`; return }

    el.innerHTML = card.alerts.map(a => {
      const col   = a.type === 'HAKA' ? 'var(--live)' : 'var(--down)'
      const lotFmt = a.lot >= 1000 ? `${(a.lot/1000).toFixed(1)}K lot` : `${_fmtNum(a.lot)} lot`
      return `
      <div class="feed-row" style="border-left-color:${col}">
        <span class="feed-row-sym">${a.sym}</span>
        <span class="feed-row-badge" style="color:${col};background:${col}22">${a.type}</span>
        <span class="feed-row-val" style="color:${col}">${_fmtRp(a.value)}</span>
        <span class="feed-row-detail">${_fmtNum(a.price)} · ${lotFmt}</span>
        <span class="feed-row-time">${a.time}</span>
      </div>`
    }).join('')
  }

  // ============================================================
  // SEKSI 10: BEEP & FORMAT
  // ============================================================
  function _beep() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)()
      const o = ctx.createOscillator(), g = ctx.createGain()
      o.connect(g); g.connect(ctx.destination)
      o.frequency.value = 880
      g.gain.setValueAtTime(0.3, ctx.currentTime)
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4)
      o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.4)
    } catch (_) {}
  }

  function _fmtRp(v) {
    if (v === null || v === undefined || isNaN(v)) return '–'
    const sign = v < 0 ? '-' : ''
    const abs  = Math.abs(v)
    if (abs >= 1e9) return sign + (abs/1e9).toFixed(2) + 'M'
    if (abs >= 1e6) return sign + (abs/1e6).toFixed(0) + 'jt'
    return sign + new Intl.NumberFormat('id-ID').format(Math.round(abs))
  }
  function _fmtNum(v) { return new Intl.NumberFormat('id-ID').format(Math.round(v)) }

  init()
  window._haka = { DB, monitor }
</script>
