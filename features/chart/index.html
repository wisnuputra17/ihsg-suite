<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chart · IHSG Suite</title>
  <link rel="stylesheet" href="../../shared/ui.css">
  <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@5.2.0/dist/lightweight-charts.standalone.production.js"></script>

  <style>
    /* Halaman ini full-screen — override max-width default shared/ui.css */
    html, body { overflow: hidden; height: 100%; }
    .page {
      max-width: none; padding: 0 10px;
      height: 100vh; display: flex; flex-direction: column;
    }

    .app-header { flex-shrink: 0; padding: 10px 0; }

    /* ── TOOLBAR — search saham + Indicators + LPM mode + token, semua 1 baris ── */
    .chart-toolbar {
      flex-shrink: 0; display: flex; align-items: center; gap: 8px;
      padding-bottom: 8px; flex-wrap: wrap; position: relative;
    }

    .sym-search {
      position: relative;
      display: flex; align-items: center; gap: 6px;
      background: #0f0e0c; border: 1px solid var(--line); border-radius: var(--radius);
      padding: 6px 10px; min-width: 140px;
    }
    .sym-search-icon { color: var(--ghost); font-size: 12px; }
    .sym-search input {
      background: transparent; border: none; outline: none; width: 90px;
      font-family: var(--f-mono); font-size: 12px; color: var(--paper); text-transform: uppercase;
    }
    .sym-search input::placeholder { color: var(--ghost); text-transform: none; }

    .sym-dropdown {
      position: absolute; top: calc(100% + 4px); left: 0; z-index: 30;
      background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
      width: 260px; max-height: 280px; overflow-y: auto;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .sym-option {
      display: flex; align-items: baseline; gap: 8px; padding: 7px 10px;
      cursor: pointer; transition: background 120ms ease;
    }
    .sym-option:hover, .sym-option.is-active { background: var(--panel-hi); }
    .sym-option-code { font-family: var(--f-mono); font-size: 12px; color: var(--paper); flex-shrink: 0; }
    .sym-option-name { font-size: 11px; color: var(--ghost); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sym-dropdown-empty { padding: 10px; font-family: var(--f-mono); font-size: 11px; color: var(--ghost); }

    .dropdown-wrap { position: relative; }
    .dropdown-panel {
      position: absolute; top: calc(100% + 4px); left: 0; z-index: 20;
      background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
      padding: 12px; min-width: 220px; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .dropdown-row {
      display: flex; align-items: center; gap: 8px; padding: 6px 0;
      font-family: var(--f-mono); font-size: 12px; color: var(--dim);
    }
    .dropdown-row input[type=checkbox] { accent-color: var(--phosphor); cursor: pointer; }
    .dropdown-row label { cursor: pointer; user-select: none; flex: 1; }
    .num-input { width: 50px; }
    .mode-select {
      background: #0f0e0c; border: 1px solid var(--line); border-radius: var(--radius);
      padding: 3px 5px; font-family: var(--f-mono); font-size: 10px; color: var(--paper); outline: none;
    }

    .lpm-status { font-family: var(--f-mono); font-size: 10px; color: var(--ghost); margin-left: 4px; }

    /* ── Toolbar drawing tools — vertikal, sisi kiri chart ── */
    .draw-toolbar {
      position: absolute; top: 8px; left: 8px; z-index: 6;
      display: flex; flex-direction: column; gap: 2px;
      background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
      padding: 4px;
    }
    .draw-tool {
      width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
      background: transparent; border: none; border-radius: var(--radius);
      color: var(--ghost); font-size: 14px; cursor: pointer; transition: all var(--ease);
    }
    .draw-tool:hover { background: var(--panel-hi); color: var(--dim); }
    .draw-tool.active { background: var(--phosphor-dim); color: var(--phosphor); }
    .draw-toolbar-sep { height: 1px; background: var(--line); margin: 2px 0; }

    /* ── Overlay canvas garis gambar — murni visual, klik diteruskan ke chart ── */
    /* (canvas overlay manual sudah dihapus — trend line sekarang series chart native,
       library urus reposisi otomatis saat pan/zoom, jauh lebih efisien) */

    .draw-delete-btn {
      position: absolute; z-index: 7; transform: translate(-50%, -50%);
      background: var(--down); color: #fff; border: none; border-radius: 50%;
      width: 20px; height: 20px; font-size: 12px; line-height: 1; cursor: pointer;
      display: none; align-items: center; justify-content: center;
    }

    /* ── AREA CHART — mengisi sisa layar ── */
    .chart-wrap { flex: 1; min-height: 0; border: 1px solid var(--line); position: relative; }
    #chart-main { width: 100%; height: 100%; }

    /* ── OHLC info bar — overlay di atas chart, bukan baris terpisah ── */
    .ohlc-bar {
      position: absolute; top: 6px; left: 8px; z-index: 5;
      display: flex; align-items: baseline; gap: 9px; flex-wrap: wrap;
      font-family: var(--f-mono); font-size: 12px; pointer-events: none;
      text-shadow: 0 0 4px rgba(10,9,8,0.9);
    }
    .ohlc-sym { color: var(--paper); font-weight: 500; }
    .ohlc-tf  { color: var(--ghost); }
    .ohlc-val { color: var(--dim); }
    .ohlc-val b { color: var(--paper); font-weight: 400; }
    .ohlc-chg.up   { color: var(--live); }
    .ohlc-chg.down { color: var(--down); }

    /* ── Legend indikator — di bawah OHLC bar, overlay juga ── */
    .chart-legend {
      position: absolute; top: 28px; left: 8px; z-index: 5;
      display: flex; flex-direction: column; gap: 2px;
      pointer-events: none; max-width: 260px;
    }
    .legend-row {
      font-family: var(--f-mono); font-size: 11px; line-height: 1.5;
      white-space: nowrap; text-shadow: 0 0 4px rgba(10,9,8,0.9);
    }
    .legend-swatch { display: inline-block; width: 8px; height: 2px; margin-right: 5px; vertical-align: middle; }
    .legend-name  { color: var(--dim); }
    .legend-value { font-weight: 500; }
  </style>
</head>
<body>

<div class="page">

  <header class="app-header" id="app-header"></header>

  <div class="chart-toolbar">
    <div class="sym-search">
      <span class="sym-search-icon">⌕</span>
      <input type="text" id="sym-input" placeholder="cari saham..." maxlength="10" autocomplete="off">
      <div class="sym-dropdown hidden" id="sym-dropdown"></div>
    </div>

    <div class="dropdown-wrap">
      <button class="btn btn-sm" id="btn-indicators">Indicators ▾</button>
      <div class="dropdown-panel hidden" id="ind-dropdown">
        <div class="dropdown-row">
          <input type="checkbox" id="ind-ma"><label for="ind-ma">MA</label>
          <input type="number" class="input num-input" id="ma-period" value="20" min="2" max="200">
        </div>
        <div class="dropdown-row">
          <input type="checkbox" id="ind-bollinger"><label for="ind-bollinger">Bollinger Bands</label>
        </div>
        <div class="dropdown-row">
          <input type="checkbox" id="ind-volume" checked><label for="ind-volume">Volume</label>
        </div>
        <div class="dropdown-row">
          <input type="checkbox" id="ind-rsi"><label for="ind-rsi">RSI</label>
        </div>
        <div class="dropdown-row">
          <input type="checkbox" id="ind-macd"><label for="ind-macd">MACD</label>
        </div>
        <div class="dropdown-row">
          <input type="checkbox" id="ind-lpm"><label for="ind-lpm">LPM</label>
          <select class="mode-select" id="lpm-mode">
            <option value="bar">Bar</option>
            <option value="line">Garis %</option>
          </select>
        </div>
      </div>
    </div>

    <span class="lpm-status" id="lpm-status"></span>
    <span id="status" style="font-family:var(--f-mono); font-size:10px; color:var(--ghost); margin-left:4px;"></span>
  </div>

  <div class="chart-wrap">
    <div class="draw-toolbar" id="draw-toolbar">
      <button class="draw-tool active" data-tool="cursor" title="Pilih">↖</button>
      <button class="draw-tool" data-tool="trendline" title="Garis Trend">／</button>
      <div class="draw-toolbar-sep"></div>
      <button class="draw-tool" id="draw-clear-all" title="Hapus semua garis di saham ini">⌫</button>
    </div>
    <div class="ohlc-bar" id="ohlc-bar"></div>
    <div class="chart-legend" id="chart-legend"></div>
    <div id="chart-main"></div>
    <button class="draw-delete-btn" id="draw-delete-btn">×</button>
  </div>

</div>

<script type="module">
  import { TOKEN, EMITEN_INFO, has, setEmitenInfo } from '../../shared/store.js'
  import { fetchDaily, fetchAbsorption, fetchMarketStatus, fetchEmitenJson } from '../../shared/api.js'
  import { renderHeader, refreshTokenStatus, openTokenPopover } from '../../shared/header.js'
  import { calcSMA, calcRSI, calcMACD, calcBollinger } from '../../shared/indicators.js'
  import { DB, savePrefs, loadPrefs, loadDrawings, addDrawing, removeDrawing } from './db.js'

  let _loading = false
  let chart = null
  let candleSeries = null
  let _dateToIndex = {}

  // Registry indikator aktif — {key: {series:[], overlay:bool, legend:fn}}
  const ACTIVE = {}
  const PANE_ORDER = ['volume', 'rsi', 'macd', 'lpm']

  // Drawing tools state
  let _drawMode = 'cursor'         // 'cursor' | 'trendline'
  let _pendingPoint = null         // titik pertama saat menggambar trend line
  let _previewSeries = null        // garis putus-putus yang ikut kursor sebelum klik ke-2
  let _selectedDrawingId = null    // id drawing yang sedang dipilih (untuk tombol hapus)
  const _drawingSeries = {}        // {drawingId: seriesObject} — referensi series native chart

  // ============================================================
  // SEKSI 1: INIT
  // ============================================================
  function init() {
    renderHeader(document.getElementById('app-header'), [
      { label: 'IHSG Suite', href: '../../index.html' },
      { label: 'Chart' }
    ])
    window.addEventListener('ihsg:token-saved', () => {
      if (!DB.sym) { document.getElementById('sym-input').value = 'IHSG'; _loadSym() }
    })

    _bindDropdowns()
    _bindControls()
    _bindSymSearch()
    _bindDrawToolbar()
    _applyPrefs(loadPrefs())
    window.addEventListener('resize', () => { _layoutPanes(); _repositionDeleteBtn() })
    _loadEmitenInfo()
    loadDrawings().then(() => { if (DB.sym) _renderDrawingsForSym() })

    // Tampilkan IHSG sebagai default, supaya chart tidak kosong sebelum pilih saham
    if (TOKEN.isSet()) {
      document.getElementById('sym-input').value = 'IHSG'
      _loadSym()
    }
  }

  async function _loadEmitenInfo() {
    if (has.emitenInfo()) return
    try {
      const raw = await fetchEmitenJson()
      setEmitenInfo(raw)
    } catch (e) {
      console.warn('[chart] gagal load emiten.json:', e.message)
    }
  }

  function _applyPrefs(p) {
    if (p.ma)         document.getElementById('ind-ma').checked = true
    if (p.bollinger)  document.getElementById('ind-bollinger').checked = true
    if (p.volume !== undefined) document.getElementById('ind-volume').checked = p.volume
    if (p.rsi)        document.getElementById('ind-rsi').checked = true
    if (p.macd)       document.getElementById('ind-macd').checked = true
    if (p.lpm)        document.getElementById('ind-lpm').checked = true
    if (p.lpmMode)    document.getElementById('lpm-mode').value = p.lpmMode
    if (p.maPeriod)   document.getElementById('ma-period').value = p.maPeriod
  }

  function _savePrefsNow() {
    savePrefs({
      ma: document.getElementById('ind-ma').checked,
      bollinger: document.getElementById('ind-bollinger').checked,
      volume: document.getElementById('ind-volume').checked,
      rsi: document.getElementById('ind-rsi').checked,
      macd: document.getElementById('ind-macd').checked,
      lpm: document.getElementById('ind-lpm').checked,
      lpmMode: document.getElementById('lpm-mode').value,
      maPeriod: document.getElementById('ma-period').value
    })
  }

  // ============================================================
  // SEKSI 3: DROPDOWN INDICATORS — buka/tutup, klik luar menutup
  // ============================================================
  function _bindDropdowns() {
    const btn   = document.getElementById('btn-indicators')
    const panel = document.getElementById('ind-dropdown')
    btn.addEventListener('click', e => { e.stopPropagation(); panel.classList.toggle('hidden') })
    document.addEventListener('click', e => {
      if (!panel.contains(e.target) && e.target !== btn) panel.classList.add('hidden')
    })
  }

  // ============================================================
  // SEKSI 3b: SEARCH SAHAM — dropdown saran, scrollable, tetap bisa mengetik
  // ============================================================
  function _bindSymSearch() {
    const input    = document.getElementById('sym-input')
    const dropdown = document.getElementById('sym-dropdown')

    input.addEventListener('input', () => _renderSymDropdown(input.value.trim()))
    input.addEventListener('focus', () => { if (input.value.trim()) _renderSymDropdown(input.value.trim()) })

    document.addEventListener('click', e => {
      if (!dropdown.contains(e.target) && e.target !== input) dropdown.classList.add('hidden')
    })
  }

  function _renderSymDropdown(query) {
    const dropdown = document.getElementById('sym-dropdown')
    if (!query) { dropdown.classList.add('hidden'); return }

    const q = query.toUpperCase()
    const all = Object.entries(EMITEN_INFO) // [code, {name, sector, ...}]

    // Prioritas: kode yang AWALAN-nya cocok dulu, baru nama yang mengandung query
    const codeMatches = all.filter(([code]) => code.startsWith(q))
    const nameMatches  = all.filter(([code, info]) =>
      !code.startsWith(q) && info.name && info.name.toUpperCase().includes(q)
    )
    const results = [...codeMatches, ...nameMatches].slice(0, 30)

    if (!results.length) {
      dropdown.innerHTML = `<div class="sym-dropdown-empty">Tidak ditemukan</div>`
      dropdown.classList.remove('hidden')
      return
    }

    dropdown.innerHTML = results.map(([code, info]) => `
      <div class="sym-option" data-code="${code}">
        <span class="sym-option-code">${code}</span>
        <span class="sym-option-name">${info.name || ''}</span>
      </div>
    `).join('')
    dropdown.classList.remove('hidden')

    dropdown.querySelectorAll('.sym-option').forEach(el => {
      el.addEventListener('click', () => {
        document.getElementById('sym-input').value = el.dataset.code
        dropdown.classList.add('hidden')
        _loadSym()
      })
    })
  }

  // ============================================================
  // SEKSI 4: CONTROLS
  // ============================================================
  function _bindControls() {
    const symInput = document.getElementById('sym-input')
    symInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') { document.getElementById('sym-dropdown').classList.add('hidden'); _loadSym() }
      if (e.key === 'Escape') document.getElementById('sym-dropdown').classList.add('hidden')
    })

    document.getElementById('ind-ma').addEventListener('change', e => _toggleIndicator('ma', e.target.checked))
    document.getElementById('ma-period').addEventListener('change', () => {
      _savePrefsNow()
      if (ACTIVE.ma) { _removeIndicator('ma'); _addIndicator('ma') }
    })
    document.getElementById('ind-bollinger').addEventListener('change', e => _toggleIndicator('bollinger', e.target.checked))
    document.getElementById('ind-volume').addEventListener('change', e => _toggleIndicator('volume', e.target.checked))
    document.getElementById('ind-rsi').addEventListener('change', e => _toggleIndicator('rsi', e.target.checked))
    document.getElementById('ind-macd').addEventListener('change', e => _toggleIndicator('macd', e.target.checked))
    document.getElementById('ind-lpm').addEventListener('change', e => _toggleIndicator('lpm', e.target.checked))

    document.getElementById('lpm-mode').addEventListener('change', () => {
      _savePrefsNow()
      if (ACTIVE.lpm) { _removeIndicator('lpm'); _addIndicator('lpm') }
    })
  }

  function _toggleIndicator(key, checked) {
    _savePrefsNow()
    if (!DB.daily.length) return
    if (checked) _addIndicator(key)
    else         _removeIndicator(key)
  }

  // ============================================================
  // SEKSI 5: LOAD DAILY
  // ============================================================
  async function _loadSym() {
    if (_loading) return
    const sym = document.getElementById('sym-input').value.trim().toUpperCase()
    const status = document.getElementById('status')
    if (!sym) return
    if (!TOKEN.isSet()) { openTokenPopover(); return }

    _loading = true
    status.textContent = 'Memuat...'

    try {
      const raw = await fetchDaily(sym)
      DB.sym      = sym
      DB.daily    = [...raw].sort((a, b) => a.date.localeCompare(b.date))
      DB.lpmCache = {}
      status.textContent = ''
      document.getElementById('sym-input').value = sym
      _rebuildChart()
    } catch (e) {
      status.textContent = e.code === 'TOKEN_EXPIRED' ? 'Token expired' : 'Error: ' + e.message
      if (e.code === 'TOKEN_EXPIRED') { TOKEN.clear(); refreshTokenStatus() }
    } finally {
      _loading = false
    }
  }

  // ============================================================
  // SEKSI 6: CHART — 1 instance, banyak pane
  // ============================================================
  function _rebuildChart() {
    if (chart) { chart.remove(); chart = null }
    Object.keys(ACTIVE).forEach(k => delete ACTIVE[k])

    const days = DB.daily
    _dateToIndex = {}
    days.forEach((d, i) => { _dateToIndex[d.date] = i })

    chart = LightweightCharts.createChart(document.getElementById('chart-main'), {
      autoSize: true,
      layout:    { background: { color: '#0a0908' }, textColor: '#6b6557' },
      grid:      { vertLines: { color: '#1a1815' }, horzLines: { color: '#1a1815' } },
      timeScale: { timeVisible: false, rightOffset: 4 }
    })

    candleSeries = chart.addSeries(LightweightCharts.CandlestickSeries, {
      upColor: '#4ade80', downColor: '#f0635c', borderVisible: false,
      wickUpColor: '#4ade80', wickDownColor: '#f0635c'
    })
    candleSeries.setData(days.map(d => ({ time: d.date, open: d.open, high: d.high, low: d.low, close: d.close })))
    ACTIVE._candle = { series: [candleSeries], overlay: true }

    ;['ma','bollinger','volume','rsi','macd','lpm'].forEach(key => {
      if (document.getElementById(`ind-${key}`).checked) _addIndicator(key)
    })

    chart.timeScale().fitContent()

    chart.subscribeCrosshairMove(param => {
      const idx = param.time ? _dateToIndex[param.time] : days.length - 1
      _updateInfoAndLegend(idx !== undefined ? idx : days.length - 1)
      _updatePreviewLine(param)
    })

    // Klik chart → tempatkan titik trend line (mode 'trendline') atau pilih garis (mode 'cursor')
    chart.subscribeClick(param => _onChartClick(param))

    // Pan/zoom → garis trend sendiri otomatis ikut (series native chart, bukan canvas
    // manual), HANYA tombol hapus (elemen HTML terpisah) yang perlu direposisi.
    chart.timeScale().subscribeVisibleLogicalRangeChange(() => _repositionDeleteBtn())

    // Render ulang trend line milik saham ini sebagai series native baru
    Object.keys(_drawingSeries).forEach(k => delete _drawingSeries[k]) // chart lama sudah di-remove() di atas
    _selectedDrawingId = null
    _pendingPoint = null
    _previewSeries = null // chart lama sudah dihancurkan, referensi lama tidak valid lagi
    _renderDrawingsForSym()

    _updateInfoAndLegend(days.length - 1)
  }

  function _paneIndexFor(key) {
    const activeNonOverlay = PANE_ORDER.filter(k => ACTIVE[k])
    const idx = activeNonOverlay.indexOf(key)
    return idx >= 0 ? idx + 1 : activeNonOverlay.length + 1
  }

  function _addIndicator(key) {
    if (ACTIVE[key]) return
    const days   = DB.daily
    const closes = days.map(d => d.close)

    if (key === 'ma') {
      const period = parseInt(document.getElementById('ma-period').value) || 20
      const ma = calcSMA(closes, period)
      const s = chart.addSeries(LightweightCharts.LineSeries, { color: '#d98e2b', lineWidth: 1.5, priceLineVisible: true, lastValueVisible: true, title: 'MA' + period })
      s.setData(_align(days, ma))
      ACTIVE.ma = { series: [s], overlay: true, legend: idx => [{ label: 'MA' + period, color: '#d98e2b', value: ma[idx], fmt: 'price' }] }
    }

    else if (key === 'bollinger') {
      const { upper, middle, lower } = calcBollinger(closes, 20, 2)
      const mid = chart.addSeries(LightweightCharts.LineSeries, { color: 'rgba(217,142,43,0.8)', lineWidth: 1, priceLineVisible: true, lastValueVisible: true, title: 'BB' })
      const up  = chart.addSeries(LightweightCharts.LineSeries, { color: 'rgba(217,142,43,0.4)', lineWidth: 1, priceLineVisible: false, lastValueVisible: false })
      const lo  = chart.addSeries(LightweightCharts.LineSeries, { color: 'rgba(217,142,43,0.4)', lineWidth: 1, priceLineVisible: false, lastValueVisible: false })
      mid.setData(_align(days, middle)); up.setData(_align(days, upper)); lo.setData(_align(days, lower))
      ACTIVE.bollinger = { series: [mid, up, lo], overlay: true, legend: idx => [{ label: 'BB(20,2)', color: 'rgba(217,142,43,0.8)', value: middle[idx], fmt: 'price' }] }
    }

    else if (key === 'volume') {
      const pIdx = _paneIndexFor('volume')
      const s = chart.addSeries(LightweightCharts.HistogramSeries, { priceFormat: { type: 'volume' }, priceLineVisible: false, lastValueVisible: true, title: 'Vol' }, pIdx)
      s.setData(days.map(d => ({ time: d.date, value: d.volume, color: d.close >= d.open ? 'rgba(74,222,128,0.5)' : 'rgba(240,99,92,0.5)' })))
      ACTIVE.volume = { series: [s], overlay: false, legend: idx => [{ label: 'Vol', color: '#9aa0a6', value: days[idx]?.volume, fmt: 'vol' }] }
    }

    else if (key === 'rsi') {
      const pIdx = _paneIndexFor('rsi')
      const rsi = calcRSI(closes, 14)
      const s = chart.addSeries(LightweightCharts.LineSeries, { color: '#ece7de', lineWidth: 1.5, priceLineVisible: true, lastValueVisible: true, title: 'RSI' }, pIdx)
      s.setData(_align(days, rsi))
      ACTIVE.rsi = { series: [s], overlay: false, legend: idx => [{ label: 'RSI(14)', color: '#ece7de', value: rsi[idx], fmt: 'num1' }] }
    }

    else if (key === 'macd') {
      const pIdx = _paneIndexFor('macd')
      const { macd, signal, hist } = calcMACD(closes)
      const macdLine = chart.addSeries(LightweightCharts.LineSeries, { color: '#60a5fa', lineWidth: 1, priceLineVisible: true, lastValueVisible: true, title: 'MACD' }, pIdx)
      const sigLine  = chart.addSeries(LightweightCharts.LineSeries, { color: '#d98e2b', lineWidth: 1, priceLineVisible: true, lastValueVisible: true }, pIdx)
      const histS    = chart.addSeries(LightweightCharts.HistogramSeries, { priceLineVisible: false, lastValueVisible: false }, pIdx)
      macdLine.setData(_align(days, macd)); sigLine.setData(_align(days, signal))
      histS.setData(days.map((d, i) => hist[i] !== null ? { time: d.date, value: hist[i], color: hist[i] >= 0 ? 'rgba(74,222,128,0.5)' : 'rgba(240,99,92,0.5)' } : null).filter(Boolean))
      ACTIVE.macd = { series: [macdLine, sigLine, histS], overlay: false, legend: idx => [
        { label: 'MACD', color: '#60a5fa', value: macd[idx], fmt: 'price2' },
        { label: 'Signal', color: '#d98e2b', value: signal[idx], fmt: 'price2' }
      ]}
    }

    else if (key === 'lpm') {
      const pIdx = _paneIndexFor('lpm')
      ACTIVE.lpm = {
        series: [], overlay: false, paneIdx: pIdx,
        legend: idx => {
          const date = days[idx]?.date
          const v = date ? DB.lpmCache[date] : null
          if (!v) return [{ label: 'LPM', color: '#d98e2b', value: null, fmt: 'rp' }]
          const mode = document.getElementById('lpm-mode').value
          if (mode === 'bar') return [{ label: 'LPM', color: '#d98e2b', value: v.net, fmt: 'rp' }]
          const total = v.buy + v.sell
          return [{ label: 'LPM', color: '#d98e2b', value: total > 0 ? (v.buy/total)*100 : 50, fmt: 'pct' }]
        }
      }
      chart.timeScale().subscribeVisibleLogicalRangeChange(_debouncedLpmUpdate)
      _updateLpmForVisibleRange()
    }

    _layoutPanes()
    if (chart) _updateInfoAndLegend(days.length - 1)
  }

  function _removeIndicator(key) {
    const ind = ACTIVE[key]
    if (!ind) return
    ind.series.forEach(s => { try { chart.removeSeries(s) } catch (_) {} })
    delete ACTIVE[key]
    _layoutPanes()
    if (chart && DB.daily.length) _updateInfoAndLegend(DB.daily.length - 1)
  }

  function _align(days, arr) {
    return days.map((d, i) => arr[i] !== null && arr[i] !== undefined ? { time: d.date, value: arr[i] } : null).filter(Boolean)
  }

  /** Proporsi tinggi pane: candle 60% dari tinggi kontainer, indikator bagi rata sisanya. */
  function _layoutPanes() {
    if (!chart) return
    const panes = chart.panes()
    const containerH = document.getElementById('chart-main').clientHeight
    if (!containerH) return
    const nInd = panes.length - 1
    const candleH = nInd > 0 ? Math.floor(containerH * 0.6) : containerH
    const indH    = nInd > 0 ? Math.floor((containerH - candleH) / nInd) : 0
    try { panes[0].setHeight(candleH) } catch (_) {}
    panes.slice(1).forEach(p => { try { p.setHeight(indH) } catch (_) {} })
  }

  // ============================================================
  // SEKSI 6b: DRAWING TOOLS — Trend Line
  // ============================================================
  // Pendekatan (dipelajari dari implementasi lama yang sudah terbukti efisien):
  // trend line = SERIES NATIVE chart (chart.addSeries(LineSeries) dengan 2 titik
  // data), BUKAN canvas overlay yang digambar manual. Keuntungan: library urus
  // reposisi/scaling otomatis saat pan/zoom — kita tidak perlu redraw apapun.
  //
  // Hit-testing (klik untuk pilih garis) tetap pakai konversi koordinat manual
  // (timeToCoordinate/priceToCoordinate) karena LineSeries 2-titik tidak punya
  // data di tiap hari yang dilewati garisnya — jadi param.seriesData tidak bisa
  // diandalkan untuk deteksi klik di sembarang titik sepanjang garis.

  function _bindDrawToolbar() {
    document.querySelectorAll('.draw-tool[data-tool]').forEach(btn => {
      btn.addEventListener('click', () => {
        _drawMode = btn.dataset.tool
        _pendingPoint = null
        if (_previewSeries) { try { chart.removeSeries(_previewSeries) } catch (_) {} _previewSeries = null }
        document.querySelectorAll('.draw-tool[data-tool]').forEach(b => b.classList.toggle('active', b === btn))
      })
    })

    document.getElementById('draw-clear-all').addEventListener('click', () => {
      if (!DB.sym) return
      if (!confirm(`Hapus semua garis di ${DB.sym}?`)) return
      DB.drawings.filter(d => d.sym === DB.sym).forEach(d => _deleteDrawing(d.id))
    })

    document.getElementById('draw-delete-btn').addEventListener('click', () => {
      if (_selectedDrawingId) _deleteDrawing(_selectedDrawingId)
    })
  }

  /**
   * Update garis preview (putus-putus) agar ikut posisi kursor — dipanggil
   * tiap crosshair bergerak, hanya aktif saat sedang menunggu klik ke-2.
   */
  function _updatePreviewLine(param) {
    if (!_previewSeries || !_pendingPoint) return
    if (!param.time || !param.point) return
    const price = candleSeries.coordinateToPrice(param.point.y)
    if (price === null) return

    const pts = _pendingPoint.time <= param.time
      ? [{ time: _pendingPoint.time, value: _pendingPoint.price }, { time: param.time, value: price }]
      : [{ time: param.time, value: price }, { time: _pendingPoint.time, value: _pendingPoint.price }]
    _previewSeries.setData(pts)
  }

  /** Buat series native chart untuk semua drawing milik DB.sym saat ini. */
  function _renderDrawingsForSym() {
    DB.drawings.filter(d => d.sym === DB.sym).forEach(d => _createLineSeriesFor(d))
  }

  /** Buat 1 series LineSeries 2-titik untuk 1 drawing, simpan referensinya. */
  function _createLineSeriesFor(d) {
    const s = chart.addSeries(LightweightCharts.LineSeries, {
      color: '#d98e2b', lineWidth: 1.5, priceLineVisible: false, lastValueVisible: false
    })
    // Urutkan titik berdasarkan waktu — LineSeries butuh data terurut menaik
    const pts = d.t1 <= d.t2
      ? [{ time: d.t1, value: d.p1 }, { time: d.t2, value: d.p2 }]
      : [{ time: d.t2, value: d.p2 }, { time: d.t1, value: d.p1 }]
    s.setData(pts)
    _drawingSeries[d.id] = s
  }

  /** Hapus 1 drawing — dari chart (series native) + dari data (Sheets). */
  function _deleteDrawing(id) {
    const s = _drawingSeries[id]
    if (s) { try { chart.removeSeries(s) } catch (_) {} delete _drawingSeries[id] }
    removeDrawing(id)
    if (_selectedDrawingId === id) { _selectedDrawingId = null; _repositionDeleteBtn() }
  }

  /**
   * Tangani klik di chart — tergantung mode aktif:
   *   'trendline' → klik 1: simpan titik pertama. klik 2: buat garis + simpan.
   *   'cursor'    → hit-test ke garis yang ada (jarak titik-ke-segmen), pilih kalau dekat.
   */
  function _onChartClick(param) {
    if (!candleSeries || !param.point) return

    if (_drawMode === 'trendline') {
      if (!param.time) return // klik di luar area data, tidak valid
      const price = candleSeries.coordinateToPrice(param.point.y)
      if (price === null) return

      if (!_pendingPoint) {
        _pendingPoint = { time: param.time, price }
        // Buat garis preview (putus-putus) — akan diupdate tiap mouse bergerak
        _previewSeries = chart.addSeries(LightweightCharts.LineSeries, {
          color: '#d98e2b', lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed,
          priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false
        })
        _previewSeries.setData([{ time: param.time, value: price }])
        return
      }
      // Titik kedua — buat drawing baru, hapus preview
      const drawing = {
        id:  Date.now() + '-' + Math.random().toString(36).slice(2, 7),
        sym: DB.sym,
        type: 'trendline',
        t1: _pendingPoint.time, p1: _pendingPoint.price,
        t2: param.time,         p2: price
      }
      if (_previewSeries) { try { chart.removeSeries(_previewSeries) } catch (_) {} _previewSeries = null }
      addDrawing(drawing)           // simpan data + sinkron Sheets
      _createLineSeriesFor(drawing) // render langsung, tanpa nunggu rebuild
      _pendingPoint = null

      // Balik ke mode cursor otomatis setelah selesai 1 garis
      _drawMode = 'cursor'
      document.querySelectorAll('.draw-tool[data-tool]').forEach(b => b.classList.toggle('active', b.dataset.tool === 'cursor'))
      return
    }

    // Mode cursor — hit-test pilih garis terdekat
    const mine = DB.drawings.filter(d => d.sym === DB.sym)
    let closest = null, closestDist = 8 // px toleransi klik

    mine.forEach(d => {
      const x1 = chart.timeScale().timeToCoordinate(d.t1)
      const y1 = candleSeries.priceToCoordinate(d.p1)
      const x2 = chart.timeScale().timeToCoordinate(d.t2)
      const y2 = candleSeries.priceToCoordinate(d.p2)
      if (x1 === null || y1 === null || x2 === null || y2 === null) return
      const dist = _distToSegment(param.point.x, param.point.y, x1, y1, x2, y2)
      if (dist < closestDist) { closestDist = dist; closest = d.id }
    })

    _setSelectedDrawing(closest)
  }

  /** Pilih/batalkan pilih 1 drawing — ubah warna series-nya jadi terang, posisikan tombol hapus. */
  function _setSelectedDrawing(id) {
    // Kembalikan warna default ke selection lama (kalau ada)
    if (_selectedDrawingId && _drawingSeries[_selectedDrawingId]) {
      try { _drawingSeries[_selectedDrawingId].applyOptions({ color: '#d98e2b', lineWidth: 1.5 }) } catch (_) {}
    }
    _selectedDrawingId = id
    if (id && _drawingSeries[id]) {
      try { _drawingSeries[id].applyOptions({ color: '#ece7de', lineWidth: 2 }) } catch (_) {}
    }
    _repositionDeleteBtn()
  }

  /** Jarak titik (px,py) ke segmen garis (x1,y1)-(x2,y2) — untuk hit-test klik. */
  function _distToSegment(px, py, x1, y1, x2, y2) {
    const dx = x2 - x1, dy = y2 - y1
    const lenSq = dx * dx + dy * dy
    let t = lenSq > 0 ? ((px - x1) * dx + (py - y1) * dy) / lenSq : 0
    t = Math.max(0, Math.min(1, t))
    const cx = x1 + t * dx, cy = y1 + t * dy
    return Math.hypot(px - cx, py - cy)
  }

  /**
   * Posisikan ulang tombol hapus (elemen HTML, bukan bagian dari chart) sesuai
   * posisi garis yang sedang dipilih saat ini. Dipanggil setelah memilih, dan
   * tiap pan/zoom (karena posisi pixel garis berubah, walau garisnya sendiri
   * sudah otomatis ikut tanpa kita lakukan apapun).
   */
  function _repositionDeleteBtn() {
    const btn = document.getElementById('draw-delete-btn')
    const d = DB.drawings.find(x => x.id === _selectedDrawingId)
    if (!d || !chart || !candleSeries) { btn.style.display = 'none'; return }

    const x1 = chart.timeScale().timeToCoordinate(d.t1)
    const y1 = candleSeries.priceToCoordinate(d.p1)
    const x2 = chart.timeScale().timeToCoordinate(d.t2)
    const y2 = candleSeries.priceToCoordinate(d.p2)
    if (x1 === null || y1 === null || x2 === null || y2 === null) { btn.style.display = 'none'; return }

    btn.style.display = 'flex'
    btn.style.left = ((x1 + x2) / 2) + 'px'
    btn.style.top  = ((y1 + y2) / 2) + 'px'
  }

  // ============================================================
  // SEKSI 7: LPM
  // ============================================================
  const LPM_MAX_DAYS    = 90
  const LPM_BATCH_SIZE  = 5
  const LPM_BATCH_DELAY = 400

  let _lpmDebounceTimer = null
  function _debouncedLpmUpdate() {
    clearTimeout(_lpmDebounceTimer)
    _lpmDebounceTimer = setTimeout(_updateLpmForVisibleRange, 300)
  }

  async function _updateLpmForVisibleRange() {
    if (!chart || !DB.daily.length || !ACTIVE.lpm) return
    const range = chart.timeScale().getVisibleLogicalRange()
    if (!range) return
    const fromIdx = Math.max(0, Math.floor(range.from))
    const toIdx   = Math.min(DB.daily.length - 1, Math.ceil(range.to))
    if (fromIdx > toIdx) return

    const visibleDates = DB.daily.slice(fromIdx, toIdx + 1).map(d => d.date)
    const missing = visibleDates.filter(d => !(d in DB.lpmCache))
    const statusEl = document.getElementById('lpm-status')

    if (missing.length > LPM_MAX_DAYS) {
      statusEl.textContent = `Zoom in untuk LPM (maks ${LPM_MAX_DAYS} hari)`
      _renderLpmFromCache()
      return
    }
    if (missing.length) {
      statusEl.textContent = `Memuat LPM ${missing.length}h...`
      await _fetchLpmDates(missing)
    }
    statusEl.textContent = ''
    _renderLpmFromCache()
  }

  async function _fetchLpmDates(dates) {
    const batches = []
    for (let i = 0; i < dates.length; i += LPM_BATCH_SIZE) batches.push(dates.slice(i, i + LPM_BATCH_SIZE))
    for (const batch of batches) {
      await Promise.allSettled(batch.map(async date => {
        try {
          const data = await fetchAbsorption(DB.sym, date)
          const buyTotal  = data.buy.length  ? data.buy[data.buy.length - 1].value   : 0
          const sellTotal = data.sell.length ? data.sell[data.sell.length - 1].value : 0
          DB.lpmCache[date] = { buy: buyTotal, sell: sellTotal, net: buyTotal - sellTotal }
        } catch (_) { DB.lpmCache[date] = null }
      }))
      if (batches.length > 1) await new Promise(r => setTimeout(r, LPM_BATCH_DELAY))
    }
  }

  function _renderLpmFromCache() {
    if (!chart || !ACTIVE.lpm) return
    const mode = document.getElementById('lpm-mode').value
    ACTIVE.lpm.series.forEach(s => { try { chart.removeSeries(s) } catch (_) {} })
    ACTIVE.lpm.series = []
    const points = DB.daily.map(d => ({ date: d.date, lpm: DB.lpmCache[d.date] })).filter(p => p.lpm)
    const pIdx = ACTIVE.lpm.paneIdx

    if (mode === 'bar') {
      const s = chart.addSeries(LightweightCharts.HistogramSeries, { priceFormat: { type: 'volume' }, title: 'LPM' }, pIdx)
      s.setData(points.map(p => ({ time: p.date, value: p.lpm.net, color: p.lpm.net >= 0 ? '#4ade80' : '#f0635c' })))
      ACTIVE.lpm.series.push(s)
    } else {
      const s = chart.addSeries(LightweightCharts.LineSeries, { color: '#d98e2b', lineWidth: 1.5, title: 'LPM %' }, pIdx)
      s.setData(points.map(p => {
        const total = p.lpm.buy + p.lpm.sell
        return { time: p.date, value: total > 0 ? (p.lpm.buy / total) * 100 : 50 }
      }))
      ACTIVE.lpm.series.push(s)
    }
    if (DB.daily.length) _updateInfoAndLegend(DB.daily.length - 1)
  }

  // ============================================================
  // SEKSI 8: OHLC BAR + LEGEND OVERLAY
  // ============================================================
  function _updateInfoAndLegend(idx) {
    const days = DB.daily
    if (!days.length || idx === undefined || idx < 0 || idx >= days.length) return
    const d = days[idx]
    const prevClose = idx > 0 ? days[idx - 1].close : d.open
    const chg = d.close - prevClose
    const chgPct = prevClose > 0 ? (chg / prevClose) * 100 : 0
    const up = chg >= 0

    document.getElementById('ohlc-bar').innerHTML = `
      <span class="ohlc-sym">${DB.sym}</span>
      <span class="ohlc-tf">· 1D</span>
      <span class="ohlc-val">O <b>${_fmtVal(d.open,'price')}</b></span>
      <span class="ohlc-val">H <b>${_fmtVal(d.high,'price')}</b></span>
      <span class="ohlc-val">L <b>${_fmtVal(d.low,'price')}</b></span>
      <span class="ohlc-val">C <b>${_fmtVal(d.close,'price')}</b></span>
      <span class="ohlc-chg ${up ? 'up' : 'down'}">${up?'+':''}${_fmtVal(chg,'price')} (${up?'+':''}${chgPct.toFixed(2)}%)</span>
      <span class="ohlc-tf">${d.date}</span>
    `

    const rows = []
    Object.keys(ACTIVE).forEach(key => {
      if (key === '_candle') return
      const ind = ACTIVE[key]
      if (!ind.legend) return
      rows.push(...ind.legend(idx))
    })

    document.getElementById('chart-legend').innerHTML = rows.map(r => `
      <div class="legend-row">
        <span class="legend-swatch" style="background:${r.color}"></span>
        <span class="legend-name">${r.label}</span>
        <span class="legend-value" style="color:${r.color}">${_fmtVal(r.value, r.fmt)}</span>
      </div>
    `).join('')
  }

  function _fmtVal(v, fmt) {
    if (v === null || v === undefined || isNaN(v)) return '–'
    if (fmt === 'vol')    return v >= 1e6 ? (v/1e6).toFixed(1)+'jt' : v >= 1e3 ? (v/1e3).toFixed(0)+'rb' : String(v)
    if (fmt === 'rp')     return (v >= 0 ? '' : '-') + (Math.abs(v) >= 1e9 ? (Math.abs(v)/1e9).toFixed(2)+'M' : Math.abs(v) >= 1e6 ? (Math.abs(v)/1e6).toFixed(0)+'jt' : Math.abs(v).toFixed(0))
    if (fmt === 'pct')    return v.toFixed(1) + '%'
    if (fmt === 'num1')   return v.toFixed(1)
    if (fmt === 'price2') return v.toFixed(2)
    return new Intl.NumberFormat('id-ID', { maximumFractionDigits: 2 }).format(v)
  }

  init()
  window._chart = { DB, chart: () => chart, ACTIVE }
</script>

</body>
</html>
