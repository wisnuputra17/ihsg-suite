<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chart · IHSG Suite</title>
  <link rel="stylesheet" href="../../shared/ui.css">
  <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@5.2.0/dist/lightweight-charts.standalone.production.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">

  <header class="app-header" id="app-header"></header>

  <div class="chart-toolbar">
    <div class="sym-search">
      <span class="sym-search-icon">⌕</span>
      <input type="text" id="sym-input" placeholder="cari saham..." maxlength="10" autocomplete="off">
      <div class="sym-dropdown hidden" id="sym-dropdown"></div>
    </div>
    <div class="tf-bar" id="tf-bar">
      <button class="tf-btn" data-tf="5m">5m</button>
      <button class="tf-btn" data-tf="15m">15m</button>
      <button class="tf-btn" data-tf="30m">30m</button>
      <button class="tf-btn" data-tf="1h">1h</button>
      <button class="tf-btn active" data-tf="1D">1D</button>
      <button class="tf-btn" data-tf="1W">1W</button>
      <button class="tf-btn" data-tf="1M">1M</button>
    </div>

    <div class="dropdown-wrap">
      <button class="btn btn-sm" id="btn-indicators">Indicators ▾</button>
      <div class="dropdown-panel hidden" id="ind-dropdown">

        <div class="ind-section-label">Overlay</div>

        <!-- MA — multi periode, bisa lebih dari 1 sekaligus -->
        <div class="ma-add-row">
          <input type="number" class="input num-input" id="ma-period-input" value="20" min="2" max="500" placeholder="Periode">
          <button class="btn btn-sm" id="ma-add-btn">+ MA</button>
        </div>
        <div class="ma-chip-row" id="ma-chip-row"></div>

        <div class="dropdown-row">
          <input type="checkbox" id="ind-ema"><label for="ind-ema">EMA</label>
          <button class="ind-gear" data-settings="ema" title="Setting">⚙</button>
        </div>
        <div class="dropdown-row">
          <input type="checkbox" id="ind-bollinger"><label for="ind-bollinger">Bollinger Bands</label>
          <button class="ind-gear" data-settings="bollinger" title="Setting">⚙</button>
        </div>
        <div class="dropdown-row">
          <input type="checkbox" id="ind-supertrend"><label for="ind-supertrend">Supertrend</label>
          <button class="ind-gear" data-settings="supertrend" title="Setting">⚙</button>
        </div>

        <div class="ind-section-label">Oscillator / Panel</div>

        <div class="dropdown-row">
          <input type="checkbox" id="ind-volume" checked><label for="ind-volume">Volume</label>
        </div>
        <div class="dropdown-row">
          <input type="checkbox" id="ind-rsi"><label for="ind-rsi">RSI</label>
          <button class="ind-gear" data-settings="rsi" title="Setting">⚙</button>
        </div>
        <div class="dropdown-row">
          <input type="checkbox" id="ind-macd"><label for="ind-macd">MACD</label>
          <button class="ind-gear" data-settings="macd" title="Setting">⚙</button>
        </div>
        <div class="dropdown-row">
          <input type="checkbox" id="ind-atr"><label for="ind-atr">ATR</label>
          <button class="ind-gear" data-settings="atr" title="Setting">⚙</button>
        </div>
        <div class="dropdown-row">
          <input type="checkbox" id="ind-lpm"><label for="ind-lpm">LPM</label>
          <button class="ind-gear" data-settings="lpm" title="Setting">⚙</button>
        </div>
        <div class="dropdown-row">
          <input type="checkbox" id="ind-orb"><label for="ind-orb">ORB + IEP (intraday)</label>
        </div>
      </div>
    </div>

    <span class="lpm-status" id="lpm-status"></span>
    <button class="btn btn-sm" id="lpm-refetch" title="Hapus cache LPM simbol ini & fetch ulang (untuk cache tercemar data lama)" style="display:none;padding:1px 6px;font-size:10px">↻ LPM</button>
    <span id="orb-status" style="font-family:var(--f-mono); font-size:11px; margin-left:8px;"></span>
    <span id="status" style="font-family:var(--f-mono); font-size:10px; color:var(--ghost); margin-left:4px;"></span>
  </div>

  <!-- MODAL SETTING INDIKATOR — gaya TradingView (Length/Source/dst), 1 panel
       (tanpa tab Style/Visibility — discoped untuk fokus ke parameter inti) -->
  <div class="ind-settings-overlay hidden" id="ind-settings-overlay">
    <div class="ind-settings-modal">
      <div class="ind-settings-header">
        <span id="ind-settings-title">Setting</span>
        <button id="ind-settings-close">×</button>
      </div>
      <div class="ind-settings-body" id="ind-settings-body"></div>
      <div class="ind-settings-footer">
        <button class="btn btn-sm" id="ind-settings-cancel">Batal</button>
        <button class="btn btn-primary btn-sm" id="ind-settings-ok">OK</button>
      </div>
    </div>
  </div>

  <div class="chart-wrap">
    <div class="draw-toolbar" id="draw-toolbar">
      <button class="draw-tool active" data-tool="cursor" title="Pilih">↖</button>
      <button class="draw-tool" data-tool="trendline" title="Garis Trend">／</button>
      <div class="draw-toolbar-sep"></div>
      <button class="draw-tool" id="draw-clear-all" title="Hapus semua garis di saham ini">⌫</button>
    </div>
    <div class="ohlc-bar" id="ohlc-bar"></div>
    <div class="chart-legend" id="chart-legend"></div>
    <div id="chart-main"></div>
    <svg id="draw-preview-svg" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:4;">
      <line id="draw-preview-line" stroke="#d98e2b" stroke-width="1" stroke-dasharray="4,4" visibility="hidden"></line>
    </svg>
    <button class="draw-delete-btn" id="draw-delete-btn">×</button>
  </div>

</div>

<script type="module" src="logic.js"></script>

</body>
</html>
