<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chart · IHSG Suite</title>
  <link rel="stylesheet" href="../../shared/ui.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lightweight-charts/5.0.7/lightweight-charts.standalone.production.js"></script>

  <style>
    .page { max-width: 1100px; }

    .token-bar {
      padding: 10px 0; border-bottom: 1px solid var(--line);
      display: flex; align-items: center; gap: 8px;
    }
    .token-bar-label {
      font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--down); white-space: nowrap;
    }

    .panel { padding: 24px 0; }

    .toolbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .sym-input { width: 100px; text-transform: uppercase; }
    .num-input { width: 64px; }
    .date-input {
      background: #0f0e0c; border: 1px solid var(--line); border-radius: var(--radius);
      padding: 7px 10px; font-family: var(--f-mono); font-size: 12px; color: var(--paper); outline: none;
    }

    .ind-row { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
    .ind-toggle {
      display: flex; align-items: center; gap: 6px; font-family: var(--f-mono); font-size: 11px;
      color: var(--dim); cursor: pointer; user-select: none;
    }
    .ind-toggle input { accent-color: var(--phosphor); cursor: pointer; }
    .ind-toggle.active { color: var(--phosphor); }

    .chart-wrap { border: 1px solid var(--line); margin-bottom: 1px; }
    #chart-main   { height: 320px; }
    #chart-volume { height: 100px; }
    #chart-rsi    { height: 120px; }
    #chart-macd   { height: 120px; }
    #chart-lpm    { height: 120px; }
  </style>
</head>
<body>

<div class="page">

  <header class="app-header">
    <div class="app-header-left">
      <a class="back-link" href="../../index.html">← Suite</a>
      <div class="header-divider"></div>
      <span class="app-name">Chart</span>
    </div>
    <div class="app-clock" id="clock">––:––:––</div>
  </header>

  <div class="token-bar hidden" id="tokenBar">
    <span class="token-bar-label">Token belum diisi</span>
    <input type="password" class="input" id="tokenInput" placeholder="Bearer token Stockbit..." style="flex:1; max-width:320px;">
    <button class="btn btn-primary btn-sm" id="tokenSave">Simpan</button>
  </div>

  <div class="panel">

    <div class="section-label">Saham</div>
    <div class="toolbar">
      <input type="text" class="input sym-input" id="sym-input" placeholder="BBCA" maxlength="10">
      <button class="btn btn-primary" id="btn-load">Load</button>
      <span class="section-label" id="status" style="margin:0;"></span>
    </div>

    <div class="section-label">Indikator</div>
    <div class="ind-row">
      <label class="ind-toggle"><input type="checkbox" id="ind-ma">MA <input type="number" class="input num-input" id="ma-period" value="20" min="2" max="200"></label>
      <label class="ind-toggle"><input type="checkbox" id="ind-bollinger">Bollinger</label>
      <label class="ind-toggle"><input type="checkbox" id="ind-volume" checked>Volume</label>
      <label class="ind-toggle"><input type="checkbox" id="ind-rsi">RSI</label>
      <label class="ind-toggle"><input type="checkbox" id="ind-macd">MACD</label>
      <label class="ind-toggle">
        <input type="checkbox" id="ind-lpm">LPM
        <select class="date-input" id="lpm-mode" style="margin-left:4px;">
          <option value="bar">Bar</option>
          <option value="line">Garis %</option>
        </select>
      </label>
    </div>

    <div class="chart-wrap"><div id="chart-main"></div></div>
    <div class="chart-wrap hidden" id="wrap-volume"><div id="chart-volume"></div></div>
    <div class="chart-wrap hidden" id="wrap-rsi"><div id="chart-rsi"></div></div>
    <div class="chart-wrap hidden" id="wrap-macd"><div id="chart-macd"></div></div>
    <div class="chart-wrap hidden" id="wrap-lpm">
      <div id="lpm-status" class="dim-cell" style="padding:6px 12px; font-family:var(--f-mono); font-size:10px; color:var(--ghost);"></div>
      <div id="chart-lpm"></div>
    </div>

  </div>
</div>

<script type="module">
  import { TOKEN }                       from '../../shared/store.js'
  import { fetchDaily, fetchAbsorption } from '../../shared/api.js'
  import { calcSMA, calcRSI, calcMACD, calcBollinger } from '../../shared/indicators.js'
  import { DB, savePrefs, loadPrefs }    from './db.js'

  let _loading = false
  const charts = {} // simpan instance chart aktif untuk di-destroy saat reload

  // ============================================================
  // SEKSI 1: INIT
  // ============================================================
  function init() {
    _renderTokenBar()
    _bindTokenInput()
    _bindControls()
    _startClock()
    _applyPrefs(loadPrefs())
  }

  function _applyPrefs(p) {
    if (p.ma)         document.getElementById('ind-ma').checked = true
    if (p.bollinger)  document.getElementById('ind-bollinger').checked = true
    if (p.volume !== undefined) document.getElementById('ind-volume').checked = p.volume
    if (p.rsi)        document.getElementById('ind-rsi').checked = true
    if (p.macd)       document.getElementById('ind-macd').checked = true
    if (p.lpm)        document.getElementById('ind-lpm').checked = true
    if (p.lpmMode)    document.getElementById('lpm-mode').value = p.lpmMode
    if (p.maPeriod)   document.getElementById('ma-period').value = p.maPeriod
  }

  function _savePrefsNow() {
    savePrefs({
      ma:         document.getElementById('ind-ma').checked,
      bollinger:  document.getElementById('ind-bollinger').checked,
      volume:     document.getElementById('ind-volume').checked,
      rsi:        document.getElementById('ind-rsi').checked,
      macd:       document.getElementById('ind-macd').checked,
      lpm:        document.getElementById('ind-lpm').checked,
      lpmMode:    document.getElementById('lpm-mode').value,
      maPeriod:   document.getElementById('ma-period').value
    })
  }

  // ============================================================
  // SEKSI 2: TOKEN
  // ============================================================
  function _renderTokenBar() {
    document.getElementById('tokenBar').classList.toggle('hidden', TOKEN.isSet())
  }
  function _bindTokenInput() {
    document.getElementById('tokenSave').addEventListener('click', () => {
      const v = document.getElementById('tokenInput').value.trim()
      if (!v) return
      TOKEN.set(v)
      _renderTokenBar()
    })
  }

  // ============================================================
  // SEKSI 3: CONTROLS
  // ============================================================
  function _bindControls() {
    document.getElementById('btn-load').addEventListener('click', _loadSym)
    document.getElementById('sym-input').addEventListener('keydown', e => { if (e.key === 'Enter') _loadSym() })

    ;['ind-ma','ind-bollinger','ind-volume','ind-rsi','ind-macd','ind-lpm','ma-period'].forEach(id => {
      document.getElementById(id).addEventListener('change', () => {
        _savePrefsNow()
        if (DB.daily.length) _renderMainCharts()
      })
    })

    document.getElementById('lpm-mode').addEventListener('change', () => {
      _savePrefsNow()
      _renderLpmFromCache() // ganti tampilan tanpa fetch ulang
    })
  }

  // ============================================================
  // SEKSI 4: LOAD DAILY
  // ============================================================
  async function _loadSym() {
    if (_loading) return
    const sym = document.getElementById('sym-input').value.trim().toUpperCase()
    const status = document.getElementById('status')
    if (!sym) { status.textContent = 'Isi kode saham dulu'; return }
    if (!TOKEN.isSet()) { _renderTokenBar(); return }

    _loading = true
    status.textContent = 'Memuat...'

    try {
      const raw = await fetchDaily(sym)
      // Urutkan lama → baru untuk chart
      DB.sym   = sym
      DB.daily = [...raw].sort((a, b) => a.date.localeCompare(b.date))
      DB.lpmCache = {} // ganti saham → cache LPM lama tidak relevan
      status.textContent = `${sym} · ${DB.daily.length} hari`
      _renderMainCharts()
    } catch (e) {
      status.textContent = e.code === 'TOKEN_EXPIRED' ? 'Token expired' : 'Error: ' + e.message
      if (e.code === 'TOKEN_EXPIRED') { TOKEN.clear(); _renderTokenBar() }
    } finally {
      _loading = false
    }
  }

  // ============================================================
  // SEKSI 5: RENDER CHART UTAMA (rebuild total tiap kali toggle berubah)
  // ============================================================
  function _destroyChart(key) {
    if (charts[key]) { charts[key].remove(); charts[key] = null }
  }

  function _renderMainCharts() {
    const days = DB.daily
    if (!days.length) return

    const showMA    = document.getElementById('ind-ma').checked
    const showBoll  = document.getElementById('ind-bollinger').checked
    const showVol   = document.getElementById('ind-volume').checked
    const showRsi   = document.getElementById('ind-rsi').checked
    const showMacd  = document.getElementById('ind-macd').checked
    const showLpm   = document.getElementById('ind-lpm').checked
    const maPeriod  = parseInt(document.getElementById('ma-period').value) || 20

    document.getElementById('wrap-volume').classList.toggle('hidden', !showVol)
    document.getElementById('wrap-rsi').classList.toggle('hidden', !showRsi)
    document.getElementById('wrap-macd').classList.toggle('hidden', !showMacd)
    document.getElementById('wrap-lpm').classList.toggle('hidden', !showLpm)

    ;['main','volume','rsi','macd','lpm'].forEach(_destroyChart)

    const opts = {
      autoSize: true,
      layout:    { background: { color: '#0a0908' }, textColor: '#6b6557' },
      grid:      { vertLines: { color: '#1a1815' }, horzLines: { color: '#1a1815' } },
      timeScale: { timeVisible: false }
    }

    const closes = days.map(d => d.close)

    // ── Pane utama: candlestick + overlay MA/Bollinger ──
    const mainChart = LightweightCharts.createChart(document.getElementById('chart-main'), opts)
    charts.main = mainChart

    const candleSeries = mainChart.addSeries(LightweightCharts.CandlestickSeries, {
      upColor: '#4ade80', downColor: '#f0635c', borderVisible: false,
      wickUpColor: '#4ade80', wickDownColor: '#f0635c'
    })
    candleSeries.setData(days.map(d => ({ time: d.date, open: d.open, high: d.high, low: d.low, close: d.close })))

    if (showMA) {
      const ma = calcSMA(closes, maPeriod)
      const maSeries = mainChart.addSeries(LightweightCharts.LineSeries, { color: '#d98e2b', lineWidth: 1.5 })
      maSeries.setData(days.map((d, i) => ma[i] !== null ? { time: d.date, value: ma[i] } : null).filter(Boolean))
    }

    if (showBoll) {
      const { upper, middle, lower } = calcBollinger(closes, 20, 2)
      const mkLine = (arr, color) => {
        const s = mainChart.addSeries(LightweightCharts.LineSeries, { color, lineWidth: 1 })
        s.setData(days.map((d, i) => arr[i] !== null ? { time: d.date, value: arr[i] } : null).filter(Boolean))
      }
      mkLine(upper,  'rgba(217,142,43,0.5)')
      mkLine(middle, 'rgba(217,142,43,0.8)')
      mkLine(lower,  'rgba(217,142,43,0.5)')
    }

    mainChart.timeScale().fitContent()

    // ── Pane volume ──
    if (showVol) {
      const volChart = LightweightCharts.createChart(document.getElementById('chart-volume'), opts)
      charts.volume = volChart
      const volSeries = volChart.addSeries(LightweightCharts.HistogramSeries, { priceFormat: { type: 'volume' } })
      volSeries.setData(days.map(d => ({ time: d.date, value: d.volume, color: d.close >= d.open ? '#4ade8066' : '#f0635c66' })))
      volChart.timeScale().fitContent()
      _syncTimeScale(mainChart, volChart)
    }

    // ── Pane RSI ──
    if (showRsi) {
      const rsiChart = LightweightCharts.createChart(document.getElementById('chart-rsi'), opts)
      charts.rsi = rsiChart
      const rsi = calcRSI(closes, 14)
      const rsiSeries = rsiChart.addSeries(LightweightCharts.LineSeries, { color: '#ece7de', lineWidth: 1.5 })
      rsiSeries.setData(days.map((d, i) => rsi[i] !== null ? { time: d.date, value: rsi[i] } : null).filter(Boolean))
      rsiChart.timeScale().fitContent()
      _syncTimeScale(mainChart, rsiChart)
    }

    // ── Pane MACD ──
    if (showMacd) {
      const macdChart = LightweightCharts.createChart(document.getElementById('chart-macd'), opts)
      charts.macd = macdChart
      const { macd, signal, hist } = calcMACD(closes)
      const histSeries = macdChart.addSeries(LightweightCharts.HistogramSeries, {})
      histSeries.setData(days.map((d, i) => hist[i] !== null ? { time: d.date, value: hist[i], color: hist[i] >= 0 ? '#4ade8066' : '#f0635c66' } : null).filter(Boolean))
      const macdSeries = macdChart.addSeries(LightweightCharts.LineSeries, { color: '#60a5fa', lineWidth: 1 })
      macdSeries.setData(days.map((d, i) => macd[i] !== null ? { time: d.date, value: macd[i] } : null).filter(Boolean))
      const sigSeries = macdChart.addSeries(LightweightCharts.LineSeries, { color: '#d98e2b', lineWidth: 1 })
      sigSeries.setData(days.map((d, i) => signal[i] !== null ? { time: d.date, value: signal[i] } : null).filter(Boolean))
      macdChart.timeScale().fitContent()
      _syncTimeScale(mainChart, macdChart)
    }

    // ── Pane LPM ──
    if (showLpm) {
      const lpmChart = LightweightCharts.createChart(document.getElementById('chart-lpm'), opts)
      charts.lpm = lpmChart
      _syncTimeScale(mainChart, lpmChart)

      // Tiap kali viewport candlestick berubah (pan/zoom) → update rentang LPM
      mainChart.timeScale().subscribeVisibleLogicalRangeChange(() => _debouncedLpmUpdate())
      _updateLpmForVisibleRange() // load awal untuk rentang yang langsung terlihat
    }
  }

  function _syncTimeScale(a, b) {
    a.timeScale().subscribeVisibleLogicalRangeChange(r => { if (r) b.timeScale().setVisibleLogicalRange(r) })
    b.timeScale().subscribeVisibleLogicalRangeChange(r => { if (r) a.timeScale().setVisibleLogicalRange(r) })
  }

  // ============================================================
  // SEKSI 6: LPM — Liquidity Pressure Model
  // ============================================================
  // Net agresif (buy-sell) per HARI. Sumber data sama dengan endpoint
  // trade-book/chart (per-tanggal, 1 request = 1 hari) — TIDAK ADA endpoint
  // yang bisa kasih banyak hari sekaligus untuk data ini, beda dari fetchDaily.
  // Strategi: ikuti rentang yang TERLIHAT di viewport candlestick, cache hasil
  // per tanggal supaya pan/zoom berulang tidak fetch ulang, dan batasi maksimal
  // LPM_MAX_DAYS sekali jalan supaya tidak membanjiri API.

  const LPM_MAX_DAYS   = 90
  const LPM_BATCH_SIZE  = 5
  const LPM_BATCH_DELAY = 400

  let _lpmDebounceTimer = null
  function _debouncedLpmUpdate() {
    clearTimeout(_lpmDebounceTimer)
    _lpmDebounceTimer = setTimeout(_updateLpmForVisibleRange, 300)
  }

  /**
   * Tentukan rentang tanggal yang sedang terlihat di chart utama,
   * fetch yang belum ada di cache, lalu render.
   */
  async function _updateLpmForVisibleRange() {
    if (!charts.main || !DB.daily.length) return

    const range = charts.main.timeScale().getVisibleLogicalRange()
    if (!range) return

    const fromIdx = Math.max(0, Math.floor(range.from))
    const toIdx   = Math.min(DB.daily.length - 1, Math.ceil(range.to))
    if (fromIdx > toIdx) return

    const visibleDates = DB.daily.slice(fromIdx, toIdx + 1).map(d => d.date)
    const missing = visibleDates.filter(d => !(d in DB.lpmCache))

    const statusEl = document.getElementById('lpm-status')

    if (missing.length > LPM_MAX_DAYS) {
      statusEl.textContent = `Rentang ${visibleDates.length} hari terlalu lebar — perbesar (zoom in) untuk melihat LPM (maks ${LPM_MAX_DAYS} hari sekaligus)`
      _renderLpmFromCache() // tetap render yang sudah ada di cache
      return
    }

    if (missing.length) {
      statusEl.textContent = `Memuat LPM ${missing.length} hari...`
      await _fetchLpmDates(missing)
    }
    statusEl.textContent = ''
    _renderLpmFromCache()
  }

  /**
   * Fetch LPM untuk daftar tanggal yang belum ada di cache, batch kecil + delay
   * supaya tidak membanjiri API (pola sama dengan IEP Scanner versi lab).
   */
  async function _fetchLpmDates(dates) {
    const batches = []
    for (let i = 0; i < dates.length; i += LPM_BATCH_SIZE) batches.push(dates.slice(i, i + LPM_BATCH_SIZE))

    for (const batch of batches) {
      await Promise.allSettled(batch.map(async date => {
        try {
          const data = await fetchAbsorption(DB.sym, date)
          // buy[]/sell[] kumulatif — nilai TERAKHIR = total agresif sepanjang hari itu
          const buyTotal  = data.buy.length  ? data.buy[data.buy.length - 1].value   : 0
          const sellTotal = data.sell.length ? data.sell[data.sell.length - 1].value : 0
          DB.lpmCache[date] = { buy: buyTotal, sell: sellTotal, net: buyTotal - sellTotal }
        } catch (e) {
          DB.lpmCache[date] = null // tandai sudah dicoba, gagal — jangan retry terus tiap render
        }
      }))
      if (batches.length > 1) await _sleep(LPM_BATCH_DELAY)
    }
  }

  function _sleep(ms) { return new Promise(r => setTimeout(r, ms)) }

  /**
   * Render pane LPM dari DB.lpmCache — tidak fetch apapun, murni render.
   * Dipanggil setelah fetch selesai, atau saat ganti mode tampilan (bar/garis%).
   */
  function _renderLpmFromCache() {
    if (!charts.lpm || !DB.daily.length) return
    const mode = document.getElementById('lpm-mode').value

    const points = DB.daily
      .map(d => ({ date: d.date, lpm: DB.lpmCache[d.date] }))
      .filter(p => p.lpm)

    try { if (charts._lpmSeries) charts.lpm.removeSeries(charts._lpmSeries) } catch (_) {}
    charts._lpmSeries = null

    if (mode === 'bar') {
      const s = charts.lpm.addSeries(LightweightCharts.HistogramSeries, { priceFormat: { type: 'volume' } })
      s.setData(points.map(p => ({ time: p.date, value: p.lpm.net, color: p.lpm.net >= 0 ? '#4ade80' : '#f0635c' })))
      charts._lpmSeries = s
    } else {
      const s = charts.lpm.addSeries(LightweightCharts.LineSeries, { color: '#d98e2b', lineWidth: 1.5 })
      s.setData(points.map(p => {
        const total = p.lpm.buy + p.lpm.sell
        const pct   = total > 0 ? (p.lpm.buy / total) * 100 : 50
        return { time: p.date, value: pct }
      }))
      charts._lpmSeries = s
    }
  }


  // ============================================================
  // SEKSI 7: CLOCK
  // ============================================================
  function _startClock() {
    const el = document.getElementById('clock')
    function tick() {
      el.textContent = new Date().toLocaleTimeString('id-ID',
        { timeZone:'Asia/Jakarta', hour:'2-digit', minute:'2-digit', second:'2-digit' }) + ' WIB'
    }
    tick(); setInterval(tick, 1000)
  }

  init()
  window._chart = { DB }
</script>

</body>
</html>
