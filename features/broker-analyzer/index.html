<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Broker Analyzer · IHSG Suite</title>
  <link rel="stylesheet" href="../../shared/ui.css">
  <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@5.2.0/dist/lightweight-charts.standalone.production.js"></script>

  <style>
    html, body { overflow: hidden; height: 100%; }
    .page { max-width: none; padding: 0 10px; height: 100vh; display: flex; flex-direction: column; }
    .app-header { flex-shrink: 0; padding: 10px 0; }

    .toolbar {
      flex-shrink: 0; display: flex; align-items: center; gap: 8px;
      padding-bottom: 8px; flex-wrap: wrap; position: relative;
    }

    .sym-search { position: relative; display: flex; align-items: center; gap: 6px;
      background: #0f0e0c; border: 1px solid var(--line); border-radius: var(--radius);
      padding: 6px 10px; min-width: 140px; }
    .sym-search-icon { color: var(--ghost); font-size: 12px; }
    .sym-search input { background: transparent; border: none; outline: none; width: 90px;
      font-family: var(--f-mono); font-size: 12px; color: var(--paper); text-transform: uppercase; }
    .sym-search input::placeholder { color: var(--ghost); text-transform: none; }
    .sym-dropdown { position: absolute; top: calc(100% + 4px); left: 0; z-index: 30;
      background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
      width: 260px; max-height: 280px; overflow-y: auto; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .sym-option { display: flex; align-items: baseline; gap: 8px; padding: 7px 10px; cursor: pointer; }
    .sym-option:hover { background: var(--panel-hi); }
    .sym-option-code { font-family: var(--f-mono); font-size: 12px; color: var(--paper); flex-shrink: 0; }
    .sym-option-name { font-size: 11px; color: var(--ghost); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sym-dropdown-empty { padding: 10px; font-family: var(--f-mono); font-size: 11px; color: var(--ghost); }

    .selected-chip-row { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
    .selected-chip-row .chip { font-size: 10px; }
    .display-mode-row { display: flex; gap: 4px; }
    .display-mode-row .pill { padding: 4px 10px; font-size: 9px; }

    .status-text { font-family: var(--f-mono); font-size: 10px; color: var(--ghost); margin-left: 4px; }

    .main-area { flex: 1; min-height: 0; display: flex; gap: 8px; }
    .chart-wrap { flex: 1; min-width: 0; border: 1px solid var(--line); position: relative; }
    #chart-main { width: 100%; height: 100%; }

    .top10-panel { width: 280px; flex-shrink: 0; border: 1px solid var(--line); overflow-y: auto; padding: 10px; }
    .top10-col { margin-bottom: 16px; }
    .top10-title { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--ghost); margin-bottom: 6px; }
    .top10-row {
      display: flex; align-items: center; justify-content: space-between; gap: 6px;
      padding: 6px 8px; border-radius: var(--radius); cursor: pointer; transition: background var(--ease);
      font-family: var(--f-mono); font-size: 11px;
    }
    .top10-row:hover { background: var(--panel-hi); }
    .top10-row.is-selected { background: var(--phosphor-dim); color: var(--phosphor); }
    .top10-row-code { font-weight: 500; }
    .top10-row-val { color: var(--dim); }
    .top10-row.is-selected .top10-row-val { color: var(--phosphor); }

    .ohlc-bar {
      position: absolute; top: 6px; left: 8px; z-index: 5;
      font-family: var(--f-mono); font-size: 12px; color: var(--paper);
      pointer-events: none; text-shadow: 0 0 4px rgba(10,9,8,0.9);
    }
    .chart-legend {
      position: absolute; top: 28px; left: 8px; z-index: 5;
      display: flex; flex-direction: column; gap: 2px; pointer-events: none; max-width: 260px;
    }
    .legend-row { font-family: var(--f-mono); font-size: 11px; line-height: 1.5; white-space: nowrap;
      text-shadow: 0 0 4px rgba(10,9,8,0.9); }
    .legend-swatch { display: inline-block; width: 8px; height: 2px; margin-right: 5px; vertical-align: middle; }
    .legend-value { font-weight: 500; }

    @media (max-width: 760px) {
      .main-area { flex-direction: column; }
      .top10-panel { width: 100%; max-height: 200px; }
    }
  </style>
</head>
<body>

<div class="page">

  <header class="app-header" id="app-header"></header>

  <div class="toolbar">
    <div class="sym-search">
      <span class="sym-search-icon">⌕</span>
      <input type="text" id="sym-input" placeholder="cari saham..." maxlength="10" autocomplete="off">
      <div class="sym-dropdown hidden" id="sym-dropdown"></div>
    </div>
    <div class="display-mode-row" id="display-mode-row">
      <button class="pill active" data-mode="cumulative">Kumulatif</button>
      <button class="pill" data-mode="bar">Bar Harian</button>
    </div>
    <div class="selected-chip-row" id="selected-chip-row"></div>
    <span class="status-text" id="status"></span>
  </div>

  <div class="main-area">
    <div class="chart-wrap">
      <div class="ohlc-bar" id="ohlc-bar"></div>
      <div class="chart-legend" id="chart-legend"></div>
      <div id="chart-main"></div>
    </div>

    <div class="top10-panel">
      <div class="top10-col">
        <div class="top10-title">Tambah Manual</div>
        <div class="toolbar" style="gap:4px;">
          <input type="text" class="input" id="manual-broker-input" placeholder="Kode broker (misal: YP)" maxlength="4" style="flex:1; text-transform:uppercase;">
          <button class="btn btn-sm btn-primary" id="manual-broker-add">+</button>
        </div>
      </div>
      <div class="top10-col">
        <div class="top10-title" id="top10-buy-title">Top 10 Buyer</div>
        <div id="top10-buy"></div>
      </div>
      <div class="top10-col">
        <div class="top10-title" id="top10-sell-title">Top 10 Seller</div>
        <div id="top10-sell"></div>
      </div>
    </div>
  </div>

</div>

<script type="module">
  import { TOKEN, has, setEmitenInfo } from '../../shared/store.js'
  import { fetchDaily, fetchBroker, fetchEmitenJson } from '../../shared/api.js'
  import { renderHeader, refreshTokenStatus, openTokenPopover } from '../../shared/header.js'
  import { bindSymSearch } from '../../shared/symsearch.js'
  import { fmtRp, fmtNum } from '../../shared/format.js'
  import { fetchWithConfirm } from '../../shared/expensive-fetch.js'
  import { DB, loadBrokerCacheForSym, appendBrokerCache, appendNoDataDates, savePrefs, loadPrefs } from './db.js'

  let _loading = false
  let chart = null
  let candleSeries = null
  let _dateToIndex = {}

  const BROKER_COLORS = ['#ece7de', '#60a5fa', '#4ade80', '#d98e2b', '#f0635c', '#a78bfa', '#fb923c', '#34d399', '#22d3ee', '#f472b6']
  const _brokerSeries = {} // {brokerCode: seriesObject}
  let _displayMode = 'cumulative' // 'cumulative' | 'bar'

  const AUTO_FETCH_MAX = 40
  const BATCH_SIZE      = 5
  const BATCH_DELAY     = 400

  // ============================================================
  // SEKSI 1: INIT
  // ============================================================
  function init() {
    renderHeader(document.getElementById('app-header'), [
      { label: 'IHSG Suite', href: '../../index.html' },
      { label: 'Broker Analyzer' }
    ])
    window.addEventListener('ihsg:token-saved', () => { if (DB.sym) _loadSym() })

    _bindSymSearch()
    _bindDisplayModeToggle()
    _bindManualBrokerAdd()
    _loadEmitenInfo()
  }

  async function _loadEmitenInfo() {
    if (has.emitenInfo()) return
    try { setEmitenInfo(await fetchEmitenJson()) } catch (e) { console.warn('[broker-analyzer] gagal load emiten.json:', e.message) }
  }

  // ============================================================
  // SEKSI 2: SEARCH SAHAM
  // ============================================================
  function _bindSymSearch() {
    bindSymSearch(
      document.getElementById('sym-input'),
      document.getElementById('sym-dropdown'),
      () => _loadSym()
    )
  }

  // ============================================================
  // SEKSI 3: LOAD SAHAM
  // ============================================================
  async function _loadSym() {
    if (_loading) return
    const sym = document.getElementById('sym-input').value.trim().toUpperCase()
    const status = document.getElementById('status')
    if (!sym) return
    if (!TOKEN.isSet()) { openTokenPopover(); return }

    _loading = true
    status.textContent = 'Memuat...'
    try {
      const raw = await fetchDaily(sym)
      DB.sym   = sym
      DB.daily = [...raw].sort((a, b) => a.date.localeCompare(b.date))
      DB.selectedBrokers = []
      await loadBrokerCacheForSym(sym)
      document.getElementById('sym-input').value = sym
      status.textContent = ''
      _rebuildChart()
      _updateBrokerHistoryForVisibleRange() // pastikan Top10 & garis broker langsung ke-trigger saat load, jangan andalkan event resize/zoom semata
      _applySavedSelection(sym)
    } catch (e) {
      status.textContent = e.code === 'TOKEN_EXPIRED' ? 'Token expired' : 'Error: ' + e.message
      if (e.code === 'TOKEN_EXPIRED') { TOKEN.clear(); refreshTokenStatus() }
    } finally {
      _loading = false
    }
  }

  function _applySavedSelection(sym) {
    const prefs = loadPrefs()
    const saved = prefs[sym]
    if (Array.isArray(saved) && saved.length) {
      DB.selectedBrokers = saved.slice(0, 10)
      _renderSelectedChips()
      _updateBrokerHistoryForVisibleRange()
    }
  }

  function _savePrefsNow() {
    const prefs = loadPrefs()
    prefs[DB.sym] = DB.selectedBrokers
    savePrefs(prefs)
  }

  /** Mode tampil (kumulatif/bar) — preferensi GLOBAL, bukan per-saham. */
  function _bindDisplayModeToggle() {
    const prefs = loadPrefs()
    if (prefs._displayMode) _displayMode = prefs._displayMode
    document.querySelectorAll('#display-mode-row .pill').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.mode === _displayMode)
      btn.addEventListener('click', () => {
        _displayMode = btn.dataset.mode
        document.querySelectorAll('#display-mode-row .pill').forEach(b => b.classList.toggle('active', b === btn))
        const p = loadPrefs()
        p._displayMode = _displayMode
        savePrefs(p)
        if (DB.selectedBrokers.length) _renderAllBrokerLines()
        _layoutBrokerPane()
      })
    })
  }

  // ============================================================
  // SEKSI 4: TOP 10 — ikut viewport chart, BUKAN konsep rentang terpisah
  // ============================================================

  /**
   * SATU fungsi yang sama menentukan baik garis broker yang dibandingkan
   * MAUPUN ranking Top 10 — keduanya ikut rentang yang sedang TERLIHAT di
   * viewport chart (persis seperti LPM), bukan 2 konsep rentang yang beda.
   * Tarik chart sejauh apapun (misal 300 hari) → Top 10 & garis broker
   * sama-sama mengikuti 300 hari itu.
   */
  async function _updateBrokerHistoryForVisibleRange() {
    if (!chart || !DB.daily.length) return
    const range = chart.timeScale().getVisibleLogicalRange()
    if (!range) return
    const fromIdx = Math.max(0, Math.floor(range.from))
    const toIdx   = Math.min(DB.daily.length - 1, Math.ceil(range.to))
    if (fromIdx > toIdx) return
    const visibleDates = DB.daily.slice(fromIdx, toIdx + 1).map(d => d.date)

    // 1 tanggal dianggap "missing" kalau BELUM PERNAH di-fetch sama sekali
    // (bukan per-broker) — karena 1 fetch sudah cukup utk semua broker DAN
    // utk ranking Top 10 sekaligus (data yang sama dipakai berdua).
    const missing = visibleDates.filter(d => !(d in DB.brokerCache))

    // Tampilkan dari cache yang sudah ada duluan, sambil nunggu (kalau ada) konfirmasi
    if (DB.selectedBrokers.length) _renderAllBrokerLines()
    _computeAndRenderTop10(visibleDates)

    await fetchWithConfirm({
      missingDates: missing,
      statusEl: document.getElementById('status'),
      autoMax: AUTO_FETCH_MAX,
      batchSize: BATCH_SIZE,
      batchDelay: BATCH_DELAY,
      fetchFn: _fetchDateBatch,
      onComplete: () => {
        if (DB.selectedBrokers.length) _renderAllBrokerLines()
        _computeAndRenderTop10(visibleDates)
      }
    })
  }

  /** Jumlahkan buy/sell per broker sepanjang rangeDates (= rentang yang TERLIHAT di chart), ranking top 10 masing2. */
  function _computeAndRenderTop10(rangeDates) {
    const sums = {} // {brokerCode: {buy, sell}}
    let anyData = false
    rangeDates.forEach(date => {
      const dayMap = DB.brokerCache[date]
      if (!dayMap) return
      anyData = true
      Object.keys(dayMap).forEach(code => {
        if (!sums[code]) sums[code] = { buy: 0, sell: 0 }
        sums[code].buy  += dayMap[code].buy
        sums[code].sell += dayMap[code].sell
      })
    })

    if (!anyData) {
      DB.brokerTop = { buys: [], sells: [], rangeDays: rangeDates.length }
      _renderTop10Lists()
      return
    }

    // Ranking berbasis NET (buy − sell), bukan sum buy/sell terpisah —
    // supaya 1 broker tidak bisa muncul di Top Buyer DAN Top Seller
    // sekaligus utk rentang yang sama (kecuali net-nya pas 0, kasus langka).
    const entries = Object.entries(sums).map(([code, v]) => ({ code, net: v.buy - v.sell }))
    const topBuyers  = entries.filter(e => e.net > 0).sort((a, b) => b.net - a.net).slice(0, 10).map(e => ({ code: e.code, val: e.net }))
    const topSellers = entries.filter(e => e.net < 0).sort((a, b) => a.net - b.net).slice(0, 10).map(e => ({ code: e.code, val: Math.abs(e.net) }))

    DB.brokerTop = { buys: topBuyers, sells: topSellers, rangeDays: rangeDates.length }
    _renderTop10Lists()
  }

  function _renderTop10Lists() {
    const rangeTxt = DB.brokerTop.rangeDays > 1 ? ` · ${DB.brokerTop.rangeDays} hari` : ''
    document.getElementById('top10-buy-title').textContent  = 'Top 10 Buyer' + rangeTxt
    document.getElementById('top10-sell-title').textContent = 'Top 10 Seller' + rangeTxt

    const renderCol = (list, elId) => {
      const el = document.getElementById(elId)
      if (!list.length) { el.innerHTML = `<div class="empty-state" style="padding:10px 0;">Tidak ada data</div>`; return }
      el.innerHTML = list.map(b => `
        <div class="top10-row ${DB.selectedBrokers.includes(b.code) ? 'is-selected' : ''}" data-code="${b.code}">
          <span class="top10-row-code">${b.code}</span>
          <span class="top10-row-val">${fmtRp(Math.abs(b.val))}</span>
        </div>
      `).join('')
      el.querySelectorAll('.top10-row').forEach(row => {
        row.addEventListener('click', () => _toggleBroker(row.dataset.code))
      })
    }
    renderCol(DB.brokerTop.buys,  'top10-buy')
    renderCol(DB.brokerTop.sells, 'top10-sell')
  }

  // ============================================================
  // SEKSI 5: PILIH BROKER UTK DIBANDINGKAN
  // ============================================================
  /** Tambah broker manual — tidak harus ada di Top 10, asal kodenya valid (akan ketahuan saat fetch). */
  function _bindManualBrokerAdd() {
    const input = document.getElementById('manual-broker-input')
    const addBtn = document.getElementById('manual-broker-add')
    const _add = () => {
      const code = input.value.trim().toUpperCase()
      if (!code) return
      if (!DB.sym) { alert('Pilih saham dulu.'); return }
      _addBroker(code)
      input.value = ''
    }
    addBtn.addEventListener('click', _add)
    input.addEventListener('keydown', e => { if (e.key === 'Enter') _add() })
  }

  function _toggleBroker(code) {
    if (DB.selectedBrokers.includes(code)) _removeBroker(code)
    else _addBroker(code)
  }

  function _addBroker(code) {
    if (DB.selectedBrokers.length >= 10) { alert('Maksimal 10 broker sekaligus.'); return }
    if (DB.selectedBrokers.includes(code)) return
    DB.selectedBrokers.push(code)
    _savePrefsNow()
    _renderSelectedChips()
    _renderTop10Lists()
    _layoutBrokerPane()

    // Catch-up: tanggal yang SUDAH pernah di-fetch (broker lain) mungkin sudah
    // punya data broker baru ini juga di memori (1 fetch = semua broker) —
    // simpan ke Sheets tanpa fetch API lagi, supaya sesi/device lain ikut dapat.
    const catchUp = []
    Object.keys(DB.brokerCache).forEach(date => {
      const dayMap = DB.brokerCache[date]
      if (dayMap && dayMap[code]) catchUp.push({ date, broker: code, ...dayMap[code] })
    })
    if (catchUp.length) appendBrokerCache(DB.sym, catchUp)

    _updateBrokerHistoryForVisibleRange()
  }

  function _removeBroker(code) {
    DB.selectedBrokers = DB.selectedBrokers.filter(c => c !== code)
    if (_brokerSeries[code]) { try { chart.removeSeries(_brokerSeries[code]) } catch (_) {} delete _brokerSeries[code] }
    _savePrefsNow()
    _renderSelectedChips()
    _renderTop10Lists()
    _layoutBrokerPane()
  }

  function _renderSelectedChips() {
    const row = document.getElementById('selected-chip-row')
    row.innerHTML = DB.selectedBrokers.map((code, i) => {
      const color = BROKER_COLORS[i % BROKER_COLORS.length]
      return `<span class="chip" style="border-color:${color}66; color:${color}">${code}<button class="chip-remove" data-code="${code}">×</button></span>`
    }).join('')
    row.querySelectorAll('.chip-remove').forEach(btn => {
      btn.addEventListener('click', () => _removeBroker(btn.dataset.code))
    })
  }

  // ============================================================
  // SEKSI 6: CHART — candlestick konteks + garis kumulatif per broker
  // ============================================================
  function _rebuildChart() {
    if (chart) { chart.remove(); chart = null }
    Object.keys(_brokerSeries).forEach(k => delete _brokerSeries[k])

    const days = DB.daily
    _dateToIndex = {}
    days.forEach((d, i) => { _dateToIndex[d.date] = i })

    chart = LightweightCharts.createChart(document.getElementById('chart-main'), {
      autoSize: true,
      layout:    { background: { color: '#0a0908' }, textColor: '#6b6557' },
      grid:      { vertLines: { color: '#1a1815' }, horzLines: { color: '#1a1815' } },
      timeScale: { timeVisible: false, rightOffset: 4 }
    })

    candleSeries = chart.addSeries(LightweightCharts.CandlestickSeries, {
      upColor: '#4ade80', downColor: '#f0635c', borderVisible: false,
      wickUpColor: '#4ade80', wickDownColor: '#f0635c'
    })
    candleSeries.setData(days.map(d => ({ time: d.date, open: d.open, high: d.high, low: d.low, close: d.close })))

    // Default zoom: 90 hari terakhir saja (bukan seluruh histori) — supaya
    // Top 10 & garis broker tidak langsung minta fetch ribuan hari di awal.
    // User tetap bisa zoom out manual kalau mau rentang lebih panjang.
    const defaultBars = Math.min(90, days.length)
    chart.timeScale().setVisibleLogicalRange({ from: days.length - defaultBars, to: days.length - 1 })

    chart.subscribeCrosshairMove(param => {
      const idx = param.time ? _dateToIndex[param.time] : days.length - 1
      _updateInfoAndLegend(idx !== undefined ? idx : days.length - 1)
    })

    chart.timeScale().subscribeVisibleLogicalRangeChange(_debouncedUpdate)

    if (DB.selectedBrokers.length) _renderAllBrokerLines()
    _layoutBrokerPane()
    _updateInfoAndLegend(days.length - 1)
  }

  let _debounceTimer = null
  function _debouncedUpdate() {
    clearTimeout(_debounceTimer)
    _debounceTimer = setTimeout(_updateBrokerHistoryForVisibleRange, 300)
  }

  // ============================================================
  // SEKSI 7b: FETCH HISTORI BROKER (MAHAL — 1 request = 1 hari, sama seperti LPM)
  // ============================================================
  // PENTING: 1 request fetchBroker(sym, date, date) sudah kasih SEMUA broker
  // sekaligus — jadi 1 tanggal yang sama dipakai bersama oleh SEMUA broker yang
  // dipilih DAN ranking Top 10, BUKAN di-fetch ulang per broker / per keperluan.
  /**
   * Fetch 1 batch tanggal — TIAP tanggal cuma 1 request fetchBroker, hasilnya
   * (SEMUA broker yang muncul) disimpan, lalu ekstrak khusus utk broker yang
   * sedang dipilih saja utk dipersist ke Sheets (hindari nyimpan 70+ broker/hari
   * yang tidak pernah dilihat siapa-siapa).
   */
  async function _fetchDateBatch(batch) {
    const newlyFetched = []
    const noDataDates  = []
    await Promise.allSettled(batch.map(async date => {
      try {
        const { buys, sells } = await fetchBroker(DB.sym, date, date)
        const hasData = buys.length > 0 || sells.length > 0
        if (!hasData) { DB.brokerCache[date] = null; noDataDates.push(date); return }

        const dayMap = {}
        buys.forEach(b  => { dayMap[b.code] = { buy: b.val, sell: 0, net: 0 } })
        sells.forEach(s => {
          const sellVal = Math.abs(s.val) // sval/val sudah negatif, ambil magnitude
          if (!dayMap[s.code]) dayMap[s.code] = { buy: 0, sell: 0, net: 0 }
          dayMap[s.code].sell = sellVal
        })
        Object.keys(dayMap).forEach(code => { dayMap[code].net = dayMap[code].buy - dayMap[code].sell })
        DB.brokerCache[date] = dayMap

        // Persist HANYA broker yang sedang dipilih — bukan semua 70+ broker
        DB.selectedBrokers.forEach(code => {
          if (dayMap[code]) newlyFetched.push({ date, broker: code, ...dayMap[code] })
        })
      } catch (_) {
        DB.brokerCache[date] = null
      }
    }))
    appendBrokerCache(DB.sym, newlyFetched)
    if (noDataDates.length) appendNoDataDates(DB.sym, noDataDates)
  }

  // ============================================================
  // SEKSI 8: RENDER GARIS KUMULATIF PER BROKER
  // ============================================================
  function _renderAllBrokerLines() {
    DB.selectedBrokers.forEach((broker, i) => {
      if (_brokerSeries[broker]) { try { chart.removeSeries(_brokerSeries[broker]) } catch (_) {} }
      const color = BROKER_COLORS[i % BROKER_COLORS.length]

      if (_displayMode === 'bar') {
        // Bar harian — net per hari APA ADANYA (bukan kumulatif), supaya hari
        // dengan masuk/keluar besar langsung kelihatan sebagai bar tinggi.
        // Bar boleh berdiri sendiri per hari (bar dipahami sebagai kejadian
        // diskrit, bukan jalur yang menyambung seperti garis).
        const points = []
        DB.daily.forEach(d => {
          const dayMap = DB.brokerCache[d.date]
          const v = dayMap ? dayMap[broker] : null
          if (!v) return
          points.push({ time: d.date, value: v.net, color: color + '99' }) // sedikit transparan, banyak broker bisa tumpang tindih
        })
        const s = chart.addSeries(LightweightCharts.HistogramSeries, {
          title: broker, priceFormat: { type: 'volume' }
        }, 1) // pane 1 = panel bar harian, terpisah dari candle
        s.setData(points)
        _brokerSeries[broker] = s
      }

      else {
        // Kumulatif — net harian ditambah terus-menerus. PENTING: garis HARUS
        // selalu sambung sebagai total berjalan — hari yang sudah DICEK tapi
        // broker tidak aktif (dayMap ada, tapi broker tidak ada di dalamnya)
        // tetap diberi titik DATAR (carry-forward), BUKAN dilewati. Kalau
        // dilewati, LineSeries akan menyambungkan garis lurus diagonal ke
        // titik valid berikutnya yang mungkin jauh — itu yang bikin garis
        // kelihatan "lompat" tidak akurat. Hari yang BELUM PERNAH di-fetch
        // (dayMap undefined) ATAU sudah dicek tapi API memang kosong total
        // hari itu (dayMap null, sentinel __none__) — keduanya dilewati,
        // beda dengan "broker ini spesifik tidak aktif" (dayMap ADA tapi
        // dayMap[broker] tidak ada) yang tetap carry-forward datar.
        let cum = 0
        const points = []
        DB.daily.forEach(d => {
          const dayMap = DB.brokerCache[d.date]
          if (!dayMap) return // undefined (belum di-fetch) ATAU null (memang kosong) — lewati
          const v = dayMap[broker]
          if (v) cum += v.net // ada transaksi hari ini → tambah ke total
          // kalau v tidak ada (broker tidak aktif hari ini, TAPI hari ini sudah
          // dicek) → cum TIDAK berubah, tetap push titik DATAR di nilai cum saat ini
          points.push({ time: d.date, value: cum })
        })
        const s = chart.addSeries(LightweightCharts.LineSeries, {
          color, lineWidth: 1.5, title: broker,
          priceScaleId: 'broker-cum-scale'
        }, 0) // pane 0 = overlay bareng candle
        s.setData(points)
        try { s.priceScale().applyOptions({ scaleMargins: { top: 0.05, bottom: 0.05 } }) } catch (_) {}
        _brokerSeries[broker] = s
      }
    })
    if (DB.daily.length) _updateInfoAndLegend(DB.daily.length - 1)
  }

  /** Atur tinggi pane 1 (bar harian) — cuma muncul kalau mode='bar' DAN ada broker terpilih. */
  function _layoutBrokerPane() {
    if (!chart) return
    const panes = chart.panes()
    const containerH = document.getElementById('chart-main').clientHeight
    if (!containerH) return
    const showBarPane = _displayMode === 'bar' && DB.selectedBrokers.length > 0
    const candleH = showBarPane ? Math.floor(containerH * 0.65) : containerH
    try { panes[0].setHeight(candleH) } catch (_) {}
    if (panes[1]) { try { panes[1].setHeight(showBarPane ? containerH - candleH : 0) } catch (_) {} }
  }

  // ============================================================
  // SEKSI 9: OHLC BAR + LEGEND
  // ============================================================
  function _updateInfoAndLegend(idx) {
    const days = DB.daily
    if (!days.length || idx === undefined || idx < 0 || idx >= days.length) return
    const d = days[idx]

    document.getElementById('ohlc-bar').innerHTML = `<b>${DB.sym}</b> · ${d.date} · C ${fmtNum(d.close)}`

    const rows = DB.selectedBrokers.map((broker, i) => {
      const color = BROKER_COLORS[i % BROKER_COLORS.length]
      if (_displayMode === 'bar') {
        const dayMap = DB.brokerCache[d.date]
        const v = dayMap ? dayMap[broker] : null
        return { label: broker, color, value: v ? v.net : null }
      }
      // Kumulatif — sama persis dgn logic render: hari belum di-fetch dilewati,
      // hari sudah dicek tapi broker tidak aktif tetap ikut hitungan (tidak nambah, tidak skip)
      let cum = 0
      for (let k = 0; k <= idx; k++) {
        const dayMap = DB.brokerCache[days[k].date]
        if (!dayMap) continue // undefined ATAU null — keduanya lewati
        const v = dayMap[broker]
        if (v) cum += v.net
      }
      return { label: broker, color, value: cum }
    })

    document.getElementById('chart-legend').innerHTML = rows.map(r => `
      <div class="legend-row">
        <span class="legend-swatch" style="background:${r.color}"></span>
        <span class="legend-value" style="color:${r.color}">${r.label}: ${fmtRp(r.value)}</span>
      </div>
    `).join('')
  }


  init()
  window._ba = { DB, chart: () => chart }
</script>
