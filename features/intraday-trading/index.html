<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intraday Trading · IHSG Suite</title>
  <link rel="stylesheet" href="../../shared/ui.css">
  <style>
    .page { max-width: none; }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      padding-bottom: 14px; border-bottom: 1px solid var(--line); margin-bottom: 20px;
    }
    .toolbar-title { font-family: var(--f-mono); font-size: 13px; font-weight: 700; color: var(--paper); }
    .market-status { margin-left: auto; font-family: var(--f-mono); font-size: 11px; color: var(--ghost); }
    .market-status.live { color: var(--live); }
    .refresh-info { font-family: var(--f-mono); font-size: 10px; color: var(--ghost); }
    .alert-toggle { font-family: var(--f-mono); font-size: 11px; color: var(--ghost);
      cursor: pointer; padding: 4px 8px; border: 1px solid var(--line); border-radius: 4px; }
    .alert-toggle.on { color: var(--live); border-color: var(--live); }

    /* ── GRID CARDS ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
      align-items: start;
    }

    /* ── CARD ── */
    /* ── Flip Card — animasi ── */
    .card-flip-wrapper {
      cursor: pointer;
      position: relative;
      perspective: 800px;
    }
    .card-front {
      transition: transform 0.35s ease, opacity 0.35s ease;
      transform-origin: center left;
    }
    .card-back {
      position: absolute;
      top: 0; left: 0; right: 0;
      min-height: 100%;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      box-sizing: border-box;
      z-index: 2;
      opacity: 0;
      pointer-events: none;
      transform: rotateY(-15deg) scale(0.97);
      transform-origin: center right;
      transition: transform 0.35s ease, opacity 0.35s ease;
    }
    .card-flip-wrapper.flipped .card-front {
      opacity: 0;
      pointer-events: none;
      transform: rotateY(15deg) scale(0.97);
    }
    .card-flip-wrapper.flipped .card-back {
      opacity: 1;
      pointer-events: auto;
      transform: rotateY(0deg) scale(1);
    }
    .formula-title {
      font-family: var(--f-mono);
      font-size: 10px;
      font-weight: 700;
      color: var(--ghost);
      text-transform: uppercase;
      letter-spacing: .08em;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--line);
    }
    .formula-row {
      display: flex;
      justify-content: space-between;
      font-family: var(--f-mono);
      font-size: 10px;
      gap: 8px;
    }
    .formula-key { color: var(--ghost); }
    .formula-val { color: var(--paper); font-weight: 600; text-align: right; }
    .formula-stat {
      margin-top: 4px;
      padding-top: 6px;
      border-top: 1px solid var(--line);
    }
    .formula-stat-row {
      display: flex;
      justify-content: space-between;
      font-family: var(--f-mono);
      font-size: 10px;
      gap: 8px;
      margin-bottom: 3px;
    }
    .flip-hint {
      font-family: var(--f-mono);
      font-size: 9px;
      color: var(--ghost);
      text-align: center;
      margin-top: auto;
      padding-top: 6px;
      opacity: 0.6;
    }

    .it-card { border: 1px solid var(--line); border-radius: var(--radius); background: var(--panel); }
    .it-card.signal-entry { border-color: var(--live); box-shadow: 0 0 0 1px var(--live); }
    .it-card.signal-avoid  { border-color: var(--down); }
    .it-card.signal-skip   { opacity: 0.5; }

    /* Card Header */
    .card-header {
      display: flex; align-items: center; gap: 8px; padding: 9px 12px;
      border-bottom: 1px solid var(--line); background: var(--raised);
    }
    .card-sym { font-family: var(--f-mono); font-size: 14px; font-weight: 900; color: var(--paper); }
    .card-badge { font-family: var(--f-mono); font-size: 9px; padding: 2px 6px;
      border-radius: 10px; background: var(--phosphor); color: var(--bg); font-weight: 700; }
    .card-gap-label { margin-left: auto; font-family: var(--f-mono); font-size: 10px; font-weight: 700; }
    .card-gap-label.up   { color: var(--live); }
    .card-gap-label.down { color: #60a5fa; }
    .card-gap-label.stabil { color: var(--ghost); }

    /* Signal Banner — muncul saat ada sinyal aktif */
    .signal-banner {
      display: none; padding: 8px 12px;
      font-family: var(--f-mono); font-size: 11px; font-weight: 700;
      border-bottom: 1px solid var(--line);
    }
    .signal-banner.entry-banner { background: rgba(74,222,128,0.10); color: var(--live); display: block; }
    .signal-banner.avoid-banner { background: rgba(240,99,92,0.10); color: var(--down); display: block; }
    .signal-banner.iep-banner   { background: rgba(251,191,36,0.10); color: #fbbf24; display: block; }

    /* Checklist Steps */
    .card-steps { padding: 8px 0; }
    .step-row {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 5px 12px;
    }
    .step-row + .step-row { border-top: 1px solid var(--line); }
    .step-icon { font-size: 12px; width: 16px; flex-shrink: 0; margin-top: 1px; }
    .step-body { flex: 1; min-width: 0; }
    .step-label { font-family: var(--f-mono); font-size: 10px; font-weight: 700; color: var(--dim); margin-bottom: 3px; }
    .step-details { display: flex; flex-direction: column; gap: 1px; }
    .step-kv { display: flex; justify-content: space-between; font-family: var(--f-mono); font-size: 10px; }
    .step-key { color: var(--ghost); }
    .step-val { color: var(--dim); font-weight: 600; }
    .step-val.up   { color: var(--live); }
    .step-val.down { color: var(--down); }
    .step-val.warn { color: #fbbf24; }

    /* Equity stats */
    .eq-stat {
      background: var(--raised);
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 6px 10px;
      font-family: var(--f-mono);
      font-size: 10px;
      color: var(--dim);
    }
    .eq-stat-sym { font-weight: 700; color: var(--paper); margin-bottom: 2px; }
    .eq-stat-val { font-size: 12px; font-weight: 700; }
    .eq-stat-pct { font-size: 10px; margin-left: 4px; }
    .eq-dot { display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px; }

    /* Step states */
    .step-row.done  .step-label { color: var(--live); }
    .step-row.active .step-label { color: #fbbf24; }
    .step-row.avoid .step-label { color: var(--down); }
    .step-row.pending .step-label { color: var(--ghost); }
    .step-row.skip  .step-label { color: var(--ghost); text-decoration: line-through; }

    /* Result box */
    .result-box {
      display: none; margin: 8px 12px;
      padding: 8px 10px; border-radius: 4px;
      background: var(--raised); border: 1px solid var(--line);
      font-family: var(--f-mono); font-size: 11px;
    }
    .result-box.profit { border-color: var(--live); }
    .result-box.loss   { border-color: var(--down); }
    .result-ret { font-size: 16px; font-weight: 900; margin-bottom: 4px; }
    .result-ret.profit { color: var(--live); }
    .result-ret.loss   { color: var(--down); }
    .result-meta { color: var(--ghost); font-size: 10px; }

    /* Card footer */
    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 5px 12px 7px; border-top: 1px solid var(--line);
      font-family: var(--f-mono); font-size: 9px; color: var(--ghost);
    }
    .card-params { display: flex; gap: 8px; }
    .param-tag { background: var(--raised); padding: 1px 5px; border-radius: 3px; color: var(--ghost); }
  </style>
</head>

<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@5.2.0/dist/lightweight-charts.standalone.production.js"></script>

<script type="module">
import { renderHeader } from '../../shared/header.js'
import { EMITEN_CONFIG, FEE_DAY_TRADE }    from './config.js'
import { prevTradingDay, isTradingDay, roundToTick } from '../../shared/idx-calendar.js'
import { computeOrbFromIntraday, hasOrbBreakup } from '../../shared/orb.js'
import { onReady }     from '../../shared/token.js'
import { fetchIntraday, fetchDaily, fetchBroker } from '../../shared/api.js'
import { calcMACD } from '../../shared/indicators.js'
import { TOKEN } from '../../shared/store.js'
import { gsLoad, gsSave, gsAppend } from '../../shared/indexeddb.js'

// renderHeader dan onReady dipanggil di bawah setelah semua fungsi terdefinisi

// ============================================================
// EQUITY CHART — simpan & render hasil trade harian
// ============================================================
const EQUITY_MODAL   = 100_000_000  // Rp 100jt
const EQUITY_START   = '2026-07-07' // mulai Senin
const EQUITY_SHEET   = 'equity_trades'
const EQUITY_COLORS  = { RAJA: '#4ade80', MBMA: '#60a5fa', TPIA: '#fbbf24' }

// Simpan hasil trade hari ini ke IndexedDB
async function _saveEquityTrade(sym, date, retPct) {
  try {
    const existing = await gsLoad(EQUITY_SHEET) || []
    const key = `${sym}_${date}`
    const filtered = existing.filter(r => !(r.sym===sym && r.date===date))
    filtered.push({ sym, date, ret: retPct })
    filtered.sort((a,b) => a.date<b.date?-1:1)
    await gsSave(EQUITY_SHEET, filtered)
  } catch(e) { console.warn('[equity] save error:', e.message) }
}

// Render equity chart dari data IndexedDB
async function _renderEquityChart() {
  const chartEl = document.getElementById('equity-chart')
  const legendEl = document.getElementById('equity-legend')
  const statsEl = document.getElementById('equity-stats')
  if (!chartEl) return

  let trades = []
  try { trades = await gsLoad(EQUITY_SHEET) || [] } catch(e) {}

  const syms = ['RAJA', 'MBMA', 'TPIA']

  // Kumpulkan semua tanggal unik
  const allDates = [...new Set(trades.map(t=>t.date))].sort()

  if (!allDates.length) {
    chartEl.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;font-family:var(--f-mono);font-size:11px;color:var(--ghost)">Belum ada data — mulai Senin ${EQUITY_START}</div>`
    statsEl.innerHTML = syms.map(sym => `
      <div class="eq-stat">
        <div class="eq-stat-sym"><span class="eq-dot" style="background:${EQUITY_COLORS[sym]}"></span>${sym}</div>
        <div class="eq-stat-val" style="color:var(--ghost)">Rp 100.000.000</div>
        <div class="eq-stat-pct" style="color:var(--ghost)">+0.00%</div>
      </div>`).join('')
    return
  }

  // Hitung equity curve per emiten
  const curves = {}
  for (const sym of syms) {
    let eq = EQUITY_MODAL
    const points = [{ date: EQUITY_START, val: eq }]
    for (const date of allDates) {
      const trade = trades.find(t=>t.sym===sym && t.date===date)
      if (trade) {
        eq = eq * (1 + (trade.ret - FEE_DAY_TRADE) / 100)
      }
      points.push({ date, val: Math.round(eq) })
    }
    curves[sym] = points
  }

  // Render dengan lightweight-charts
  if (!window.LightweightCharts) {
    chartEl.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;font-family:var(--f-mono);font-size:11px;color:var(--down)">LightweightCharts gagal load — cek koneksi CDN</div>`
  } else {
    chartEl.innerHTML = ''
    const chart = LightweightCharts.createChart(chartEl, {
      autoSize: true,
      layout: { background: { color: 'transparent' }, textColor: '#6b6557' },
      grid: { vertLines: { color: '#1a1815' }, horzLines: { color: '#1a1815' } },
      timeScale: { timeVisible: false, rightOffset: 4 },
      rightPriceScale: { borderColor: '#1a1815' },
      crosshair: { mode: 1 }
    })

    for (const sym of syms) {
      const series = chart.addSeries(LightweightCharts.LineSeries, {
        color: EQUITY_COLORS[sym],
        lineWidth: 2,
        title: sym,
        priceLineVisible: false,
        lastValueVisible: true,
      })
      series.setData(curves[sym].map(p => ({ time: p.date, value: p.val })))
    }
    chart.timeScale().fitContent()
  }

  // Legend
  legendEl.innerHTML = syms.map(sym =>
    `<span><span class="eq-dot" style="background:${EQUITY_COLORS[sym]}"></span>${sym}</span>`
  ).join('')

  // Stats per emiten
  statsEl.innerHTML = syms.map(sym => {
    const pts = curves[sym]
    const last = pts[pts.length-1].val
    const pct = (last - EQUITY_MODAL) / EQUITY_MODAL * 100
    const cls = pct >= 0 ? 'up' : 'down'
    const clr = pct >= 0 ? 'var(--live)' : 'var(--down)'
    return `<div class="eq-stat">
      <div class="eq-stat-sym"><span class="eq-dot" style="background:${EQUITY_COLORS[sym]}"></span>${sym}</div>
      <div class="eq-stat-val" style="color:${clr}">Rp ${last.toLocaleString('id-ID')}</div>
      <div class="eq-stat-pct" style="color:${clr}">${pct>=0?'+':''}${pct.toFixed(2)}%</div>
    </div>`
  }).join('')
}

// ── END EQUITY CHART ──

// ============================================================
// KONFIGURASI PER EMITEN — parameter tervalidasi dari backtest
// ============================================================
// ============================================================
// MODE: 'intraday' atau 'bsjp'
// ============================================================
let _currentMode = 'intraday'
window._setMode = function(mode) {
  _currentMode = mode
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode)
  })
  document.getElementById('scalping-section').style.display = mode==='scalping' ? '' : 'none'
  document.getElementById('bsjp-section').style.display    = mode==='bsjp'     ? '' : 'none'
}

// EMITEN_CONFIG → lihat config.js

// BSJP config — hanya RAJA
// FORMULA E (13 Jul 2026, backtest 237 hari):
//   Entry 16:00 SETIAP hari, KECUALI RAJA turun >3% hari itu → SKIP
//   Exit besok 09:05 FIX (tidak tergantung foreign flow)
//   WLB 62.1% · avg +1.26% · MDD 8.6% · ~+343%/thn (ex-Jan 2026, fee 0.40%)
//   Temporal E59/L59 ✓ | Kategori foreign = INFO saja (terbukti tidak konsisten temporal)
//   ⚠️ Overnight: fee reguler 0.40% (bukan Day Trade) · tail risk gap → max 30-40% modal
// FORMULA E-BANDAR v3 (15 Jul 2026, backtest 237 hari, NO look-ahead):
//   Filter 1: bandar imbalance 5 hari (H-1..H-5) > 0 — data final semalam
//   Filter 2: dayRet RAJA live > -3% (cek 15:55)
//   Exit 09:15 · n=80/thn · WLB 64.5% · avg +1.83% · MDD 7.4% (fee 0.40)
const BSJP_P75_MAG    = 0.156   // untuk info kategori (kalibrasi 6 bulan)
const BSJP_SKIP_DAYRET = -3     // skip entry kalau RAJA hari itu turun > 3%
const BSJP_EXIT       = '09:15' // exit fix semua kondisi (v3)

// n hari bursa mundur dari dateStr (skip Sabtu/Minggu + libur bursa IDX)
function _workdayBack(dateStr, n) {
  let cur = dateStr
  for (let i = 0; i < n; i++) cur = prevTradingDay(cur)
  return cur
}

// Bandar imbalance 5 hari trading SEBELUM entryDateStr (H-1..H-5)
// imbalance = (netTop3Buy + netTop3Sell) / (netTop3Buy + |netTop3Sell|) ∈ -1..1
// Cache per entryDate — broker H-1 tidak berubah sepanjang hari
async function _fetchBandarImbalance(entryDateStr) {
  if (window._bsjpImb && window._bsjpImb.key === entryDateStr) return window._bsjpImb.val
  const toH1   = _workdayBack(entryDateStr, 1)
  const fromH5 = _workdayBack(entryDateStr, 5)
  const res = await fetchBroker('RAJA', fromH5, toH1)
  const net = {}
  for (const b of (res.buys  || [])) net[b.code] = (net[b.code] || 0) + (b.val || 0)
  for (const s of (res.sells || [])) net[s.code] = (net[s.code] || 0) + (s.val || 0)
  const entries = Object.entries(net)
  const buys  = entries.filter(([,v]) => v > 0).sort((a,b) => b[1]-a[1]).slice(0,3)
  const sells = entries.filter(([,v]) => v < 0).sort((a,b) => a[1]-b[1]).slice(0,3)
  const B = buys.reduce((s,[,v]) => s+v, 0)
  const S = sells.reduce((s,[,v]) => s+v, 0)
  const imb = (B + Math.abs(S)) > 0 ? (B + S)/(B + Math.abs(S)) : null
  const val = { imb, topBuy: buys[0]?.[0] || '–', topSell: sells[0]?.[0] || '–',
                from: fromH5, to: toH1 }
  window._bsjpImb = { key: entryDateStr, val }
  return val
}

// ============================================================
// BSJP PTRO v1 — MASA PERCOBAAN (docs/ANALISA_BSJP_PTRO.md)
//   Entry 16:00 HANYA jika PTRO hijau > +3% saat sore (dayRet live)
//   Exit besok 09:15 FIX · n=69 (18bln) · WLB 61 · avg +2.24% · MDD 6.6%
//   Bandarmology TIDAK dipakai (diuji 19 Jul: netral, WLB malah turun)
// ============================================================
const PTRO_TH   = 3        // syarat hijau > +3%
const PTRO_EXIT = '09:15'
let _ptroAlerted = null     // tanggal terakhir alert sinyal dibunyikan

async function _fetchPtroBsjp() {
  if (!TOKEN.isSet()) return
  try {
    const now      = Date.now()
    const wib      = new Date(now + 7*3600*1000)
    const todayStr = wib.toISOString().slice(0, 10)
    const timeNow  = _wibTime()
    const dow      = wib.getUTCDay()
    const isWeekend = dow === 0 || dow === 6
    function lastWorkday(fromDate) {
      const d = new Date(fromDate + 'T07:00:00Z')
      do { d.setUTCDate(d.getUTCDate() - 1) } while (d.getUTCDay() === 0 || d.getUTCDay() === 6)
      return d.toISOString().slice(0, 10)
    }
    let entryDateStr
    if (isWeekend)              entryDateStr = lastWorkday(todayStr)
    else if (timeNow >= '16:00') entryDateStr = todayStr
    else                         entryDateStr = lastWorkday(todayStr)

    // daily hari entry → dayRet final + harga entry (close)
    let entryRow = null
    try {
      const from4 = new Date(new Date(entryDateStr+'T07:00:00Z').getTime()-4*86400*1000).toISOString().slice(0,10)
      const dl = await fetchDaily('PTRO', entryDateStr, from4)
      if (dl && dl.length && dl[0].date === entryDateStr) entryRow = dl[0]
    } catch(e) {}
    const dayRetEntry = entryRow && entryRow.open ? (entryRow.close-entryRow.open)/entryRow.open*100 : null
    const signalEntry = dayRetEntry != null && dayRetEntry > PTRO_TH
    const entryPrice  = entryRow ? entryRow.close : null

    // dayRet live HARI INI (precheck sore, sebelum 16:00)
    let dayRetLive = null
    if (!isWeekend && entryDateStr !== todayStr) {
      try {
        const from7 = new Date(now - 7*86400*1000).toISOString().slice(0,10)
        const dT = await fetchDaily('PTRO', todayStr, from7)
        if (dT && dT.length && dT[0].date === todayStr && dT[0].open)
          dayRetLive = (dT[0].close-dT[0].open)/dT[0].open*100
      } catch(e) {}
    }

    // exit besok 09:15
    let exitPrice = null, tradeReturn = null
    const isExitDay = !isWeekend && entryDateStr !== todayStr
    if (isExitDay && signalEntry && entryPrice && timeNow >= PTRO_EXIT) {
      try {
        const toTs   = Math.floor(now / 1000)
        const fromTs = Math.floor(new Date(todayStr+'T01:00:00Z').getTime() / 1000)
        const raw = await fetchIntraday('PTRO', toTs, fromTs, 1)
        if (raw && raw.length) {
          const s = [...raw].sort((a,b) => a.unix-b.unix)
          const ec = s.filter(x => (x.datetime||'').slice(11,16) <= PTRO_EXIT)
          exitPrice = ec.length ? ec[ec.length-1].close : null
          if (exitPrice) tradeReturn = (exitPrice-entryPrice)/entryPrice*100
        }
      } catch(e) {}
    }

    _renderPtroBsjp({ todayStr, timeNow, isWeekend, entryDateStr, dayRetEntry,
                      signalEntry, entryPrice, dayRetLive, exitPrice, tradeReturn, isExitDay })
  } catch(e) { console.warn('[bsjp-ptro]', e.message) }
}

// ============================================================
// BSJP TPIA v2 — SEKUNDER, NET TIPIS (formula final, handoff 19 Jul)
//   Entry 16:00 HANYA jika (cek 15:55): MACD hist intraday < 0 ATAU CLV < 0.3
//   Exit besok 09:00 di OPEN (jual pre-opening) · n=146 · WLB 69.2 · avg +0.61
//   net ~+0.16 (tipis!) · MDD 10.3 · bandarmology TIDAK dipakai (menurunkan WLB)
//   SKIP jendela MSCI. DEFINISI JENDELA = ASUMSI (analisa asli tidak mencatat
//   tanggalnya): bulan review Feb/Mei/Agu/Nov tgl >=15 s/d akhir bulan, plus
//   tgl <=4 bulan berikutnya. Koreksi fungsi ini bila spesifikasi asli ditemukan.
// ============================================================
function TPIA_MSCI(dateStr) {
  const mo = +dateStr.slice(5,7), day = +dateStr.slice(8,10)
  if ([2,5,8,11].includes(mo) && day >= 15) return true
  if ([3,6,9,12].includes(mo) && day <= 4)  return true
  return false
}
let _tpiaAlerted = null

async function _fetchTpiaBsjp() {
  if (!TOKEN.isSet()) return
  try {
    const now      = Date.now()
    const wib      = new Date(now + 7*3600*1000)
    const todayStr = wib.toISOString().slice(0, 10)
    const timeNow  = _wibTime()
    const dow      = wib.getUTCDay()
    const isWeekend = dow === 0 || dow === 6
    function lastWorkday(fromDate) {
      const d = new Date(fromDate + 'T07:00:00Z')
      do { d.setUTCDate(d.getUTCDate() - 1) } while (d.getUTCDay() === 0 || d.getUTCDay() === 6)
      return d.toISOString().slice(0, 10)
    }
    let entryDateStr
    if (isWeekend)              entryDateStr = lastWorkday(todayStr)
    else if (timeNow >= '16:00') entryDateStr = todayStr
    else                         entryDateStr = lastWorkday(todayStr)

    // daily hari entry → OHLC utk CLV final + harga entry
    let entryRow = null
    try {
      const from4 = new Date(new Date(entryDateStr+'T07:00:00Z').getTime()-4*86400*1000).toISOString().slice(0,10)
      const dl = await fetchDaily('TPIA', entryDateStr, from4)
      if (dl && dl.length && dl[0].date === entryDateStr) entryRow = dl[0]
    } catch(e) {}
    const clvOf = r => (r && r.high != null && r.low != null && r.high !== r.low)
      ? (r.close - r.low) / (r.high - r.low) : null

    // MACD hist intraday utk hari tertentu (candle 1m, hist terakhir <= 15:55)
    async function macdHistAt(dayStr) {
      try {
        const fromTs = Math.floor(new Date(dayStr+'T01:00:00Z').getTime()/1000)
        const toTs   = fromTs + 9*3600
        const raw = await fetchIntraday('TPIA', toTs, fromTs, 1)
        if (!raw || raw.length < 40) return null
        const s = [...raw].sort((a,b) => a.unix - b.unix)
          .filter(x => { const t=(x.datetime||'').slice(11,16); return t >= '09:00' && t <= '15:55' })
        if (s.length < 40) return null
        const { hist } = calcMACD(s.map(x => x.close))
        for (let i = hist.length-1; i >= 0; i--) if (hist[i] != null) return hist[i]
        return null
      } catch(e) { return null }
    }

    // kondisi FINAL hari entry
    const entryMacd = await macdHistAt(entryDateStr)
    const entryClv  = clvOf(entryRow)
    const condMacd  = entryMacd != null && entryMacd < 0
    const condClv   = entryClv  != null && entryClv  < 0.3
    const msciEntry = TPIA_MSCI(entryDateStr)
    const signalEntry = !msciEntry && (condMacd || condClv) && entryRow != null
    const entryPrice  = entryRow ? entryRow.close : null

    // precheck LIVE hari ini (sebelum 16:00)
    let live = null
    if (!isWeekend && entryDateStr !== todayStr) {
      let todayRow = null
      try {
        const from7 = new Date(now - 7*86400*1000).toISOString().slice(0,10)
        const dT = await fetchDaily('TPIA', todayStr, from7)
        if (dT && dT.length && dT[0].date === todayStr) todayRow = dT[0]
      } catch(e) {}
      live = { macd: await macdHistAt(todayStr), clv: clvOf(todayRow),
               msci: TPIA_MSCI(todayStr) }
    }

    // exit besok 09:00 = OPEN hari ini
    let tradeReturn = null, exitPrice = null
    const isExitDay = !isWeekend && entryDateStr !== todayStr
    if (isExitDay && signalEntry && entryPrice && timeNow >= '09:00') {
      try {
        const from7 = new Date(now - 7*86400*1000).toISOString().slice(0,10)
        const dT = await fetchDaily('TPIA', todayStr, from7)
        if (dT && dT.length && dT[0].date === todayStr && dT[0].open) {
          exitPrice = dT[0].open
          tradeReturn = (exitPrice - entryPrice)/entryPrice*100
        }
      } catch(e) {}
    }

    _renderTpiaBsjp({ todayStr, timeNow, isWeekend, entryDateStr, signalEntry,
                      condMacd, condClv, entryMacd, entryClv, msciEntry,
                      entryPrice, live, exitPrice, tradeReturn, isExitDay })
  } catch(e) { console.warn('[bsjp-tpia]', e.message) }
}

let _alertEnabled = true
window._toggleAlert = function() {
  _alertEnabled = !_alertEnabled
  const btn = document.getElementById('alert-toggle')
  btn.textContent = _alertEnabled ? '🔔 Alert ON' : '🔕 Alert OFF'
  btn.className = 'alert-toggle ' + (_alertEnabled ? 'on' : '')
}

function _playAlert(type) {
  if (!_alertEnabled) return
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)()
    const patterns = {
      iep_confirmed: [{f:520,d:0.12,t:0},{f:650,d:0.15,t:0.15}],
      orb_up:        [{f:440,d:0.12,t:0},{f:550,d:0.12,t:0.14},{f:660,d:0.22,t:0.28}],
      avoid:         [{f:440,d:0.18,t:0},{f:330,d:0.28,t:0.20}],
    }
    ;(patterns[type]||[]).forEach(({f,d,t}) => {
      const osc=ctx.createOscillator(), gain=ctx.createGain()
      osc.connect(gain); gain.connect(ctx.destination)
      osc.frequency.value=f; osc.type=type==='avoid'?'sawtooth':'sine'
      gain.gain.setValueAtTime(0, ctx.currentTime+t)
      gain.gain.linearRampToValueAtTime(0.20, ctx.currentTime+t+0.01)
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime+t+d)
      osc.start(ctx.currentTime+t); osc.stop(ctx.currentTime+t+d+0.05)
    })
  } catch(e) {}
}

function _wibTime() {
  return new Date(Date.now()+7*3600*1000).toISOString().slice(11,16)

function _isMarketHours() {
  const wib = new Date(Date.now()+7*3600*1000)
  const day = wib.getUTCDay()
  if (day===0||day===6) return false
  const tot = wib.getUTCHours()*60+wib.getUTCMinutes()
  return tot>=8*60+45 && tot<16*60
}

        <div class="formula-row"><span class="formula-key">Exit AVOID</span><span class="formula-val">${cfg.exit_avoid}</span></div>
        <div class="formula-stat">
          <div class="formula-stat-row">
            <span class="formula-key">GAP UP</span>
            <span class="formula-val" style="color:var(--live)">WLB ${cfg.stats.up.wlb} · ${cfg.stats.up.avg} · win ${cfg.stats.up.win}</span>
          </div>
          <div class="formula-stat-row">
            <span class="formula-key">GAP DOWN</span>
            <span class="formula-val" style="color:var(--live)">WLB ${cfg.stats.down.wlb} · ${cfg.stats.down.avg} · win ${cfg.stats.down.win}</span>
          </div>
          <div class="formula-stat-row">
            <span class="formula-key">Return/thn</span>

          </div>
          <div class="formula-stat-row">
            <span class="formula-key">MDD</span>
            <span class="formula-val">${cfg.mdd}</span>
          </div>
        </div>
        `}
        <div class="flip-hint">↩ klik untuk kembali</div>
      </div><!-- card-back -->

    `
    // Toggle flip on click
    card.addEventListener('click', (e) => {
      if (e.target.closest('button, a, input')) return
      card.classList.toggle('flipped')
    })
    grid.appendChild(card)
  })
}

// ============================================================
// FETCH & COMPUTE per emiten
// ============================================================
async function _fetchEmiten(cfg) {
  const sym = cfg.sym
  const id  = sym.toLowerCase()
  try {
    const now = Date.now()
    const wib = new Date(now+7*3600*1000)
    const dateStr = wib.toISOString().slice(0,10)
    const toTs  = Math.floor(now/1000)
    const fromTs= Math.floor(new Date(dateStr+'T01:00:00Z').getTime()/1000)

    const raw = await fetchIntraday(sym, toTs, fromTs, 1)
    if (!raw||!raw.length) return _renderEmiten(cfg, null)
    const sort = [...raw].sort((a,b)=>a.unix-b.unix)

    // IEP
    const iepC = sort.filter(c=>{const t=(c.datetime||'').slice(11,16); return t>='08:45'&&t<='08:59'})
    const iepPrice = iepC.length ? iepC[iepC.length-1].close : null
    const iepVol   = iepC.reduce((s,c)=>s+(c.volume||0),0)

    // Open 09:00
    const open9 = sort.filter(c=>(c.datetime||'').slice(11,16)==='09:00')
    const open9Price = open9.length ? open9[0].open : null

    // Entry price: IEP untuk mode trailing, open 09:00 untuk mode biasa
    const openPrice = (cfg.entry_mode==='iep' && iepPrice) ? iepPrice : open9Price

    // ORB 09:00-09:04 (via shared/orb.js)
    const orbRange = computeOrbFromIntraday(sort, '09:00', '09:04')
    const orbHigh  = orbRange?.high ?? null
    const orbLow   = orbRange?.low  ?? null

    // ORB breakout
    const brokenUp = orbHigh ? hasOrbBreakup(sort, orbHigh, '09:05', cfg.orb_deadline) : false

    // Prev close
    let prevClose=null
    try {
      // Ambil 5 hari terakhir, ambil close paling akhir (last workday)
      const fromDate = new Date(wib.getTime()-7*24*3600*1000).toISOString().slice(0,10)
      const toDate   = new Date(wib.getTime()-1*24*3600*1000).toISOString().slice(0,10)
      const daily = await fetchDaily(sym, toDate, fromDate)
      if (daily&&daily.length) prevClose=daily[0].close  // index 0 = terbaru (descending)
    } catch(e2){}

    // Gap classification
    let gapCat='STABIL', gapPct=null
    if (iepPrice&&prevClose) {
      gapPct=(iepPrice-prevClose)/prevClose*100
      if (gapPct>cfg.gap_threshold)       gapCat='UP'
      else if (gapPct<-cfg.gap_threshold) gapCat='DOWN'
      else                                gapCat='STABIL'
    }

    // Exit time sesuai gap
    const exitOrbTime = cfg.mode==='trailing' ? cfg.exit_orb : (gapCat==='DOWN' ? cfg.exit_down : cfg.exit_up)

    // Status
    const timeNow=_wibTime()
    let orbStatus, exitPrice=null, tradeReturn=null, trailLevel=null, highestPrice=null

    if (cfg.mode==='trailing') {
      // TPIA: semua gap masuk (tidak ada skip), trailing stop 10%
      if (timeNow<'08:58') {
        orbStatus='pre_iep'
      } else if (timeNow<'09:00') {
        orbStatus='iep_confirmed'
      } else if (timeNow<'09:05') {
        orbStatus='orb_forming'
      } else if (brokenUp) {
        // Trailing stop SEKUENSIAL: update highest per candle, cek trail SAAT ITU
        // (bukan max global — highest 'masa depan' tidak boleh dipakai)
        const postEntry = sort.filter(c=>(c.datetime||'').slice(11,16)>='09:00')
        let runHigh = openPrice || 0
        let trailHitPrice = null
        for (const c of postEntry) {
          runHigh = Math.max(runHigh, c.high)
          const lvl = runHigh * (1 - cfg.trail_pct/100)
          if (c.low <= lvl) { trailHitPrice = lvl; break }
        }
        highestPrice = runHigh || null
        trailLevel = highestPrice ? highestPrice*(1-cfg.trail_pct/100) : null

        if (trailHitPrice) {
          exitPrice = trailHitPrice
          if (openPrice) tradeReturn=(exitPrice-openPrice)/openPrice*100
          orbStatus='done_trail'
        } else if (timeNow>=cfg.exit_orb) {
          const ec=sort.filter(c=>(c.datetime||'').slice(11,16)<=cfg.exit_orb)
          exitPrice=ec.length?ec[ec.length-1].close:null
          if (openPrice&&exitPrice) tradeReturn=(exitPrice-openPrice)/openPrice*100
          orbStatus='done_orb'
        } else {
          orbStatus='broken_up'
        }
      } else if (timeNow<cfg.orb_deadline) {
        orbStatus='waiting'
      } else {
        // Tidak ada ORB → exit avoid di deadline
        const ec=sort.filter(c=>(c.datetime||'').slice(11,16)<=cfg.exit_avoid)
        exitPrice=ec.length?ec[ec.length-1].close:null
        if (openPrice&&exitPrice) tradeReturn=(exitPrice-openPrice)/openPrice*100
        orbStatus='done_avoid'
      }
    } else if (gapCat==='STABIL') {
      orbStatus='skip'
    } else if (timeNow<'08:58') {
      orbStatus='pre_iep'
    } else if (timeNow<'09:00') {
      orbStatus='iep_confirmed'
    } else if (timeNow<'09:05') {
      orbStatus='orb_forming'
    } else {
      // Hitung SL level
      const slPct = gapCat==='DOWN' ? (cfg.sl_down||0) : (cfg.sl_up||0)
      const slLevel = slPct && openPrice ? roundToTick(openPrice*(1-slPct/100), 'down') : null

      // Cek apakah SL sudah kena (sebelum deadline)
      const postCandles = sort.filter(c=>{const t=(c.datetime||'').slice(11,16); return t>='09:05'&&t<cfg.orb_deadline})
      const slHit = slLevel && postCandles.some(c=>c.low<=slLevel)

      if (slHit && !brokenUp) {
        // SL kena sebelum ORB — exit di SL level
        exitPrice = slLevel
        if (openPrice&&exitPrice) tradeReturn=(exitPrice-openPrice)/openPrice*100
        orbStatus='done_sl'
      } else if (brokenUp) {
        if (timeNow>=exitOrbTime) {
          const ec=sort.filter(c=>(c.datetime||'').slice(11,16)<=exitOrbTime)
          exitPrice=ec.length?ec[ec.length-1].close:null
          if (openPrice&&exitPrice) tradeReturn=(exitPrice-openPrice)/openPrice*100
          orbStatus='done_orb'
        } else {
          orbStatus='broken_up'
        }
      } else if (timeNow<cfg.orb_deadline) {
        orbStatus='waiting'
      } else {
        const ec=sort.filter(c=>(c.datetime||'').slice(11,16)<=cfg.exit_avoid)
        exitPrice=ec.length?ec[ec.length-1].close:null
        if (openPrice&&exitPrice) tradeReturn=(exitPrice-openPrice)/openPrice*100
        orbStatus='done_avoid'
      }
    }

    const slPctFinal = gapCat==='DOWN' ? (cfg.sl_down||0) : (cfg.sl_up||0)
    const slLevelFinal = slPctFinal && openPrice ? roundToTick(openPrice*(1-slPctFinal/100), 'down') : null
    // Avoid exit price = harga pasar saat deadline (bukan harga fixed)
    const avoidCandlesFinal = sort.filter(c=>(c.datetime||'').slice(11,16)<=cfg.orb_deadline)
    const avoidPriceFinal = avoidCandlesFinal.length ? avoidCandlesFinal[avoidCandlesFinal.length-1].close : null

    const d={sym,id,iepPrice,iepVol,openPrice,prevClose,gapCat,gapPct,
             orbHigh,orbLow,orbStatus,brokenUp,exitOrbTime,exitPrice,tradeReturn,
             trailLevel,highestPrice,slLevel:slLevelFinal,avoidPrice:avoidPriceFinal,
             timeNow,cfg}
    _renderEmiten(cfg, d)

    // Alert (hanya sekali per hari per status)
    const alertKey=`${dateStr}_${sym}_${orbStatus}`
    if (!window._alertedKeys) window._alertedKeys={}
    if (!window._alertedKeys[alertKey]) {
      window._alertedKeys[alertKey]=true
      if (orbStatus==='iep_confirmed') _playAlert('iep_confirmed')
      if (orbStatus==='broken_up')     _playAlert('orb_up')
      if (orbStatus==='done_avoid')    _playAlert('avoid')
    }

    // Simpan hasil trade ke equity chart kalau sudah selesai
    if (['done_orb','done_avoid','done_sl','done_trail'].includes(orbStatus) && tradeReturn!=null) {
      const wibDate = new Date(Date.now()+7*3600*1000).toISOString().slice(0,10)
      _saveEquityTrade(sym, wibDate, tradeReturn).then(() => _renderEquityChart())
    }

  } catch(e) { console.warn(`[${sym}]`, e.message) }
}

// ============================================================
// RENDER per emiten
// ============================================================
function _renderEmiten(cfg, d) {
  const id = cfg.sym.toLowerCase()
  const card = document.getElementById(`card-${id}`)
  if (!card) return
  // card = wrapper (.card-flip-wrapper), cardFront = inner .it-card
  const cardFront = document.getElementById(`${id}-front`) || card

  function $v(sel, val) {
    const el=document.getElementById(`${id}-${sel}`)
    if (el) el.textContent=val||'–'
  }
  function $c(sel, cls) {
    const el=document.getElementById(`${id}-${sel}`)
    if (el) el.className=cls
  }
  function setStep(step, state, icon) {
    const sr=document.getElementById(`${id}-step-${step}`)
    const ic=document.getElementById(`${id}-icon-${step}`)
    if (sr) sr.className='step-row '+state
    if (ic) ic.textContent=icon
  }
  function setBanner(type, text) {
    const b=document.getElementById(`${id}-banner`)
    if (!b) return
    b.className='signal-banner '+(type?type+'-banner':'')
    b.style.display=type?'block':'none'
    b.textContent=text||''
  }

  // Update footer refresh
  $v('refresh', d ? 'Update: '+d.timeNow+' WIB' : '–')

  if (!d) {
    ['iep','entry','orb','exit'].forEach(s=>setStep(s,'pending','○'))
    setBanner(null)
    cardFront.className='it-card'
    return
  }

  // IEP data
  $v('iep-price', fmt(d.iepPrice))
  $v('iep-vol',   fmtVol(d.iepVol))
  $v('open-price',fmt(d.openPrice))
  $v('sl-price',  d.slLevel ? fmt(d.slLevel) : '–')
  $v('avoid-price', d.avoidPrice ? `${fmt(d.avoidPrice)} @${d.cfg.orb_deadline}` : `@${d.cfg.orb_deadline} (belum)`)
  $v('exit-target', d.exitOrbTime ? (d.timeNow>=d.exitOrbTime && d.exitPrice ? `${fmt(d.exitPrice)} @${d.exitOrbTime}` : `@${d.exitOrbTime} (belum)`) : '–')
  $v('orb-high',  fmt(d.orbHigh))
  $v('orb-low',   fmt(d.orbLow))

  // Gap label di header
  const gapEl=document.getElementById(`${id}-gap-label`)
  if (gapEl && d.gapPct!=null) {
    const sign=d.gapPct>=0?'+':''
    const gapStr=sign+d.gapPct.toFixed(2)+'%'
    if (d.gapCat==='UP')     { gapEl.textContent='🟢 '+gapStr; gapEl.className='card-gap-label up' }
    else if (d.gapCat==='DOWN') { gapEl.textContent='🔵 '+gapStr; gapEl.className='card-gap-label down' }
    else                        { gapEl.textContent='🟡 '+gapStr; gapEl.className='card-gap-label stabil' }
  }

  // IEP gap detail
  const iepGapEl=document.getElementById(`${id}-iep-gap`)
  if (iepGapEl && d.gapPct!=null) {
    const sign=d.gapPct>=0?'+':''
    iepGapEl.textContent=sign+d.gapPct.toFixed(2)+'%'
    iepGapEl.className='step-val '+(d.gapCat==='UP'?'up':d.gapCat==='DOWN'?'down':'')
  }

  const s=d.orbStatus
  const statInfo = d.gapCat!=='STABIL' ? d.cfg.stats[d.gapCat==='DOWN'?'down':'up'] : null

  if (s==='skip') {
    setStep('iep','skip','⚪'); setStep('entry','pending','○')
    setStep('orb','pending','○'); setStep('exit','pending','○')
    $v('exit-label','SKIP hari ini')
    $v('exit-msg','Gap ±'+d.cfg.gap_threshold+'% — tidak ada sinyal')
    setBanner(null); cardFront.className='it-card signal-skip'

  } else if (s==='pre_iep') {
    setStep('iep','pending','○'); setStep('entry','pending','○')
    setStep('orb','pending','○'); setStep('exit','pending','○')
    $v('exit-label','Exit'); $v('exit-msg','–')
    setBanner(null); cardFront.className='it-card'

  } else if (s==='iep_confirmed') {
    setStep('iep','active','🔔'); setStep('entry','pending','○')
    setStep('orb','pending','○'); setStep('exit','pending','○')
    const gl=d.gapCat==='UP'?'🟢 GAP UP':d.gapCat==='DOWN'?'🔵 GAP DOWN':'🟡 STABIL'
    if (d.cfg.mode==='trailing') {
      $v('exit-label','→ ENTRY di IEP sekarang')
      $v('exit-msg', `${gl} — entry di harga IEP ${fmt(d.iepPrice)}, trail ${d.cfg.trail_pct}%`)
      setBanner('iep',`🔔 IEP FINAL ${gl} — ENTRY di harga IEP ${fmt(d.iepPrice)}`)
    } else {
      $v('exit-label','→ Siapkan ENTRY 09:00')
      $v('exit-msg', gl+' — masuk di Open 09:00')
      setBanner('iep',`🔔 IEP FINAL ${gl} — ENTRY di Open 09:00`)
    }
    cardFront.className='it-card signal-entry'

  } else if (s==='orb_forming') {
    setStep('iep','done','✓'); setStep('entry','active','⏰')
    setStep('orb','pending','○'); setStep('exit','pending','○')
    $v('exit-label','Exit'); $v('exit-msg','ORB 09:00–09:04 terbentuk...')
    setBanner(null); cardFront.className='it-card'

  } else if (s==='waiting') {
    setStep('iep','done','✓'); setStep('entry','done','✓')
    setStep('orb','active','👁'); setStep('exit','pending','○')
    $v('exit-label','Menunggu ORB')
    const slInfo = d.slLevel ? ` · SL @${fmt(d.slLevel)}` : ''
    $v('exit-msg','Deadline '+d.cfg.orb_deadline+' — belum ada breakout'+slInfo)
    setBanner(null); cardFront.className='it-card'

  } else if (s==='broken_up' && d.cfg.mode==='trailing') {
    // TPIA trailing mode — ORB confirmed, pantau trailing
    setStep('iep','done','✓'); setStep('entry','done','✓')
    setStep('orb','done','✓'); setStep('exit','active','📈')
    const trail = d.trailLevel ? fmt(Math.round(d.trailLevel)) : '–'
    const highest = d.highestPrice ? fmt(d.highestPrice) : '–'
    $v('exit-label', `HOLD → Exit 15:50 · Trail @${trail}`)
    $v('exit-msg', `Highest: ${highest} · Trail stop: ${trail} (-${d.cfg.trail_pct}%)`)
    setBanner('entry', `📈 ORB CONFIRMED — HOLD sampai 15:50 · Trail stop ${trail}`)
    cardFront.className='it-card signal-entry'

  } else if (s==='done_trail') {
    // TPIA trailing kena
    setStep('iep','done','✓'); setStep('entry','done','✓')
    setStep('orb','done','✓'); setStep('exit','done','✓')
    const retCls=d.tradeReturn>=0?'signal-profit':'signal-loss'
    const retStr=d.tradeReturn!=null?(d.tradeReturn>=0?'+':'')+d.tradeReturn.toFixed(2)+'%':'–'
    $v('exit-label', `SELESAI — Trailing Stop kena`)
    $v('exit-msg', `Return: ${retStr} · Exit @${fmt(Math.round(d.trailLevel||0))}`)
    setBanner(d.tradeReturn>=0?'entry':'loss',
      `${d.tradeReturn>=0?'✓':'✗'} Trailing Stop ${retStr}`)
    cardFront.className='it-card '+retCls

  } else if (s==='broken_up') {
    setStep('iep','done','✓'); setStep('entry','done','✓')
    setStep('orb','done','✓'); setStep('exit','active','🎯')
    $v('exit-label','EXIT '+d.exitOrbTime+' — ORB UP ✓')
    const statTxt=statInfo?`WLB ${statInfo.wlb} · avg ${statInfo.avg} · win ${statInfo.win}`:''
    $v('exit-msg', 'HOLD posisi · '+statTxt)
    const gl=d.gapCat==='UP'?'🟢 GAP UP':'🔵 GAP DOWN'
    setBanner('entry',`✓ ORB UP CONFIRMED ${gl} — HOLD → exit ${d.exitOrbTime}`)
    cardFront.className='it-card signal-entry'

  } else if (s==='done_sl') {
    setStep('iep','done','✓'); setStep('entry','done','✓')
    setStep('orb','avoid','✗'); setStep('exit','avoid','🛑')
    const slPct = d.cfg.gapCat==='DOWN' ? d.cfg.sl_down : d.cfg.sl_up
    const retStr = d.tradeReturn!=null?(d.tradeReturn>=0?'+':'')+d.tradeReturn.toFixed(2)+'%':'–'
    $v('exit-label','STOP LOSS kena')
    $v('exit-target', fmt(d.slLevel ? Math.round(d.slLevel) : null))
    $v('exit-msg', `SL ${slPct}% · Return ${retStr}`)
    setBanner('avoid',`🛑 STOP LOSS kena @${fmt(d.slLevel ? Math.round(d.slLevel) : null)} · ${retStr}`)
    cardFront.className='it-card signal-avoid'
    if (d.tradeReturn!=null) {
      const retEl=document.getElementById(`${id}-result-ret`)
      const metaEl=document.getElementById(`${id}-result-meta`)
      if (retEl) { retEl.textContent=(d.tradeReturn>=0?'+':'')+d.tradeReturn.toFixed(2)+'%'; retEl.className='result-ret '+(d.tradeReturn>=0?'up':'down') }
      if (metaEl) metaEl.textContent=`SL exit @${fmt(Math.round(d.slLevel||0))}`
    }

  } else if (s==='done_avoid') {
    setStep('iep','done','✓'); setStep('entry','done','✓')
    setStep('orb','avoid','✗'); setStep('exit','avoid','⚠')
    $v('exit-label','EXIT AVOID '+d.cfg.exit_avoid)
    $v('exit-msg','Tidak ada ORB breakout')
    setBanner('avoid','✗ AVOID — Tidak ada ORB · exit '+d.cfg.exit_avoid)
    cardFront.className='it-card signal-avoid'
    // Result box
    if (d.tradeReturn!=null) _showResult(id, d, false)

  } else if (s==='done_orb') {
    setStep('iep','done','✓'); setStep('entry','done','✓')
    setStep('orb','done','✓'); setStep('exit','done','✓')
    $v('exit-label','SELESAI — Exit '+d.exitOrbTime)
    $v('exit-msg','ORB UP terkonfirmasi')
    setBanner(null); cardFront.className='it-card'
    if (d.tradeReturn!=null) _showResult(id, d, true)
  }
}

function _showResult(id, d, isWin) {
  const box=document.getElementById(`${id}-result-box`)
  const retEl=document.getElementById(`${id}-result-ret`)
  const metaEl=document.getElementById(`${id}-result-meta`)
  if (!box||!retEl||!metaEl) return
  box.style.display='block'
  const sign=d.tradeReturn>=0?'+':''
  const cls=d.tradeReturn>=0?'profit':'loss'
  box.className='result-box '+cls
  retEl.className='result-ret '+cls
  retEl.textContent=sign+d.tradeReturn.toFixed(2)+'%'
  metaEl.textContent=(isWin?'ORB UP → exit '+d.exitOrbTime:'AVOID → exit '+d.cfg.exit_avoid)
    +' · entry '+fmt(d.openPrice)+' → exit '+fmt(d.exitPrice)
}

// ============================================================
// AUTO REFRESH
// ============================================================
let _timer=null
async function _refresh() {
  const ms = document.getElementById('market-status')
  const ri = document.getElementById('refresh-info')
  const wib = new Date(Date.now() + 7*3600*1000)
  const day = wib.getUTCDay()
  const tot = wib.getUTCHours()*60 + wib.getUTCMinutes()
  const isWeekday = day !== 0 && day !== 6

  if (_isMarketHours()) {
    if (ms) { ms.textContent='● Pasar buka'; ms.className='market-status live' }
    await Promise.all(EMITEN_CONFIG.map(cfg => _fetchEmiten(cfg)))
    if (ri) ri.textContent='Refresh otomatis tiap 1 menit'
  } else if (isWeekday && tot >= 9*60+15) {
    // Hari kerja setelah deadline ORB terpendek (09:15)
    // Fetch untuk tampilkan hasil trade hari ini
    if (ms) { ms.textContent='Pasar tutup'; ms.className='market-status' }
    await Promise.all(EMITEN_CONFIG.map(cfg => _fetchEmiten(cfg)))
    if (ri) ri.textContent='Data hari ini — refresh manual bila perlu'
  } else {
    // Weekend atau sebelum jam buka
    if (ms) { ms.textContent='Pasar tutup'; ms.className='market-status' }
    if (ri) ri.textContent = isWeekday ? 'Aktif jam 08:45 WIB' : 'Weekend — pasar buka Senin'
    EMITEN_CONFIG.forEach(cfg => _renderEmiten(cfg, null))
  }
}

function _start() {

async function _fetchBsjpMonitor() {
  if (!TOKEN.isSet()) return
  try {
    const now       = Date.now()
    const wib       = new Date(now + 7*3600*1000)
    const todayStr  = wib.toISOString().slice(0, 10)
    const timeNow   = _wibTime()
    const dayOfWeek = wib.getUTCDay() // 0=Minggu, 6=Sabtu
    const isWeekend = dayOfWeek === 0 || dayOfWeek === 6

    // ── Helper: cari hari kerja terakhir ──
    // Mundur dari hari ini sampai ketemu Senin-Jumat
    function getLastWorkday(fromDate) {
      const d = new Date(fromDate + 'T07:00:00Z')
      do { d.setUTCDate(d.getUTCDate() - 1) } while (d.getUTCDay() === 0 || d.getUTCDay() === 6)
      return d.toISOString().slice(0, 10)
    }

    // Tentukan "hari entry" = hari kerja terakhir sebelum hari ini
    // - Weekend: hari Jumat (atau Kamis kalau Jumat libur)
    // - Hari kerja sebelum 16:00: kemarin
    // - Hari kerja setelah 16:00: hari ini
    let entryDateStr
    if (isWeekend) {
      entryDateStr = getLastWorkday(todayStr)
    } else if (timeNow >= '16:00') {
      entryDateStr = todayStr       // sudah entry hari ini
    } else {
      entryDateStr = getLastWorkday(todayStr)  // belum entry, posisi dari kemarin
    }

    // ── Fetch intraday hari entry untuk ambil harga 16:00 ──
    // Fetch intraday hari entry: dari 08:00 sampai 17:00 WIB
    const entryToTs  = Math.floor(new Date(entryDateStr + 'T10:00:00Z').getTime() / 1000) // 17:00 WIB
    const entryFromTs= Math.floor(new Date(entryDateStr + 'T01:00:00Z').getTime() / 1000) // 08:00 WIB

    // Fetch intraday hari entry — EMPTY_RESPONSE mungkin terjadi kalau tidak ada candle
    let sortEntry = []
    try {
      const rawEntry = await fetchIntraday('RAJA', entryToTs, entryFromTs, 1)
      if (rawEntry && rawEntry.length)
        sortEntry = [...rawEntry].sort((a, b) => a.unix - b.unix)
    } catch(e) {
      if (e.code !== 'EMPTY_RESPONSE') throw e
      // EMPTY_RESPONSE = tidak ada candle hari itu (misal libur/weekend) → lanjut
    }

    // Harga entry = close candle jam 16:00 (IEP lelang penutupan)
    // Fallback 1: candle terakhir setelah 15:50
    // Fallback 2: close dari fetchDaily
    const candle1600 = sortEntry.filter(c => (c.datetime||'').slice(11,16) === '16:00')
    const candleLast = sortEntry.filter(c => (c.datetime||'').slice(11,16) >= '15:50')
    let entryPrice = candle1600.length
      ? candle1600[0].close
      : candleLast.length ? candleLast[candleLast.length-1].close : null

    // Fallback 3: ambil dari daily close kalau intraday tidak ada
    if (!entryPrice) {
      try {
        const entryFrom3 = new Date(new Date(entryDateStr+'T07:00:00Z').getTime()-3*86400*1000).toISOString().slice(0,10)
        const dailyFb = await fetchDaily('RAJA', entryDateStr, entryFrom3)
        if (dailyFb && dailyFb.length) entryPrice = dailyFb[0].close
      } catch(e3) {}
    }

    // ── Fetch daily hari entry untuk foreign flow ──
    let fb=0, fs=0, netForeign=0, magnitude=0, kategori=null
    let exitTime = BSJP_EXIT            // formula E: exit fix, tidak tergantung foreign
    let dayRetEntry = null, foreignReady = false
    try {
      // Ambil range 3 hari untuk handle Senin (data Jumat) atau libur
      const entryFrom = new Date(new Date(entryDateStr+'T07:00:00Z').getTime()-3*86400*1000).toISOString().slice(0,10)
      const dailyData = await fetchDaily('RAJA', entryDateStr, entryFrom)
      if (dailyData && dailyData.length) {
        const d = dailyData[0]  // [0] = terbaru (Stockbit descending)
        fb = d.foreignbuy || 0
        fs = d.foreignsell || 0
        foreignReady = (fb + fs) > 0

        // dayRet hari entry → filter SKIP (formula E)
        if (d.open) dayRetEntry = (d.close - d.open) / d.open * 100

        if (foreignReady) {
          netForeign = fb - fs
          const closePrice = sortEntry[sortEntry.length-1]?.close || 1
          const vol = sortEntry.reduce((s, c) => s + (c.volume||0), 0)
          magnitude = vol > 0 ? Math.abs(netForeign) / (closePrice * vol * 100) * 100 : 0
          const isNetBuy = fb > fs
          const isStrong = magnitude >= BSJP_P75_MAG
          if      (isNetBuy && isStrong)  kategori = 'buy_strong'
          else if (isNetBuy)              kategori = 'buy_weak'
          else if (isStrong)              kategori = 'sell_strong'
          else                            kategori = 'sell_weak'
        }
      }
    } catch(e2) { console.warn('[bsjp] daily fetch error:', e2.message) }

    // ── Tentukan state: entry hari ini, hari exit, atau weekend ──
    const isEntryDay = !isWeekend && entryDateStr === todayStr
    let isExitDay = false
    let exitPrice = null, tradeReturn = null

    if (!isWeekend && !isEntryDay) {
      // Hari ini adalah hari setelah entry → hari exit
      isExitDay = true
      const xt = exitTime
      if (xt && entryPrice && timeNow >= xt) {
        // Fetch intraday hari ini untuk hitung return
        const todayToTs  = Math.floor(now / 1000)
        const todayFromTs= Math.floor(new Date(todayStr + 'T01:00:00Z').getTime() / 1000)
        const rawToday   = await fetchIntraday('RAJA', todayToTs, todayFromTs, 1)
        if (rawToday && rawToday.length) {
          const sortToday = [...rawToday].sort((a, b) => a.unix - b.unix)
          const ec = sortToday.filter(c => (c.datetime||'').slice(11,16) <= xt)
          exitPrice = ec.length ? ec[ec.length-1].close : null
          if (entryPrice && exitPrice)
            tradeReturn = (exitPrice - entryPrice) / entryPrice * 100
        }
      }
    }

    // ── v3: bandar imbalance H-1..H-5 relatif hari entry ──
    let imbData = null
    try { imbData = await _fetchBandarImbalance(entryDateStr) }
    catch(eImb) { console.warn('[bsjp] imbalance fetch:', eImb.message) }

    // dayRet live HARI INI (untuk keputusan sore, pre-16:00)
    let dayRetLive = null
    if (!isWeekend && entryDateStr !== todayStr) {
      try {
        const from7 = new Date(now - 7*86400*1000).toISOString().slice(0,10)
        const dToday = await fetchDaily('RAJA', todayStr, from7)
        if (dToday && dToday.length && dToday[0].date === todayStr && dToday[0].open)
          dayRetLive = (dToday[0].close - dToday[0].open) / dToday[0].open * 100
      } catch(eLive) {}
    }

    const imbFail = imbData && imbData.imb != null ? imbData.imb <= 0 : false
    const skipBsjp = (dayRetEntry != null && dayRetEntry < BSJP_SKIP_DAYRET) || imbFail
    _renderBsjpMonitor({
      entryPrice, fb, fs, netForeign, magnitude, kategori,
      exitTime, exitPrice, tradeReturn, timeNow, todayStr,
      entryDateStr, foreignReady, isEntryDay, isExitDay, isWeekend,
      dayRetEntry, skipBsjp, imbData, dayRetLive,
    })
  } catch(e) { console.warn('[bsjp]', e.message) }
}

      pre.style.display = 'block'
      pre.innerHTML = `
        <div style="color:var(--ghost);font-weight:700;margin-bottom:4px">CEK ENTRY SORE INI (${d.todayStr})</div>
        <div>${c1ok?'✅':'❌'} Bandar imbalance 5 hari (H-1): <b>${c1txt}</b> <span style="color:var(--ghost)">syarat &gt; 0</span></div>
        <div>${c2ok?'✅':'❌'} RAJA hari ini (live): <b>${c2txt}</b> <span style="color:var(--ghost)">syarat &gt; -3%</span></div>
        <div style="margin-top:4px">${verdict}</div>`
    } else pre.style.display = 'none'
  }

  // ── FORMULA E-BANDAR v3: SKIP — tidak ada posisi ──
  if (d.skipBsjp) {
    setStep('entry','skip','⚪')
    setStep('foreign','pending','○')
    setStep('exit','pending','○')
    $v('bsjp-entry-price', 'SKIP')
    $v('bsjp-net-foreign', '–'); $v('bsjp-magnitude', '–'); $v('bsjp-kondisi', '–')
    $v('bsjp-exit-label', 'Tidak ada posisi')
    const alasan = []
    if (d.dayRetEntry != null && d.dayRetEntry < BSJP_SKIP_DAYRET) alasan.push(`RAJA ${d.dayRetEntry.toFixed(1)}% (< -3%)`)
    if (d.imbData?.imb != null && d.imbData.imb <= 0) alasan.push(`imbalance ${d.imbData.imb.toFixed(3)} (≤ 0)`)
    setBanner('avoid', `⛔ SKIP hari entry ${d.entryDateStr} — ${alasan.join(' · ')}`)
    return
  }

  // ── Weekend tanpa posisi / pasar tutup ──
  if (d.isWeekend && !d.entryPrice) {
    setStep('entry','pending','○')
    setStep('foreign','pending','○')
    setStep('exit','pending','○')
    $v('bsjp-entry-price', '–')
    setBanner(null)
    const ref=document.getElementById('bsjp-refresh')
    if (ref) ref.textContent = 'Weekend — pasar buka Senin'
    return
  }

  // ── Weekend dengan posisi terbuka ──
  if (d.isWeekend && d.entryPrice) {
    setStep('entry','done','✓')
    $v('bsjp-entry-price', fmt(d.entryPrice))
    if (d.kategori && d.foreignReady) {
      setStep('foreign','done','✓')
      const netSign = d.netForeign >= 0 ? '+' : ''
      $v('bsjp-net-foreign', netSign+fmtM(d.netForeign))
      $v('bsjp-magnitude', d.magnitude.toFixed(3)+'%'+(d.magnitude>=BSJP_P75_MAG?' (KUAT)':' (lemah)'))
      $v('bsjp-kondisi', KONDISI_LABEL[d.kategori]||'–')
      const fl=document.getElementById('bsjp-foreign-label')
      if (fl) {
        fl.textContent=KONDISI_LABEL[d.kategori]
        fl.style.color=d.kategori==='buy_strong'?'var(--live)':d.kategori==='buy_weak'?'#86efac':d.kategori==='sell_strong'?'#f97316':'var(--ghost)'
      }
      setStep('exit','active','📅')
      $v('bsjp-exit-label','Exit Senin jam '+d.exitTime)
      $v('bsjp-exit-time', d.exitTime)
      $v('bsjp-exit-stat', KONDISI_STAT[d.kategori]||'–')
      setBanner('entry','🌙 POSISI TERBUKA (weekend) — Exit Senin jam '+d.exitTime+' · '+(KONDISI_STAT[d.kategori]||''))
    } else {
      setStep('foreign','active','⏳')
      $v('bsjp-net-foreign', 'Data dari hari entry ('+d.entryDateStr+')')
      $v('bsjp-magnitude', '–'); $v('bsjp-kondisi', '–')
      setStep('exit','pending','○')
      setBanner(null)
    }
    const ref=document.getElementById('bsjp-refresh')
    if (ref) ref.textContent='Weekend — posisi dari '+d.entryDateStr
    return
  }

  // ── Hari exit (hari setelah entry, sebelum jam exit) ──
  if (d.isExitDay) {
    setStep('entry','done','✓')
    $v('bsjp-entry-price', d.entryPrice ? fmt(d.entryPrice) : '–')
    if (d.kategori && d.foreignReady) {
      setStep('foreign','done','✓')
      const netSign = d.netForeign >= 0 ? '+' : ''
      $v('bsjp-net-foreign', netSign+fmtM(d.netForeign))
      $v('bsjp-magnitude', d.magnitude.toFixed(3)+'%'+(d.magnitude>=BSJP_P75_MAG?' (KUAT)':' (lemah)'))
      $v('bsjp-kondisi', KONDISI_LABEL[d.kategori]||'–')
      const fl=document.getElementById('bsjp-foreign-label')
      if (fl) {
        fl.textContent=KONDISI_LABEL[d.kategori]
        fl.style.color=d.kategori==='buy_strong'?'var(--live)':d.kategori==='buy_weak'?'#86efac':d.kategori==='sell_strong'?'#f97316':'var(--ghost)'
      }
      if (d.exitPrice && d.tradeReturn != null) {
        setStep('exit','done','✓')
        const retSign = d.tradeReturn >= 0 ? '+' : ''
        $v('bsjp-exit-label', 'Selesai — '+retSign+d.tradeReturn.toFixed(2)+'%')
        $v('bsjp-exit-time', d.exitTime)
        $v('bsjp-exit-stat', retSign+d.tradeReturn.toFixed(2)+'%')
        setBanner(d.tradeReturn>=0?'entry':'avoid',
          (d.tradeReturn>=0?'✓':'✗')+' BSJP Exit '+retSign+d.tradeReturn.toFixed(2)+'% · Exit '+d.exitTime)
      } else {
        setStep('exit','active','⏰')
        $v('bsjp-exit-label', 'Exit jam '+d.exitTime)
        $v('bsjp-exit-time', d.exitTime)
        $v('bsjp-exit-stat', KONDISI_STAT[d.kategori]||'–')
        setBanner('entry','📅 HARI EXIT — '+KONDISI_LABEL[d.kategori]+' · Exit jam '+d.exitTime)
      }
    } else {
      setStep('foreign','active','⏳')
      $v('bsjp-net-foreign', 'Data foreign belum tersedia')
      setStep('exit','pending','○')
      $v('bsjp-exit-label', '–')
      setBanner(null)
    }
    return
  }

  // ── Hari kerja biasa ──
  if (t >= '16:00') {
    if (d.entryPrice) {
      setStep('entry','done','✓')
      $v('bsjp-entry-price', fmt(d.entryPrice))
    } else {
      setStep('entry','active','⚠')
      $v('bsjp-entry-price', 'Gagal fetch — refresh')
    }
  } else if (t >= '15:30') {
    setStep('entry','active','⏰')
    $v('bsjp-entry-price', 'Siapkan order 16:00')
  } else {
    setStep('entry','pending','○')
    $v('bsjp-entry-price', '–')
  }

  // Step 2: Foreign flow (tersedia setelah 16:30)
  if (d.kategori && d.isEntryDay && d.timeNow >= '16:30') {
    setStep('foreign','done','✓')
    const netSign = d.netForeign >= 0 ? '+' : ''
    $v('bsjp-net-foreign', netSign+fmtM(d.netForeign))
    $v('bsjp-magnitude', d.magnitude.toFixed(3)+'%'+(d.magnitude>=BSJP_P75_MAG?' (KUAT)':' (lemah)'))
    $v('bsjp-kondisi', KONDISI_LABEL[d.kategori] || '–')
    // Foreign label di header
    const fl=document.getElementById('bsjp-foreign-label')
    if (fl) {
      fl.textContent=KONDISI_LABEL[d.kategori]
      fl.style.color=d.kategori==='buy_strong'?'var(--live)':d.kategori==='buy_weak'?'#86efac':d.kategori==='sell_strong'?'#f97316':'var(--ghost)'
    }
  } else if (d.isExitDay && d.exitTime && t < d.exitTime) {
    // Hari exit, belum lewat jam exit — posisi masih terbuka
    setStep('entry','done','✓')
    setStep('foreign','done','✓')
    setStep('exit','active','⏰')
    $v('bsjp-exit-label','POSISI TERBUKA — Exit hari ini '+d.exitTime)
    $v('bsjp-exit-time', d.exitTime)
    $v('bsjp-exit-stat', d.kategori ? (KONDISI_STAT[d.kategori]||'–') : '–')
    setBanner('entry','⏰ POSISI BSJP AKTIF — Exit hari ini jam '+d.exitTime)
  } else if (t >= '16:00' && t < '19:00') {
    setStep('foreign','active','⏳')
    $v('bsjp-net-foreign', 'Menunggu data Stockbit...')
    $v('bsjp-magnitude', 'Data final tersedia jam 19:00')
    $v('bsjp-kondisi', 'App akan update otomatis jam 19:00')
  } else {
    setStep('foreign','pending','○')
    $v('bsjp-net-foreign', '–')
    $v('bsjp-magnitude', '–')
    $v('bsjp-kondisi', '–')
  }

  // Step 3: Exit
  // Tampilkan SELESAI hanya setelah foreign data tersedia (jam >= 19:00)
  if (d.isExitDay && d.exitTime && d.tradeReturn !== null) {
    // Sudah selesai
    setStep('exit','done','✓')
    $v('bsjp-exit-label','SELESAI — Exit '+d.exitTime)
    $v('bsjp-exit-time', d.exitTime)
    $v('bsjp-exit-stat', KONDISI_STAT[d.kategori]||'–')
    const box=document.getElementById('bsjp-result-box')
    const retEl=document.getElementById('bsjp-result-ret')
    const metaEl=document.getElementById('bsjp-result-meta')
    if (box) box.style.display='block'
    const sign=d.tradeReturn>=0?'+':''
    const cls=d.tradeReturn>=0?'profit':'loss'
    if (box) box.className='result-box '+cls
    if (retEl) { retEl.className='result-ret '+cls; retEl.textContent=sign+d.tradeReturn.toFixed(2)+'%' }
    if (metaEl) metaEl.textContent='Entry '+fmt(d.entryPrice)+' → Exit '+fmt(d.exitPrice)+' ('+d.exitTime+')'
    setBanner(d.tradeReturn>=0?'entry':'avoid',
      (d.tradeReturn>=0?'✓ PROFIT ':'✗ LOSS ')+sign+d.tradeReturn.toFixed(2)+'%')
  } else if (d.kategori && d.isEntryDay && d.timeNow >= '16:30') {
    setStep('exit','active','🎯')
    $v('bsjp-exit-label','Exit besok jam '+d.exitTime)
    $v('bsjp-exit-time', d.exitTime)
    $v('bsjp-exit-stat', KONDISI_STAT[d.kategori]||'–')
    setBanner('entry','🌙 POSISI OVERNIGHT — Exit besok '+d.exitTime+' · '+(KONDISI_STAT[d.kategori]||''))
  } else if (t >= '16:00') {
    setStep('exit','pending','○')
    $v('bsjp-exit-label','Menunggu data foreign...')
    $v('bsjp-exit-time', '–')
    $v('bsjp-exit-stat', '–')
  } else {
    setStep('exit','pending','○')
    $v('bsjp-exit-label','Exit besok (ditentukan malam ini)')
    $v('bsjp-exit-time', '–')
    $v('bsjp-exit-stat', '–')
  }
}

let _bsjpTimer = null
function _startBsjp() {
  if (_bsjpTimer) clearInterval(_bsjpTimer)
  _buildBsjpCards()
  _fetchBsjpMonitor()
  _fetchPtroBsjp()
  _fetchTpiaBsjp()
  // Cek tiap menit HANYA untuk update entry 16:00 dan hasil trade pagi
  // Foreign fetch dilakukan sekali saat jam >= 19:00 (data sudah final di Stockbit)
  _bsjpTimer = setInterval(() => {
    const t = _wibTime()
    // Jam bursa atau jam 19:00 (fetch foreign)
    if (t >= '08:00' && t <= '17:00') { _fetchBsjpMonitor(); _fetchPtroBsjp(); _fetchTpiaBsjp(); return }
    if (t >= '19:00' && t <= '19:05') { _fetchBsjpMonitor(); _fetchPtroBsjp(); _fetchTpiaBsjp(); return }
  }, 60*1000)
}
// _startBsjp sudah di-init di atas bersama _start
</script>
