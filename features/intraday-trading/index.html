<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intraday Trading · IHSG Suite</title>
  <link rel="stylesheet" href="../../shared/ui.css">
  <style>
    .page { max-width: none; }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      padding-bottom: 14px; border-bottom: 1px solid var(--line); margin-bottom: 20px;
    }
    .toolbar-title { font-family: var(--f-mono); font-size: 13px; font-weight: 700; color: var(--paper); }
    .market-status { margin-left: auto; font-family: var(--f-mono); font-size: 11px; color: var(--ghost); }
    .market-status.live { color: var(--live); }
    .refresh-info { font-family: var(--f-mono); font-size: 10px; color: var(--ghost); }
    .alert-toggle { font-family: var(--f-mono); font-size: 11px; color: var(--ghost);
      cursor: pointer; padding: 4px 8px; border: 1px solid var(--line); border-radius: 4px; }
    .alert-toggle.on { color: var(--live); border-color: var(--live); }

    /* ── GRID CARDS ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
      align-items: start;
    }

    /* ── CARD ── */
    .it-card { border: 1px solid var(--line); border-radius: var(--radius); background: var(--panel); overflow: hidden; }
    .it-card.signal-entry { border-color: var(--live); box-shadow: 0 0 0 1px var(--live); }
    .it-card.signal-avoid  { border-color: var(--down); }
    .it-card.signal-skip   { opacity: 0.5; }

    /* Card Header */
    .card-header {
      display: flex; align-items: center; gap: 8px; padding: 9px 12px;
      border-bottom: 1px solid var(--line); background: var(--raised);
    }
    .card-sym { font-family: var(--f-mono); font-size: 14px; font-weight: 900; color: var(--paper); }
    .card-badge { font-family: var(--f-mono); font-size: 9px; padding: 2px 6px;
      border-radius: 10px; background: var(--phosphor); color: var(--bg); font-weight: 700; }
    .card-gap-label { margin-left: auto; font-family: var(--f-mono); font-size: 10px; font-weight: 700; }
    .card-gap-label.up   { color: var(--live); }
    .card-gap-label.down { color: #60a5fa; }
    .card-gap-label.stabil { color: var(--ghost); }

    /* Signal Banner — muncul saat ada sinyal aktif */
    .signal-banner {
      display: none; padding: 8px 12px;
      font-family: var(--f-mono); font-size: 11px; font-weight: 700;
      border-bottom: 1px solid var(--line);
    }
    .signal-banner.entry-banner { background: rgba(74,222,128,0.10); color: var(--live); display: block; }
    .signal-banner.avoid-banner { background: rgba(240,99,92,0.10); color: var(--down); display: block; }
    .signal-banner.iep-banner   { background: rgba(251,191,36,0.10); color: #fbbf24; display: block; }

    /* Checklist Steps */
    .card-steps { padding: 8px 0; }
    .step-row {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 5px 12px;
    }
    .step-row + .step-row { border-top: 1px solid var(--line); }
    .step-icon { font-size: 12px; width: 16px; flex-shrink: 0; margin-top: 1px; }
    .step-body { flex: 1; min-width: 0; }
    .step-label { font-family: var(--f-mono); font-size: 10px; font-weight: 700; color: var(--dim); margin-bottom: 3px; }
    .step-details { display: flex; flex-direction: column; gap: 1px; }
    .step-kv { display: flex; justify-content: space-between; font-family: var(--f-mono); font-size: 10px; }
    .step-key { color: var(--ghost); }
    .step-val { color: var(--dim); font-weight: 600; }
    .step-val.up   { color: var(--live); }
    .step-val.down { color: var(--down); }
    .step-val.warn { color: #fbbf24; }

    /* Step states */
    .step-row.done  .step-label { color: var(--live); }
    .step-row.active .step-label { color: #fbbf24; }
    .step-row.avoid .step-label { color: var(--down); }
    .step-row.pending .step-label { color: var(--ghost); }
    .step-row.skip  .step-label { color: var(--ghost); text-decoration: line-through; }

    /* Result box */
    .result-box {
      display: none; margin: 8px 12px;
      padding: 8px 10px; border-radius: 4px;
      background: var(--raised); border: 1px solid var(--line);
      font-family: var(--f-mono); font-size: 11px;
    }
    .result-box.profit { border-color: var(--live); }
    .result-box.loss   { border-color: var(--down); }
    .result-ret { font-size: 16px; font-weight: 900; margin-bottom: 4px; }
    .result-ret.profit { color: var(--live); }
    .result-ret.loss   { color: var(--down); }
    .result-meta { color: var(--ghost); font-size: 10px; }

    /* Card footer */
    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 5px 12px 7px; border-top: 1px solid var(--line);
      font-family: var(--f-mono); font-size: 9px; color: var(--ghost);
    }
    .card-params { display: flex; gap: 8px; }
    .param-tag { background: var(--raised); padding: 1px 5px; border-radius: 3px; color: var(--ghost); }
  </style>
</head>
<body>
<div class="page">
  <div id="app-header"></div>

  <div class="feature-section">
    <div class="section-label">Intraday Trading</div>

    <!-- TOOLBAR -->
    <div class="toolbar">
      <span class="toolbar-title">Monitor Real-Time</span>
      <span class="market-status" id="market-status">Memuat...</span>
      <span class="refresh-info" id="refresh-info">–</span>
      <button class="alert-toggle on" id="alert-toggle" onclick="window._toggleAlert()">🔔 Alert ON</button>
    </div>

    <!-- MODE TOGGLE -->
    <div class="mode-toggle" style="display:flex;gap:8px;margin-bottom:16px;">
      <button class="mode-btn active" data-mode="intraday" onclick="window._setMode('intraday')"
        style="font-family:var(--f-mono);font-size:11px;font-weight:700;padding:5px 14px;
               border-radius:4px;border:1px solid var(--live);background:rgba(74,222,128,0.12);
               color:var(--live);cursor:pointer;">
        📈 Intraday
      </button>
      <button class="mode-btn" data-mode="bsjp" onclick="window._setMode('bsjp')"
        style="font-family:var(--f-mono);font-size:11px;font-weight:700;padding:5px 14px;
               border-radius:4px;border:1px solid var(--line);background:transparent;
               color:var(--ghost);cursor:pointer;">
        🌙 BSJP
      </button>
      <style>
        .mode-btn.active { border-color:var(--phosphor)!important;
          background:rgba(74,222,128,0.12)!important; color:var(--paper)!important; }
      </style>
    </div>

    <!-- INTRADAY SECTION -->
    <div id="intraday-section">
      <div class="cards-grid" id="cards-grid">
        <!-- Cards di-generate oleh JS -->
      </div>
    </div>

    <!-- BSJP SECTION -->
    <div id="bsjp-section" style="display:none">
      <div class="cards-grid" id="bsjp-cards-grid">
        <!-- BSJP card di-generate oleh JS -->
      </div>
    </div>
  </div>
</div>

    { label: 'IHSG Suite', href: '../../index.html' },

  ])

// ============================================================
// KONFIGURASI INTRADAY — parameter tervalidasi per emiten
// Menggunakan EmitenMonitor dari shared/monitor.js
// ============================================================

  {

    name:          'Merdeka Battery Materials',
    gap_threshold: 1.5,
    orb_deadline:  '09:31',
    exit_up:       '09:30',

    exit_avoid:    '09:15',
    prefix:        'mbma',

// ── Build cards dari config ──
function _buildCards() {

// ── Buat instance EmitenMonitor per emiten ──
let _monitors = []

function _initMonitors() {
  _monitors.forEach(m => m.stop())
  _monitors = EMITEN_CONFIG.map(cfg => new EmitenMonitor({
    ...cfg,
    onData:  (d) => _renderCard(cfg, d),
    onAlert: (type) => playAlert(type),
  }))
}

// ── Render card intraday — wrapper renderMonitorCard + card-specific UI ──
function _renderCard(cfg, d) {
  const id = cfg.prefix
  const card = document.getElementById(`card-${id}`)
  if (!card) return

  // Render checklist via shared/monitor.js
  renderMonitorCard(id, d)

  // Update card border state
  if (!d || d.orbStatus === 'skip') {
    card.className = 'it-card signal-skip'
  } else if (d.orbStatus === 'broken_up' || d.orbStatus === 'iep_confirmed') {
    card.className = 'it-card signal-entry'
  } else if (d.orbStatus === 'done_avoid') {
    card.className = 'it-card signal-avoid'
  } else {
    card.className = 'it-card'
  }

  // Gap label di header card
  if (d && d.gapPct != null) {
    const gl = document.getElementById(`${id}-gap-label`)
    if (gl) {
      const sign = d.gapPct >= 0 ? '+' : ''
      gl.textContent = (d.gapCat==='UP'?'🟢 ':d.gapCat==='DOWN'?'🔵 ':'🟡 ')+sign+d.gapPct.toFixed(2)+'%'
      gl.className = 'card-gap-label '+(d.gapCat==='UP'?'up':d.gapCat==='DOWN'?'down':'stabil')
    }
  }

  // Signal banner (reuse signal-box element sebagai banner)
  const banner = document.getElementById(`${id}-signal-box`)
  if (banner && d) {
    if (d.orbStatus === 'broken_up') {
      banner.style.display = 'block'
      banner.className = 'signal-banner entry-banner'
      banner.textContent = `✓ ORB UP CONFIRMED — HOLD → exit ${d.exitOrbTime}`
    } else if (d.orbStatus === 'iep_confirmed') {
      banner.style.display = 'block'
      banner.className = 'signal-banner iep-banner'
      banner.textContent = `🔔 IEP FINAL — ${d.gapCat==='UP'?'🟢 GAP UP':'🔵 GAP DOWN'} → ENTRY 09:00`
    } else if (d.orbStatus === 'done_avoid') {
      banner.style.display = 'block'
      banner.className = 'signal-banner avoid-banner'
      banner.textContent = `✗ AVOID — exit ${d.exitAvoidTime}`
    } else {
      banner.style.display = 'none'
    }
  } else if (banner) {
    banner.style.display = 'none'
  }

  // Result box
  const rb = document.getElementById(`${id}-step-result`)
  const rr = document.getElementById(`${id}-result-ret`)
  const rm = document.getElementById(`${id}-result-meta`)
  if (rb && d && (d.orbStatus === 'done_orb' || d.orbStatus === 'done_avoid') && d.tradeReturn != null) {
    rb.style.display = 'block'
    const sign = d.tradeReturn >= 0 ? '+' : ''
    const cls  = d.tradeReturn >= 0 ? 'profit' : 'loss'
    rb.className = 'result-box ' + cls
    if (rr) { rr.className = 'result-ret ' + cls; rr.textContent = sign + d.tradeReturn.toFixed(2) + '%' }
    if (rm) rm.textContent = (d.orbStatus==='done_orb'?'ORB UP':'AVOID') + ' → exit ' +
      (d.orbStatus==='done_orb'?d.exitOrbTime:d.exitAvoidTime)
  } else if (rb) {
    rb.style.display = 'none'
  }
}

// ── Refresh cycle ──
let _timer = null
async function _refresh() {
  const ms = document.getElementById('market-status')
  const ri = document.getElementById('refresh-info')
  if (isMarketHours()) {
    if (ms) { ms.textContent = '● Pasar buka'; ms.className = 'market-status live' }
    await Promise.all(_monitors.map(m => m.fetch()))
    if (ri) ri.textContent = 'Refresh otomatis tiap 1 menit'
  } else {
    if (ms) { ms.textContent = 'Pasar tutup'; ms.className = 'market-status' }
    if (ri) ri.textContent = 'Auto-refresh aktif jam 08:45–16:00 WIB'
    EMITEN_CONFIG.forEach(cfg => _renderCard(cfg, null))
  }
}

function _start() {
  if (_timer) clearInterval(_timer)
  _buildCards()
  _initMonitors()
  _refresh()
  _timer = setInterval(() => {
    if (!isMarketHours()) { clearInterval(_timer); return }
    _refresh()
  }, 60 * 1000)
}

window._start = _start
window._startBsjp = _startBsjp

window.addEventListener('ihsg:token-saved', _start)
window.addEventListener('ihsg:token-saved', _startBsjp)

// Inisialisasi setelah semua module selesai load
window.addEventListener('load', () => {

async function _fetchBsjpMonitor() {
  if (!TOKEN.isSet()) return
  try {
    const now = Date.now()
    const wib = new Date(now + 7*3600*1000)
    const dateStr = wib.toISOString().slice(0,10)
    const timeNow = _wibTime()
    const toTs = Math.floor(now/1000)
    const fromTs = Math.floor(new Date(dateStr+'T01:00:00Z').getTime()/1000)

    const raw = await fetchIntraday('RAJA', toTs, fromTs, 1)
    if (!raw || !raw.length) return

    const sort = [...raw].sort((a,b) => a.unix - b.unix)

    // Entry price: candle jam 16:00 (lelang penutupan)
    const entry16 = sort.filter(c => (c.datetime||'').slice(11,16) >= '16:00')
    const entryPrice = entry16.length ? entry16[0].close : null

    // Fetch daily hari ini untuk foreign flow
    // Data foreign di Stockbit daily API belum tentu langsung tersedia setelah 16:00
    // Kode ini retry sampai data muncul (nilai fb+fs > 0)
    let fb = 0, fs = 0, netForeign = 0, magnitude = 0, kategori = null, exitTime = null
    let foreignReady = false
    try {
      const dailyData = await fetchDaily('RAJA', dateStr, dateStr)
      if (dailyData && dailyData.length) {
        const d = dailyData[dailyData.length-1]
        fb = d.foreignbuy || 0
        fs = d.foreignsell || 0
        foreignReady = (fb + fs) > 0  // data sudah tersedia kalau ada nilai
        if (foreignReady) {
          netForeign = fb - fs
          const closePrice = sort[sort.length-1]?.close || 1
          const vol = sort.reduce((s,c) => s+(c.volume||0), 0)
          const volVal = closePrice * vol * 100
          magnitude = volVal > 0 ? Math.abs(netForeign) / volVal * 100 : 0
          const isNetBuy = fb > fs
          const isStrong = magnitude >= BSJP_P75_MAG
          if (isNetBuy && isStrong)  kategori = 'buy_strong'
          else if (isNetBuy)         kategori = 'buy_weak'
          else if (isStrong)         kategori = 'sell_strong'
          else                       kategori = 'sell_weak'
          exitTime = BSJP_EXIT_MAP[kategori]
        }
      }
    } catch(e2) {}

    // ── BSJP exit logic ──
    // Entry hari ini (16:00), EXIT besok pagi sesuai kondisi foreign
    // Hasil trade hanya bisa dihitung SETELAH market besok buka dan lewat jam exit
    // Logic:
    //   - Hari entry (sebelum 16:00)    → belum entry, tampilkan checklist
    //   - Hari entry (16:00-18:59)      → sudah entry, menunggu foreign jam 19:00
    //   - Hari entry (19:00+)           → foreign tersedia, tampilkan jam exit besok
    //   - Hari berikutnya (sebelum exit)→ posisi masih terbuka, tampilkan countdown
    //   - Hari berikutnya (setelah exit)→ hitung dan tampilkan hasil trade

    // Simpan tanggal entry di localStorage agar tahu posisi masih terbuka
    const entryKey = 'bsjp_entry_date'
    const savedEntryDate = localStorage.getItem(entryKey)

    let exitPrice = null, tradeReturn = null
    let isEntryDay = true   // apakah hari ini adalah hari entry?
    let isExitDay = false   // apakah hari ini adalah hari exit?

    // Cek apakah hari ini adalah hari setelah entry (hari exit)
    // Kalau ada saved entry date dan bukan hari ini → ini hari exit
    if (savedEntryDate && savedEntryDate !== dateStr) {
      isEntryDay = false
      isExitDay = true
      // Fetch candle hari ini (hari exit) untuk hitung return
      if (exitTime && entryPrice && timeNow >= exitTime) {
        const ec = sort.filter(c => (c.datetime||'').slice(11,16) <= exitTime)
        exitPrice = ec.length ? ec[ec.length-1].close : null
        // entryPrice dari hari sebelumnya — ambil dari localStorage
        const savedEntry = parseFloat(localStorage.getItem('bsjp_entry_price') || '0')
        if (savedEntry && exitPrice) tradeReturn = (exitPrice - savedEntry) / savedEntry * 100
      }
    }

    // Simpan data entry ke localStorage kalau sudah entry hari ini
    if (isEntryDay && entryPrice && timeNow >= '16:00') {
      localStorage.setItem(entryKey, dateStr)
      localStorage.setItem('bsjp_entry_price', String(entryPrice))
    }

    _renderBsjpMonitor({ entryPrice, fb, fs, netForeign, magnitude, kategori,
                          exitTime, exitPrice, tradeReturn, timeNow, dateStr,
                          foreignReady, isEntryDay, isExitDay })
  } catch(e) { console.warn('[bsjp]', e.message) }
}

function _renderBsjpMonitor(d) {
  const fmt = v => v ? v.toLocaleString('id-ID') : '–'
  const fmtM = v => v ? (v/1e9).toFixed(1)+'M' : '–'

  function $v(id, val) { const el=document.getElementById(id); if(el) el.textContent=val||'–' }
  function setStep(id, state, icon) {
    const el=document.getElementById('bsjp-step-'+id)
    if (el) el.className='step-row '+state
    const ic=document.getElementById('bsjp-icon-'+id)
    if (ic) ic.textContent=icon
  }
  function setBanner(type, text) {
    const b=document.getElementById('bsjp-banner')
    if (!b) return
    b.className='signal-banner '+(type?type+'-banner':'')
    b.style.display=type?'block':'none'
    b.textContent=text||''
  }

  const ref=document.getElementById('bsjp-refresh')
  if (ref) ref.textContent='Update: '+d.timeNow+' WIB'
  if (!d) return

  const t=d.timeNow

  // Step 1: Entry (setelah 16:00)
  if (t >= '16:00' && d.entryPrice) {
    setStep('entry','done','✓')
    $v('bsjp-entry-price', fmt(d.entryPrice))
  } else if (t >= '15:30') {
    setStep('entry','active','⏰')
    $v('bsjp-entry-price', 'Siapkan order 16:00')
  } else {
    setStep('entry','pending','○')
    $v('bsjp-entry-price', '–')
  }

  // Step 2: Foreign flow (tersedia setelah 16:30)
  const KONDISI_LABEL = {
    buy_strong:  '🟢 NET BUY KUAT',
    buy_weak:    '🟡 NET BUY LEMAH',
    sell_strong: '🟠 NET SELL KUAT',
    sell_weak:   '⚪ NET SELL LEMAH',
  }
  const KONDISI_STAT = {
    buy_strong:  'WLB 67.9%★ · avg +2.05%',
    buy_weak:    'WLB 49.7% · avg +1.15%',
    sell_strong: 'WLB 48.8% · avg +1.40%',
    sell_weak:   'WLB 61.1% · avg +0.50%',
  }
  if (d.kategori && d.isEntryDay && d.timeNow >= '19:00') {
    setStep('foreign','done','✓')
    const netSign = d.netForeign >= 0 ? '+' : ''
    $v('bsjp-net-foreign', netSign+fmtM(d.netForeign))
    $v('bsjp-magnitude', d.magnitude.toFixed(3)+'%'+(d.magnitude>=BSJP_P75_MAG?' (KUAT)':' (lemah)'))
    $v('bsjp-kondisi', KONDISI_LABEL[d.kategori] || '–')
    // Foreign label di header
    const fl=document.getElementById('bsjp-foreign-label')
    if (fl) {
      fl.textContent=KONDISI_LABEL[d.kategori]
      fl.style.color=d.kategori==='buy_strong'?'var(--live)':d.kategori==='buy_weak'?'#86efac':d.kategori==='sell_strong'?'#f97316':'var(--ghost)'
    }
  } else if (d.isExitDay && d.exitTime && t < d.exitTime) {
    // Hari exit, belum lewat jam exit — posisi masih terbuka
    setStep('entry','done','✓')
    setStep('foreign','done','✓')
    setStep('exit','active','⏰')
    $v('bsjp-exit-label','POSISI TERBUKA — Exit hari ini '+d.exitTime)
    $v('bsjp-exit-time', d.exitTime)
    $v('bsjp-exit-stat', d.kategori ? (KONDISI_STAT[d.kategori]||'–') : '–')
    setBanner('entry','⏰ POSISI BSJP AKTIF — Exit hari ini jam '+d.exitTime)
  } else if (t >= '16:00' && t < '19:00') {
    setStep('foreign','active','⏳')
    $v('bsjp-net-foreign', 'Menunggu data Stockbit...')
    $v('bsjp-magnitude', 'Data final tersedia jam 19:00')
    $v('bsjp-kondisi', 'App akan update otomatis jam 19:00')
  } else {
    setStep('foreign','pending','○')
    $v('bsjp-net-foreign', '–')
    $v('bsjp-magnitude', '–')
    $v('bsjp-kondisi', '–')
  }

  // Step 3: Exit
  // Tampilkan SELESAI hanya setelah foreign data tersedia (jam >= 19:00)
  if (d.isExitDay && d.exitTime && d.tradeReturn !== null) {
    // Sudah selesai
    setStep('exit','done','✓')
    $v('bsjp-exit-label','SELESAI — Exit '+d.exitTime)
    $v('bsjp-exit-time', d.exitTime)
    $v('bsjp-exit-stat', KONDISI_STAT[d.kategori]||'–')
    const box=document.getElementById('bsjp-result-box')
    const retEl=document.getElementById('bsjp-result-ret')
    const metaEl=document.getElementById('bsjp-result-meta')
    if (box) box.style.display='block'
    const sign=d.tradeReturn>=0?'+':''
    const cls=d.tradeReturn>=0?'profit':'loss'
    if (box) box.className='result-box '+cls
    if (retEl) { retEl.className='result-ret '+cls; retEl.textContent=sign+d.tradeReturn.toFixed(2)+'%' }
    if (metaEl) metaEl.textContent='Entry '+fmt(d.entryPrice)+' → Exit '+fmt(d.exitPrice)+' ('+d.exitTime+')'
    setBanner(d.tradeReturn>=0?'entry':'avoid',
      (d.tradeReturn>=0?'✓ PROFIT ':'✗ LOSS ')+sign+d.tradeReturn.toFixed(2)+'%')
  } else if (d.kategori && d.isEntryDay && d.timeNow >= '19:00') {
    setStep('exit','active','🎯')
    $v('bsjp-exit-label','Exit besok jam '+d.exitTime)
    $v('bsjp-exit-time', d.exitTime)
    $v('bsjp-exit-stat', KONDISI_STAT[d.kategori]||'–')
    setBanner('entry','🌙 POSISI OVERNIGHT — Exit besok '+d.exitTime+' · '+(KONDISI_STAT[d.kategori]||''))
  } else if (t >= '16:00') {
    setStep('exit','pending','○')
    $v('bsjp-exit-label','Menunggu data foreign...')
    $v('bsjp-exit-time', '–')
    $v('bsjp-exit-stat', '–')
  } else {
    setStep('exit','pending','○')
    $v('bsjp-exit-label','Exit besok (ditentukan malam ini)')
    $v('bsjp-exit-time', '–')
    $v('bsjp-exit-stat', '–')
  }
}

let _bsjpTimer = null
function _startBsjp() {
  if (_bsjpTimer) clearInterval(_bsjpTimer)
  _buildBsjpCards()
  _fetchBsjpMonitor()
  // Cek tiap menit HANYA untuk update entry 16:00 dan hasil trade pagi
  // Foreign fetch dilakukan sekali saat jam >= 19:00 (data sudah final di Stockbit)
  _bsjpTimer = setInterval(() => {
    const t = _wibTime()
    // Jam bursa atau jam 19:00 (fetch foreign)
    if (t >= '08:00' && t <= '17:00') { _fetchBsjpMonitor(); return }
    if (t >= '19:00' && t <= '19:05') { _fetchBsjpMonitor(); return }
  }, 60*1000)
}
// _startBsjp sudah di-init di atas bersama _start
</script>
