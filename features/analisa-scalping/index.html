<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analisa Scalping · IHSG Suite</title>
  <link rel="stylesheet" href="../../shared/ui.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page">
  <header class="app-header" id="app-header"></header>
  <div class="layout">

    <!-- ── KIRI ── -->
    <div class="panel">

      <!-- Data -->
      <div>
        <div class="sec">Data</div>
        <div class="row"><span class="lbl">Emiten</span>
          <input class="inp" id="sym" value="RAJA" maxlength="10" style="width:80px;text-transform:uppercase">
        </div>
        <div class="row"><span class="lbl">Dari</span>
          <input class="inp" id="date-from" type="date" style="width:118px">
        </div>
        <div class="row"><span class="lbl">Sampai</span>
          <input class="inp" id="date-to" type="date" style="width:118px">
        </div>
        <button class="fetch-btn" id="fetch-btn">▶ FETCH DATA</button>
        <div class="status" id="status">Belum ada data</div>
      </div>

      <hr class="hr">

      <!-- Entry Conditions -->
      <div>
        <div class="sec">Entry Conditions</div>

        <!-- Gap -->
        <div class="row" style="gap:8px;flex-wrap:wrap">
          <label class="cb" style="min-width:0"><input type="radio" name="gap" value="up" checked> Gap UP</label>
          <label class="cb" style="min-width:0"><input type="radio" name="gap" value="down"> Gap DOWN</label>
          <label class="cb" style="min-width:0"><input type="radio" name="gap" value="both"> Keduanya</label>
          <label class="cb" style="min-width:0"><input type="radio" name="gap" value="all"> Semua</label>
        </div>
        <div class="sub" id="gap-th-row">
          Gap ± <input class="inp" id="gap-th" value="0.5" style="width:36px"> %
        </div>

        <hr class="hr" style="margin:5px 0">

        <!-- Additional conditions -->
        <label class="cb"><input type="checkbox" id="c-vol-iep"> Vol IEP surge</label>
        <div class="sub" id="s-vol-iep" style="display:none">
          ≥ <input class="inp" id="vol-iep-x" value="1.5" style="width:36px">× avg 5hr
        </div>

        <label class="cb"><input type="checkbox" id="c-rsi"> RSI kemarin</label>
        <div class="sub" id="s-rsi" style="display:none; gap:4px">
          <label><input type="radio" name="rsi-dir" value="le" checked> ≤</label>
          <input class="inp" id="rsi-lo" value="40" style="width:36px">
          <label><input type="radio" name="rsi-dir" value="ge"> ≥</label>
          <input class="inp" id="rsi-hi" value="60" style="width:36px">
        </div>

        <label class="cb"><input type="checkbox" id="c-trend"> Trend MA</label>
        <div class="sub" id="s-trend" style="display:none; gap:4px">
          IEP
          <label><input type="radio" name="tr-dir" value="above" checked> atas</label>
          <label><input type="radio" name="tr-dir" value="below"> bawah</label>
          MA<input class="inp" id="ma-n" value="20" style="width:36px">
        </div>

        <label class="cb"><input type="checkbox" id="c-orb-range"> ORB Range</label>
        <div class="sub" id="s-orb-range" style="display:none">
          ≥ <input class="inp" id="orb-range-pct" value="1.0" style="width:36px">% prev close
        </div>

        <label class="cb"><input type="checkbox" id="c-vol-orb"> Vol ORB surge</label>
        <div class="sub" id="s-vol-orb" style="display:none">
          ≥ <input class="inp" id="vol-orb-x" value="2.0" style="width:36px">× avg 5hr
        </div>
      </div>

      <hr class="hr">

      <!-- Entry Times -->
      <div>
        <div class="sec">Entry Time (grid search)</div>
        <div class="times-grid" id="entry-times-grid">
          <label class="cb"><input type="checkbox" value="09:00" checked> 09:00</label>
          <label class="cb"><input type="checkbox" value="09:05"> 09:05</label>
          <label class="cb"><input type="checkbox" value="09:10"> 09:10</label>
          <label class="cb"><input type="checkbox" value="09:15"> 09:15</label>
          <label class="cb"><input type="checkbox" value="09:20"> 09:20</label>
          <label class="cb"><input type="checkbox" value="09:25"> 09:25</label>
          <label class="cb"><input type="checkbox" value="09:30"> 09:30</label>
          <label class="cb"><input type="checkbox" value="09:45"> 09:45</label>
          <label class="cb"><input type="checkbox" value="10:00"> 10:00</label>
          <label class="cb"><input type="checkbox" value="10:15"> 10:15</label>
          <label class="cb"><input type="checkbox" value="10:30"> 10:30</label>
        </div>
      </div>

      <hr class="hr">

      <!-- ORB Monitoring -->
      <div>
        <div class="sec">ORB Monitoring</div>
        <label class="cb"><input type="checkbox" id="use-orb" checked> Aktifkan ORB</label>
        <div id="orb-cfg">
          <div class="row" style="margin-top:4px">
            <span class="lbl">Deadline</span>
            <select class="sel" id="orb-dl">
              <option>09:06</option><option>09:11</option>
              <option selected>09:16</option><option>09:21</option><option>09:31</option>
            </select>
          </div>
          <div class="row">
            <span class="lbl">Exit ORB</span>
            <select class="sel" id="exit-orb">
              <option>09:15</option><option>09:30</option><option selected>10:00</option>
              <option>10:30</option><option>11:00</option><option>11:30</option><option>15:50</option>
            </select>
          </div>
          <div class="row">
            <span class="lbl">Exit AV</span>
            <select class="sel" id="exit-av">
              <option selected>09:15</option><option>09:30</option><option>10:00</option>
            </select>
          </div>
        </div>
      </div>

      <hr class="hr">

      <!-- Exit Times -->
      <div id="exit-sec">
        <div class="sec">Exit Time (grid search)</div>
        <div class="times-grid" id="exit-times-grid">
          <label class="cb"><input type="checkbox" value="09:15" checked> 09:15</label>
          <label class="cb"><input type="checkbox" value="09:30" checked> 09:30</label>
          <label class="cb"><input type="checkbox" value="10:00" checked> 10:00</label>
          <label class="cb"><input type="checkbox" value="10:30" checked> 10:30</label>
          <label class="cb"><input type="checkbox" value="11:00" checked> 11:00</label>
          <label class="cb"><input type="checkbox" value="11:30"> 11:30</label>
          <label class="cb"><input type="checkbox" value="12:00"> 12:00</label>
          <label class="cb"><input type="checkbox" value="13:30"> 13:30</label>
          <label class="cb"><input type="checkbox" value="15:50" checked> 15:50</label>
        </div>
      </div>

    </div>

    <!-- ── KANAN ── -->
    <div class="result">
      <div class="prog"><div class="pfill" id="prog"></div></div>
      <div class="rinfo" id="rinfo"></div>
      <div id="rbody">
        <div class="empty">
          <div style="font-size:32px;opacity:.4">📊</div>
          <div>Klik <b>FETCH DATA</b> untuk memuat data emiten</div>
          <div style="font-size:10px;margin-top:4px">Filter akan update tabel secara real-time</div>
        </div>
      </div>
    </div>

  </div>
</div>

<script type="module" src="logic.js"></script>
</body>
</html>
