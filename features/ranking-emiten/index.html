<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ranking Emiten · IHSG Suite</title>
  <link rel="stylesheet" href="../../shared/ui.css">

  <style>
    .panel { border: 1px solid var(--line); border-radius: var(--radius); padding: 12px; margin-bottom: 10px; }
    .panel-title { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--ghost); margin-bottom: 8px; }
    .panel-sub { font-family: var(--f-mono); font-size: 10px; color: var(--ghost); margin-left: 8px; text-transform: none; letter-spacing: 0; }

    .preset-row { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; align-items: center; }
    .emiten-grid {
      display: flex; flex-wrap: wrap; gap: 4px; max-height: 130px; overflow-y: auto;
      padding: 8px; background: #0f0e0c; border: 1px solid var(--line); border-radius: var(--radius);
    }
    .etag {
      padding: 3px 7px; border-radius: var(--radius); cursor: pointer; user-select: none;
      font-family: var(--f-mono); font-size: 10px; border: 1px solid var(--line);
      color: var(--ghost); background: transparent; transition: all 100ms ease;
    }
    .etag:hover { border-color: var(--line-hi); color: var(--dim); }
    .etag.active { border-color: var(--phosphor-line); color: var(--phosphor); background: var(--phosphor-dim); }
    .watch-count { font-family: var(--f-mono); font-size: 10px; color: var(--phosphor); margin-left: auto; }

    .date-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .date-row label { font-family: var(--f-mono); font-size: 10px; color: var(--ghost); }

    .scan-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .scan-status { font-family: var(--f-mono); font-size: 11px; color: var(--ghost); }

    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
    .stat-box { border: 1px solid var(--line); border-radius: var(--radius); padding: 10px 12px; text-align: center; }
    .stat-label { font-family: var(--f-mono); font-size: 9px; color: var(--ghost); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .stat-val { font-family: var(--f-mono); font-size: 20px; font-weight: 500; color: var(--paper); }
    .stat-sub { font-family: var(--f-mono); font-size: 9px; color: var(--dim); }

    #ranking-table { width: 100%; border-collapse: collapse; font-family: var(--f-mono); font-size: 11px; }
    #ranking-table th, #ranking-table td { padding: 7px 10px; border-bottom: 1px solid var(--line); white-space: nowrap; }
    #ranking-table th { color: var(--ghost); font-weight: 500; text-align: left; font-size: 10px; }
    #ranking-table td.num { text-align: right; }
    .rank-cell { text-align: center; color: var(--ghost); width: 32px; }
    .sym-cell { font-weight: 500; color: var(--phosphor); }
    .cond-cell { font-size: 9px; color: var(--dim); max-width: 220px; overflow: hidden; text-overflow: ellipsis; }
    .wr-good { color: var(--live); font-weight: 500; }
    .wr-mid  { color: var(--wait); font-weight: 500; }
    .wr-bad  { color: var(--down); font-weight: 500; }
    .wr-sub-small { font-size: 8px; color: var(--ghost); font-weight: 400; }
    .gain-pos { color: var(--live); font-weight: 500; }
    .gain-neg { color: var(--down); font-weight: 500; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="page">

  <header class="app-header" id="app-header"></header>

  <div class="panel">
    <div class="panel-title">1. Pilih Watchlist</div>
    <div class="preset-row">
      <button class="btn btn-sm" data-preset="lq45">LQ45</button>
      <button class="btn btn-sm" data-preset="idx80">IDX80</button>
      <button class="btn btn-sm" data-preset="all">Semua</button>
      <button class="btn btn-sm" data-preset="none">Reset</button>
      <span class="watch-count" id="watch-count">0 dipilih</span>
    </div>
    <input type="text" class="input" id="grid-search" placeholder="Cari kode saham..." style="width:100%; margin-bottom:8px;">
    <div class="emiten-grid" id="emiten-grid"></div>
  </div>

  <div class="panel">
    <div class="panel-title">2. Rentang Tanggal</div>
    <div class="date-row">
      <label>Dari <input type="date" class="input" id="date-from"></label>
      <label>Sampai <input type="date" class="input" id="date-to"></label>
    </div>
  </div>

  <div class="panel">
    <div class="scan-row">
      <button class="btn btn-primary" id="scan-btn">Mulai Scan</button>
      <span class="scan-status" id="scan-status"></span>
    </div>
  </div>

  <div class="progress-wrap hidden" id="progress-wrap"></div>

  <div class="panel hidden" id="results-panel">
    <div class="panel-title">📊 Ranking Emiten — Win Rate Terbaik per Saham
      <span class="panel-sub">Entry 09:02 · Win ≥ +1% · Kondisi terbaik masing-masing saham</span>
    </div>
    <div class="stats-row" id="stats-row"></div>
    <div class="table-wrap" style="max-height:70vh;">
      <table id="ranking-table"></table>
    </div>
  </div>

</div>

<script type="module">
  import { TOKEN, SYMS, LQ45, IDX80, has, setEmitenInfo } from '../../shared/store.js'
  import { fetchEmitenJson } from '../../shared/api.js'
  import { renderHeader, refreshTokenStatus, openTokenPopover, whenTokenReady } from '../../shared/header.js'
  import { rankEmiten, buildRows, validateSplit } from './engine.js'
  import { DB, loadIhsg } from './db.js'
  import { estimateFetch, fetchWatchlist } from './fetch.js'
  import { showProgress, hideProgress, setProgress, logProgress } from '../../shared/fetch-progress.js'

  let _selectedSyms = new Set()
  const AUTO_FETCH_MAX = 100 // total hari belum ter-cache di bawah ini -> auto fetch tanpa konfirmasi

  // ============================================================
  // SEKSI 1: INIT
  // ============================================================
  function init() {
    renderHeader(document.getElementById('app-header'), [
      { label: 'IHSG Suite', href: '../../index.html' },
      { label: 'Ranking Emiten' }
    ])
    _loadEmitenInfo()
    _bindPresetButtons()
    document.getElementById('grid-search').addEventListener('input', _renderGrid)
    document.getElementById('scan-btn').addEventListener('click', _runScan)

    const today = new Date()
    const threeMonthsAgo = new Date(today); threeMonthsAgo.setMonth(today.getMonth() - 3)
    document.getElementById('date-to').value   = today.toISOString().slice(0, 10)
    document.getElementById('date-from').value = threeMonthsAgo.toISOString().slice(0, 10)
  }

  async function _loadEmitenInfo() {
    if (has.emitenInfo()) { _renderGrid(); return }
    try {
      setEmitenInfo(await fetchEmitenJson())
      _renderGrid()
    } catch (e) {
      console.warn('[ranking-emiten] gagal load emiten.json:', e.message)
    }
  }

  // ============================================================
  // SEKSI 2: GRID PILIH WATCHLIST (search + preset + toggle)
  // ============================================================
  function _renderGrid() {
    const query = document.getElementById('grid-search').value.trim().toUpperCase()
    const list  = query ? SYMS.filter(s => s.includes(query)) : SYMS
    const el = document.getElementById('emiten-grid')
    el.innerHTML = list.map(sym =>
      `<span class="etag ${_selectedSyms.has(sym) ? 'active' : ''}" data-sym="${sym}">${sym}</span>`
    ).join('')
    el.querySelectorAll('.etag').forEach(tag => {
      tag.addEventListener('click', () => {
        const sym = tag.dataset.sym
        if (_selectedSyms.has(sym)) _selectedSyms.delete(sym); else _selectedSyms.add(sym)
        _renderGrid()
      })
    })
    document.getElementById('watch-count').textContent = `${_selectedSyms.size} dipilih`
  }

  function _bindPresetButtons() {
    document.querySelectorAll('[data-preset]').forEach(btn => {
      btn.addEventListener('click', () => {
        const preset = btn.dataset.preset
        if (preset === 'lq45')  _selectedSyms = new Set(LQ45)
        else if (preset === 'idx80') _selectedSyms = new Set(IDX80)
        else if (preset === 'all')   _selectedSyms = new Set(SYMS)
        else if (preset === 'none')  _selectedSyms = new Set()
        _renderGrid()
      })
    })
  }

  // ============================================================
  // SEKSI 3: SCAN — estimasi, fetch (dgn konfirmasi kalau besar), ranking
  // ============================================================
  async function _runScan() {
    const statusEl = document.getElementById('scan-status')
    const progEl = document.getElementById('progress-wrap')
    const syms = [..._selectedSyms]
    const fromDate = document.getElementById('date-from').value
    const toDate   = document.getElementById('date-to').value

    if (syms.length === 0)    { statusEl.textContent = 'Pilih minimal 1 saham dulu.'; return }
    if (!fromDate || !toDate) { statusEl.textContent = 'Isi rentang tanggal dulu.'; return }
    if (fromDate > toDate)    { statusEl.textContent = 'Tanggal "Dari" harus sebelum "Sampai".'; return }
    await whenTokenReady()
    if (!TOKEN.isSet())       { openTokenPopover(); return }

    statusEl.textContent = ''
    showProgress(progEl)
    setProgress(progEl, 0, syms.length, 'Menghitung estimasi...')
    logProgress(progEl, 'Menghitung estimasi cache...', 'info')

    let estimates
    try {
      estimates = await estimateFetch(syms, fromDate, toDate, (sym, i, total) => {
        setProgress(progEl, i, total, `Cek cache ${sym}`)
      })
    } catch (err) {
      hideProgress(progEl)
      _handleFetchError(err, statusEl); return
    }
    const totalMissing = estimates.reduce((s, e) => s + e.missingDays, 0)
    logProgress(progEl, `Estimasi: ~${totalMissing} hari belum ter-cache dari ${syms.length} saham.`, 'info')

    if (totalMissing <= AUTO_FETCH_MAX) {
      await _doScan(syms, fromDate, toDate, statusEl, progEl)
      return
    }

    hideProgress(progEl)
    statusEl.innerHTML = `${syms.length} saham, ~${totalMissing} hari belum ter-cache (estimasi kasar). ` +
      `<button class="btn btn-sm btn-primary" id="scan-confirm-btn">Lanjut Fetch</button>`
    document.getElementById('scan-confirm-btn').addEventListener('click', () => _doScan(syms, fromDate, toDate, statusEl, progEl))
  }

  async function _doScan(syms, fromDate, toDate, statusEl, progEl) {
    document.getElementById('scan-btn').disabled = true
    showProgress(progEl)
    logProgress(progEl, 'Fetch IHSG...', 'info')
    try {
      await fetchWatchlist(
        syms, fromDate, toDate,
        (sym, i, total) => setProgress(progEl, i, total, `Mengambil ${sym}`),
        (sym, result) => {
          logProgress(progEl, `${sym}: ${result.daysFetched} hari diambil, ${result.daysSkipped} sudah ter-cache`, 'ok')
        }
      )
      setProgress(progEl, syms.length, syms.length, 'Menghitung ranking...')
      logProgress(progEl, 'Menghitung ranking...', 'info')

      const ihsgByDate = await loadIhsg()
      const emitenDataBySym = {}
      for (const sym of syms) emitenDataBySym[sym] = DB.emiten[sym]
      const ranking = rankEmiten(emitenDataBySym, ihsgByDate)

      logProgress(progEl, 'Memvalidasi train/test per saham...', 'info')
      // Validasi: kondisi terbaik tiap saham dicari LAGI dari 70% data awal
      // saja, lalu diuji ulang di 30% data akhir (belum pernah dilihat saat
      // mencari) -- supaya kelihatan mana yang sinyal asli vs cuma kebetulan
      // backtest (data dredging). Tidak mengubah urutan ranking yang sudah
      // ada, cuma nambah info "Validasi" di kolom baru.
      const rankingWithValidation = ranking.map(r => {
        const rows = buildRows(emitenDataBySym[r.sym], ihsgByDate)
          .sort((a, b) => a.date.localeCompare(b.date)) // validateSplit WAJIB rows terurut kronologis
        return { ...r, validation: validateSplit(rows) }
      })

      logProgress(progEl, `Selesai: ${syms.length} emiten.`, 'ok')
      hideProgress(progEl)
      statusEl.textContent = `Selesai — ${syms.length} saham, ${fromDate} s.d. ${toDate}.`
      document.getElementById('results-panel').classList.remove('hidden')
      _renderResults(rankingWithValidation, syms.length)
    } catch (err) {
      logProgress(progEl, `Gagal: ${err.code || err.message}`, 'err')
      hideProgress(progEl)
      _handleFetchError(err, statusEl)
    } finally {
      document.getElementById('scan-btn').disabled = false
    }
  }

  function _handleFetchError(err, statusEl) {
    if (err.code === 'TOKEN_NOT_SET') { openTokenPopover(); return }
    if (err.code === 'TOKEN_EXPIRED') {
      statusEl.textContent = 'Token expired — klik indikator token di header utk update.'
      TOKEN.clear(); refreshTokenStatus()
      return
    }
    const detail = err.detail ? ` — ${err.detail}` : (err.status ? ` — HTTP ${err.status}` : '')
    statusEl.textContent = `Gagal: ${err.code || err.message}${detail}`
    console.error('[ranking-emiten] scan error:', err.code, '| status:', err.status, '| detail:', err.detail, '| full:', err)
  }

  // ============================================================
  // SEKSI 4: RENDER HASIL — stat box + tabel ranking (medali top 3)
  // ============================================================
  function _renderResults(ranking, totalEmiten) {
    const statsEl = document.getElementById('stats-row')
    if (!ranking.length) {
      statsEl.innerHTML = ''
      document.getElementById('ranking-table').innerHTML =
        '<tr><td style="padding:16px; color:var(--ghost)">Tidak ada data valid (kemungkinan sample tiap kondisi/exit kurang dari minimal 3 hari).</td></tr>'
      return
    }

    const avgWR = ranking.reduce((s, r) => s + r.bestWR, 0) / ranking.length
    const count70 = ranking.filter(r => r.bestWR >= 70).length
    const holdsCount = ranking.filter(r => r.validation?.holds === true).length

    statsEl.innerHTML = `
      <div class="stat-box"><div class="stat-label">Total Emiten</div><div class="stat-val">${totalEmiten}</div></div>
      <div class="stat-box"><div class="stat-label">Avg WR Terbaik</div><div class="stat-val">${avgWR.toFixed(1)}%</div></div>
      <div class="stat-box"><div class="stat-label">WR ≥ 70%</div><div class="stat-val">${count70}</div><div class="stat-sub">saham</div></div>
      <div class="stat-box"><div class="stat-label">Bertahan di Uji</div><div class="stat-val">${holdsCount}</div><div class="stat-sub">dari ${ranking.length} saham</div></div>
    `

    const thead = `<thead><tr>
      <th class="rank-cell">#</th><th>Saham</th><th class="num">Hari Data</th><th class="num">Signals</th>
      <th class="num">Win Rate</th><th class="num">Avg Gain</th><th class="num">Best Exit</th><th>Kondisi Terbaik</th>
      <th>Validasi (70/30)</th>
    </tr></thead>`

    const tbody = '<tbody>' + ranking.map((r, i) => {
      const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i + 1}`
      const wrCls = r.bestWR >= 70 ? 'wr-good' : r.bestWR >= 55 ? 'wr-mid' : 'wr-bad'
      const gainCls = r.bestAvgGain >= 0 ? 'gain-pos' : 'gain-neg'
      const gainSign = r.bestAvgGain >= 0 ? '+' : ''
      const wilsonSub = r.validation?.train?.wilsonLower != null
        ? `<div class="wr-sub-small">min ${r.validation.train.wilsonLower.toFixed(0)}%</div>` : ''
      const val = _renderValidationCell(r.validation)
      return `<tr>
        <td class="rank-cell">${medal}</td>
        <td class="sym-cell">${r.sym}</td>
        <td class="num">${r.totalDays}</td>
        <td class="num">${r.bestSignals}</td>
        <td class="num ${wrCls}">${r.bestWR.toFixed(1)}%${wilsonSub}</td>
        <td class="num ${gainCls}">${gainSign}${r.bestAvgGain.toFixed(2)}%</td>
        <td class="num">${_fmtExitLabel(r.bestExit)}</td>
        <td class="cond-cell" title="${r.bestCond}">${r.bestCond}</td>
        <td title="${val.title}">${val.html}</td>
      </tr>`
    }).join('') + '</tbody>'

    document.getElementById('ranking-table').innerHTML = thead + tbody
  }

  function _fmtExitLabel(key) {
    if (key === '—') return key
    return `${key.slice(1, 3)}:${key.slice(3, 5)}`
  }

  /**
   * Render cell kolom "Validasi" — bandingkan performa kondisi terbaik di
   * data LATIH (70% awal) vs data UJI (30% akhir, belum pernah dilihat).
   * holds=true (bertahan) -> kandidat sinyal asli. holds=false (anjlok) ->
   * kemungkinan besar cuma kebetulan dari mengetes banyak kombinasi (data
   * dredging). holds=null -> sample uji terlalu kecil, BELUM bisa
   * disimpulkan (BUKAN berarti gagal).
   */
  function _renderValidationCell(validation) {
    if (!validation || !validation.train) {
      return { html: '<span style="color:var(--ghost)">–</span>', title: 'Data tidak cukup utk validasi' }
    }
    if (validation.train.bestCond === '—') {
      return { html: '<span style="color:var(--ghost)">– tdk ada kondisi</span>', title: 'Tidak ada kondisi dgn sample cukup di data latih' }
    }
    if (validation.holds === null) {
      return {
        html: '<span style="color:var(--ghost)">– sample kecil</span>',
        title: `Sample data uji cuma ${validation.test.signals} hari, terlalu kecil utk disimpulkan (minimal 5)`
      }
    }
    const cls  = validation.holds ? 'gain-pos' : 'gain-neg'
    const icon = validation.holds ? '✓ Bertahan' : '✗ Anjlok'
    const title = `Latih: ${validation.train.bestWR.toFixed(1)}% (n=${validation.train.bestSignals}) → ` +
      `Uji: ${validation.test.winRate.toFixed(1)}% (n=${validation.test.signals})`
    return { html: `<span class="${cls}">${icon}</span>`, title }
  }

  init()
</script>
</body>
</html>
