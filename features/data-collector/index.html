<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Collector · IHSG Suite</title>
  <link rel="stylesheet" href="../../shared/ui.css">

  <style>
    .sym-search { position: relative; display: flex; align-items: center; gap: 6px;
      background: #0f0e0c; border: 1px solid var(--line); border-radius: var(--radius);
      padding: 6px 10px; min-width: 160px; }
    .sym-search-icon { color: var(--ghost); font-size: 12px; }
    .sym-search input { background: transparent; border: none; outline: none; width: 110px;
      font-family: var(--f-mono); font-size: 12px; color: var(--paper); text-transform: uppercase; }
    .sym-search input::placeholder { color: var(--ghost); text-transform: none; }
    .sym-dropdown { position: absolute; top: calc(100% + 4px); left: 0; z-index: 30;
      background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
      width: 260px; max-height: 280px; overflow-y: auto; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .sym-option { display: flex; align-items: baseline; gap: 8px; padding: 7px 10px; cursor: pointer; }
    .sym-option:hover { background: var(--panel-hi); }
    .sym-option-code { font-family: var(--f-mono); font-size: 12px; color: var(--paper); flex-shrink: 0; }
    .sym-option-name { font-size: 11px; color: var(--ghost); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sym-dropdown-empty { padding: 10px; font-family: var(--f-mono); font-size: 11px; color: var(--ghost); }

    .collector-grid {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
      align-items: start;
      margin-top: 20px;
    }
    @media (max-width: 760px) {
      .collector-grid { grid-template-columns: 1fr; }
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      padding: 16px;
    }
    .panel + .panel { margin-top: 16px; }

    .panel-title {
      font-family: var(--f-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ghost);
      margin-bottom: 12px;
    }

    .field-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
    .field-row:last-child { margin-bottom: 0; }
    .field-label { font-family: var(--f-mono); font-size: 10px; color: var(--dim); letter-spacing: 0.04em; }
    .date-row { display: flex; gap: 8px; align-items: center; }
    .date-row .input { flex: 1; }
    .date-row span { color: var(--ghost); font-family: var(--f-mono); font-size: 11px; }

    .checkbox-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .check-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 9px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all var(--ease);
      font-family: var(--f-mono);
      font-size: 11px;
      color: var(--dim);
      user-select: none;
    }
    .check-item:hover { border-color: var(--line-hi); }
    .check-item.is-checked { border-color: var(--phosphor-line); color: var(--phosphor); background: var(--phosphor-dim); }
    .check-item input { display: none; }
    .check-item .req-badge { margin-left: auto; font-size: 8px; color: var(--ghost); letter-spacing: 0.05em; }
    .check-item.is-slow { }
    .check-item.is-slow .slow-badge {
      margin-left: auto; font-size: 8px; color: var(--wait); letter-spacing: 0.05em;
    }

    .estimate-box {
      font-family: var(--f-mono); font-size: 11px; color: var(--ghost);
      padding: 10px 12px; border: 1px dashed var(--line); border-radius: var(--radius);
      margin-top: 12px; line-height: 1.6;
    }
    .estimate-box b { color: var(--dim); }
    .estimate-box.is-warn { border-color: rgba(224,179,65,0.3); color: var(--wait); }

    .preview-table-wrap { max-height: 420px; overflow: auto; }
    .empty-hint {
      padding: 60px 20px; text-align: center;
      font-family: var(--f-mono); font-size: 12px; color: var(--ghost);
    }
  </style>
</head>
<body>

<div class="page">

  <header class="app-header" id="app-header"></header>

  <div class="collector-grid">

    <!-- KIRI: KONFIGURASI -->
    <div>
      <div class="panel">
        <div class="panel-title">Emiten</div>
        <div class="sym-search">
          <span class="sym-search-icon">⌕</span>
          <input type="text" id="sym-input" placeholder="cari saham..." maxlength="10" autocomplete="off">
          <div class="sym-dropdown hidden" id="sym-dropdown"></div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Timeframe</div>
        <div class="field-row" style="gap:6px; flex-wrap:wrap;">
          <label style="display:flex;align-items:center;gap:4px;cursor:pointer;">
            <input type="radio" name="tf" value="daily" checked> Daily
          </label>
          <label style="display:flex;align-items:center;gap:4px;cursor:pointer;">
            <input type="radio" name="tf" value="1m"> 1 Menit
          </label>
          <label style="display:flex;align-items:center;gap:4px;cursor:pointer;">
            <input type="radio" name="tf" value="30m"> 30 Menit
          </label>
          <label style="display:flex;align-items:center;gap:4px;cursor:pointer;">
            <input type="radio" name="tf" value="1h"> 1 Jam
          </label>
        </div>
        <div id="tf-note" style="font-size:11px;color:var(--ghost);margin-top:6px;">
          Daily: histori penuh sejak listing, semua indikator tersedia.
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Rentang Tanggal</div>
        <div class="field-row">
          <span class="field-label">Dari</span>
          <input type="date" class="input" id="date-from">
        </div>
        <div class="field-row">
          <span class="field-label">Sampai</span>
          <input type="date" class="input" id="date-to">
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Indikator & Data</div>
        <div class="checkbox-grid" id="indicator-grid"></div>
        <div class="estimate-box" id="estimate-box">Pilih tanggal &amp; indikator untuk lihat estimasi.</div>
      </div>

      <div class="panel">
        <button class="btn btn-primary" id="collect-btn" style="width:100%;">Kumpulkan &amp; Export</button>
        <div class="progress-wrap hidden" id="progress-wrap" style="margin-top:12px; margin-bottom:0;"></div>
      </div>
    </div>

    <!-- KANAN: PREVIEW -->
    <div class="panel">
      <div class="panel-title">Preview Data</div>
      <div id="preview-area">
        <div class="empty-hint">Belum ada data. Pilih emiten, rentang tanggal, dan indikator di sebelah kiri, lalu klik "Kumpulkan &amp; Export".</div>
      </div>
    </div>

  </div>

</div>

<script type="module">
  import { TOKEN, setEmitenInfo, has } from '../../shared/store.js'
  import { fetchDaily, fetchBroker, fetchAbsorption, fetchEmitenJson, fetchIntraday } from '../../shared/api.js'
  import { renderHeader, openTokenPopover, whenTokenReady } from '../../shared/header.js'
  import { bindSymSearch } from '../../shared/symsearch.js'
  import { calcRSI, calcMACD, calcSMA, calcBollinger, calcVWMA, calcVolumeProfilePOC, calcRSIDivergence } from '../../shared/indicators.js'
  import { classifyTrend, momentum, relativeStrength, SECTOR_MAP } from '../../shared/regime.js'
  import { showProgress, hideProgress, setProgress, logProgress } from '../../shared/fetch-progress.js'

  // ============================================================
  // HEADER
  // ============================================================
  renderHeader(document.getElementById('app-header'), [
    { label: 'IHSG Suite', href: '../../index.html' },
    { label: 'Data Collector' }
  ])

  // ============================================================
  // DEFINISI INDIKATOR — tiap entry tahu cara hitung & apakah perlu
  // request per-hari (lambat) atau cukup 1 request (cepat).
  // ============================================================
  const INDICATOR_DEFS = [
    { id: 'rsi',       label: 'RSI (14)',        group: 'fast', default: true },
    { id: 'macd',      label: 'MACD (12,26,9)',  group: 'fast', default: true },
    { id: 'volume',    label: 'Volume',          group: 'fast', default: true },
    { id: 'maVolume',  label: 'MA Volume (20)',  group: 'fast', default: true },
    { id: 'ma10',      label: 'MA 10',           group: 'fast', default: false },
    { id: 'ma20',      label: 'MA 20',           group: 'fast', default: false },
    { id: 'ma50',      label: 'MA 50',           group: 'fast', default: false },
    { id: 'ma100',     label: 'MA 100',          group: 'fast', default: false },
    { id: 'broker',    label: 'Broker (net buy/sell)', group: 'slow', default: false },
    { id: 'lpm',       label: 'LPM (absorption)',      group: 'slow', default: false },
    { id: 'tradebook', label: 'Trade Book per menit (IEP/ORB analysis)', group: 'slow', default: false },
    { id: 'bbWidth',   label: 'Bollinger Width',  group: 'fast', default: false },
    { id: 'vwma20',    label: 'VWMA (20)',        group: 'fast', default: false },
    { id: 'poc',       label: 'Volume Profile POC', group: 'fast', default: false },
    { id: 'rsiDiv',    label: 'RSI Divergence',   group: 'fast', default: false },
    { id: 'foreignRatio', label: 'Foreign Net Ratio (% dari value harian)', group: 'fast', default: false },
    { id: 'bandarmology', label: 'Bandarmology (top-3 broker net 5 hari)',  group: 'slow', default: false },
    { id: 'regime', label: 'Market Regime (tren IHSG + sektor emiten + kekuatan relatif)', group: 'fast', default: false },
  ]

  const _selected = new Set(INDICATOR_DEFS.filter(d => d.default).map(d => d.id))
  let _currentSym = null

  // ============================================================
  // SEKSI 1: SYM SEARCH
  // ============================================================
  bindSymSearch(
    document.getElementById('sym-input'),
    document.getElementById('sym-dropdown'),
    (code) => { _currentSym = code; _updateEstimate() }
  )

  async function _loadEmitenInfo() {
    if (has.emitenInfo()) return
    try {
      const raw = await fetchEmitenJson()
      setEmitenInfo(raw)
    } catch (e) {
      console.warn('[data-collector] gagal load emiten.json:', e.message)
    }
  }
  _loadEmitenInfo()

  // ============================================================
  // SEKSI 2: TANGGAL DEFAULT (1 tahun terakhir)
  // ============================================================
  const dateFromEl = document.getElementById('date-from')
  const dateToEl   = document.getElementById('date-to')

  const today = new Date()
  const oneYearAgo = new Date(today)
  oneYearAgo.setFullYear(today.getFullYear() - 1)

  dateToEl.value   = today.toISOString().slice(0, 10)
  dateFromEl.value = oneYearAgo.toISOString().slice(0, 10)

  dateFromEl.addEventListener('change', _updateEstimate)
  dateToEl.addEventListener('change', _updateEstimate)

  // Timeframe state
  let _activeTf = 'daily'
  const TF_NOTES = {
    'daily': 'Daily: histori penuh sejak listing, semua indikator tersedia.',
    '1m':    '1 Menit: OHLCV only (tanpa indikator). Gunakan daily untuk indikator — pakai data kemarin sebagai filter entry hari ini. Max ~7 hari per request, multi-batch otomatis.',
    '30m':   '30 Menit: max ~30 hari per request, multi-batch otomatis. Indikator yang tersedia: RSI, MACD, Volume, MA Volume.',
    '1h':    '1 Jam: max ~30 hari per request, multi-batch otomatis. Indikator yang tersedia: RSI, MACD, Volume, MA Volume.',
  }
  const TF_SLOW_IDS = new Set(['broker', 'lpm', 'tradebook', 'bbWidth', 'vwma20', 'poc', 'rsiDiv'])

  document.querySelectorAll('input[name="tf"]').forEach(radio => {
    radio.addEventListener('change', () => {
      _activeTf = radio.value
      document.getElementById('tf-note').textContent = TF_NOTES[_activeTf] || ''
      // 1m: disable semua indikator (OHLCV only — gunakan daily untuk indikator)
      // 30m/1h: disable hanya slow indicators
      // daily: semua aktif
      document.querySelectorAll('#indicator-grid .check-item').forEach(el => {
        const id = el.dataset.id
        const shouldDisable = _activeTf === '1m' || (_activeTf !== 'daily' && TF_SLOW_IDS.has(id))
        if (shouldDisable) {
          el.classList.add('is-disabled')
          el.style.opacity = '0.35'
          el.style.pointerEvents = 'none'
          _selected.delete(id)
          el.classList.remove('is-checked')
          el.querySelector('input').checked = false
        } else {
          el.classList.remove('is-disabled')
          el.style.opacity = ''
          el.style.pointerEvents = ''
        }
      })
      _updateEstimate()
    })
  })

  // ============================================================
  // SEKSI 3: CHECKBOX INDIKATOR
  // ============================================================
  const gridEl = document.getElementById('indicator-grid')
  gridEl.innerHTML = INDICATOR_DEFS.map(d => `
    <label class="check-item ${_selected.has(d.id) ? 'is-checked' : ''} ${d.group === 'slow' ? 'is-slow' : ''}" data-id="${d.id}">
      <input type="checkbox" ${_selected.has(d.id) ? 'checked' : ''}>
      <span>${d.label}</span>
      ${d.group === 'slow' ? '<span class="slow-badge">PER HARI</span>' : ''}
    </label>
  `).join('')

  gridEl.querySelectorAll('.check-item').forEach(el => {
    el.addEventListener('click', (e) => {
      e.preventDefault()
      const id = el.dataset.id
      if (_selected.has(id)) { _selected.delete(id); el.classList.remove('is-checked'); el.querySelector('input').checked = false }
      else { _selected.add(id); el.classList.add('is-checked'); el.querySelector('input').checked = true }
      _updateEstimate()
    })
  })

  // ============================================================
  // SEKSI 4: ESTIMASI REQUEST
  // ============================================================
  function _tradingDaysBetween(from, to) {
    // Estimasi kasar: ~5/7 hari adalah hari bursa (exclude weekend, TIDAK exclude libur nasional)
    const fromD = new Date(from)
    const toD   = new Date(to)
    const totalDays = Math.max(0, Math.round((toD - fromD) / 86400000))
    return Math.round(totalDays * 5 / 7)
  }

  function _updateEstimate() {
    const box = document.getElementById('estimate-box')
    if (!_currentSym) {
      box.className = 'estimate-box'
      box.textContent = 'Pilih emiten terlebih dulu.'
      return
    }

    if (_activeTf !== 'daily') {
      // Intraday: hitung berapa batch yang dibutuhkan
      const fromD = new Date(dateFromEl.value)
      const toD   = new Date(dateToEl.value)
      const totalDays = Math.max(1, Math.round((toD - fromD) / 86400000))
      const batchDays = _activeTf === '1m' ? 7 : 30  // 1m=7 hari, 30m/1h=30 hari
      const batches = Math.ceil(totalDays / batchDays)
      let html = `<b>${_currentSym}</b> · ${_activeTf} · ~${totalDays} hari kalender dalam rentang.<br>`
      html += `OHLC Intraday: <b>~${batches} request</b> (batch ${batchDays} hari, max ~${batches * batchDays * (24 / (_activeTf === '30m' ? 0.5 : 1) * 7)} candle).<br>`
      html += `Indikator dihitung lokal dari data yang ter-fetch.`
      box.innerHTML = html
      box.classList.toggle('is-warn', batches > 10)
      return
    }

    const days = _tradingDaysBetween(dateFromEl.value, dateToEl.value)
    const needsBroker    = _selected.has('broker')
    const needsLpm       = _selected.has('lpm')
    const needsTradebook = _selected.has('tradebook')
    const slowCount = (needsBroker ? days : 0) + (needsLpm ? days : 0) + (needsTradebook ? days : 0)

    let html = `<b>${_currentSym}</b> · ~${days} hari bursa dalam rentang EXPORT.<br>`
    html += `OHLC: <b>1 request</b> (histori PENUH sejak listing, untuk warmup RSI/MACD/MA akurat — file hasil tetap dipotong ke rentang tanggal di atas).`
    if (needsTradebook) {
      html += `<br>Trade Book: <b>~${days} request</b> (1 per hari) — menyimpan data per menit termasuk periode IEP (08:45-08:59) untuk analisa ORB & Surge Volume IEP.`
    }
    if (needsBroker || needsLpm) {
      html += `<br>Broker/LPM: <b>~${(needsBroker?days:0)+(needsLpm?days:0)} request</b> (1 per hari per indikator).`
    }
    box.innerHTML = html
    box.classList.toggle('is-warn', slowCount > 300)
  }

  // ============================================================
  // SEKSI 5: KUMPULKAN DATA
  // ============================================================
  const progressEl = document.getElementById('progress-wrap')
  const collectBtn = document.getElementById('collect-btn')

  collectBtn.addEventListener('click', _collect)

  function _dateRangeArray(from, to) {
    const out = []
    const d = new Date(from)
    const end = new Date(to)
    while (d <= end) {
      const dow = d.getDay()
      if (dow !== 0 && dow !== 6) out.push(d.toISOString().slice(0, 10)) // skip weekend
      d.setDate(d.getDate() + 1)
    }
    return out
  }

  async function _collect() {
    if (!_currentSym) { alert('Pilih emiten dulu.'); return }
    await whenTokenReady()
    if (!TOKEN.isSet()) { openTokenPopover(); return }

    const from = dateFromEl.value
    const to   = dateToEl.value
    if (!from || !to || from > to) { alert('Rentang tanggal tidak valid.'); return }

    collectBtn.disabled = true
    showProgress(progressEl)

    // ── INTRADAY: cabang terpisah, tidak perlu warmup daily ──
    if (_activeTf !== 'daily') {
      try {
        const mult = _activeTf === '1m' ? 1 : _activeTf === '30m' ? 30 : 60
        const batchMs = (_activeTf === '1m' ? 7 : 30) * 24 * 3600 * 1000   // 1m=7hr, 30m/1h=30hr
        const fromTs = Math.floor(new Date(from).getTime() / 1000)
        const toTs   = Math.floor(new Date(to + 'T23:59:59').getTime() / 1000)

        // Hitung berapa batch
        const totalMs = (toTs - fromTs) * 1000
        const numBatches = Math.ceil(totalMs / batchMs)
        logProgress(progressEl, `${_currentSym}: fetch intraday ${_activeTf} (${numBatches} batch)...`, 'info')

        const allCandles = []
        const seen = new Set()
        for (let b = 0; b < numBatches; b++) {
          const batchTo   = toTs - b * batchMs / 1000
          const batchFrom = Math.max(fromTs, toTs - (b + 1) * batchMs / 1000)
          setProgress(progressEl, b, numBatches, `Batch ${b+1}/${numBatches}`)
          try {
            const candles = await fetchIntraday(_currentSym, batchTo, batchFrom, mult)
            for (const c of candles) {
              if (!seen.has(c.unix)) { seen.add(c.unix); allCandles.push(c) }
            }
          } catch (e) {
            if (e.code === 'EMPTY_RESPONSE') break
            throw e
          }
        }

        // Sort ascending
        allCandles.sort((a, b) => a.unix - b.unix)
        logProgress(progressEl, `${allCandles.length} candle intraday diterima.`, 'ok')

        // Hitung indikator dari intraday (hanya 30m/1h — 1m OHLCV only)
        const closes  = allCandles.map(c => c.close)
        const volumes = allCandles.map(c => c.volume)

        if (_activeTf !== '1m') {
          if (_selected.has('rsi')) {
            const rsi = calcRSI(closes, 14)
            allCandles.forEach((c, i) => c.rsi = rsi[i])
          }
          if (_selected.has('macd')) {
            const macd = calcMACD(closes)
            allCandles.forEach((c, i) => { c.macdHist = macd.hist[i]; c.macdSignal = macd.signal[i] })
          }
          if (_selected.has('maVolume')) {
            const maVol = calcSMA(volumes, 20)
            allCandles.forEach((c, i) => c.maVolume20 = maVol[i])
          }
          if (_selected.has('ma20')) {
            const ma = calcSMA(closes, 20)
            allCandles.forEach((c, i) => c.ma20 = ma[i])
          }
          if (_selected.has('ma50')) {
            const ma = calcSMA(closes, 50)
            allCandles.forEach((c, i) => c.ma50 = ma[i])
          }
        }

        const exportPayload = {
          symbol: _currentSym,
          timeframe: _activeTf,
          from, to,
          indicators: _activeTf === '1m' ? ['ohlcv'] : ['ohlcv', ...(
            [_selected.has('rsi') && 'rsi', _selected.has('macd') && 'macd',
             _selected.has('maVolume') && 'maVolume20', _selected.has('ma20') && 'ma20',
             _selected.has('ma50') && 'ma50'].filter(Boolean)
          )],
          exportedAt: new Date().toISOString(),
          candles: allCandles
        }

        _renderPreviewIntraday(allCandles, exportPayload)
        _downloadJson(exportPayload)
        logProgress(progressEl, 'Export intraday selesai.', 'ok')
      } catch (e) {
        logProgress(progressEl, `Gagal: ${e.code || e.message}`, 'err')
        if (e.code === 'TOKEN_EXPIRED') openTokenPopover()
      } finally {
        collectBtn.disabled = false
        setTimeout(() => hideProgress(progressEl), 1500)
      }
      return  // stop, jangan lanjut ke logic daily
    }

    try {
      // ── 1. OHLC: fetch SEMUA histori yang tersedia (warmup penuh), bukan
      // cuma rentang from-to. RSI/MACD/MA dihitung secara rekursif/EMA --
      // kalau dipotong duluan ke rentang export, nilainya BIAS karena basis
      // smoothing terlalu pendek (lihat insiden Kunci RAJA: RSI 33.7 vs 58.3
      // di tanggal sama, beda krn basis histori beda). Maka: hitung indikator
      // dari dailyAll (histori penuh sejak 2000), filter ke from-to PALING
      // AKHIR cuma untuk apa yang di-export ke file.
      setProgress(progressEl, 0, 1, 'Mengambil OHLC (histori penuh utk warmup)')
      logProgress(progressEl, `${_currentSym}: fetch OHLC histori penuh (warmup indikator)...`, 'info')
      const dailyAll = await fetchDaily(_currentSym) // tanpa from/to = semua histori sejak 2000
      // PENTING: jangan pakai localeCompare untuk sort tanggal -- perilakunya
      // bisa beda antar locale browser (collation locale-sensitive), terbukti
      // menyebabkan urutan sort SALAH TOTAL di sebagian browser meski terlihat
      // benar saat ditest di Node.js. Perbandingan string langsung (a<b) selalu
      // leksikal murni, deterministik di semua environment, aman utk format
      // tanggal ISO (YYYY-MM-DD) yang memang urut leksikal = urut kronologis.
      const dailyAllSorted = [...dailyAll].sort((a, b) => a.date < b.date ? -1 : a.date > b.date ? 1 : 0)
      logProgress(progressEl, `${_currentSym}: ${dailyAllSorted.length} bar histori penuh diterima (${dailyAllSorted[0]?.date} – ${dailyAllSorted[dailyAllSorted.length-1]?.date})`, 'ok')

      // ── 2. Indikator turunan — dihitung dari SELURUH histori (dailyAllSorted) ──
      const closesAll  = dailyAllSorted.map(d => d.close)
      const volumesAll = dailyAllSorted.map(d => d.volume)

      if (_selected.has('rsi')) {
        const rsi = calcRSI(closesAll, 14)
        dailyAllSorted.forEach((d, i) => d.rsi = rsi[i])
      }
      if (_selected.has('macd')) {
        const macd = calcMACD(closesAll)
        dailyAllSorted.forEach((d, i) => { d.macd = macd.macd[i]; d.macdSignal = macd.signal[i]; d.macdHist = macd.hist[i] })
      }
      if (_selected.has('maVolume')) {
        const maVol = calcSMA(volumesAll, 20)
        dailyAllSorted.forEach((d, i) => d.maVolume20 = maVol[i])
      }
      if (_selected.has('ma10'))  { const ma = calcSMA(closesAll, 10);  dailyAllSorted.forEach((d, i) => d.ma10  = ma[i]) }
      if (_selected.has('ma20'))  { const ma = calcSMA(closesAll, 20);  dailyAllSorted.forEach((d, i) => d.ma20  = ma[i]) }
      if (_selected.has('ma50'))  { const ma = calcSMA(closesAll, 50);  dailyAllSorted.forEach((d, i) => d.ma50  = ma[i]) }
      if (_selected.has('ma100')) { const ma = calcSMA(closesAll, 100); dailyAllSorted.forEach((d, i) => d.ma100 = ma[i]) }

      if (_selected.has('bbWidth')) {
        const bb = calcBollinger(closesAll, 20, 2)
        dailyAllSorted.forEach((d, i) => {
          d.bbWidth = (bb.upper[i] != null && bb.middle[i]) ? (bb.upper[i] - bb.lower[i]) / bb.middle[i] * 100 : null
        })
      }
      if (_selected.has('vwma20')) {
        const vwma = calcVWMA(closesAll, volumesAll, 20)
        dailyAllSorted.forEach((d, i) => d.vwma20 = vwma[i])
      }
      if (_selected.has('poc')) {
        const poc = calcVolumeProfilePOC(dailyAllSorted, 60, 20)
        dailyAllSorted.forEach((d, i) => d.poc60 = poc[i])
      }
      if (_selected.has('rsiDiv')) {
        const rsiForDiv = _selected.has('rsi') ? dailyAllSorted.map(d => d.rsi) : calcRSI(closesAll, 14)
        const divFlags = calcRSIDivergence(closesAll, rsiForDiv, 3)
        dailyAllSorted.forEach((d, i) => d.rsiBullishDiv = divFlags[i])
      }
      if (_selected.has('foreignRatio')) {
        // foreignbuy/foreignsell dari chartbit daily = value Rp.
        // Daily TIDAK punya field value → proxy: value ≈ close × volume.
        // foreignNetRatio = net foreign / total value harian, dalam % (-100..+100)
        dailyAllSorted.forEach(d => {
          const fb = d.foreignbuy || 0, fs = d.foreignsell || 0
          const valueProxy = (d.close || 0) * (d.volume || 0)
          d.foreignNet      = fb - fs
          d.foreignNetRatio = valueProxy > 0 ? +(((fb - fs) / valueProxy) * 100).toFixed(4) : null
        })
      }

      if (_selected.has('regime')) {
        // Fetch IHSG + sektor emiten (endpoint chartbit menerima simbol indeks IDX).
        // Sektor otomatis dari SECTOR_MAP; kalau emiten tak terpetakan → IHSG saja.
        const sectorSym = SECTOR_MAP[_currentSym] || null
        logProgress(progressEl, `Regime: fetch IHSG${sectorSym ? ' + ' + sectorSym : ''}…`, 'info')
        try {
          const histFrom = dailyAllSorted[0]?.date || from   // awal histori emiten
          const ihsgRaw = await fetchDaily('IHSG', histFrom, to)
          const ihsgMap = {}
          for (const b of ihsgRaw) ihsgMap[b.date] = b.close
          let secMap = null
          if (sectorSym) {
            const secRaw = await fetchDaily(sectorSym, histFrom, to)
            secMap = {}
            for (const b of secRaw) secMap[b.date] = b.close
          }
          // Bangun array closes IHSG & sektor SEJAJAR dengan dailyAllSorted (by date)
          const ihsgCloses = dailyAllSorted.map(d => ihsgMap[d.date] ?? null)
          const secCloses  = secMap ? dailyAllSorted.map(d => secMap[d.date] ?? null) : null
          dailyAllSorted.forEach((d, i) => {
            // butuh histori valid sampai i (skip null)
            const ihsgUpto = ihsgCloses.slice(0, i+1).filter(x => x != null)
            if (ihsgUpto.length < 50) { d.regime = null; return }
            const ihsgTrend = classifyTrend(ihsgUpto)
            const ihsgMom = momentum(ihsgUpto, 20)
            let sectorTrend = null, rs = null
            if (secCloses) {
              const secUpto = secCloses.slice(0, i+1).filter(x => x != null)
              if (secUpto.length >= 50) {
                sectorTrend = classifyTrend(secUpto)
                // RS butuh dua array sejajar — pakai panjang minimum
                const m = Math.min(ihsgUpto.length, secUpto.length)
                rs = relativeStrength(secUpto.slice(-m), ihsgUpto.slice(-m), 20)
              }
            }
            d.regime = {
              ihsg: ihsgTrend, ihsgMom20: ihsgMom != null ? +ihsgMom.toFixed(2) : null,
              sector: sectorSym, sectorTrend,
              rs: rs?.rs || null, rsPct: rs?.ratio ?? null,
            }
          })
        } catch (eReg) {
          logProgress(progressEl, `Regime gagal: ${eReg.message}`, 'warn')
        }
      }

      // ── 3. FILTER ke rentang export yang dipilih user — PALING AKHIR,
      // setelah semua indikator selesai dihitung dgn basis histori penuh ──
      const daily = dailyAllSorted.filter(d => d.date >= from && d.date <= to)
      logProgress(progressEl, `Dipotong ke rentang export: ${daily.length} bar (${from} – ${to})`, 'ok')

      // ── 3. Broker, LPM, Trade Book (lambat, per hari) ──
      const dateList = _dateRangeArray(from, to)
      const brokerByDate    = {}
      const lpmByDate       = {}
      const tradebookByDate = {}

      const needsBandarmology = _selected.has('bandarmology')
      const needsBroker    = _selected.has('broker') || needsBandarmology
      const needsLpm       = _selected.has('lpm')
      const needsTradebook = _selected.has('tradebook')

      // Bandarmology butuh rolling 5 hari trading — fetch broker mulai
      // 9 hari kalender sebelum 'from' agar window penuh sejak bar pertama
      const brokerDateList = needsBandarmology
        ? _dateRangeArray(new Date(new Date(from + 'T07:00:00Z').getTime() - 9*86400*1000).toISOString().slice(0,10), to)
        : dateList

      if (needsBroker || needsLpm || needsTradebook) {
        const tasks = []
        if (needsBroker)    tasks.push(...brokerDateList.map(date => ({ type: 'broker', date })))
        if (needsLpm)       tasks.push(...dateList.map(date => ({ type: 'lpm',       date })))
        if (needsTradebook) tasks.push(...dateList.map(date => ({ type: 'tradebook', date })))

        for (let i = 0; i < tasks.length; i++) {
          const t = tasks[i]
          setProgress(progressEl, i + 1, tasks.length, `${t.type.toUpperCase()} ${t.date}`)
          try {
            if (t.type === 'broker') {
              const res = await fetchBroker(_currentSym, t.date, t.date)
              brokerByDate[t.date] = res
            } else if (t.type === 'lpm') {
              const res = await fetchAbsorption(_currentSym, t.date)
              const totalBuy  = res.buy.reduce((s, x) => s + x.value, 0)
              const totalSell = res.sell.reduce((s, x) => s + x.value, 0)
              // bigMoneyNet = NET PER MENIT (BUKAN kumulatif) → agregat harian = SUM.
              // Diverifikasi Console 15 Jul 2026 (RAJA 14 Jul): nilai per menit
              // bolak-balik ±, elemen terakhir 0, SUM -13.78M vs net total -33M ✓
              const totalBig  = (res.bigMoneyNet || []).reduce((s, x) => s + x.value, 0)
              lpmByDate[t.date] = { buy: totalBuy, sell: totalSell, net: totalBuy - totalSell, bigMoneyNet: totalBig }
            } else {
              // TRADEBOOK: ambil semua data per menit, simpan raw + ekstrak IEP metrics
              const res = await fetchAbsorption(_currentSym, t.date)

              // Klasifikasikan candle per menit ke periode:
              // IEP pre-opening: 08:45-08:59
              // Regular: 09:00-16:00
              // Simpan semua menit raw, plus ringkasan IEP untuk analisa ORB
              const minuteData = []
              const allMinutes = [...res.buy, ...res.sell].map(x => x.time).filter(Boolean)
              const uniqueTimes = [...new Set(allMinutes)].sort()

              // Bangun map buy/sell per menit
              const buyMap = {}; res.buy.forEach(x => { buyMap[x.time] = x.value })
              const sellMap = {}; res.sell.forEach(x => { sellMap[x.time] = x.value })

              for (const t_min of uniqueTimes) {
                minuteData.push({
                  time:    t_min,
                  buy:     buyMap[t_min]  || 0,
                  sell:    sellMap[t_min] || 0,
                  net:     (buyMap[t_min] || 0) - (sellMap[t_min] || 0),
                })
              }

              // Ekstrak periode IEP (08:45-08:59)
              const iepMinutes = minuteData.filter(m => m.time >= '08:45' && m.time <= '08:59')
              const iepVolBuy  = iepMinutes.reduce((s, m) => s + m.buy, 0)
              const iepVolSell = iepMinutes.reduce((s, m) => s + m.sell, 0)
              const iepVolNet  = iepVolBuy - iepVolSell

              // Opening candle setelah IEP: 09:00-09:04 (1m pertama setelah opening)
              const openMinutes = minuteData.filter(m => m.time >= '09:00' && m.time <= '09:04')
              const openVolBuy  = openMinutes.reduce((s, m) => s + m.buy, 0)
              const openVolSell = openMinutes.reduce((s, m) => s + m.sell, 0)

              tradebookByDate[t.date] = {
                minutes: minuteData,       // semua data per menit (untuk analisa detail)
                iep: {
                  volBuy:  iepVolBuy,      // total value beli di IEP (08:45-08:59)
                  volSell: iepVolSell,     // total value jual di IEP
                  volNet:  iepVolNet,      // net IEP (positif = lebih banyak beli)
                  minutes: iepMinutes,     // data per menit IEP
                },
                open: {
                  volBuy:  openVolBuy,     // total value beli di menit pertama (09:00-09:04)
                  volSell: openVolSell,
                },
              }
            }
          } catch (e) {
            logProgress(progressEl, `${t.date} ${t.type}: ${e.code || e.message}`, e.code === 'EMPTY_RESPONSE' ? 'warn' : 'err')
          }
        }
        logProgress(progressEl, `Selesai mengambil data per-hari (${tasks.length} request)`, 'ok')
      }

      // Gabungkan ke daily by date
      if (_selected.has('broker')) daily.forEach(d => d.broker = brokerByDate[d.date] || null)
      if (needsLpm)       daily.forEach(d => d.lpm       = lpmByDate[d.date]       || null)
      if (needsTradebook) daily.forEach(d => d.tradebook = tradebookByDate[d.date] || null)

      // ── Bandarmology: akumulasi net broker rolling 5 hari trading ──
      if (needsBandarmology) {
        // Urutan tanggal trading yang punya data broker (ascending)
        const brokerDates = Object.keys(brokerByDate).sort()
        daily.forEach(d => {
          // Window = 5 tanggal broker terakhir sampai dengan d.date
          const upto = brokerDates.filter(bd => bd <= d.date)
          const win  = upto.slice(-5)
          if (!win.length) { d.bandarmology = null; return }

          // Akumulasi net per broker: buys val positif, sells val negatif
          const netByBroker = {}
          let totalAbs = 0
          for (const bd of win) {
            const res = brokerByDate[bd]
            if (!res) continue
            for (const b of (res.buys || []))  { netByBroker[b.code] = (netByBroker[b.code] || 0) + (b.val || 0); totalAbs += Math.abs(b.val || 0) }
            for (const s of (res.sells || [])) { netByBroker[s.code] = (netByBroker[s.code] || 0) + (s.val || 0); totalAbs += Math.abs(s.val || 0) }
          }

          const entries = Object.entries(netByBroker)
          if (!entries.length) { d.bandarmology = null; return }

          // Top-3 net buyer (hanya net>0) & top-3 net seller (hanya net<0)
          const sorted = entries.sort((a, b) => b[1] - a[1])
          const top3Buy  = sorted.filter(([, net]) => net > 0).slice(0, 3)
            .map(([code, net]) => ({ code, net: Math.round(net) }))
          const top3Sell = sorted.filter(([, net]) => net < 0).sort((a, b) => a[1] - b[1]).slice(0, 3)
            .map(([code, net]) => ({ code, net: Math.round(net) }))

          // Konsentrasi: |net top-3 buyer| / total turnover broker window (0..1)
          const top3Net = top3Buy.reduce((s, b) => s + b.net, 0)
          const concentration = totalAbs > 0 ? +(Math.abs(top3Net) / totalAbs).toFixed(4) : null

          const sellNet = top3Sell.reduce((s, b) => s + b.net, 0)
          const imbalance = (top3Net + Math.abs(sellNet)) > 0
            ? +((top3Net + sellNet) / (top3Net + Math.abs(sellNet))).toFixed(4)
            : null
          d.bandarmology = {
            days: win.length,           // <5 di awal kalau data belum penuh
            top3Buy, top3Sell,
            top3NetCum5d: Math.round(top3Net),
            imbalance,                  // -1..1 — buyer vs seller dominan (indikator utama BSJP v3)
            concentration               // 0..1 — makin tinggi makin terkonsentrasi
          }
        })
      }

      // ── 4. Export ──
      const exportPayload = {
        symbol: _currentSym,
        from, to,
        indicators: [...selectedLabelsForExport()],
        exportedAt: new Date().toISOString(),
        daily
      }

      _renderPreview(daily, exportPayload)
      _downloadJson(exportPayload)

      logProgress(progressEl, 'Export selesai — file ter-download.', 'ok')
    } catch (e) {
      logProgress(progressEl, `Gagal: ${e.code || e.message}`, 'err')
      if (e.code === 'TOKEN_EXPIRED') openTokenPopover()
    } finally {
      collectBtn.disabled = false
      setTimeout(() => hideProgress(progressEl), 1500)
    }
  }

  function selectedLabelsForExport() {
    return INDICATOR_DEFS.filter(d => _selected.has(d.id)).map(d => d.id)
  }

  function _downloadJson(payload) {
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' })
    const url = URL.createObjectURL(blob)
    const a = document.createElement('a')
    a.href = url
    a.download = `ihsg-${payload.symbol}-${payload.from}_${payload.to}.json`
    a.click()
    URL.revokeObjectURL(url)
  }

  // ============================================================
  // SEKSI 6: PREVIEW TABLE
  // ============================================================
  function _renderPreviewIntraday(candles, payload) {
    const area = document.getElementById('preview-area')
    if (!candles.length) {
      area.innerHTML = `<div class="empty-hint">Tidak ada data intraday pada rentang ini.</div>`
      return
    }
    const cols = ['datetime', 'close', 'volume']
    if (payload.indicators.includes('rsi'))       cols.push('rsi')
    if (payload.indicators.includes('macdHist'))  cols.push('macdHist')
    if (payload.indicators.includes('maVolume20')) cols.push('maVolume20')
    if (payload.indicators.includes('ma20'))      cols.push('ma20')

    const fmt = (v) => {
      if (v === null || v === undefined) return '–'
      if (typeof v === 'number') return v.toLocaleString('id-ID', { maximumFractionDigits: 2 })
      return v
    }
    const rows = candles.slice(-100)
    area.innerHTML = `
      <div style="font-family:var(--f-mono); font-size:11px; color:var(--ghost); margin-bottom:10px;">
        ${payload.symbol} · ${payload.timeframe} · ${payload.from} – ${payload.to} · ${candles.length} candle (preview 100 terakhir)
      </div>
      <div class="preview-table-wrap">
        <table class="data-table">
          <thead><tr>${cols.map(c => `<th>${c}</th>`).join('')}</tr></thead>
          <tbody>${rows.map(r => `<tr>${cols.map(c => `<td>${fmt(r[c])}</td>`).join('')}</tr>`).join('')}</tbody>
        </table>
      </div>
    `
  }

  function _renderPreview(daily, payload) {
    const area = document.getElementById('preview-area')
    if (!daily.length) {
      area.innerHTML = `<div class="empty-hint">Tidak ada data pada rentang ini.</div>`
      return
    }

    const cols = ['date', 'close', 'volume']
    if (_selected.has('rsi'))      cols.push('rsi')
    if (_selected.has('macd'))     cols.push('macdHist')
    if (_selected.has('maVolume')) cols.push('maVolume20')
    if (_selected.has('ma10'))     cols.push('ma10')
    if (_selected.has('ma20'))     cols.push('ma20')
    if (_selected.has('ma50'))     cols.push('ma50')
    if (_selected.has('ma100'))    cols.push('ma100')
    if (_selected.has('bbWidth'))  cols.push('bbWidth')
    if (_selected.has('vwma20'))   cols.push('vwma20')
    if (_selected.has('poc'))      cols.push('poc60')
    if (_selected.has('rsiDiv'))   cols.push('rsiBullishDiv')
    if (_selected.has('broker'))   cols.push('broker')
    if (_selected.has('lpm'))      cols.push('lpm')
    if (_selected.has('foreignRatio')) cols.push('foreignNetRatio')
    if (_selected.has('regime')) cols.push('regime')
    if (_selected.has('bandarmology')) cols.push('bandarmology')

    const fmt = (v) => {
      if (v === null || v === undefined) return '–'
      if (typeof v === 'boolean') return v ? '✓' : '–'
      if (typeof v === 'number') return v.toLocaleString('id-ID', { maximumFractionDigits: 2 })
      if (typeof v === 'object') {
        if (v.ihsg !== undefined) return `IHSG ${v.ihsg?.slice(0,4)||'?'}${v.sectorTrend ? ' / '+v.sectorTrend.slice(0,4) : ''}${v.rs ? ' ('+v.rs.slice(0,3)+')' : ''}`
        if (v.concentration !== undefined) return `${v.top3Buy?.[0]?.code||'?'} ${(v.concentration*100).toFixed(1)}%`
        return v.net !== undefined ? v.net.toLocaleString('id-ID') : JSON.stringify(v).slice(0, 30)
      }
      return v
    }

    const rows = daily.slice(-100) // preview 100 bar terakhir saja, file lengkap tetap di-download

    area.innerHTML = `
      <div style="font-family:var(--f-mono); font-size:11px; color:var(--ghost); margin-bottom:10px;">
        ${payload.symbol} · ${payload.from} – ${payload.to} · ${daily.length} bar (preview 100 bar terakhir)
      </div>
      <div class="preview-table-wrap">
        <table class="data-table">
          <thead><tr>${cols.map(c => `<th>${c}</th>`).join('')}</tr></thead>
          <tbody>
            ${rows.map(d => `<tr>${cols.map(c => `<td class="${c === 'date' ? 'sym-cell' : 'num-cell'}">${fmt(d[c])}</td>`).join('')}</tr>`).join('')}
          </tbody>
        </table>
      </div>
    `
  }

  _updateEstimate()
</script>
