<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Collector · IHSG Suite</title>
  <link rel="stylesheet" href="../../shared/ui.css">

  <style>
    .sym-search { position: relative; display: flex; align-items: center; gap: 6px;
      background: #0f0e0c; border: 1px solid var(--line); border-radius: var(--radius);
      padding: 6px 10px; min-width: 160px; }
    .sym-search-icon { color: var(--ghost); font-size: 12px; }
    .sym-search input { background: transparent; border: none; outline: none; width: 110px;
      font-family: var(--f-mono); font-size: 12px; color: var(--paper); text-transform: uppercase; }
    .sym-search input::placeholder { color: var(--ghost); text-transform: none; }
    .sym-dropdown { position: absolute; top: calc(100% + 4px); left: 0; z-index: 30;
      background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
      width: 260px; max-height: 280px; overflow-y: auto; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .sym-option { display: flex; align-items: baseline; gap: 8px; padding: 7px 10px; cursor: pointer; }
    .sym-option:hover { background: var(--panel-hi); }
    .sym-option-code { font-family: var(--f-mono); font-size: 12px; color: var(--paper); flex-shrink: 0; }
    .sym-option-name { font-size: 11px; color: var(--ghost); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sym-dropdown-empty { padding: 10px; font-family: var(--f-mono); font-size: 11px; color: var(--ghost); }

    .collector-grid {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
      align-items: start;
      margin-top: 20px;
    }
    @media (max-width: 760px) {
      .collector-grid { grid-template-columns: 1fr; }
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      padding: 16px;
    }
    .panel + .panel { margin-top: 16px; }

    .panel-title {
      font-family: var(--f-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ghost);
      margin-bottom: 12px;
    }

    .field-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
    .field-row:last-child { margin-bottom: 0; }
    .field-label { font-family: var(--f-mono); font-size: 10px; color: var(--dim); letter-spacing: 0.04em; }
    .date-row { display: flex; gap: 8px; align-items: center; }
    .date-row .input { flex: 1; }
    .date-row span { color: var(--ghost); font-family: var(--f-mono); font-size: 11px; }

    .checkbox-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .check-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 9px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all var(--ease);
      font-family: var(--f-mono);
      font-size: 11px;
      color: var(--dim);
      user-select: none;
    }
    .check-item:hover { border-color: var(--line-hi); }
    .check-item.is-checked { border-color: var(--phosphor-line); color: var(--phosphor); background: var(--phosphor-dim); }
    .check-item input { display: none; }
    .check-item .req-badge { margin-left: auto; font-size: 8px; color: var(--ghost); letter-spacing: 0.05em; }
    .check-item.is-slow { }
    .check-item.is-slow .slow-badge {
      margin-left: auto; font-size: 8px; color: var(--wait); letter-spacing: 0.05em;
    }

    .estimate-box {
      font-family: var(--f-mono); font-size: 11px; color: var(--ghost);
      padding: 10px 12px; border: 1px dashed var(--line); border-radius: var(--radius);
      margin-top: 12px; line-height: 1.6;
    }
    .estimate-box b { color: var(--dim); }
    .estimate-box.is-warn { border-color: rgba(224,179,65,0.3); color: var(--wait); }

    .preview-table-wrap { max-height: 420px; overflow: auto; }
    .empty-hint {
      padding: 60px 20px; text-align: center;
      font-family: var(--f-mono); font-size: 12px; color: var(--ghost);
    }
  </style>
</head>
<body>

<div class="page">

  <header class="app-header" id="app-header"></header>

  <div class="collector-grid">

    <!-- KIRI: KONFIGURASI -->
    <div>
      <div class="panel">
        <div class="panel-title">Emiten</div>
        <div class="sym-search">
          <span class="sym-search-icon">⌕</span>
          <input type="text" id="sym-input" placeholder="cari saham..." maxlength="10" autocomplete="off">
          <div class="sym-dropdown hidden" id="sym-dropdown"></div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Rentang Tanggal</div>
        <div class="field-row">
          <span class="field-label">Dari</span>
          <input type="date" class="input" id="date-from">
        </div>
        <div class="field-row">
          <span class="field-label">Sampai</span>
          <input type="date" class="input" id="date-to">
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Indikator & Data</div>
        <div class="checkbox-grid" id="indicator-grid"></div>
        <div class="estimate-box" id="estimate-box">Pilih tanggal &amp; indikator untuk lihat estimasi.</div>
      </div>

      <div class="panel">
        <button class="btn btn-primary" id="collect-btn" style="width:100%;">Kumpulkan &amp; Export</button>
        <div class="progress-wrap hidden" id="progress-wrap" style="margin-top:12px; margin-bottom:0;"></div>
      </div>
    </div>

    <!-- KANAN: PREVIEW -->
    <div class="panel">
      <div class="panel-title">Preview Data</div>
      <div id="preview-area">
        <div class="empty-hint">Belum ada data. Pilih emiten, rentang tanggal, dan indikator di sebelah kiri, lalu klik "Kumpulkan &amp; Export".</div>
      </div>
    </div>

  </div>

</div>

<script type="module">
  import { TOKEN, setEmitenInfo, has } from '../../shared/store.js'
  import { fetchDaily, fetchBroker, fetchAbsorption, fetchEmitenJson } from '../../shared/api.js'
  import { renderHeader, openTokenPopover, whenTokenReady } from '../../shared/header.js'
  import { bindSymSearch } from '../../shared/symsearch.js'
  import { calcRSI, calcMACD, calcSMA, calcBollinger, calcVWMA, calcVolumeProfilePOC, calcRSIDivergence } from '../../shared/indicators.js'
  import { showProgress, hideProgress, setProgress, logProgress } from '../../shared/fetch-progress.js'

  // ============================================================
  // HEADER
  // ============================================================
  renderHeader(document.getElementById('app-header'), [
    { label: 'IHSG Suite', href: '../../index.html' },
    { label: 'Data Collector' }
  ])

  // ============================================================
  // DEFINISI INDIKATOR — tiap entry tahu cara hitung & apakah perlu
  // request per-hari (lambat) atau cukup 1 request (cepat).
  // ============================================================
  const INDICATOR_DEFS = [
    { id: 'rsi',       label: 'RSI (14)',        group: 'fast', default: true },
    { id: 'macd',      label: 'MACD (12,26,9)',  group: 'fast', default: true },
    { id: 'volume',    label: 'Volume',          group: 'fast', default: true },
    { id: 'maVolume',  label: 'MA Volume (20)',  group: 'fast', default: true },
    { id: 'ma10',      label: 'MA 10',           group: 'fast', default: false },
    { id: 'ma20',      label: 'MA 20',           group: 'fast', default: false },
    { id: 'ma50',      label: 'MA 50',           group: 'fast', default: false },
    { id: 'ma100',     label: 'MA 100',          group: 'fast', default: false },
    { id: 'broker',    label: 'Broker (net buy/sell)', group: 'slow', default: false },
    { id: 'lpm',       label: 'LPM (absorption)',      group: 'slow', default: false },
    { id: 'bbWidth',   label: 'Bollinger Width',  group: 'fast', default: false },
    { id: 'vwma20',    label: 'VWMA (20)',        group: 'fast', default: false },
    { id: 'poc',       label: 'Volume Profile POC', group: 'fast', default: false },
    { id: 'rsiDiv',    label: 'RSI Divergence',   group: 'fast', default: false },
  ]

  const _selected = new Set(INDICATOR_DEFS.filter(d => d.default).map(d => d.id))
  let _currentSym = null

  // ============================================================
  // SEKSI 1: SYM SEARCH
  // ============================================================
  bindSymSearch(
    document.getElementById('sym-input'),
    document.getElementById('sym-dropdown'),
    (code) => { _currentSym = code; _updateEstimate() }
  )

  async function _loadEmitenInfo() {
    if (has.emitenInfo()) return
    try {
      const raw = await fetchEmitenJson()
      setEmitenInfo(raw)
    } catch (e) {
      console.warn('[data-collector] gagal load emiten.json:', e.message)
    }
  }
  _loadEmitenInfo()

  // ============================================================
  // SEKSI 2: TANGGAL DEFAULT (1 tahun terakhir)
  // ============================================================
  const dateFromEl = document.getElementById('date-from')
  const dateToEl   = document.getElementById('date-to')

  const today = new Date()
  const oneYearAgo = new Date(today)
  oneYearAgo.setFullYear(today.getFullYear() - 1)

  dateToEl.value   = today.toISOString().slice(0, 10)
  dateFromEl.value = oneYearAgo.toISOString().slice(0, 10)

  dateFromEl.addEventListener('change', _updateEstimate)
  dateToEl.addEventListener('change', _updateEstimate)

  // ============================================================
  // SEKSI 3: CHECKBOX INDIKATOR
  // ============================================================
  const gridEl = document.getElementById('indicator-grid')
  gridEl.innerHTML = INDICATOR_DEFS.map(d => `
    <label class="check-item ${_selected.has(d.id) ? 'is-checked' : ''} ${d.group === 'slow' ? 'is-slow' : ''}" data-id="${d.id}">
      <input type="checkbox" ${_selected.has(d.id) ? 'checked' : ''}>
      <span>${d.label}</span>
      ${d.group === 'slow' ? '<span class="slow-badge">PER HARI</span>' : ''}
    </label>
  `).join('')

  gridEl.querySelectorAll('.check-item').forEach(el => {
    el.addEventListener('click', (e) => {
      e.preventDefault()
      const id = el.dataset.id
      if (_selected.has(id)) { _selected.delete(id); el.classList.remove('is-checked'); el.querySelector('input').checked = false }
      else { _selected.add(id); el.classList.add('is-checked'); el.querySelector('input').checked = true }
      _updateEstimate()
    })
  })

  // ============================================================
  // SEKSI 4: ESTIMASI REQUEST
  // ============================================================
  function _tradingDaysBetween(from, to) {
    // Estimasi kasar: ~5/7 hari adalah hari bursa (exclude weekend, TIDAK exclude libur nasional)
    const fromD = new Date(from)
    const toD   = new Date(to)
    const totalDays = Math.max(0, Math.round((toD - fromD) / 86400000))
    return Math.round(totalDays * 5 / 7)
  }

  function _updateEstimate() {
    const box = document.getElementById('estimate-box')
    if (!_currentSym) {
      box.className = 'estimate-box'
      box.textContent = 'Pilih emiten terlebih dulu.'
      return
    }
    const days = _tradingDaysBetween(dateFromEl.value, dateToEl.value)
    const needsBroker = _selected.has('broker')
    const needsLpm    = _selected.has('lpm')
    const slowCount = (needsBroker ? days : 0) + (needsLpm ? days : 0)

    let html = `<b>${_currentSym}</b> · ~${days} hari bursa dalam rentang ini.<br>`
    html += `OHLC: <b>1 request</b>.`
    if (slowCount > 0) {
      html += `<br>Broker/LPM: <b>~${slowCount} request</b> (1 per hari per indikator) — bisa makan waktu.`
    }
    box.innerHTML = html
    box.classList.toggle('is-warn', slowCount > 300)
  }

  // ============================================================
  // SEKSI 5: KUMPULKAN DATA
  // ============================================================
  const progressEl = document.getElementById('progress-wrap')
  const collectBtn = document.getElementById('collect-btn')

  collectBtn.addEventListener('click', _collect)

  function _dateRangeArray(from, to) {
    const out = []
    const d = new Date(from)
    const end = new Date(to)
    while (d <= end) {
      const dow = d.getDay()
      if (dow !== 0 && dow !== 6) out.push(d.toISOString().slice(0, 10)) // skip weekend
      d.setDate(d.getDate() + 1)
    }
    return out
  }

  async function _collect() {
    if (!_currentSym) { alert('Pilih emiten dulu.'); return }
    await whenTokenReady()
    if (!TOKEN.isSet()) { openTokenPopover(); return }

    const from = dateFromEl.value
    const to   = dateToEl.value
    if (!from || !to || from > to) { alert('Rentang tanggal tidak valid.'); return }

    collectBtn.disabled = true
    showProgress(progressEl)

    try {
      // ── 1. OHLC (selalu, 1 request) ──
      setProgress(progressEl, 0, 1, 'Mengambil OHLC')
      logProgress(progressEl, `${_currentSym}: fetch OHLC harian...`, 'info')
      const dailyAll = await fetchDaily(_currentSym, to, from)
      const daily = dailyAll.filter(d => d.date >= from && d.date <= to)
      logProgress(progressEl, `${_currentSym}: ${daily.length} bar harian diterima`, 'ok')

      // ── 2. Indikator turunan (cepat, dihitung lokal) ──
      const closes  = daily.map(d => d.close)
      const volumes = daily.map(d => d.volume)

      if (_selected.has('rsi')) {
        const rsi = calcRSI(closes, 14)
        daily.forEach((d, i) => d.rsi = rsi[i])
      }
      if (_selected.has('macd')) {
        const macd = calcMACD(closes)
        daily.forEach((d, i) => { d.macd = macd.macd[i]; d.macdSignal = macd.signal[i]; d.macdHist = macd.hist[i] })
      }
      if (_selected.has('maVolume')) {
        const maVol = calcSMA(volumes, 20)
        daily.forEach((d, i) => d.maVolume20 = maVol[i])
      }
      if (_selected.has('ma10'))  { const ma = calcSMA(closes, 10);  daily.forEach((d, i) => d.ma10  = ma[i]) }
      if (_selected.has('ma20'))  { const ma = calcSMA(closes, 20);  daily.forEach((d, i) => d.ma20  = ma[i]) }
      if (_selected.has('ma50'))  { const ma = calcSMA(closes, 50);  daily.forEach((d, i) => d.ma50  = ma[i]) }
      if (_selected.has('ma100')) { const ma = calcSMA(closes, 100); daily.forEach((d, i) => d.ma100 = ma[i]) }

      if (_selected.has('bbWidth')) {
        const bb = calcBollinger(closes, 20, 2)
        daily.forEach((d, i) => {
          d.bbWidth = (bb.upper[i] != null && bb.middle[i]) ? (bb.upper[i] - bb.lower[i]) / bb.middle[i] * 100 : null
        })
      }
      if (_selected.has('vwma20')) {
        const vwma = calcVWMA(closes, volumes, 20)
        daily.forEach((d, i) => d.vwma20 = vwma[i])
      }
      if (_selected.has('poc')) {
        const poc = calcVolumeProfilePOC(daily, 60, 20)
        daily.forEach((d, i) => d.poc60 = poc[i])
      }
      if (_selected.has('rsiDiv')) {
        const rsiForDiv = _selected.has('rsi') ? daily.map(d => d.rsi) : calcRSI(closes, 14)
        const divFlags = calcRSIDivergence(closes, rsiForDiv, 3)
        daily.forEach((d, i) => d.rsiBullishDiv = divFlags[i])
      }

      // ── 3. Broker & LPM (lambat, per hari) ──
      const dateList = _dateRangeArray(from, to)
      const brokerByDate = {}
      const lpmByDate = {}

      const needsBroker = _selected.has('broker')
      const needsLpm    = _selected.has('lpm')

      if (needsBroker || needsLpm) {
        const tasks = []
        if (needsBroker) tasks.push(...dateList.map(date => ({ type: 'broker', date })))
        if (needsLpm)    tasks.push(...dateList.map(date => ({ type: 'lpm', date })))

        for (let i = 0; i < tasks.length; i++) {
          const t = tasks[i]
          setProgress(progressEl, i + 1, tasks.length, `${t.type.toUpperCase()} ${t.date}`)
          try {
            if (t.type === 'broker') {
              const res = await fetchBroker(_currentSym, t.date, t.date)
              brokerByDate[t.date] = res
            } else {
              const res = await fetchAbsorption(_currentSym, t.date)
              const totalBuy  = res.buy.reduce((s, x) => s + x.value, 0)
              const totalSell = res.sell.reduce((s, x) => s + x.value, 0)
              lpmByDate[t.date] = { buy: totalBuy, sell: totalSell, net: totalBuy - totalSell }
            }
          } catch (e) {
            logProgress(progressEl, `${t.date}: ${e.code || e.message}`, e.code === 'EMPTY_RESPONSE' ? 'warn' : 'err')
          }
        }
        logProgress(progressEl, `Selesai mengambil data per-hari (${tasks.length} request)`, 'ok')
      }

      // Gabungkan broker/lpm ke daily by date
      if (needsBroker) daily.forEach(d => d.broker = brokerByDate[d.date] || null)
      if (needsLpm)    daily.forEach(d => d.lpm    = lpmByDate[d.date]    || null)

      // ── 4. Export ──
      const exportPayload = {
        symbol: _currentSym,
        from, to,
        indicators: [...selectedLabelsForExport()],
        exportedAt: new Date().toISOString(),
        daily
      }

      _renderPreview(daily, exportPayload)
      _downloadJson(exportPayload)

      logProgress(progressEl, 'Export selesai — file ter-download.', 'ok')
    } catch (e) {
      logProgress(progressEl, `Gagal: ${e.code || e.message}`, 'err')
      if (e.code === 'TOKEN_EXPIRED') openTokenPopover()
    } finally {
      collectBtn.disabled = false
      setTimeout(() => hideProgress(progressEl), 1500)
    }
  }

  function selectedLabelsForExport() {
    return INDICATOR_DEFS.filter(d => _selected.has(d.id)).map(d => d.id)
  }

  function _downloadJson(payload) {
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' })
    const url = URL.createObjectURL(blob)
    const a = document.createElement('a')
    a.href = url
    a.download = `ihsg-${payload.symbol}-${payload.from}_${payload.to}.json`
    a.click()
    URL.revokeObjectURL(url)
  }

  // ============================================================
  // SEKSI 6: PREVIEW TABLE
  // ============================================================
  function _renderPreview(daily, payload) {
    const area = document.getElementById('preview-area')
    if (!daily.length) {
      area.innerHTML = `<div class="empty-hint">Tidak ada data pada rentang ini.</div>`
      return
    }

    const cols = ['date', 'close', 'volume']
    if (_selected.has('rsi'))      cols.push('rsi')
    if (_selected.has('macd'))     cols.push('macdHist')
    if (_selected.has('maVolume')) cols.push('maVolume20')
    if (_selected.has('ma10'))     cols.push('ma10')
    if (_selected.has('ma20'))     cols.push('ma20')
    if (_selected.has('ma50'))     cols.push('ma50')
    if (_selected.has('ma100'))    cols.push('ma100')
    if (_selected.has('bbWidth'))  cols.push('bbWidth')
    if (_selected.has('vwma20'))   cols.push('vwma20')
    if (_selected.has('poc'))      cols.push('poc60')
    if (_selected.has('rsiDiv'))   cols.push('rsiBullishDiv')
    if (_selected.has('broker'))   cols.push('broker')
    if (_selected.has('lpm'))      cols.push('lpm')

    const fmt = (v) => {
      if (v === null || v === undefined) return '–'
      if (typeof v === 'boolean') return v ? '✓' : '–'
      if (typeof v === 'number') return v.toLocaleString('id-ID', { maximumFractionDigits: 2 })
      if (typeof v === 'object') return v.net !== undefined ? v.net.toLocaleString('id-ID') : JSON.stringify(v).slice(0, 30)
      return v
    }

    const rows = daily.slice(-100) // preview 100 bar terakhir saja, file lengkap tetap di-download

    area.innerHTML = `
      <div style="font-family:var(--f-mono); font-size:11px; color:var(--ghost); margin-bottom:10px;">
        ${payload.symbol} · ${payload.from} – ${payload.to} · ${daily.length} bar (preview 100 bar terakhir)
      </div>
      <div class="preview-table-wrap">
        <table class="data-table">
          <thead><tr>${cols.map(c => `<th>${c}</th>`).join('')}</tr></thead>
          <tbody>
            ${rows.map(d => `<tr>${cols.map(c => `<td class="${c === 'date' ? 'sym-cell' : 'num-cell'}">${fmt(d[c])}</td>`).join('')}</tr>`).join('')}
          </tbody>
        </table>
      </div>
    `
  }

  _updateEstimate()
</script>

</body>
</html>
