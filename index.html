<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IHSG Suite</title>
  <link rel="stylesheet" href="shared/ui.css">

  <style>
    /* =========================================================
       Khusus halaman landing — di luar token shared/ui.css
       ========================================================= */

    .page { display: grid; grid-template-rows: auto auto 1fr auto; }

    /* ── HERO ── */
    .hero {
      padding: 40px 0 28px;
      border-bottom: 1px solid var(--line);
    }

    .hero-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 28px;
    }

    .hero-logo {
      font-family: var(--f-mono);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ghost);
      margin-bottom: 8px;
    }

    .hero-title {
      font-family: var(--f-mono);
      font-size: 26px;
      font-weight: 300;
      letter-spacing: -0.02em;
      color: var(--paper);
      line-height: 1.15;
    }
    .hero-title span { color: var(--ghost); }

    .market-badge {
      display: flex; align-items: center; gap: 6px;
      font-family: var(--f-mono); font-size: 11px; color: var(--dim); letter-spacing: 0.08em;
      padding-top: 4px;
    }
    .market-badge.live  { color: var(--live); }
    .market-badge.down  { color: var(--down); }

    /* ── TERMINAL SEARCH PROMPT — signature element ── */
    .terminal {
      background: #0e0d0b;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: border-color var(--ease);
    }
    .terminal:focus-within { border-color: var(--phosphor-line); }

    .terminal-prompt {
      font-family: var(--f-mono);
      font-size: 14px;
      color: var(--phosphor);
      flex-shrink: 0;
      user-select: none;
    }

    .terminal-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: var(--f-mono);
      font-size: 14px;
      color: var(--paper);
      caret-color: var(--phosphor);
    }
    .terminal-input::placeholder { color: var(--ghost); }

    .terminal-cursor {
      width: 8px; height: 16px;
      background: var(--phosphor);
      animation: blink 1s step-end infinite;
      flex-shrink: 0;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .terminal-count {
      font-family: var(--f-mono);
      font-size: 11px;
      color: var(--ghost);
      letter-spacing: 0.05em;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .terminal-count b { color: var(--phosphor); font-weight: 500; }

    /* ── MAIN BODY: 2 kolom ── */
    .body-layout {
      display: grid;
      grid-template-columns: 260px 1fr 280px;
      gap: 24px;
      align-items: start;
    }

    /* ── MONITOR KIRI — RAJA IEP/ORB real-time ── */
    .monitor-panel { padding: 28px 0; display: flex; flex-direction: column; gap: 10px; }
    .monitor-label { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ghost); margin-bottom: 4px; }
    .monitor-card { border: 1px solid var(--line); border-radius: var(--radius); background: var(--panel); overflow: hidden; }
    .monitor-card-header { display: flex; align-items: center; justify-content: space-between; padding: 7px 10px; border-bottom: 1px solid var(--line); background: var(--raised); }
    .monitor-sym { font-family: var(--f-mono); font-size: 11px; font-weight: 700; color: var(--dim); letter-spacing: 0.05em; }
    .monitor-badge { font-family: var(--f-mono); font-size: 9px; padding: 1px 5px; border-radius: 3px; background: var(--phosphor); color: var(--bg); font-weight: 700; }
    .monitor-body { padding: 10px; display: flex; flex-direction: column; gap: 6px; }
    .monitor-row { display: flex; justify-content: space-between; align-items: center; font-family: var(--f-mono); font-size: 11px; }
    .monitor-key { color: var(--ghost); }
    .monitor-val { color: var(--dim); font-weight: 600; }
    .monitor-val.up { color: var(--live); }
    .monitor-val.down { color: var(--down); }
    .monitor-val.warn { color: #fbbf24; }
    .monitor-status { margin-top: 4px; padding: 6px 8px; border-radius: 4px; font-family: var(--f-mono); font-size: 10px; line-height: 1.5; background: var(--raised); }
    .monitor-status.orb-up    { border-left: 2px solid var(--live); }
    .monitor-status.orb-wait  { border-left: 2px solid #fbbf24; }
    .monitor-status.orb-avoid { border-left: 2px solid var(--down); }
    .monitor-status.orb-none  { border-left: 2px solid var(--ghost); }
    .monitor-refresh { font-family: var(--f-mono); font-size: 9px; color: var(--ghost); text-align: right; padding: 4px 10px 6px; }
    .monitor-enter-btn { display: block; width: calc(100% - 20px); margin: 0 10px 10px; padding: 6px; background: var(--phosphor); color: var(--bg); border: none; border-radius: 4px; font-family: var(--f-mono); font-size: 11px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
    .monitor-enter-btn:hover { opacity: 0.85; }
    .monitor-enter-btn:disabled { opacity: 0.35; cursor: default; }

    /* ── FEATURE LIST ── */
    .feature-section { padding: 28px 0; }

    .feature-list {
      display: flex;
      flex-direction: column;
      gap: 1px;
      background: var(--line);
      border: 1px solid var(--line);
    }

    .feature-row {
      background: var(--ink);
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      transition: background var(--ease);
      position: relative;
    }
    .feature-row:hover { background: var(--panel); }
    .feature-row.is-soon { cursor: default; }

    .feature-row-status { flex-shrink: 0; }
    .feature-row-main { min-width: 0; }

    .feature-row-name {
      font-family: var(--f-mono);
      font-size: 13px;
      color: var(--paper);
      margin-bottom: 2px;
    }
    .feature-row-name mark {
      background: transparent;
      color: var(--phosphor);
      text-decoration: underline;
      text-decoration-color: var(--phosphor-line);
    }

    .feature-row-desc {
      font-size: 12px;
      color: var(--dim);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .feature-row-tag {
      font-family: var(--f-mono);
      font-size: 9px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ghost);
      border: 1px solid var(--line);
      padding: 3px 8px;
      border-radius: var(--radius);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .feature-row.is-soon .feature-row-tag { color: var(--wait); border-color: rgba(224,179,65,0.3); }

    .feature-row-arrow {
      font-family: var(--f-mono);
      font-size: 14px;
      color: var(--ghost);
      transition: all var(--ease);
      flex-shrink: 0;
    }
    .feature-row:hover .feature-row-arrow { color: var(--dim); transform: translate(2px,-2px); }

    /* ── SIDEBAR ── */
    .sidebar {
      padding: 28px 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .sidebar-label {
      font-family: var(--f-mono);
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ghost);
      margin-bottom: 4px;
    }

    /* Card pembungkus tiap widget */
    .market-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--panel);
    }

    .market-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid var(--line);
    }

    .market-card-title {
      font-family: var(--f-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ghost);
    }

    .market-card-sub {
      font-family: var(--f-mono);
      font-size: 9px;
      color: var(--ghost);
      opacity: 0.6;
    }

    /* Widget TradingView duduk di dalam card */
    .market-card .tv-widget-wrap {
      width: 100%;
      display: block;
    }
    .market-card .tv-widget-wrap iframe {
      border: none;
      display: block;
    }

    .market-card .tv-ticker-wrap {
      width: 100%;
      border-bottom: 1px solid var(--line);
    }
    .market-card .tv-ticker-wrap iframe {
      border: none;
      display: block;
    }

    /* ── FOOTER ── */
    .app-footer {
      padding: 18px 0 28px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      font-family: var(--f-mono);
      font-size: 10px;
      color: var(--ghost);
      letter-spacing: 0.08em;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 860px) {
      .body-layout { grid-template-columns: 1fr; }
      .monitor-panel { display: none; }
      .sidebar { padding-top: 0; }
    }
    @media (max-width: 640px) {
      .feature-row { grid-template-columns: auto 1fr; }
      .feature-row-tag, .feature-row-arrow { display: none; }
      .hero-title { font-size: 21px; }
    }
  </style>
</head>
<body>

<!-- TradingView widgets — load async setelah halaman siap -->
<script>
  function _loadTvTicker(containerId, symbol, title) {
    const wrap = document.getElementById(containerId)
    if (!wrap) return

    const div = document.createElement('div')
    div.className = 'tradingview-widget-container'
    wrap.appendChild(div)

    const inner = document.createElement('div')
    inner.className = 'tradingview-widget-container__widget'
    div.appendChild(inner)

    const script = document.createElement('script')
    script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-tickers.js'
    script.async = true
    script.innerHTML = JSON.stringify({
      symbols: [{ proName: symbol, title }],
      colorTheme: 'dark',
      isTransparent: true,
      showSymbolLogo: false,
      locale: 'id',
    })
    div.appendChild(script)
  }

  function _loadTvCandleWidget(containerId, symbol, height, interval) {
    const wrap = document.getElementById(containerId)
    if (!wrap) return

    const div = document.createElement('div')
    div.id = containerId + '-tv'
    div.className = 'tradingview-widget-container'
    wrap.style.height = height + 'px'
    wrap.appendChild(div)

    const inner = document.createElement('div')
    inner.className = 'tradingview-widget-container__widget'
    div.appendChild(inner)

    const script = document.createElement('script')
    script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js'
    script.async = true
    script.innerHTML = JSON.stringify({
      symbol,
      interval,
      timezone: 'Asia/Jakarta',
      theme: 'dark',
      style: '1',
      locale: 'id',
      autosize: true,
      hide_top_toolbar: true,
      hide_legend: true,
      hide_volume: true,
      allow_symbol_change: false,
      save_image: false,
      backgroundColor: 'rgba(19, 18, 16, 1)',
      gridColor: 'rgba(35, 32, 25, 0.5)',
      withdateranges: false,
      support_host: 'https://www.tradingview.com',
    })
    div.appendChild(script)
  }

  // Tunggu DOM siap baru inject widget
  document.addEventListener('DOMContentLoaded', () => {
    _loadTvTicker('widget-usdidr-ticker', 'PEPPERSTONE:USDIDR', 'USD/IDR')
    _loadTvCandleWidget('widget-usdidr', 'PEPPERSTONE:USDIDR', 240, '60')

    _loadTvTicker('widget-eido-ticker', 'AMEX:EIDO', 'EIDO')
    _loadTvCandleWidget('widget-eido',   'AMEX:EIDO',          240, '60')
  })
</script>

<script type="module">
  import { FEATURES }                          from './shared/features.js'
  import { TOKEN, has, setEmitenInfo }          from './shared/store.js'
  import { fetchMarketStatus, fetchEmitenJson, fetchIntraday } from './shared/api.js'
  import { saveTokenEverywhere, syncTokenFromSheetsIfNeeded } from './shared/header.js'

  // ============================================================
  // RAJA INTRADAY MONITOR
  // Formula: ORB deadline 09:15, exit 10:00
  // Win rate 79.5%, WLB 69.6%, avg +2.36% (n=83, tervalidasi)
  // ============================================================

  function _isMarketHours() {
    const now = new Date()
    const wib = new Date(now.getTime() + 7*3600*1000)
    const day = wib.getUTCDay()
    if (day === 0 || day === 6) return false
    const h = wib.getUTCHours(), m = wib.getUTCMinutes()
    const tot = h*60+m
    return tot >= 8*60+45 && tot < 16*60
  }

  function _wibTime() {
    const wib = new Date(Date.now() + 7*3600*1000)
    return wib.toISOString().slice(11,16)
  }

  let _rajaMonitorTimer = null
  let _rajaData = null   // cache hasil fetch terakhir

  async function _fetchRajaMonitor() {
    if (!TOKEN.isSet()) return
    try {
      const now = Date.now()
      const wib = new Date(now + 7*3600*1000)
      const dateStr = wib.toISOString().slice(0,10)
      const toTs   = Math.floor(now/1000)
      const fromTs = Math.floor(new Date(dateStr+'T01:00:00Z').getTime()/1000)

      const raw = await fetchIntraday('RAJA', toTs, fromTs, 1)
      if (!raw || raw.length === 0) { _renderMonitor(null); return }
      const sort = [...raw].sort((a,b)=>a.unix-b.unix)

      // IEP (08:45-08:59)
      const iepC = sort.filter(c=>{const t=(c.datetime||'').slice(11,16); return t>='08:45'&&t<='08:59'})
      const iepPrice = iepC.length ? iepC[iepC.length-1].close : null
      const iepVol   = iepC.reduce((s,c)=>s+(c.volume||0),0)

      // ORB (09:00-09:04)
      const orbC = sort.filter(c=>{const t=(c.datetime||'').slice(11,16); return t>='09:00'&&t<='09:04'})
      const orbHigh = orbC.length ? Math.max(...orbC.map(c=>c.high)) : null
      const orbLow  = orbC.length ? Math.min(...orbC.map(c=>c.low))  : null

      // ORB breakout check (09:05-09:14, deadline 09:15)
      const postOrb = sort.filter(c=>{const t=(c.datetime||'').slice(11,16); return t>='09:05'&&t<'09:15'})
      const brokenUp = orbHigh && postOrb.some(c=>c.close>orbHigh)

      const timeNow = _wibTime()
      let orbStatus
      if (timeNow < '08:45')       orbStatus = 'pre_iep'
      else if (timeNow < '09:00')  orbStatus = 'iep_forming'
      else if (timeNow < '09:05')  orbStatus = 'orb_forming'
      else if (brokenUp)           orbStatus = 'broken_up'
      else if (timeNow < '09:15')  orbStatus = 'waiting'
      else                         orbStatus = 'no_signal'

      _rajaData = { iepPrice, iepVol, orbHigh, orbLow, orbStatus, brokenUp, timeNow }
      _renderMonitor(_rajaData)
    } catch(e) {
      console.warn('[raja-monitor]', e.message)
    }
  }

  function _renderMonitor(d) {
    const fmt = v => v ? v.toLocaleString('id-ID') : '–'
    const fmtVol = v => v ? (v/1000).toFixed(0)+'rb' : '–'

    const statusEl  = document.getElementById('m-status')
    const iepPEl    = document.getElementById('m-iep-price')
    const iepVEl    = document.getElementById('m-iep-vol')
    const orbHEl    = document.getElementById('m-orb-high')
    const orbLEl    = document.getElementById('m-orb-low')
    const sigEl     = document.getElementById('m-signal')
    const refreshEl = document.getElementById('m-refresh-time')
    const enterBtn  = document.getElementById('m-enter-btn')

    if (!d) {
      statusEl.textContent = 'Belum ada data'
      statusEl.className = 'monitor-val warn'
      return
    }

    iepPEl.textContent = fmt(d.iepPrice)
    iepVEl.textContent = fmtVol(d.iepVol)
    orbHEl.textContent = fmt(d.orbHigh)
    orbLEl.textContent = fmt(d.orbLow)
    refreshEl.textContent = 'Update: ' + d.timeNow + ' WIB'

    const statusMap = {
      'pre_iep':    ['–––',                       'warn',  'orb-none',  'Sebelum IEP (08:45)',                                       false],
      'iep_forming':['IEP AKTIF',                 'warn',  'orb-wait',  '🔔 Lelang berjalan — pantau volume IEP',                    false],
      'orb_forming':['ORB FORMING',               'warn',  'orb-wait',  '⏳ Opening range 09:00–09:04 terbentuk',                    false],
      'broken_up':  ['ENTRY ✓',                   'up',    'orb-up',    '✓ ORB BROKEN UP\nEntry Open 09:00 → exit jam 10:00\nWLB 79.5%, avg +2.36%', true],
      'waiting':    ['MENUNGGU',                  'warn',  'orb-wait',  '⏳ Belum ada ORB breakout (09:05–09:14)\nDeadline: 09:15',   false],
      'no_signal':  ['AVOID ✗',                   'down',  'orb-avoid', '✗ TIDAK ADA ORB — EXIT 09:15\nAvg loss -0.81% (vs stay -3.56%)', false],
    }

    const [stTxt, stCls, sigCls, sigTxt, showBtn] = statusMap[d.orbStatus] || ['–', 'warn', 'orb-none', '–', false]
    statusEl.textContent = stTxt
    statusEl.className = 'monitor-val ' + stCls
    sigEl.className = 'monitor-status ' + sigCls
    sigEl.innerHTML = sigTxt.replace(/\n/g, '<br>')

    if (showBtn) enterBtn.classList.remove('hidden')
    else enterBtn.classList.add('hidden')
  }

  function _startRajaMonitor() {
    if (_rajaMonitorTimer) clearInterval(_rajaMonitorTimer)
    if (!_isMarketHours()) {
      document.getElementById('m-status').textContent = 'Pasar tutup'
      document.getElementById('m-refresh-time').textContent = 'Auto-refresh aktif saat jam bursa'
      return
    }
    _fetchRajaMonitor()
    // refresh tiap 1 menit saat jam bursa
    _rajaMonitorTimer = setInterval(() => {
      if (!_isMarketHours()) { clearInterval(_rajaMonitorTimer); return }
      _fetchRajaMonitor()
    }, 60*1000)
  }

  // Mulai monitor saat token tersedia
  window.addEventListener('ihsg:token-saved', _startRajaMonitor)
  if (TOKEN.isSet()) _startRajaMonitor()

  // ============================================================
  // SEKSI 1: RENDER FEATURE LIST
  // ============================================================

  const listEl  = document.getElementById('featureList')
  const countEl = document.getElementById('terminalCount')
  const footEl  = document.getElementById('footerCount')

  function _highlight(text, query) {
    if (!query) return text
    const idx = text.toLowerCase().indexOf(query.toLowerCase())
    if (idx === -1) return text
    return text.slice(0, idx) +
      '<mark>' + text.slice(idx, idx + query.length) + '</mark>' +
      text.slice(idx + query.length)
  }

  function _matches(feature, query) {
    if (!query) return true
    const q = query.toLowerCase()
    const haystack = [feature.name, feature.desc, ...feature.tags].join(' ').toLowerCase()
    return haystack.includes(q)
  }

  function render(query = '') {
    const filtered = FEATURES.filter(f => _matches(f, query))

    countEl.innerHTML = query
      ? `<b>${filtered.length}</b> / ${FEATURES.length}`
      : ''
    footEl.textContent = `${FEATURES.length} fitur`

    if (!filtered.length) {
      listEl.innerHTML = `<div class="empty-state">Tidak ditemukan. Coba kata kunci lain.</div>`
      return
    }

    listEl.innerHTML = filtered.map(f => {
      const isReady = f.status === 'ready'
      const tag     = isReady ? 'Siap' : 'Segera'
      const tag_    = `<span class="feature-row-tag">${tag}</span>`
      const inner = `
        <span class="feature-row-status">
          <span class="status-dot ${isReady ? 'live' : 'wait'}"></span>
        </span>
        <span class="feature-row-main">
          <div class="feature-row-name">${_highlight(f.name, query)}</div>
          <div class="feature-row-desc">${_highlight(f.desc, query)}</div>
        </span>
        ${tag_}
        <span class="feature-row-arrow">${isReady ? '↗' : '·'}</span>
      `
      return isReady
        ? `<a class="feature-row" href="features/${f.id}/">${inner}</a>`
        : `<div class="feature-row is-soon">${inner}</div>`
    }).join('')
  }

  render()

  // ============================================================
  // SEKSI 2: SEARCH INPUT
  // ============================================================

  const searchInput = document.getElementById('search')
  const cursorEl     = document.getElementById('terminalCursor')

  searchInput.addEventListener('input', e => render(e.target.value))

  function _updateCursorVisibility() {
    const show = document.activeElement !== searchInput && searchInput.value === ''
    cursorEl.classList.toggle('hidden', !show)
  }
  searchInput.addEventListener('focus', _updateCursorVisibility)
  searchInput.addEventListener('blur',  _updateCursorVisibility)
  searchInput.addEventListener('input', _updateCursorVisibility)
  _updateCursorVisibility()

  document.addEventListener('keydown', e => {
    if (document.activeElement === searchInput) return
    if (e.metaKey || e.ctrlKey || e.altKey) return
    if (e.key.length === 1) searchInput.focus()
  })

  // ============================================================
  // SEKSI 3: TOKEN
  // ============================================================

  const tokenBtn    = document.getElementById('tokenBtn')
  const tokenBox    = document.getElementById('tokenBox')
  const tokenInput  = document.getElementById('tokenInput')
  const tokenSaveBtn= document.getElementById('tokenSave')

  function _renderTokenBtn() {
    tokenBtn.textContent = TOKEN.isSet() ? '✓ Token' : 'Token'
    tokenBtn.classList.toggle('btn-primary', TOKEN.isSet())
  }

  tokenBtn.addEventListener('click', () => {
    tokenBox.classList.toggle('hidden')
    if (!tokenBox.classList.contains('hidden')) tokenInput.focus()
  })

  tokenSaveBtn.addEventListener('click', () => {
    const v = tokenInput.value.trim()
    if (!v) return
    saveTokenEverywhere(v)
    _renderTokenBtn()
    tokenBox.classList.add('hidden')
    tokenInput.value = ''
    _loadMarketStatus()
  })

  tokenInput.addEventListener('keydown', e => { if (e.key === 'Enter') tokenSaveBtn.click() })

  _renderTokenBtn()

  window.addEventListener('ihsg:token-saved', () => { _renderTokenBtn(); _loadMarketStatus() })
  syncTokenFromSheetsIfNeeded()

  // ============================================================
  // SEKSI 4: STATUS PASAR
  // ============================================================

  const marketBadge = document.getElementById('marketBadge')
  const marketDot    = document.getElementById('marketDot')
  const marketLabel  = document.getElementById('marketLabel')

  async function _loadMarketStatus() {
    if (!TOKEN.isSet()) { marketLabel.textContent = 'Token belum diisi'; return }
    try {
      const status  = await fetchMarketStatus()
      const isOpen  = status.market === 'open'
      const isIep   = status.iepiev_regular === 'open'
      marketDot.className   = 'status-dot ' + (isOpen || isIep ? 'live' : '')
      marketBadge.className = 'market-badge ' + (isOpen || isIep ? 'live' : '')
      marketLabel.textContent = isIep ? 'Sesi IEP' : isOpen ? 'Pasar buka' : 'Pasar tutup'
    } catch (e) {
      marketLabel.textContent = e.code === 'TOKEN_EXPIRED' ? 'Token expired' : 'Gagal cek status'
      marketDot.className = 'status-dot down'
    }
  }

  // ============================================================
  // SEKSI 5: DATA GLOBAL (emiten.json)
  // ============================================================

  async function _loadEmitenInfo() {
    if (has.emitenInfo()) return
    try {
      const raw = await fetchEmitenJson()
      setEmitenInfo(raw)
    } catch (e) {
      console.warn('[landing] gagal load emiten.json:', e.message)
    }
  }

  // ============================================================
  // SEKSI 6: FOOTER CLOCK
  // ============================================================

  function _tick() {
    document.getElementById('footerTime').textContent =
      new Date().toLocaleString('id-ID', {
        timeZone: 'Asia/Jakarta', day:'2-digit', month:'short', year:'numeric',
        hour:'2-digit', minute:'2-digit', second:'2-digit'
      }) + ' WIB'
  }

  // ============================================================
  // INIT
  // ============================================================

  _loadMarketStatus()
  _loadEmitenInfo()
  _tick()
  setInterval(_tick, 1000)
  setInterval(_loadMarketStatus, 60_000)
</script>

</body>
</html>
