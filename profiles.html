<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IHSG Suite — Pilih Profil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..700;1,400..700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #924628;
      --primary-light: #b15e3d;
      --surface: #fef8f3;
      --surface-glass: rgba(254,248,243,0.60);
      --on-surface: #1d1b19;
      --on-surface-muted: #54433d;
      --outline: #87736c;
      --outline-variant: #dac1b9;
    }

    html, body {
      height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--on-surface);
      background: var(--surface);
      min-height: 100vh;
      position: relative;
    }

    /* ── FILM GRAIN ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.028;
      z-index: 99;
    }

    /* ── BACKGROUND ── */
    .bg-wrap {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }
    .bg-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.06);
      transition: transform 0.1s linear;
      will-change: transform;
    }
    .bg-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(254,248,243,0.12) 0%,
        rgba(254,248,243,0.05) 40%,
        rgba(254,248,243,0.18) 100%
      );
    }

    /* ── LAYOUT ── */
    .layout {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 64px;
      max-width: 1280px;
      width: 100%;
      margin: 0 auto;
    }
    .logo {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 26px;
      font-style: italic;
      font-weight: 500;
      color: var(--primary);
      letter-spacing: -0.01em;
    }
    nav {
      display: flex;
      align-items: center;
      gap: 32px;
    }
    nav a {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--on-surface-muted);
      text-decoration: none;
      transition: color .2s;
    }
    nav a:hover { color: var(--primary); }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
    }

    .glass-card {
      background: var(--surface-glass);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.45);
      border-radius: 20px;
      padding: 56px 64px;
      width: 100%;
      max-width: 1100px;
      text-align: center;
      box-shadow: 0 8px 48px rgba(146,70,40,0.10);
      animation: fadeUp 1.2s cubic-bezier(0.23,1,0.32,1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-eyebrow {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--outline);
      margin-bottom: 14px;
    }
    .card-title {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: clamp(40px, 5vw, 60px);
      font-weight: 400;
      line-height: 1.1;
      color: var(--on-surface);
      margin-bottom: 10px;
    }
    .card-sub {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 18px;
      font-style: italic;
      color: var(--on-surface-muted);
      opacity: 0.75;
      margin-bottom: 52px;
    }

    /* ── PROFILES GRID ── */
    .profiles {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
      max-width: 900px;
      margin: 0 auto;
    }

    .profile-card {
      background: rgba(255,255,255,0.45);
      border-radius: 12px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.6);
      transition: transform .55s cubic-bezier(0.23,1,0.32,1),
                  box-shadow .55s cubic-bezier(0.23,1,0.32,1),
                  border-color .3s;
    }
    .profile-card:hover {
      transform: translateY(-14px);
      box-shadow: 0 24px 48px -8px rgba(146,70,40,0.22);
      border-color: rgba(255,255,255,0.9);
    }

    .profile-img-wrap {
      aspect-ratio: 4/5;
      overflow: hidden;
    }
    .profile-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .7s cubic-bezier(0.23,1,0.32,1);
    }
    .profile-card:hover .profile-img { transform: scale(1.07); }

    .profile-name {
      padding: 14px 0;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 22px;
      font-weight: 500;
      color: var(--on-surface-muted);
      transition: color .2s;
    }
    .profile-card:hover .profile-name { color: var(--primary); }

    .profile-theme-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-bottom: 14px;
      opacity: 0.6;
      transition: opacity .2s;
    }
    .profile-card:hover .profile-theme-dot { opacity: 1; }

    /* Per-profile theme dots */
    .theme-cmbyn     { background: #c4663a; }
    .theme-noir      { background: #1a1208; }
    .theme-forest    { background: #546040; }
    .theme-ocean     { background: #3e6265; }

    /* ── FOOTER ── */
    footer {
      padding: 24px 64px;
      max-width: 1280px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-brand {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--outline);
    }
    .footer-links {
      display: flex;
      gap: 24px;
    }
    .footer-links a {
      font-size: 12px;
      color: var(--on-surface-muted);
      text-decoration: none;
      opacity: 0.7;
      transition: opacity .2s, color .2s;
    }
    .footer-links a:hover { opacity: 1; color: var(--primary); }
    .footer-copy {
      font-size: 12px;
      color: var(--outline);
      opacity: 0.7;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 860px) {
      header, footer { padding: 20px 24px; }
      nav { display: none; }
      .glass-card { padding: 40px 24px; }
      .profiles { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) {
      .profiles { grid-template-columns: repeat(2, 1fr); gap: 14px; }
      .card-title { font-size: 34px; }
    }
  </style>
</head>
<body>

<!-- Background -->
<div class="bg-wrap">
  <img
    class="bg-img"
    id="bgImg"
    src="https://images.unsplash.com/photo-1523531294919-4bcd7c65e216?w=1800&q=85&auto=format&fit=crop"
    alt=""
    aria-hidden="true"
  >
  <div class="bg-overlay"></div>
</div>

<!-- Layout -->
<div class="layout">

  <header>
    <span class="logo">IHSG Suite</span>
    <nav>
      <a href="index.html">Beranda</a>
      <a href="#about">Tentang</a>
    </nav>
  </header>

  <main>
    <div class="glass-card">
      <p class="card-eyebrow">Pilih Profil Anda</p>
      <h1 class="card-title">Selamat Datang Kembali</h1>
      <p class="card-sub">"Membaca arus diam kapital dengan sabar"</p>

      <div class="profiles">

        <a class="profile-card" href="rudi.html" onclick="selectProfile('Rudi','cmbyn')">
          <div class="profile-img-wrap">
            <img class="profile-img"
              src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400&q=80&auto=format&fit=crop&crop=face"
              alt="Rudi">
          </div>
          <div class="profile-name">Rudi</div>
          <span class="profile-theme-dot theme-cmbyn"></span>
        </a>

        <a class="profile-card" href="index.html" onclick="selectProfile('Fajar','noir')">
          <div class="profile-img-wrap">
            <img class="profile-img"
              src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=400&q=80&auto=format&fit=crop&crop=face"
              alt="Fajar">
          </div>
          <div class="profile-name">Fajar</div>
          <span class="profile-theme-dot theme-noir"></span>
        </a>

        <a class="profile-card" href="index.html" onclick="selectProfile('Muhajir','forest')">
          <div class="profile-img-wrap">
            <img class="profile-img"
              src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=400&q=80&auto=format&fit=crop&crop=face"
              alt="Muhajir">
          </div>
          <div class="profile-name">Muhajir</div>
          <span class="profile-theme-dot theme-forest"></span>
        </a>

        <a class="profile-card" href="index.html" onclick="selectProfile('Wisnu','ocean')">
          <div class="profile-img-wrap">
            <img class="profile-img"
              src="https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?w=400&q=80&auto=format&fit=crop&crop=face"
              alt="Wisnu">
          </div>
          <div class="profile-name">Wisnu</div>
          <span class="profile-theme-dot theme-ocean"></span>
        </a>

      </div>

      <p style="margin-top:40px; font-size:12px; color:var(--outline); opacity:.65;">
        Bukan kamu? <a href="profiles.html" style="color:var(--primary);opacity:.9;text-underline-offset:2px;">Ganti arsip</a>
      </p>
    </div>
  </main>

  <footer>
    <span class="footer-brand">IHSG Suite</span>
    <div class="footer-links">
      <a href="#">Kebijakan</a>
      <a href="#">Ketentuan</a>
      <a href="#">Keamanan</a>
    </div>
    <span class="footer-copy">© 2025 IHSG Suite. Personal use only.</span>
  </footer>

</div>

<script>
  // Parallax on mouse move
  const bg = document.getElementById('bgImg')
  document.addEventListener('mousemove', (e) => {
    const mx = (e.clientX / window.innerWidth  - 0.5) * 12
    const my = (e.clientY / window.innerHeight - 0.5) * 12
    bg.style.transform = `translate3d(${mx}px,${my}px,0) scale(1.06)`
  })

  // Save profile + theme to localStorage, then navigate
  function selectProfile(name, theme) {
    localStorage.setItem('ihsglab_profile', name)
    localStorage.setItem('ihsglab_theme', theme)
    // href will navigate, just let it through
  }

  // If already logged in redirect straight to index
  // (uncomment if you want auto-skip)
  // if (localStorage.getItem('ihsglab_profile')) location.href = 'index.html'
</script>
</body>
</html>
